<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Kingdoms: Group A vs B</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* --- UNIFIED CONTAINER SYSTEM --- */
        .unified-container { max-width: 1600px; margin: 0 auto; width: 100%; padding: 0 25px; box-sizing: border-box; }

        /* --- ROW 1: NAVIGATION --- */
        .header-top-row { 
            margin-top: 25px; 
            margin-bottom: 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            width: 100%;
        }
        .nav-side-box { display: flex; align-items: center; }
        .nav-side-box.right { min-width: 150px; } /* Symmetry spacer */
        .header-top-row .home-link { position: static; margin: 0; backdrop-filter: none; }

        /* --- LAYOUT GRID --- */
        .comparison-wrapper { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            align-items: start; 
            padding-bottom: 50px;
        }
        
        .group-column { display: flex; flex-direction: column; gap: 15px; min-width: 0; }

        /* --- UI COMPONENTS --- */
        .control-panel { 
            background: var(--glass); 
            backdrop-filter: blur(15px);
            padding: 25px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
        }
        
        .sticky-box {
            position: sticky; 
            top: 15px; 
            z-index: 100;
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px);
            padding: 15px; 
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            border-top: 5px solid var(--primary);
            margin-bottom: 10px; 
            display: none; 
            text-align: center;
        }
        .group-b .sticky-box { border-top-color: #ef4444; }

        .legend-title { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); font-weight: 800; letter-spacing: 0.1em; margin-bottom: 12px; }
        .group-label { font-size: 1.4rem; font-weight: 900; text-align: center; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- INPUTS & BUTTONS --- */
        .search-input-row { display: flex; gap: 12px; }
        input { flex: 1; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-size: 1rem; outline: none; font-weight: 600; }
        input:focus { border-color: var(--primary); }
        
        button { padding: 12px 24px; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; transition: 0.2s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-a { background: var(--primary); }
        .btn-b { background: #ef4444; }

        .legend-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 700; color: white; }
        .color-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        /* --- CHART STYLES --- */
        .chart-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            height: 380px; 
            margin-bottom: 25px; 
        }

        @media (max-width: 1200px) { 
            .comparison-wrapper { grid-template-columns: 1fr; } 
            .header-top-row { grid-template-columns: 1fr auto; }
            .nav-side-box.right { display: none; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;"><div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div><style>@keyframes spin { 100% { transform: rotate(360deg); } }</style></div>

<!-- ROW 1: HEADER -->
<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box">
            <a href="index.html" class="home-link">← Kingdom Hub</a>
        </div>
        <h1 class="page-title-main">Kingdom Comparison</h1>
        <div class="nav-side-box right"></div>
    </div>
</div>

<div class="unified-container">
    <div class="comparison-wrapper">
        <div class="group-column group-a">
            <div class="control-panel">
                <div class="group-label" style="color: var(--primary)">Group A</div>
                <div class="search-input-row">
                    <input type="text" id="inputA" placeholder="IDs: 509, 60, 122" onkeypress="if(event.key==='Enter') runComparison('A')">
                    <button class="btn-a" onclick="runComparison('A')">LOAD A</button>
                </div>
            </div>
            <div id="stickyA" class="sticky-box">
                <div class="legend-title">Active Alliances</div>
                <div class="legend-grid" id="legendA"></div>
            </div>
            <div id="chartsA"></div>
        </div>

        <div class="group-column group-b">
            <div class="control-panel">
                <div class="group-label" style="color: #ef4444">Group B</div>
                <div class="search-input-row">
                    <input type="text" id="inputB" placeholder="IDs: 300, 450, 11" onkeypress="if(event.key==='Enter') runComparison('B')">
                    <button class="btn-b" onclick="runComparison('B')">LOAD B</button>
                </div>
            </div>
            <div id="stickyB" class="sticky-box">
                <div class="legend-title">Active Alliances</div>
                <div class="legend-grid" id="legendB"></div>
            </div>
            <div id="chartsB"></div>
        </div>
    </div>
</div>

<script>
    let fileList = [];
    let charts = { A: {}, B: {} };
    const palette = ['#3b82f6', '#10b981', '#a855f7', '#f59e0b', '#06b6d4', '#f43f5e', '#84cc16', '#ec4899', '#6366f1', '#14b8a6'];

    const metrics = [
        { id: 'Power', label: 'Power', index: 2, showRaw: true },
        { id: 'Merits', label: 'Merits', index: 3, showRaw: true },
        { id: 'MP', label: 'M/P', index: 4, isPercent: true, showRaw: false },
        { id: 'Kills', label: 'Kills', index: 5, showRaw: true },
        { id: 'Deads', label: 'Deads', index: 6, showRaw: true },
        { id: 'Heals', label: 'Heals', index: 7, showRaw: true },
        { id: 'CH25', label: 'CH25', index: 8, showRaw: false },
        { id: 'CH25AP', label: 'CH25 AP', index: 9, showRaw: true }
    ];

    function formatValue(val, isPct) {
        if (val === null) return "N/A";
        if (isPct) return (val * 100).toFixed(2) + '%';
        if (val >= 1e9) return (val / 1e9).toFixed(2) + 'B';
        if (val >= 1e6) return (val / 1e6).toFixed(2) + 'M';
        return val.toLocaleString();
    }

    function formatRaw(value) {
        if (value === null) return "N/A";
        return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    async function init() {
        try {
            const resp = await fetch('Pull/files.json');
            fileList = (await resp.json()).sort();
            ['A', 'B'].forEach(group => {
                const container = document.getElementById(`charts${group}`);
                metrics.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'chart-card';
                    card.innerHTML = `<canvas id="chart-${group}-${m.id}"></canvas>`;
                    container.appendChild(card);
                    setupChart(group, m);
                });
            });
        } catch(e) { console.error("Error loading files.json"); }
        finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    }

    function setupChart(group, m) {
        const ctx = document.getElementById(`chart-${group}-${m.id}`).getContext('2d');
        charts[group][m.id] = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    title: { display: true, text: m.label, font: { size: 14, weight: '900' }, color: '#f8fafc' }, 
                    legend: { display: false },
                    tooltip: {
                        mode: 'index', intersect: false, padding: 12,
                        backgroundColor: 'rgba(15, 23, 42, 0.95)',
                        callbacks: {
                            label: (context) => {
                                const val = context.parsed.y;
                                const formatted = formatValue(val, m.isPercent);
                                const historicalAlliance = context.dataset.historicalAlliances[context.dataIndex] || '---';
                                let label = ` ${historicalAlliance}: ${formatted}`;
                                if (m.showRaw) label += ` | ${formatRaw(val)}`;
                                return label;
                            }
                        }
                    }
                },
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', callback: v => formatValue(v, m.isPercent), font: { size: 10, weight: '600' } } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10, weight: '600' } } }
                }
            }
        });
    }

    async function runComparison(group) {
        const input = document.getElementById(`input${group}`).value;
        const targetIds = input.split(',').map(s => s.trim()).filter(s => s !== "");
        if (!targetIds.length) return;
        const history = {}; targetIds.forEach(id => history[id] = []);
        const latestNameMap = {};
        const lastFile = fileList[fileList.length-1];
        const lastResp = await fetch(`Pull/${lastFile}`);
        const lastCsv = Papa.parse(await lastResp.text(), {skipEmptyLines: true}).data;
        targetIds.forEach(id => { const row = lastCsv.find(r => String(r[0]).trim() === id); latestNameMap[id] = row ? row[1] : `ID ${id}`; });

        await Promise.all(fileList.map(async (f) => {
            try {
                const r = await fetch(`Pull/${f}`);
                const csv = Papa.parse(await r.text(), {skipEmptyLines: true}).data;
                targetIds.forEach(id => {
                    const row = csv.find(r => String(r[0]).trim() === id);
                    if(row) {
                        let mData = {};
                        metrics.forEach(m => { let v = row[m.index]; if(typeof v === 'string') v = v.replace(/,/g,'').replace('%',''); v = parseFloat(v); if(m.isPercent) v = v/100; mData[m.id] = isNaN(v) ? null : v; });
                        history[id].push({ date: f.replace('.csv',''), data: mData, historicalName: row[1] || '---' });
                    }
                });
            } catch(e) {}
        }));

        const labels = fileList.map(f => f.replace('.csv',''));
        const legendDiv = document.getElementById(`legend${group}`);
        const sticky = document.getElementById(`sticky${group}`);
        legendDiv.innerHTML = ''; sticky.style.display = 'block';

        metrics.forEach(m => {
            const chart = charts[group][m.id];
            chart.data.labels = labels;
            chart.data.datasets = targetIds.map((id, i) => {
                const color = palette[i % palette.length];
                const latestAllianceName = latestNameMap[id];
                if(m.id === metrics[0].id) {
                    const item = document.createElement('div'); item.className = 'legend-item';
                    item.innerHTML = `<div class="color-dot" style="background:${color}"></div> <span>${latestAllianceName}</span>`;
                    legendDiv.appendChild(item);
                }
                const points = labels.map(l => history[id].find(pt => pt.date === l));
                return { label: latestAllianceName, data: points.map(p => p ? p.data[m.id] : null), historicalAlliances: points.map(p => p ? p.historicalName : '---'), borderColor: color, backgroundColor: color, fill: false, tension: 0.2, pointRadius: 4, borderWidth: 3 };
            });
            chart.update();
        });
    }
    window.onload = init;
</script>
</body>
</html>
