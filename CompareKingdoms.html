<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compare Kingdoms: Group A vs B</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { 
                display: flex; 
            }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- BASE STYLING --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        .unified-container { 
            max-width: 1600px; 
            margin: 0 auto; 
            width: 100%; 
            padding: 0 25px; 
            box-sizing: border-box; 
        }

        .header-top-row { 
            margin-top: 25px; 
            margin-bottom: 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            width: 100%; 
        }

        .nav-side-box { display: flex; align-items: center; }
        .nav-side-box.right { min-width: 150px; }
        .header-top-row .home-link { position: static; margin: 0; backdrop-filter: none; }

        .comparison-wrapper { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            align-items: start; 
            padding-bottom: 50px; 
        }

        .group-column { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            min-width: 0; 
        }

        .control-panel { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            padding: 25px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border); 
        }

        .sticky-box { 
            position: sticky; 
            top: 15px; 
            z-index: 100; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            border-top: 5px solid var(--primary); 
            margin-bottom: 10px; 
            display: none; 
            text-align: center; 
        }

        .group-b .sticky-box { border-top-color: #ef4444; }

        .legend-title { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: var(--muted); 
            font-weight: 800; 
            letter-spacing: 0.1em; 
            margin-bottom: 12px; 
        }

        .group-label { 
            font-size: 1.4rem; 
            font-weight: 900; 
            text-align: center; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .search-input-row { display: flex; gap: 12px; }

        input { 
            flex: 1; 
            padding: 12px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            color: white; 
            font-size: 1rem; 
            outline: none; 
            font-weight: 600; 
        }

        input:focus { border-color: var(--primary); }

        button { 
            padding: 12px 24px; 
            border-radius: 12px; 
            border: none; 
            color: white; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            transition: 0.2s; 
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-a { background: var(--primary); }
        .btn-b { background: #ef4444; }

        .legend-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            justify-content: center; 
            align-items: center; 
        }

        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: white; 
        }

        .color-dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 3px; 
            flex-shrink: 0; 
        }

        .chart-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border); 
            height: 380px; 
            margin-bottom: 25px; 
        }

        @media (max-width: 1200px) { 
            .comparison-wrapper { grid-template-columns: 1fr; } 
            .header-top-row { grid-template-columns: 1fr auto; } 
            .nav-side-box.right { display: none; } 
        }
        
        #progressContainer { 
            width: 100%; 
            max-width: 600px; 
            height: 10px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            margin: 20px auto; 
            overflow: hidden; 
            border: 1px solid var(--glass-border); 
        }

        #progressBar { 
            width: 0%; 
            height: 100%; 
            background: var(--primary); 
            transition: width 0.1s ease; 
            box-shadow: 0 0 15px var(--primary); 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ROTATE HINT OVERLAY -->
<div id="rotate-hint">
    <div class="rotate-content">
        <div class="phone-icon"></div>
        <p>Landscape view recommended</p>
        <button onclick="document.getElementById('rotate-hint').style.setProperty('display', 'none', 'important')">Dismiss</button>
    </div>
</div>

<div id="loadingOverlay" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s;">
    <div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <div id="status-text" style="margin-top: 20px; font-weight: 900; color: var(--muted); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px;">Initializing...</div>
    <div id="progressContainer"><div id="progressBar"></div></div>
</div>

<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box">
            <a href="index.html" class="home-link btn" style="text-decoration:none; padding:10px 20px; border-radius:12px; border:1px solid var(--glass-border); background:var(--glass); color:white; font-weight:800; font-size:0.7rem;">HOME PAGE</a>
        </div>
        <h1 class="page-title-main">Kingdom Comparison</h1>
        <div class="nav-side-box right"></div>
    </div>
</div>

<div class="unified-container">
    <div class="comparison-wrapper">
        <!-- Group A Column -->
        <div class="group-column group-a">
            <div class="control-panel">
                <div class="group-label" style="color: var(--primary)">Group A</div>
                <div class="search-input-row">
                    <input type="text" id="inputA" placeholder="IDs: 509, 60, 122" onkeypress="if(event.key==='Enter') runComparison('A')" autocomplete="off">
                    <button class="btn-a" id="btnA" onclick="runComparison('A')">LOAD A</button>
                </div>
            </div>
            <div id="stickyA" class="sticky-box">
                <div class="legend-title">Active Alliances</div>
                <div class="legend-grid" id="legendA"></div>
            </div>
            <div id="chartsA"></div>
        </div>

        <!-- Group B Column -->
        <div class="group-column group-b">
            <div class="control-panel">
                <div class="group-label" style="color: #ef4444">Group B</div>
                <div class="search-input-row">
                    <input type="text" id="inputB" placeholder="IDs: 300, 450, 11" onkeypress="if(event.key==='Enter') runComparison('B')" autocomplete="off">
                    <button class="btn-b" id="btnB" onclick="runComparison('B')">LOAD B</button>
                </div>
            </div>
            <div id="stickyB" class="sticky-box">
                <div class="legend-title">Active Alliances</div>
                <div class="legend-grid" id="legendB"></div>
            </div>
            <div id="chartsB"></div>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    
    // --- STATE & CONSTANTS ---
    let fileList = [];
    let charts = { A: {}, B: {} };
    let sosMap = {};
    const palette = ['#3b82f6', '#10b981', '#a855f7', '#f59e0b', '#06b6d4', '#f43f5e', '#84cc16', '#ec4899', '#6366f1', '#14b8a6'];
    
    const metrics = [
        { id: 'Power', label: 'POWER', index: 2, showRaw: true },
        { id: 'Merits', label: 'MERITS', index: 3, showRaw: true },
        { id: 'MP', label: 'M/P RATIO', index: 4, isPercent: true, showRaw: false },
        { id: 'Kills', label: 'KILLS', index: 5, showRaw: true },
        { id: 'Deads', label: 'DEADS', index: 6, showRaw: true },
        { id: 'Heals', label: 'HEALS', index: 7, showRaw: true },
        { id: 'CH25', label: 'CH25', index: 8, showRaw: false },
        { id: 'CH25AP', label: 'CH25 AP', index: 9, showRaw: true }
    ];

    // --- CACHE BUSTING FETCH HELPER ---
    async function fetchLatest(path) {
        const url = `${SUPABASE_URL}/storage/v1/object/authenticated/${BUCKET_DATA}/${path}?t=${Date.now()}`;
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Cache-Control': 'no-cache'
            }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status} for ${path}`);
        return response;
    }

    function formatValue(val, isPct) {
        if (val === null || isNaN(val)) return "N/A";
        if (isPct) return (val * 100).toFixed(2) + '%';
        if (val >= 1e9) return (val / 1e9).toFixed(2) + 'B';
        if (val >= 1e6) return (val / 1e6).toFixed(2) + 'M';
        return val.toLocaleString();
    }

    function formatRaw(value) {
        if (value === null || isNaN(value)) return "N/A";
        return Math.round(value).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
    
    function updateProgress(pct, text) {
        const overlay = document.getElementById('loadingOverlay');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('status-text');
        
        if (overlay) { 
            overlay.style.display = 'flex'; 
            overlay.style.opacity = '1'; 
        }
        if (progressBar) progressBar.style.width = pct + '%';
        if (statusText && text) statusText.textContent = text;
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) { 
            overlay.style.opacity = '0'; 
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 300); 
        }
    }

    async function init() {
        try {
            updateProgress(10, "Fetching Metadata...");
            const [sRes, fRes] = await Promise.all([
                fetchLatest('Pull/SosNames.json'),
                fetchLatest('Pull/files.json')
            ]);
            
            sosMap = await sRes.json();
            fileList = (await fRes.json()).sort();

            updateProgress(30, "Preparing Charts...");
            ['A', 'B'].forEach(group => {
                const container = document.getElementById(`charts${group}`);
                metrics.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'chart-card';
                    card.innerHTML = `<canvas id="chart-${group}-${m.id}"></canvas>`;
                    container.appendChild(card);
                    setupChart(group, m);
                });
            });
            
            updateProgress(100, "Ready");
            setTimeout(hideLoading, 500);

        } catch(e) { 
            console.error("Initialization Error:", e);
            document.getElementById('status-text').textContent = "ERROR: Connection failed.";
            document.getElementById('status-text').style.color = "#ef4444";
        }
    }

    function setupChart(group, m) {
        const ctx = document.getElementById(`chart-${group}-${m.id}`).getContext('2d');
        charts[group][m.id] = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [] 
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { 
                    title: { 
                        display: true, 
                        text: m.label, 
                        font: { size: 14, weight: '900' }, 
                        color: '#f8fafc' 
                    }, 
                    legend: { display: false },
                    tooltip: {
                        mode: 'index', 
                        intersect: false, 
                        padding: 12,
                        backgroundColor: 'rgba(15, 23, 42, 0.95)',
                        callbacks: {
                            label: (context) => {
                                const val = context.parsed.y;
                                const formatted = formatValue(val, m.isPercent);
                                const historicalAlliance = context.dataset.historicalAlliances[context.dataIndex] || '---';
                                let label = ` ${historicalAlliance}: ${formatted}`;
                                if (m.showRaw) label += ` | ${formatRaw(val)}`;
                                return label;
                            }
                        }
                    }
                },
                scales: { 
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { 
                            color: '#94a3b8', 
                            callback: v => formatValue(v, m.isPercent), 
                            font: { size: 10, weight: '600' } 
                        } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { 
                            color: '#94a3b8', 
                            font: { size: 10, weight: '600' } 
                        } 
                    }
                }
            }
        });
    }

    async function runComparison(group) {
        const input = document.getElementById(`input${group}`).value;
        const targetIds = input.split(',').map(s => s.trim()).filter(s => s !== "");
        if (!targetIds.length || !fileList.length) return;
        
        updateProgress(5, "Analyzing Snapshots...");
        const history = {}; 
        targetIds.forEach(id => history[id] = []);
        const latestNameMap = {};
        
        try {
            const lastFile = fileList[fileList.length-1];
            const lastRes = await fetchLatest(`Pull/${lastFile}`);
            const lastCsv = Papa.parse(await lastRes.text(), {skipEmptyLines: true}).data;
            
            targetIds.forEach(id => { 
                const row = lastCsv.find(r => String(r[0]).trim() === id); 
                latestNameMap[id] = row ? `${row[1]} (${id})` : `ID ${id}`; 
            });

            let count = 0;
            const downloadPromises = fileList.map(async (f) => {
                try {
                    const res = await fetchLatest(`Pull/${f}`);
                    const csvData = Papa.parse(await res.text(), {skipEmptyLines: true}).data;
                    const date = f.replace(/\.csv/i, '');
                    
                    targetIds.forEach(id => {
                        const row = csvData.find(r => String(r[0]).trim() === id);
                        if(row) {
                            let mData = {};
                            metrics.forEach(m => { 
                                let v = String(row[m.index] || "0").replace(/,/g,'').replace('%','');
                                let n = parseFloat(v);
                                if(m.isPercent && n > 1) n /= 100;
                                mData[m.id] = isNaN(n) ? null : n; 
                            });
                            history[id].push({ 
                                date, 
                                data: mData, 
                                historicalName: `${row[1]} (${id})` || `ID ${id}` 
                            });
                        }
                    });
                } catch (e) { console.warn(`Snapshot fail: ${f}`); }
                count++;
                updateProgress(10 + (count/fileList.length)*80, `Processing: ${count}/${fileList.length}`);
            });

            await Promise.all(downloadPromises);

            const dateKeys = fileList.map(f => f.replace(/\.csv/i, ''));
            const displayLabels = dateKeys.map(d => sosMap[d] ? `${sosMap[d]} (${d})` : d);
            const legendDiv = document.getElementById(`legend${group}`);
            legendDiv.innerHTML = '';
            document.getElementById(`sticky${group}`).style.display = 'block';

            metrics.forEach(m => {
                const chart = charts[group][m.id];
                chart.data.labels = displayLabels;
                chart.data.datasets = targetIds.map((id, i) => {
                    const color = palette[i % palette.length];
                    const latestDisplayLabel = latestNameMap[id];
                    
                    if(m.id === metrics[0].id) {
                        const item = document.createElement('div'); 
                        item.className = 'legend-item';
                        item.innerHTML = `<div class="color-dot" style="background:${color}"></div> <span>${latestDisplayLabel}</span>`;
                        legendDiv.appendChild(item);
                    }
                    
                    const points = dateKeys.map(d => history[id].find(pt => pt.date === d));
                    return { 
                        label: latestDisplayLabel, 
                        data: points.map(p => p ? p.data[m.id] : null), 
                        historicalAlliances: points.map(p => p ? p.historicalName : '---'), 
                        borderColor: color, 
                        backgroundColor: color, 
                        fill: false, 
                        tension: 0.2, 
                        pointRadius: 4, 
                        borderWidth: 3 
                    };
                });
                chart.update();
            });

            updateProgress(100, "Done");
            setTimeout(hideLoading, 500);

        } catch (err) {
            console.error(err);
            document.getElementById('status-text').textContent = "Process failed. Check connection.";
        }
    }

    window.onload = init;
</script>
</body>
</html>
