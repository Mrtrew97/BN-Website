<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Evolutions</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .brand-logo { position: fixed; bottom: 30px; z-index: 2000; opacity: 0.6; width: 200px; pointer-events: none; user-select: none; transition: 0.4s ease; }
        .logo-right { right: 30px; } .logo-left { left: 30px; }
        @media (max-width: 650px) { .brand-logo { width: 100px; bottom: 15px; } .logo-right { right: 15px; } .logo-left { left: 15px; } }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .header-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; padding-top: 10px; }
        #status-text { text-align: center; margin: 25px auto; font-weight: 900; color: var(--muted); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; background: rgba(255,255,255,0.05); width: fit-content; padding: 8px 30px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .search-container { display: none; justify-content: center; margin-bottom: 20px; }
        .sort-bar { display: none; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .search-box { padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border); width: 100%; max-width: 500px; background: rgba(0,0,0,0.3); color: white; outline: none; font-weight: 600; text-align: center; font-size: 1rem; }
        #cardGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .kd-card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 24px; padding: 24px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 16px; transition: 0.3s; cursor: pointer; position: relative; }
        .kd-card:hover { transform: translateY(-5px); border-color: var(--primary); background: rgba(255,255,255,0.06); }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .kd-id { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
        .kd-ally { font-weight: 800; color: white; font-size: 1.1rem; }
        .snap-count { font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px; color: var(--muted); font-weight: 900; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .stat-box { padding: 16px; border-radius: 20px; border: 1px solid var(--glass-border); border-left-width: 6px; display: flex; flex-direction: column; min-height: 125px; justify-content: space-between; background: rgba(255,255,255,0.02); }
        .stat-label { font-size: 0.65rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.4rem; font-weight: 950; color: white; margin: 4px 0; }
        .range-row { display: flex; justify-content: space-between; margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .range-item { width: 48%; }
        .range-label { font-size: 0.55rem; color: var(--muted); display: block; font-weight: 900; }
        .range-val { font-size: 0.8rem; font-weight: 800; color: white; display: block; }
        .range-date { font-size: 0.6rem; color: var(--muted); display: block; font-weight: 700; opacity: 0.6; }
        .box-mp { border-left-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
        .box-merits { border-left-color: #bb4dc5; background: rgba(187, 77, 197, 0.05); }
        .box-kills { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .box-deads { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .box-heals { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .box-ch { border-left-color: #06b6d4; background: rgba(6, 182, 212, 0.05); }
        .card-hint { text-align: center; font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; opacity: 0.5; }
        #soloModal { display: none; position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(15, 23, 42, 0.9), #000); z-index: 2000; backdrop-filter: blur(25px); overflow-y: auto; padding: 40px 20px; }
        .modal-container { max-width: 1500px; margin: 0 auto; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 40px; padding: 40px; position: relative; box-shadow: 0 0 100px rgba(0,0,0,0.5); }
        .modal-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 50px; border-bottom: 1px solid var(--glass-border); padding-bottom: 30px; }
        .solo-main-title { font-size: 3.5rem; font-weight: 950; text-transform: uppercase; letter-spacing: -3px; color: var(--primary); margin: 0; }
        .solo-sub-title { font-size: 1.2rem; font-weight: 800; color: white; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; }
        .close-view-btn { position: absolute; top: 30px; right: 30px; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #ef4444; padding: 12px 25px; border-radius: 15px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .solo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(650px, 1fr)); gap: 30px; }
        .chart-card-solo { display: grid; grid-template-columns: 1fr 160px; gap: 15px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 28px; border: 1px solid var(--glass-border); height: 350px; }
        .mini-stats-panel { display: flex; flex-direction: column; justify-content: center; gap: 8px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 15px; }
        .mini-stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 14px; border: 1px solid var(--glass-border); border-left: 3px solid var(--primary); }
        .mini-stat-label { font-size: 0.55rem; font-weight: 900; color: var(--muted); text-transform: uppercase; }
        .mini-stat-val { font-size: 0.95rem; font-weight: 900; color: white; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-stat-date { font-size: 0.5rem; color: var(--muted); opacity: 0.7; }
        @media (max-width: 1000px) { .chart-card-solo { grid-template-columns: 1fr; height: auto; } .mini-stats-panel { border-left: none; border-top: 1px solid var(--glass-border); padding-top: 20px; flex-direction: row; flex-wrap: wrap; } }
    </style>
</head>
<body>

<a href="index.html" class="home-link">HOME PAGE</a>

<div class="header-container">
    <h1 class="page-title-main">KINGDOM EVOLUTIONS</h1>
</div>

<div class="search-container" id="searchArea">
    <input type="text" id="searchInput" class="search-box" placeholder="Search Kingdom# or Alliance Name..." oninput="handleSearch()">
</div>

<div class="sort-bar" id="sortBar">
    <button class="sort-btn" onclick="handleSort('id', this)">Kingdom #</button>
    <button class="sort-btn" onclick="handleSort('merits', this)">Merits</button>
    <button class="sort-btn" onclick="handleSort('mp', this)">M/P Ratio</button>
    <button class="sort-btn" onclick="handleSort('kills', this)">Kills</button>
    <button class="sort-btn" onclick="handleSort('deads', this)">Deads</button>
    <button class="sort-btn" onclick="handleSort('heals', this)">Heals</button>
    <button class="sort-btn" onclick="handleSort('ch', this)">CH25</button>
</div>

<div id="status-text">Connecting to Hub...</div>
<div id="cardGrid"></div>

<div style="text-align: center;">
    <button id="loadMoreBtn" class="sort-btn" style="width: 250px; margin: 40px auto; display: none;" onclick="loadMore()">Load More Profiles</button>
</div>

<div id="soloModal">
    <div class="modal-container">
        <button class="close-view-btn" onclick="closeSolo()">CLOSE VIEW</button>
        <div class="modal-header">
            <h1 class="solo-main-title" id="soloTitle">KINGDOM --</h1>
            <div class="solo-sub-title" id="soloAlly">UNKNOWN ALLIANCE</div>
        </div>
        <div class="solo-grid" id="soloGrid"></div>
    </div>
</div>

<script>
    const RENDER_URL = "https://kd-backend-icbu.onrender.com";
    let fileList = [];
    let masterData = {}; 
    let kingdomStats = [];
    let filteredList = [];
    let currentSort = { key: 'id', asc: true };
    let itemsShown = 30;
    const pageSize = 30;
    let activeCharts = [];
    let sosMap = {};

    const metricsConfig = [
        { id: 'Power', label: 'Power', key: 'pwr', colName: 'Power', index: 2, isPct: false },
        { id: 'Merits', label: 'Merits', key: 'd', colName: 'Merits', index: 3, isPct: false },
        { id: 'MP', label: 'M/P Ratio', key: 'e', colName: 'M/P', index: 4, isPct: true },
        { id: 'Kills', label: 'Kills', key: 'f', colName: 'Kills', index: 5, isPct: false },
        { id: 'Deads', label: 'Deads', key: 'g', colName: 'Deads', index: 6, isPct: false },
        { id: 'Heals', label: 'Heals', key: 'h', colName: 'Heals', index: 7, isPct: false },
        { id: 'CH25', label: 'CH25', key: 'ch', colName: 'CH25', index: 8, isPct: false },
        { id: 'CH25AP', label: 'CH25 AP', key: 'ap', colName: 'CH25 AP', index: 9, isPct: false }
    ];

    function formatShorthand(v) {
        if (v === null || isNaN(v)) return "-";
        if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
        if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
        return Math.round(v).toLocaleString();
    }

    function formatRawDots(v) {
        if (v === null || isNaN(v)) return "-";
        return Math.round(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function formatMini(v, isPct) {
        if (v === null || isNaN(v)) return "-";
        if (isPct) return (v * 100).toFixed(2) + '%';
        if (v >= 1e6) return formatShorthand(v);
        return Math.round(v).toLocaleString();
    }

    async function syncIDs() {
        const status = document.getElementById('status-text');
        status.textContent = "Connecting to Archive...";
        try {
            // Updated to fetch through backend proxy
            const sResp = await fetch(`${RENDER_URL}/api/data/Pull/SosNames.json?cb=${Date.now()}`);
            sosMap = sResp.ok ? await sResp.json() : {};

            const resp = await fetch(`${RENDER_URL}/api/data/Pull/files.json`);
            fileList = await resp.json();
            fileList.sort();
            
            for (let i = 0; i < fileList.length; i++) {
                const file = fileList[i];
                status.textContent = `Syncing Snapshot ${i+1}/${fileList.length}...`;
                const r = await fetch(`${RENDER_URL}/api/data/Pull/${file}`);
                const csv = Papa.parse(await r.text(), { skipEmptyLines: true }).data;
                masterData[file] = csv;
            }

            const idSet = new Set();
            Object.values(masterData).forEach(csv => {
                csv.forEach((row, idx) => {
                    if (idx === 0) return;
                    const id = String(row[0]).trim();
                    if (id !== "" && !isNaN(id) && id.length < 5) idSet.add(id);
                });
            });

            const uniqueIDs = Array.from(idSet).sort((a, b) => Number(a) - Number(b));
            
            kingdomStats = uniqueIDs.map(id => {
                let s = {
                    id: Number(id), ally: "Unknown", count: 0, dates: [],
                    pwr: [], d: [], e: [], f: [], g: [], h: [], ch: [], ap: [],
                    src: {
                        d_min: {v: Infinity, s: ""}, d_max: {v: -Infinity, s: ""},
                        e_min: {v: Infinity, s: ""}, e_max: {v: -Infinity, s: ""},
                        f_min: {v: Infinity, s: ""}, f_max: {v: -Infinity, s: ""},
                        g_min: {v: Infinity, s: ""}, g_max: {v: -Infinity, s: ""},
                        h_min: {v: Infinity, s: ""}, h_max: {v: -Infinity, s: ""},
                        pwr_min: {v: Infinity, s: ""}, pwr_max: {v: -Infinity, s: ""},
                        ch_min: {v: Infinity, s: ""}, ch_max: {v: -Infinity, s: ""},
                        ap_min: {v: Infinity, s: ""}, ap_max: {v: -Infinity, s: ""}
                    }
                };

                fileList.forEach(file => {
                    const csv = masterData[file];
                    const headers = csv[0].map(h => h.trim());
                    const row = csv.find(r => String(r[0]).trim() === String(id));
                    const date = file.replace('.csv','');
                    s.dates.push(date);

                    metricsConfig.forEach(m => {
                        let colIdx = headers.indexOf(m.colName);
                        if (colIdx === -1) colIdx = m.index;
                        let val = row ? row[colIdx] : null;
                        let n = null;
                        if (val !== undefined && val !== null && val !== "") {
                            let cleanVal = String(val).replace(/[^0-9.\-]/g, '');
                            n = parseFloat(cleanVal);
                            if (m.isPct && n > 1) n = n / 100;
                            if (isNaN(n)) n = null;
                        }
                        s[m.key].push(n);
                        if (n !== null) {
                            if (row) s.ally = row[1] || s.ally; 
                            if (n < s.src[m.key + '_min'].v) s.src[m.key + '_min'] = { v: n, s: date };
                            if (n > s.src[m.key + '_max'].v) s.src[m.key + '_max'] = { v: n, s: date };
                        }
                    });
                    if (row) s.count++;
                });

                const getAvg = (arr) => {
                    const valid = arr.filter(v => v !== null);
                    return valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : 0;
                };

                s.avgMerits = getAvg(s.d); s.avgMp = getAvg(s.e); s.avgKills = getAvg(s.f);
                s.avgDeads = getAvg(s.g); s.avgHeals = getAvg(s.h); s.avgPwr = getAvg(s.pwr);
                s.avgCh = getAvg(s.ch); s.avgAp = getAvg(s.ap);
                s.searchText = `${s.id} ${s.ally.toLowerCase()}`;
                return s;
            });

            status.textContent = `${kingdomStats.length} Kingdom Profiles Prepared`;
            autoInitialise();
        } catch (err) { 
            status.textContent = "Archive Connection Failed."; 
            console.error(err); 
        }
    }

    function autoInitialise() {
        document.getElementById('searchArea').style.display = 'flex';
        document.getElementById('sortBar').style.display = 'flex';
        applyFilterAndSort();
    }

    function renderGrid() {
        const grid = document.getElementById('cardGrid'); grid.innerHTML = '';
        filteredList.slice(0, itemsShown).forEach(s => {
            const card = document.createElement('div'); card.className = 'kd-card';
            card.onclick = () => openSolo(s.id);
            card.innerHTML = `
                <div class="card-header"><div style="display: flex; gap: 10px; align-items: baseline;"><div class="kd-id">KD ${s.id}</div><div class="kd-ally">${s.ally}</div></div><div class="snap-count">${s.count} Snaps</div></div>
                <div class="stat-grid">
                    <div class="stat-box box-mp"><div><span class="stat-label">M/P Ratio (AVG)</span><div class="stat-value">${(s.avgMp*100).toFixed(2)}%</div></div>${getRangeHTML(s.src.e_min, s.src.e_max, true)}</div>
                    <div class="stat-box box-merits"><div><span class="stat-label">Merits (AVG)</span><div class="stat-value">${formatShorthand(s.avgMerits)}</div></div>${getRangeHTML(s.src.d_min, s.src.d_max, false)}</div>
                    <div class="stat-box box-kills"><div><span class="stat-label">Kills (AVG)</span><div class="stat-value">${formatShorthand(s.avgKills)}</div></div>${getRangeHTML(s.src.f_min, s.src.f_max, false)}</div>
                    <div class="stat-box box-deads"><div><span class="stat-label">Deads (AVG)</span><div class="stat-value">${formatShorthand(s.avgDeads)}</div></div>${getRangeHTML(s.src.g_min, s.src.g_max, false)}</div>
                    <div class="stat-box box-heals"><div><span class="stat-label">Heals (AVG)</span><div class="stat-value">${formatShorthand(s.avgHeals)}</div></div>${getRangeHTML(s.src.h_min, s.src.h_max, false)}</div>
                    <div class="stat-box box-ch"><div><span class="stat-label">CH25 (AVG)</span><div class="stat-value">${Math.round(s.avgCh)}</div></div>${getRangeHTML(s.src.ch_min, s.src.ch_max, false)}</div>
                </div>
                <div class="card-hint">Click card for historical progression</div>
            `;
            grid.appendChild(card);
        });
        document.getElementById('loadMoreBtn').style.display = (itemsShown < filteredList.length) ? 'block' : 'none';
    }

    function openSolo(id) {
        const kd = kingdomStats.find(k => k.id === id); if(!kd) return;
        document.getElementById('soloTitle').textContent = `KINGDOM ${kd.id}`;
        document.getElementById('soloAlly').textContent = kd.ally;
        const container = document.getElementById('soloGrid'); container.innerHTML = ''; activeCharts = [];
        metricsConfig.forEach(m => {
            const plotLabels = []; const plotValues = [];
            kd.dates.forEach((date, index) => {
                const val = kd[m.key][index];
                if (val !== null) {
                    const label = sosMap[date] ? `${sosMap[date]} (${date})` : date;
                    plotLabels.push(label); plotValues.push(val);
                }
            });
            if (plotValues.length === 0) return; 
            const card = document.createElement('div'); card.className = 'chart-card-solo';
            const avgKeyMap = { pwr: 'avgPwr', d: 'avgMerits', e: 'avgMp', f: 'avgKills', g: 'avgDeads', h: 'avgHeals', ch: 'avgCh', ap: 'avgAp' };
            card.innerHTML = `<div style="position: relative; height: 100%;"><canvas id="soloChart-${m.id}"></canvas></div><div class="mini-stats-panel"><div class="mini-stat-box"><span class="mini-stat-label">Average</span><div class="mini-stat-val">${formatMini(kd[avgKeyMap[m.key]], m.isPct)}</div></div><div class="mini-stat-box"><span class="mini-stat-label">Min</span><div class="mini-stat-val">${formatMini(kd.src[m.key+'_min'].v, m.isPct)}</div><div class="mini-stat-date">${sosMap[kd.src[m.key+'_min'].s] || kd.src[m.key+'_min'].s}</div></div><div class="mini-stat-box"><span class="mini-stat-label">Max</span><div class="mini-stat-val">${formatMini(kd.src[m.key+'_max'].v, m.isPct)}</div><div class="mini-stat-date">${sosMap[kd.src[m.key+'_max'].s] || kd.src[m.key+'_max'].s}</div></div></div>`;
            container.appendChild(card);
            const ctx = document.getElementById(`soloChart-${m.id}`).getContext('2d');
            activeCharts.push(new Chart(ctx, {
                type: 'line', 
                data: { labels: plotLabels, datasets: [{ label: m.label, data: plotValues, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3, pointRadius: 5 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: m.label, color: '#fff', font: { size: 14, weight: '900' } }, legend: { display: false }, tooltip: { callbacks: { label: function(context) { let val = context.parsed.y; if (m.isPct) return m.label + ": " + (val * 100).toFixed(2) + "%"; return m.label + ": " + formatRawDots(val); } } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', callback: function(value) { if (m.isPct) return (value * 100).toFixed(1) + '%'; return formatShorthand(value); } } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
            }));
        });
        document.getElementById('soloModal').style.display = 'block'; document.body.style.overflow = 'hidden';
    }

    function getRangeHTML(minObj, maxObj, isPct) { 
        return `<div class="range-row"><div class="range-item"><span class="range-label">MIN</span><span class="range-val">${isPct ? (minObj.v*100).toFixed(2)+'%' : formatShorthand(minObj.v)}</span><span class="range-date">${sosMap[minObj.s] || minObj.s}</span></div><div class="range-item"><span class="range-label">MAX</span><span class="range-val">${isPct ? (maxObj.v*100).toFixed(2)+'%' : formatShorthand(maxObj.v)}</span><span class="range-date">${sosMap[maxObj.s] || maxObj.s}</span></div></div>`; 
    }

    function closeSolo() { document.getElementById('soloModal').style.display = 'none'; document.body.style.overflow = 'auto'; activeCharts.forEach(c => c.destroy()); }
    function handleSearch() { applyFilterAndSort(); }
    function applyFilterAndSort() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredList = kingdomStats.filter(s => s.searchText.includes(query));
        filteredList.sort((a, b) => {
            let valA = a[currentSort.key] || 0, valB = b[currentSort.key] || 0;
            if(currentSort.key === 'id') { valA = a.id; valB = b.id; }
            else if(currentSort.key === 'merits') { valA = a.avgMerits; valB = b.avgMerits; }
            else if(currentSort.key === 'mp') { valA = a.avgMp; valB = b.avgMp; }
            else if(currentSort.key === 'kills') { valA = a.avgKills; valB = b.avgKills; }
            else if(currentSort.key === 'deads') { valA = a.avgDeads; valB = b.avgDeads; }
            else if(currentSort.key === 'heals') { valA = a.avgHeals; valB = b.avgHeals; }
            else if(currentSort.key === 'ch') { valA = a.avgCh; valB = b.avgCh; }
            return currentSort.asc ? valA - valB : valB - valA;
        });
        itemsShown = pageSize; renderGrid();
    }
    function loadMore() { itemsShown += pageSize; renderGrid(); }
    function handleSort(key, btn) { currentSort.asc = (currentSort.key === key) ? !currentSort.asc : false; currentSort.key = key; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); if(btn) btn.classList.add('active'); applyFilterAndSort(); }
    window.onload = syncIDs;
</script>
<img src="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/dadrew%20logo.png" alt="Dadrew Logo" class="brand-logo logo-right">
<img src="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/BE%20NASTi%20Guy.png" alt="BE NASTi Logo" class="brand-logo logo-left">
</body>
