<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Kingdom Evolutions</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { 
                display: flex; 
            }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- BASE STYLES --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.5; 
        }

        .header-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px; 
            padding-top: 10px; 
        }

        .page-title-main { 
            font-size: 3.5rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: -2px; 
            margin: 0; 
        }

        #status-text { 
            text-align: center; 
            margin: 25px auto; 
            font-weight: 900; 
            color: var(--muted); 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 2px; 
            background: rgba(255,255,255,0.05); 
            width: fit-content; 
            padding: 8px 30px; 
            border-radius: 50px; 
            border: 1px solid var(--glass-border); 
        }

        .progress-container { 
            width: 100%; 
            max-width: 600px; 
            height: 10px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            margin: 0 auto 20px auto; 
            display: none; 
            overflow: hidden; 
            border: 1px solid var(--glass-border); 
        }

        #progressBar { 
            width: 0%; 
            height: 100%; 
            background: var(--primary); 
            transition: width 0.1s ease; 
        }

        .search-container { 
            display: none; 
            justify-content: center; 
            margin-bottom: 20px; 
        }

        .sort-bar { 
            display: none; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }

        .sort-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            color: var(--muted); 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .sort-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }

        .search-box { 
            padding: 16px; 
            border-radius: 16px; 
            border: 1px solid var(--glass-border); 
            width: 100%; 
            max-width: 500px; 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
            font-weight: 600; 
            text-align: center; 
            font-size: 1rem; 
        }

        /* --- CARDS GRID --- */
        #cardGrid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); 
            gap: 25px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .kd-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border-radius: 24px; 
            padding: 24px; 
            border: 1px solid var(--glass-border); 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            transition: 0.3s; 
            cursor: pointer; 
            position: relative; 
        }

        .kd-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--primary); 
            background: rgba(255,255,255,0.06); 
        }

        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--glass-border); 
            padding-bottom: 15px; 
        }

        .kd-id { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
        .kd-ally { font-weight: 800; color: white; font-size: 1.1rem; }
        .snap-count { font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px; color: var(--muted); font-weight: 900; }

        .stat-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 14px; 
        }

        .stat-box { 
            padding: 16px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            border-left-width: 6px; 
            display: flex; 
            flex-direction: column; 
            min-height: 125px; 
            justify-content: space-between; 
            background: rgba(255,255,255,0.02); 
        }

        .stat-label { font-size: 0.65rem; font-weight: 900; color: var(--muted); text-transform: uppercase; }
        .stat-value { font-size: 1.4rem; font-weight: 950; color: white; margin: 4px 0; }
        
        .range-row { display: flex; justify-content: space-between; margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .range-item { width: 48%; }
        .range-label { font-size: 0.55rem; color: var(--muted); display: block; font-weight: 900; }
        .range-val { font-size: 0.8rem; font-weight: 800; color: white; display: block; }
        .range-date { font-size: 0.6rem; color: var(--muted); display: block; font-weight: 700; opacity: 0.6; }

        .box-mp { border-left-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
        .box-merits { border-left-color: #bb4dc5; background: rgba(187, 77, 197, 0.05); }
        .box-kills { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .box-deads { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .box-heals { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .box-ch { border-left-color: #06b6d4; background: rgba(6, 182, 212, 0.05); }

        /* --- SOLO MODAL --- */
        #soloModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, rgba(15, 23, 42, 1), #000); 
            z-index: 2000; 
            backdrop-filter: blur(25px); 
            overflow-y: auto; 
            padding: 20px; 
        }

        .modal-container { 
            max-width: auto; 
            margin: 0 auto; 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            border-radius: 40px; 
            padding: 50px; 
            position: relative; 
            box-shadow: 0 0 100px rgba(0,0,0,0.5); 
        }

        .modal-header { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            margin-bottom: 40px; 
            border-bottom: 1px solid var(--glass-border); 
            padding-bottom: 20px; 
        }

        .solo-main-title { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 950; text-transform: uppercase; letter-spacing: -3px; color: var(--primary); margin: 0; }
        .solo-sub-title { font-size: 1.1rem; font-weight: 800; color: white; opacity: 0.6; text-transform: uppercase; }

        .close-view-btn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(239, 68, 68, 0.2); 
            border: 1px solid rgba(239, 68, 68, 0.4); 
            color: #ef4444; 
            padding: 10px 20px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            z-index: 2100;
        }

        .solo-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); 
            gap: 20px; 
        }

        .chart-card-solo { 
            display: flex; 
            flex-direction: row; 
            background: rgba(255,255,255,0.02); 
            padding: 20px; 
            border-radius: 28px; 
            border: 1px solid var(--glass-border); 
            height: 400px; 
            gap: 15px;
        }

        .chart-wrapper-internal {
            flex: 1;
            position: relative;
            min-width: 0; /* Prevents flex items from overflowing container */
        }

        .mini-stats-panel { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            gap: 8px; 
            border-left: 1px solid rgba(255,255,255,0.1); 
            padding-left: 15px; 
            width: 160px;
            flex-shrink: 0;
        }

        .mini-stat-box { 
            background: rgba(0,0,0,0.3); 
            padding: 10px; 
            border-radius: 14px; 
            border: 1px solid var(--glass-border); 
            border-left: 3px solid var(--primary); 
        }

        .mini-stat-label { font-size: 0.55rem; font-weight: 900; color: var(--muted); text-transform: uppercase; }
        .mini-stat-val { font-size: 1rem; font-weight: 900; color: white; margin-top: 2px; }
        .mini-stat-date { font-size: 0.5rem; color: var(--muted); opacity: 0.7; }

        /* ============================================================
           FIXED: DYNAMIC LANDSCAPE MOBILE ADAPTATION
           ============================================================ */
        @media (max-height: 550px) and (orientation: landscape) { 
            .modal-container {
                padding: 20px !important;
            }
            .solo-grid {
                grid-template-columns: 1fr !important;
                gap: 15px !important;
            }
            .chart-card-solo { 
                flex-direction: column !important; /* Stats move to bottom */
                height: 450px !important; 
            } 
            .mini-stats-panel { 
                border-left: none !important; 
                border-top: 1px solid var(--glass-border); 
                padding-top: 15px !important; 
                padding-left: 0 !important;
                flex-direction: row !important; 
                width: 100% !important;
                height: auto !important;
                justify-content: space-around;
            } 
            .mini-stat-box {
                flex: 1;
                text-align: center;
            }
        }

        @media (max-width: 700px) {
            .solo-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="rotate-hint">
    <div class="rotate-content">
        <div class="phone-icon"></div>
        <p>Landscape view recommended</p>
        <button onclick="document.getElementById('rotate-hint').style.setProperty('display', 'none', 'important')">Dismiss</button>
    </div>
</div>

<a href="index.html" class="home-link">HOME PAGE</a>

<div class="header-container">
    <h1 class="page-title-main">KINGDOM EVOLUTIONS</h1>
</div>

<div class="search-container" id="searchArea">
    <input type="text" id="searchInput" class="search-box" placeholder="Search Kingdom# or Alliance Name..." oninput="handleSearch()">
</div>

<div class="sort-bar" id="sortBar">
    <button class="sort-btn active" onclick="handleSort('id', this)">Kingdom #</button>
    <button class="sort-btn" onclick="handleSort('merits', this)">Merits</button>
    <button class="sort-btn" onclick="handleSort('mp', this)">M/P Ratio</button>
    <button class="sort-btn" onclick="handleSort('kills', this)">Kills</button>
    <button class="sort-btn" onclick="handleSort('deads', this)">Deads</button>
    <button class="sort-btn" onclick="handleSort('heals', this)">Heals</button>
    <button class="sort-btn" onclick="handleSort('ch', this)">CH25</button>
</div>

<div id="status-text">Connecting to Hub...</div>
<div class="progress-container" id="progressContainer"><div id="progressBar"></div></div>
<div id="cardGrid"></div>

<div style="text-align: center;">
    <button id="loadMoreBtn" class="sort-btn" style="width: 250px; margin: 40px auto; display: none;" onclick="loadMore()">Load More Profiles</button>
</div>

<div id="soloModal">
    <div class="modal-container">
        <button class="close-view-btn" onclick="closeSolo()">CLOSE VIEW</button>
        <div class="modal-header">
            <h1 class="solo-main-title" id="soloTitle">KINGDOM --</h1>
            <div class="solo-sub-title" id="soloAlly">UNKNOWN ALLIANCE</div>
        </div>
        <div class="solo-grid" id="soloGrid"></div>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- STATE ---
    let fileList = [];
    let kingdomStats = [];
    let filteredList = [];
    let activeCharts = [];
    let sosMap = {};
    let currentSort = { key: 'id', asc: true };
    let itemsShown = 30;
    const pageSize = 30;

    const metricsConfig = [
        { id: 'Power', label: 'Power', key: 'pwr', colName: 'Top 300 Power', index: 2, isPct: false },
        { id: 'Merits', label: 'Merits', key: 'merits', colName: 'Top 300 Merits', index: 3, isPct: false },
        { id: 'MP', label: 'M/P Ratio', key: 'mp', colName: 'M/P', index: 4, isPct: true },
        { id: 'Kills', label: 'Kills', key: 'kills', colName: 'Top 300 Kills', index: 5, isPct: false },
        { id: 'Deads', label: 'Deads', key: 'deads', colName: 'Top 300 Deads', index: 6, isPct: false },
        { id: 'Heals', label: 'Heals', key: 'heals', colName: 'Top 300 Heals', index: 7, isPct: false },
        { id: 'CH25', label: 'CH25', key: 'ch', colName: 'CH25', index: 8, isPct: false },
        { id: 'CH25AP', label: 'CH25 AP', key: 'ap', colName: 'CH25 AP', index: 9, isPct: false }
    ];

    window.onload = async () => {
        const status = document.getElementById('status-text');
        try {
            updateProgress(0, "Syncing metadata...");
            const timestamp = `?t=${Date.now()}`;
            
            const [sRes, fRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/SosNames.json${timestamp}`),
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/files.json${timestamp}`)
            ]);
            
            sosMap = JSON.parse(await sRes.data.text());
            fileList = JSON.parse(await fRes.data.text()).sort();

            let downloadedCount = 0;
            const downloadPromises = fileList.map(file => 
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${file}${timestamp}`)
                    .then(result => {
                        downloadedCount++;
                        updateProgress((downloadedCount / fileList.length) * 50, `Downloading: ${downloadedCount}/${fileList.length}`);
                        return { file, ...result };
                    })
            );
            const allCSVs = await Promise.all(downloadPromises);

            updateProgress(60, "Building historical timelines...");
            const tempKingdoms = {}; 
            let processedCount = 0;

            for (const { file, data, error } of allCSVs) {
                if (error) continue;
                const csvText = await data.text();
                const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true }).data;
                const date = file.replace(/\.csv/i, '');

                parsed.forEach(row => {
                    const kd = String(row.KD || row['KD#'] || "").trim();
                    if (!kd) return;

                    if (!tempKingdoms[kd]) {
                        tempKingdoms[kd] = { id: kd, ally: "Unknown", count: 0, dates: [], searchText: kd };
                        metricsConfig.forEach(m => tempKingdoms[kd][m.key] = []);
                    }
                    const kingdom = tempKingdoms[kd];
                    kingdom.count++;
                    kingdom.dates.push(date);
                    if (row['#1 Ally']) kingdom.ally = row['#1 Ally'];
                    kingdom.searchText = `${kd} ${kingdom.ally.toLowerCase()}`;

                    metricsConfig.forEach(m => {
                        let val = row[m.colName];
                        let n = null;
                        if (val !== undefined && val !== null && val !== "") {
                            let cleanVal = String(val).replace(/[^0-9.\-]/g, '');
                            n = parseFloat(cleanVal);
                            if (m.isPct && n > 1) n /= 100;
                            if (isNaN(n)) n = null;
                        }
                        kingdom[m.key].push(n);
                    });
                });
                processedCount++;
                updateProgress(60 + (processedCount / fileList.length) * 40, `Processing ${processedCount}/${fileList.length}`);
            }
            
            kingdomStats = Object.values(tempKingdoms).map(s => {
                const getAvg = (arr) => { 
                    const valid = arr.filter(v => v !== null); 
                    return valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : 0; 
                };
                
                const getMinMax = (arr, dateArr) => {
                    let min = {v: Infinity, s: ""}, max = {v: -Infinity, s: ""};
                    arr.forEach((val, i) => {
                        if (val !== null) {
                            if (val < min.v) min = { v: val, s: dateArr[i] };
                            if (val > max.v) max = { v: val, s: dateArr[i] };
                        }
                    });
                    return { min, max };
                };
                
                s.src = {};
                metricsConfig.forEach(m => {
                    const {min, max} = getMinMax(s[m.key], s.dates);
                    s.src[`${m.key}_min`] = min;
                    s.src[`${m.key}_max`] = max;
                });
                
                s.avgMerits = getAvg(s.merits); s.avgMp = getAvg(s.mp); s.avgKills = getAvg(s.kills);
                s.avgDeads = getAvg(s.deads); s.avgHeals = getAvg(s.heals); s.avgPwr = getAvg(s.pwr);
                s.avgCh = getAvg(s.ch); s.avgAp = getAvg(s.ap);
                return s;
            }).sort((a,b) => a.id - b.id);

            status.textContent = `${kingdomStats.length} Historical Records Processed`;
            document.getElementById('progressContainer').style.display = 'none';
            autoInitialise();
        } catch (err) { 
            status.style.color = '#ef4444';
            status.textContent = "Archive Connection Failed."; 
            console.error(err); 
        }
    };
    
    function renderGrid() {
        const grid = document.getElementById('cardGrid'); 
        grid.innerHTML = '';
        filteredList.slice(0, itemsShown).forEach(s => {
            const card = document.createElement('div'); 
            card.className = 'kd-card';
            card.onclick = () => openSolo(s.id);
            card.innerHTML = `
                <div class="card-header"><div style="display: flex; gap: 10px; align-items: baseline;"><div class="kd-id">KD ${s.id}</div><div class="kd-ally">${s.ally}</div></div><div class="snap-count">${s.count} Snaps</div></div>
                <div class="stat-grid">
                    <div class="stat-box box-mp"><div><span class="stat-label">M/P Ratio (AVG)</span><div class="stat-value">${(s.avgMp*100).toFixed(2)}%</div></div>${getRangeHTML(s.src.mp_min, s.src.mp_max, true)}</div>
                    <div class="stat-box box-merits"><div><span class="stat-label">Merits (AVG)</span><div class="stat-value">${formatShorthand(s.avgMerits)}</div></div>${getRangeHTML(s.src.merits_min, s.src.merits_max, false)}</div>
                    <div class="stat-box box-kills"><div><span class="stat-label">Kills (AVG)</span><div class="stat-value">${formatShorthand(s.avgKills)}</div></div>${getRangeHTML(s.src.kills_min, s.src.kills_max, false)}</div>
                    <div class="stat-box box-deads"><div><span class="stat-label">Deads (AVG)</span><div class="stat-value">${formatShorthand(s.avgDeads)}</div></div>${getRangeHTML(s.src.deads_min, s.src.deads_max, false)}</div>
                    <div class="stat-box box-heals"><div><span class="stat-label">Heals (AVG)</span><div class="stat-value">${formatShorthand(s.avgHeals)}</div></div>${getRangeHTML(s.src.heals_min, s.src.heals_max, false)}</div>
                    <div class="stat-box box-ch"><div><span class="stat-label">CH25 (AVG)</span><div class="stat-value">${Math.round(s.avgCh)}</div></div>${getRangeHTML(s.src.ch_min, s.src.ch_max, false)}</div>
                </div>
                <div class="card-hint">Click card for historical progression</div>`;
            grid.appendChild(card);
        });
        document.getElementById('loadMoreBtn').style.display = (itemsShown < filteredList.length) ? 'block' : 'none';
    }

    function openSolo(id) {
        const kd = kingdomStats.find(k => k.id === id); 
        if(!kd) return;
        document.getElementById('soloTitle').textContent = `KINGDOM ${kd.id}`;
        document.getElementById('soloAlly').textContent = kd.ally;
        const container = document.getElementById('soloGrid'); container.innerHTML = ''; activeCharts = [];
        
        const isLandscapeShort = window.innerHeight < 550;

        metricsConfig.forEach(m => {
            const plotLabels = []; 
            const plotValues = [];
            kd.dates.forEach((date, index) => {
                const val = kd[m.key][index];
                if (val !== null) {
                    plotLabels.push(sosMap[date] ? `${sosMap[date]}` : date); 
                    plotValues.push(val);
                }
            });
            if (plotValues.length === 0) return; 

            const card = document.createElement('div'); 
            card.className = 'chart-card-solo';
            const avgKeyMap = { pwr: 'avgPwr', merits: 'avgMerits', mp: 'avgMp', kills: 'avgKills', deads: 'avgDeads', heals: 'avgHeals', ch: 'avgCh', ap: 'avgAp' };
            
            card.innerHTML = `
                <div class="chart-wrapper-internal">
                    <canvas id="soloChart-${m.id}"></canvas>
                </div>
                <div class="mini-stats-panel">
                    <div class="mini-stat-box">
                        <span class="mini-stat-label">Average</span>
                        <div class="mini-stat-val">${formatMini(kd[avgKeyMap[m.key]], m.isPct)}</div>
                    </div>
                    <div class="mini-stat-box">
                        <span class="mini-stat-label">Min</span>
                        <div class="mini-stat-val">${formatMini(kd.src[m.key+'_min'].v, m.isPct)}</div>
                        <div class="mini-stat-date">${sosMap[kd.src[m.key+'_min'].s] || kd.src[m.key+'_min'].s}</div>
                    </div>
                    <div class="mini-stat-box">
                        <span class="mini-stat-label">Max</span>
                        <div class="mini-stat-val">${formatMini(kd.src[m.key+'_max'].v, m.isPct)}</div>
                        <div class="mini-stat-date">${sosMap[kd.src[m.key+'_max'].s] || kd.src[m.key+'_max'].s}</div>
                    </div>
                </div>`;
            container.appendChild(card);
            
            const ctx = document.getElementById(`soloChart-${m.id}`).getContext('2d');
            activeCharts.push(new Chart(ctx, {
                type: 'line', 
                data: { labels: plotLabels, datasets: [{ label: m.label, data: plotValues, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3, pointRadius: isLandscapeShort ? 3 : 5 }] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    layout: {
                        padding: {
                            left: 15,
                            right: 25,
                            top: 10,
                            bottom: 10
                        }
                    },
                    plugins: { 
                        title: { display: true, text: m.label, color: '#fff', font: { size: isLandscapeShort ? 12 : 14, weight: '900' } }, 
                        legend: { display: false }, 
                    }, 
                    scales: { 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: isLandscapeShort ? 8 : 10 }, callback: function(value) { if (m.isPct) return (value * 100).toFixed(1) + '%'; return formatShorthand(value); } } }, 
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: isLandscapeShort ? 8 : 10 }, maxRotation: 45, minRotation: 45 } } 
                    } 
                }
            }));
        });
        document.getElementById('soloModal').style.display = 'block'; document.body.style.overflow = 'hidden';
    }

    function updateProgress(pct, text) {
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('progressBar').style.width = pct + '%';
        if (text) document.getElementById('status-text').textContent = text;
    }
    function autoInitialise() { document.getElementById('searchArea').style.display = 'flex'; document.getElementById('sortBar').style.display = 'flex'; applyFilterAndSort(); }
    function getRangeHTML(minObj, maxObj, isPct) { return `<div class="range-row"><div class="range-item"><span class="range-label">MIN</span><span class="range-val">${isPct ? (minObj.v*100).toFixed(2)+'%' : formatShorthand(minObj.v)}</span><span class="range-date">${sosMap[minObj.s] || minObj.s}</span></div><div class="range-item"><span class="range-label">MAX</span><span class="range-val">${isPct ? (maxObj.v*100).toFixed(2)+'%' : formatShorthand(maxObj.v)}</span><span class="range-date">${sosMap[maxObj.s] || maxObj.s}</span></div></div>`; }
    function closeSolo() { document.getElementById('soloModal').style.display = 'none'; document.body.style.overflow = 'auto'; activeCharts.forEach(c => c.destroy()); }
    function handleSearch() { applyFilterAndSort(); }
    function applyFilterAndSort() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredList = kingdomStats.filter(s => s.searchText.includes(query));
        filteredList.sort((a, b) => {
            const avgKeyMap = { id: 'id', merits: 'avgMerits', mp: 'avgMp', kills: 'avgKills', deads: 'avgDeads', heals: 'avgHeals', ch: 'avgCh' };
            let valA = a[avgKeyMap[currentSort.key]], valB = b[avgKeyMap[currentSort.key]];
            if (currentSort.key === 'id') { valA = parseInt(valA); valB = parseInt(valB); }
            return currentSort.asc ? valA - valB : valB - valA;
        });
        itemsShown = pageSize; renderGrid();
    }
    function loadMore() { itemsShown += pageSize; renderGrid(); }
    function handleSort(key, btn) { 
        if (currentSort.key === key) currentSort.asc = !currentSort.asc;
        else currentSort.asc = (key === 'id'); 
        currentSort.key = key; 
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); 
        if(btn) btn.classList.add('active'); 
        applyFilterAndSort(); 
    }
    function formatShorthand(v) { if (v === null || isNaN(v) || v === Infinity || v === -Infinity) return "-"; if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B'; if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M'; return Math.round(v).toLocaleString(); }
    function formatRawDots(v) { if (v === null || isNaN(v)) return "-"; return Math.round(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function formatMini(v, isPct) { if (v === null || isNaN(v) || v === Infinity || v === -Infinity) return "-"; if (isPct) return (v * 100).toFixed(2) + '%'; if (v >= 1e6) return formatShorthand(v); return Math.round(v).toLocaleString(); }
</script>
</body>
</html>
