<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Intelligence Hub</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- CORE CONFIGURATION --- */
        :root { 
            --primary: #3b82f6; 
            --secondary: #10b981; 
            --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --text: #f8fafc; 
            --muted: #94a3b8;
            /* Stat Accents */
            --brd-merits: #bb4dc5; --brd-kills: #f59e0b; --brd-deads: #ef4444; --brd-heals: #10b981;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.5;
        }

        /* --- NAVIGATION --- */
        .home-link { 
            position: fixed; left: 20px; top: 20px; z-index: 1001; 
            background: var(--glass); border: 1px solid var(--glass-border); 
            color: white; padding: 12px 20px; border-radius: 12px;
            text-decoration: none; font-weight: 800; font-size: 0.75rem; 
            text-transform: uppercase; backdrop-filter: blur(10px); transition: 0.2s;
        }
        .home-link:hover { background: var(--primary); transform: translateY(-2px); }

        .header-container { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .page-title { font-weight: 900; font-size: 2.2rem; text-transform: uppercase; letter-spacing: -2px; color: white; }

        /* --- ACTION CONTROLS --- */
        .controls { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; align-items: center; flex-wrap: wrap; }
        button { 
            padding: 14px 28px; border-radius: 12px; border: 1px solid var(--glass-border); color: white; cursor: pointer; font-weight: 800; 
            transition: all 0.2s; font-size: 0.85rem; text-transform: uppercase; background: var(--glass);
        }
        button:hover:not(:disabled) { transform: translateY(-2px); background: var(--primary); border-color: var(--primary); }
        .btn-scan { background: rgba(59, 130, 246, 0.2); border-color: var(--primary); }
        .btn-compute { background: rgba(16, 185, 129, 0.2); border-color: var(--secondary); }
        .btn-load { background: var(--glass); margin: 40px auto; display: none; width: 250px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- SEARCH & SORTING --- */
        .search-container { display: none; justify-content: center; margin-bottom: 20px; }
        .search-box { 
            padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border); width: 100%; max-width: 500px; 
            background: rgba(0,0,0,0.3); color: white; outline: none; font-weight: 600; text-align: center; font-size: 1rem; transition: 0.2s; 
        }
        .search-box:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

        /* --- GRID & CARDS --- */
        #cardGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .kd-card { 
            background: var(--glass); backdrop-filter: blur(10px); border-radius: 24px; padding: 24px; 
            border: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 16px; transition: 0.3s;
        }
        .kd-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }

        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .kd-id { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
        .kd-ally { font-weight: 800; color: white; font-size: 1.1rem; }
        .snap-count { font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px; color: var(--muted); font-weight: 900; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .stat-box { 
            padding: 16px; border-radius: 20px; border: 1px solid var(--glass-border); border-left-width: 6px;
            display: flex; flex-direction: column; min-height: 125px; justify-content: space-between; 
            background: rgba(255,255,255,0.02);
        }
        .last-row-center { display: flex; justify-content: center; width: 100%; margin-top: 5px; }
        .half-width-box { width: calc(50% - 7px); }

        .stat-label { font-size: 0.65rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.4rem; font-weight: 950; color: white; margin: 4px 0; }
        
        /* --- RANGE DETAILS --- */
        .range-row { display: flex; justify-content: space-between; margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .range-item { width: 48%; }
        .range-label { font-size: 0.55rem; color: var(--muted); display: block; font-weight: 900; }
        .range-val { font-size: 0.8rem; font-weight: 800; color: white; display: block; }
        .range-date { font-size: 0.6rem; color: var(--muted); display: block; font-weight: 700; opacity: 0.6; }

        /* Stat Accents */
        .box-mp { border-left-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
        .box-merits { border-left-color: var(--brd-merits); background: rgba(187, 77, 197, 0.05); }
        .box-kills { border-left-color: var(--brd-kills); background: rgba(245, 158, 11, 0.05); }
        .box-deads { border-left-color: var(--brd-deads); background: rgba(239, 68, 68, 0.05); }
        .box-heals { border-left-color: var(--brd-heals); background: rgba(16, 185, 129, 0.05); }

        #status-text { text-align: center; margin-bottom: 20px; font-weight: 800; color: var(--muted); text-transform: uppercase; font-size: 0.8rem; }

        @media (max-width: 1000px) {
            .home-link { position: static; display: block; margin: 0 auto 20px auto; width: 100px; text-align: center; }
            .header-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<a href="index.html" class="home-link">← Kingdom Hub</a>

<div class="header-container">
    <h1 class="page-title">Intelligence Hub</h1>
</div>

<div class="controls">
    <button class="btn-scan" onclick="syncIDs()">Scan Snapshots</button>
    <button class="btn-compute" id="valBtn" onclick="renderInitial()" disabled>Generate Profiles</button>
</div>

<div class="search-container" id="searchArea">
    <input type="text" id="searchInput" class="search-box" placeholder="Search Kingdom# or Alliance Name..." oninput="handleSearch()">
</div>

<div class="sort-bar" id="sortBar">
    <button class="sort-btn" onclick="handleSort('id', this)">Kingdom # ...</button>
    <button class="sort-btn" onclick="handleSort('merits', this)">Merits ...</button>
    <button class="sort-btn" onclick="handleSort('mp', this)">M/P Ratio <span id="icon-mp"></span></button>
    <button class="sort-btn" onclick="handleSort('kills', this)">Kills <span id="icon-kills"></span></button>
    <button class="sort-btn" onclick="handleSort('deads', this)">Deads <span id="icon-deads"></span></button>
    <button class="sort-btn" onclick="handleSort('heals', this)">Heals <span id="icon-heals"></span></button>
</div>

<div id="status-text">Ready</div>
<div id="cardGrid"></div>

<div style="text-align: center;">
    <button id="loadMoreBtn" class="btn-load" onclick="loadMore()">Load More Profiles</button>
</div>

<script>
    let fileList = [];
    let masterData = {}; 
    let kingdomStats = [];
    let filteredList = [];
    let currentSort = { key: 'id', asc: true };
    let itemsShown = 30;
    const pageSize = 30;

    function formatValue(v, isPct) {
        if (v === null || isNaN(v)) return "-";
        if (isPct) return (v * 100).toFixed(2) + '%';
        if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
        if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
        return Math.round(v).toLocaleString();
    }

    async function syncIDs() {
        const status = document.getElementById('status-text');
        status.textContent = "Fetching Snapshots...";
        try {
            const resp = await fetch('Pull/files.json');
            fileList = await resp.json();
            fileList.sort();
            const idSet = new Set();
            masterData = {}; 

            for (let i = 0; i < fileList.length; i++) {
                const file = fileList[i];
                const r = await fetch(`Pull/${file}`);
                const text = await r.text();
                const csv = Papa.parse(text, { skipEmptyLines: true }).data;
                masterData[file] = csv;
                csv.forEach(row => {
                    const id = String(row[0]).trim();
                    if (id !== "" && !isNaN(id) && id.length < 5) idSet.add(id);
                });
                status.textContent = `Syncing Snapshots... (${i+1}/${fileList.length})`;
            }

            const uniqueIDs = Array.from(idSet).sort((a, b) => Number(a) - Number(b));
            kingdomStats = uniqueIDs.map(id => {
                let s = {
                    id: Number(id), ally: "Unknown", count: 0,
                    d: [], e: [], f: [], g: [], h: [],
                    src: {
                        d_min: {v: Infinity, s: ""}, d_max: {v: -Infinity, s: ""},
                        e_min: {v: Infinity, s: ""}, e_max: {v: -Infinity, s: ""},
                        f_min: {v: Infinity, s: ""}, f_max: {v: -Infinity, s: ""},
                        g_min: {v: Infinity, s: ""}, g_max: {v: -Infinity, s: ""},
                        h_min: {v: Infinity, s: ""}, h_max: {v: -Infinity, s: ""}
                    }
                };
                fileList.forEach(file => {
                    const row = masterData[file].find(r => String(r[0]).trim() === String(id));
                    if (row) {
                        s.count++; s.ally = row[1] || s.ally;
                        const date = file.replace('.csv','');
                        const parse = (idx, isPct) => {
                            let val = row[idx];
                            if (typeof val === 'string') val = val.replace(/,/g, '').replace('%', '');
                            let n = parseFloat(val); if (isPct) n = n / 100;
                            return isNaN(n) ? null : n;
                        };
                        const log = (key, idx, isPct) => {
                            const n = parse(idx, isPct);
                            if (n !== null) {
                                s[key].push(n);
                                if (n < s.src[key + '_min'].v) s.src[key + '_min'] = { v: n, s: date };
                                if (n > s.src[key + '_max'].v) s.src[key + '_max'] = { v: n, s: date };
                            }
                        };
                        log('d', 3, false); log('e', 4, true); log('f', 5, false); log('g', 6, false); log('h', 7, false);
                    }
                });
                const getAvg = (arr) => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
                s.avgMerits = getAvg(s.d); s.avgMp = getAvg(s.e);
                s.avgKills = getAvg(s.f); s.avgDeads = getAvg(s.g); s.avgHeals = getAvg(s.h);
                s.searchText = `${s.id} ${s.ally.toLowerCase()}`;
                return s;
            });
            status.textContent = `${kingdomStats.length} Kingdom Profiles Prepared.`;
            document.getElementById('valBtn').disabled = false;
        } catch (err) { status.textContent = "Error loading files."; console.error(err); }
    }

    function renderInitial() {
        document.getElementById('searchArea').style.display = 'flex';
        document.getElementById('sortBar').style.display = 'flex';
        applyFilterAndSort();
    }

    function handleSearch() { applyFilterAndSort(); }

    function applyFilterAndSort() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredList = kingdomStats.filter(s => s.searchText.includes(query));
        filteredList.sort((a, b) => {
            let valA, valB;
            switch(currentSort.key) {
                case 'id': valA = a.id; valB = b.id; break;
                case 'merits': valA = a.avgMerits; valB = b.avgMerits; break;
                case 'mp': valA = a.avgMp; valB = b.avgMp; break;
                case 'kills': valA = a.avgKills; valB = b.avgKills; break;
                case 'deads': valA = a.avgDeads; valB = b.avgDeads; break;
                case 'heals': valA = a.avgHeals; valB = b.avgHeals; break;
            }
            return currentSort.asc ? valA - valB : valB - valA;
        });
        itemsShown = pageSize;
        renderGrid();
    }

    function loadMore() { itemsShown += pageSize; renderGrid(); }

    function renderGrid() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        filteredList.slice(0, itemsShown).forEach(s => {
            const card = document.createElement('div');
            card.className = 'kd-card';
            card.innerHTML = `
                <div class="card-header">
                    <div style="display: flex; gap: 10px; align-items: baseline;"><div class="kd-id">Kingdom ${s.id}</div><div class="kd-ally">${s.ally}</div></div>
                    <div class="snap-count">${s.count} Snaps</div>
                </div>
                <div class="stat-grid">
                    <div class="stat-box box-merits">
                        <div><span class="stat-label">Merits (AVG)</span><div class="stat-value">${formatValue(s.avgMerits, false)}</div></div>
                        ${getRangeHTML(s.src.d_min, s.src.d_max, false)}
                    </div>
                    <div class="stat-box box-mp">
                        <div><span class="stat-label">M/P Ratio (AVG)</span><div class="stat-value">${formatValue(s.avgMp, true)}</div></div>
                        ${getRangeHTML(s.src.e_min, s.src.e_max, true)}
                    </div>
                </div>
                <div class="stat-grid">
                    <div class="stat-box box-kills">
                        <div><span class="stat-label">Kills (AVG)</span><div class="stat-value">${formatValue(s.avgKills, false)}</div></div>
                        ${getRangeHTML(s.src.f_min, s.src.f_max, false)}
                    </div>
                    <div class="stat-box box-deads">
                        <div><span class="stat-label">Deads (AVG)</span><div class="stat-value">${formatValue(s.avgDeads, false)}</div></div>
                        ${getRangeHTML(s.src.g_min, s.src.g_max, false)}
                    </div>
                </div>
                <div class="last-row-center">
                    <div class="stat-box box-heals half-width-box">
                        <div><span class="stat-label">Heals (AVG)</span><div class="stat-value">${formatValue(s.avgHeals, false)}</div></div>
                        ${getRangeHTML(s.src.h_min, s.src.h_max, false)}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        document.getElementById('loadMoreBtn').style.display = (itemsShown < filteredList.length) ? 'block' : 'none';
    }

    function getRangeHTML(minObj, maxObj, isPct) {
        return `
            <div class="range-row">
                <div class="range-item">
                    <span class="range-label">MIN</span>
                    <span class="range-val">${formatValue(minObj.v, isPct)}</span>
                    <span class="range-date">${minObj.s}</span>
                </div>
                <div class="range-item">
                    <span class="range-label">MAX</span>
                    <span class="range-val">${formatValue(maxObj.v, isPct)}</span>
                    <span class="range-date">${maxObj.s}</span>
                </div>
            </div>`;
    }

    function handleSort(key, btn) {
        if (currentSort.key === key) currentSort.asc = !currentSort.asc;
        else { currentSort.key = key; currentSort.asc = false; }
        
        // UNIFIED GLOW LOGIC:
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        updateSortIcons();
        applyFilterAndSort();
    }

    function updateSortIcons() {
        document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.sort-btn span').forEach(span => span.textContent = '');
        const activeBtn = document.querySelector(`button[onclick="handleSort('${currentSort.key}')"]`);
        if (activeBtn) {
            activeBtn.classList.add('active');
            document.getElementById(`icon-${currentSort.key}`).textContent = currentSort.asc ? ' ↑' : ' ↓';
        }
    }
</script>
</body>
</html>
