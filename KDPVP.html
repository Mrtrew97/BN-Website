<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom PVP Analytics</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #3b82f6; --accent-purple: #a855f7; --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); 
            --text: #f8fafc; --muted: #94a3b8;
            --brd-merits: #bb4dc5; --brd-kills: #f59e0b; --brd-deads: #ef4444; --brd-heals: #10b981;
        }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* --- ROW 1: NAVIGATION --- */
        .nav-container { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; max-width: 1600px; margin: 0 auto 30px; }
        .nav-side-box { display: flex; align-items: center; }
        .nav-side-box.right { justify-content: flex-end; gap: 10px; }
        .nav-container .home-link { position: static; margin: 0; backdrop-filter: none; }

        /* --- ROW 2: TOOLS --- */
        .controls-wrapper { max-width: 1600px; margin: 0 auto 25px auto; padding: 25px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid var(--glass-border); }
        .main-controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        input.search-input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; color: white; font-weight: 700; outline: none; flex: 2; transition: 0.3s; }
        input.search-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

        /* --- ROW 3: STICKY METRICS --- */
        .sticky-wrapper { position: sticky; top: 15px; z-index: 1000; width: 100%; display: flex; justify-content: center; margin-bottom: 40px; }
        .metrics-island { width: 100%; max-width: 1550px; background: var(--glass); backdrop-filter: blur(20px); padding: 10px 0; border: 1px solid var(--glass-border); border-radius: 24px; display: flex; flex-direction: column; gap: 0px; box-shadow: none; }
        .sort-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .sort-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--muted); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; transition: 0.2s; }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* --- CARDS GRID --- */
        #cardGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 25px; max-width: 1600px; margin: 0 auto; }
        .pvp-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 20px; transition: 0.3s; }
        .pvp-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .card-header { text-align: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .ally-name-row { font-size: 1.3rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .sep-bar { margin: 0 10px; opacity: 0.3; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-box { padding: 14px 10px; border-radius: 16px; text-align: center; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-left-width: 5px; }
        .stat-label { font-size: 0.6rem; font-weight: 800; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 950; }

        .box-mp { border-left-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
        .box-merits { border-left-color: var(--brd-merits); background: rgba(187, 77, 197, 0.05); }
        .box-kills { border-left-color: var(--brd-kills); background: rgba(245, 158, 11, 0.05); }
        .box-deads { border-left-color: var(--brd-deads); background: rgba(239, 68, 68, 0.05); }
        .box-heals { border-left-color: var(--brd-heals); background: rgba(16, 185, 129, 0.05); }

        .roster-section { background: rgba(168, 85, 247, 0.05); border-radius: 20px; padding: 18px; border: 1px solid rgba(168, 85, 247, 0.2); border-left: 5px solid var(--accent-purple); }
        .roster-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .roster-item { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid var(--glass-border); }
        .r-val { font-size: 0.85rem; font-weight: 900; color: var(--accent-purple); }
        .badge { font-size: 0.65rem; font-weight: 900; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; background: rgba(255,255,255,0.1); }

        /* Admin UI */
        .admin-card-controls { display: flex; gap: 10px; border-top: 1px solid var(--glass-border); padding-top: 15px; justify-content: center; align-items: center; }
        .paragon-label { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; color: var(--muted); }
        .paragon-checkbox { appearance: none; width: 16px; height: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 4px; cursor: pointer; position: relative; transition: all 0.3s; }
        .paragon-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .paragon-checkbox:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 10px; }

        .btn { padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--glass-border); font-size: 0.75rem; background: var(--glass); color: white; text-decoration: none; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: white; }

        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="handleOutsideClick(event)">

<div id="loadingOverlay"><div class="spinner"></div></div>

<!-- ROW 1: HEADER -->
<div class="unified-container">
    <div class="nav-container">
        <div class="nav-side-box"><a href="index.html" class="home-link">← Kingdom Hub</a></div>
        <h1 class="page-title-main">PVP Analytics</h1>
        <div class="nav-side-box right">
            <button id="adminSaveBtn" class="btn" style="display:none; background:var(--accent-purple);" onclick="saveDedicatedJson()">SAVE CLOUD</button>
            <button id="logoutBtn" class="btn btn-red" style="display:none;" onclick="logout()">LOGOUT</button>
            <button id="loginBtn" class="btn" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<!-- ROW 2: TOOLS -->
<div class="unified-container">
    <div class="controls-wrapper">
        <div class="main-controls">
            <select id="fileSelector" onchange="processFile(this.value)" style="min-width: 150px;"></select>
            <select id="regFilter" onchange="handleSearch()">
                <option value="all">All Status</option>
                <option value="Registered" selected>Registered</option>
                <option value="Not Registered">Not Registered</option>
            </select>
            <select id="classFilter" onchange="handleSearch()">
                <option value="all">All Classes</option>
                <option value="A">Class A</option>
                <option value="B">Class B</option>
                <option value="C">Class C</option>
                <option value="D">Class D</option>
            </select>
            <input type="text" id="searchInput" class="search-input" placeholder="Search Alliance or Kingdom..." oninput="handleSearch()">
        </div>
    </div>
</div>

<!-- ROW 3: STICKY METRICS -->
<div class="sticky-wrapper">
    <div class="metrics-island" id="sortBar">
        <div class="sort-row">
            <button class="sort-btn" onclick="handleSort('kd', this)">Kingdom</button>
            <button class="sort-btn active" onclick="handleSort('power', this)">Power</button>
            <button class="sort-btn" onclick="handleSort('merits', this)">Merits</button>
            <button class="sort-btn" onclick="handleSort('mp', this)">M/P Ratio</button>
            <button class="sort-btn" onclick="handleSort('kills', this)">Kills</button>
            <button class="sort-btn" onclick="handleSort('deads', this)">Deads</button>
            <button class="sort-btn" onclick="handleSort('heals', this)">Heals</button>
            <button class="sort-btn" onclick="handleSort('ch25', this)">CH25</button>
        </div>
    </div>
</div>

<div class="unified-container">
    <div id="status" style="text-align:center; font-weight:800; color:var(--muted); margin-bottom:20px; text-transform:uppercase; font-size:0.75rem;">Initializing...</div>
    <div id="cardGrid"></div>
    <div style="text-align: center; padding: 40px;"><button id="loadMoreBtn" class="btn" style="display:none;" onclick="showNextPage()">LOAD MORE</button></div>
</div>

<div id="authModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items:center; justify-content:center; z-index:2000;">
    <div class="modal-content" style="background: #1e293b; padding: 40px; border-radius: 30px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center;">
        <h2 style="margin-top:0; font-weight:900;">ADMIN ACCESS</h2>
        <input type="text" id="user" class="modal-input" placeholder="Username" style="width:100%; margin-bottom:12px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:10px; color:white;">
        <input type="password" id="pass" class="modal-input" placeholder="Password" style="width:100%; margin-bottom:20px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:10px; color:white;" onkeydown="if(event.key==='Enter') login()">
        <div id="loginError" style="color: #ef4444; font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; display: none;">INVALID CREDENTIALS</div>
        <button class="btn btn-blue" style="width: 100%; padding: 15px;" onclick="login()">AUTHORIZE</button>
        <button onclick="toggleModal(false)" class="btn" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
    </div>
</div>

<script>
    const RENDER_URL = "https://kd-backend-icbu.onrender.com";
    let allData = []; let filteredData = []; let itemsShown = 0; const pageSize = 30;
    let currentSort = { field: 'power', direction: 'desc' }; let isAdmin = false;
    let currentSnapshotReg = { kingdoms: [], data: {} }; 
    const ROSTER_MAP = { '10M': '10M', '20M': '20M', '30M': '30M', '40M': '40M', '50M': '50M', '80M': '80M+', '100M': '100M+', '125M': '125M+', '150M': '150M+', '200M': '200M+', '250M': '250M+', '300M': '300M+' };

    window.onload = async () => {
        try {
            const resp = await fetch(`Pull/files.json?cb=${Date.now()}`);
            const files = await resp.json();
            const selector = document.getElementById('fileSelector');
            files.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f; opt.textContent = f.replace('.csv', '').toUpperCase();
                selector.appendChild(opt);
            });
            if(files.length > 0) { selector.value = files[files.length-1]; await processFile(selector.value); }
        } catch (e) { console.error("Init Error:", e); }
        finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    };

    async function processFile(fileName) {
        if (!fileName) return; document.getElementById('status').textContent = "SYNCING SNAPSHOT...";
        try {
            const jsonName = fileName.replace('.csv', '.json');
            const regResp = await fetch(`${RENDER_URL}/load-registration/${jsonName}?cb=${Date.now()}`);
            if (regResp.ok) { currentSnapshotReg = await regResp.json(); if (currentSnapshotReg.message === "Not Found") currentSnapshotReg = { kingdoms: [], data: {} }; } 
            else { currentSnapshotReg = { kingdoms: [], data: {} }; }
            const resp = await fetch(`Pull/${fileName}`);
            const result = Papa.parse(await resp.text(), { skipEmptyLines: true });
            let rawRows = result.data; const headers = rawRows[0].map(h => String(h).trim());
            const idx = { kd: headers.indexOf('KD'), name: headers.indexOf('#1 Ally'), power: headers.indexOf('Top 300 Power'), merits: headers.indexOf('Top 300 Merits'), mp: headers.indexOf('M/P'), kills: headers.indexOf('Top 300 Kills'), deads: headers.indexOf('Top 300 Deads'), heals: headers.indexOf('Top 300 Heals'), ch25: headers.indexOf('CH25') };
            allData = [];
            for (let i = 1; i < rawRows.length; i++) {
                const r = rawRows[i]; const rawKd = String(r[idx.kd] || "").trim(); if (!rawKd) continue;
                const cleanKd = String(parseInt(parseFloat(rawKd)));
                const isRegistered = currentSnapshotReg.kingdoms && currentSnapshotReg.kingdoms.includes(cleanKd);
                const regInfo = currentSnapshotReg.data?.[cleanKd] || { class: "TBD", isParagon: false };
                const roster = {}; for (const [lbl, csv] of Object.entries(ROSTER_MAP)) { const hIdx = headers.indexOf(csv); roster[lbl] = hIdx !== -1 ? cleanNum(r[hIdx]) : 0; }
                const pwr = cleanNum(r[idx.power]); const merits = cleanNum(r[idx.merits]);
                allData.push({ kd: cleanKd, name: String(r[idx.name] || "Unknown").trim(), power: pwr, merits: merits, mp: pwr > 0 ? (merits / pwr) * 100 : 0, kills: cleanNum(r[idx.kills]), deads: cleanNum(r[idx.deads]), heals: cleanNum(r[idx.heals]), ch25: cleanNum(r[idx.ch25]), status: isRegistered ? "Registered" : "Not Registered", class: regInfo.class, isParagon: regInfo.isParagon, roster: roster });
            }
            handleSearch(); document.getElementById('status').textContent = `SNAPSHOT READY`;
        } catch (e) { console.error("Process Error:", e); }
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const sFilter = document.getElementById('regFilter').value; const cFilter = document.getElementById('classFilter').value;
        let rankingPool = (sFilter === 'all') ? [...allData] : allData.filter(a => a.status === sFilter);
        const sortedByPower = [...rankingPool].sort((a,b) => b.power - a.power);
        const sortedByMP = [...rankingPool].sort((a,b) => b.mp - a.mp);
        allData.forEach(a => {
            const inPool = rankingPool.some(x => x.kd === a.kd);
            if (inPool) { a.powerRank = sortedByPower.findIndex(x => x.kd === a.kd) + 1; a.mpRank = sortedByMP.findIndex(x => x.kd === a.kd) + 1; }
            else { a.powerRank = "-"; a.mpRank = "-"; }
        });
        filteredData = rankingPool.filter(a => (a.name.toLowerCase().includes(query) || a.kd.includes(query)) && (cFilter === 'all' || a.class === cFilter));
        applySort(); resetAndRender();
    }

    function handleSort(field, btn) {
        if (currentSort.field === field) currentSort.direction = (currentSort.direction === 'desc') ? 'asc' : 'desc';
        else { currentSort.field = field; currentSort.direction = 'desc'; }
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); handleSearch();
    }

    function applySort() {
        filteredData.sort((a, b) => {
            let valA = a[currentSort.field], valB = b[currentSort.field];
            if(currentSort.field === 'powerRank' || currentSort.field === 'mpRank') { valA = (valA === "-") ? 999999 : valA; valB = (valB === "-") ? 999999 : valB; }
            return currentSort.direction === 'desc' ? (valB - valA) : (valA - valB);
        });
    }

    function resetAndRender() { itemsShown = 0; document.getElementById('cardGrid').innerHTML = ""; showNextPage(); }

    function showNextPage() {
        const grid = document.getElementById('cardGrid'); const nextBatch = filteredData.slice(itemsShown, itemsShown + pageSize);
        nextBatch.forEach(a => {
            const card = document.createElement('div'); card.className = 'pvp-card';
            card.innerHTML = `<div class="card-header"><div class="ally-name-row"><div>${a.name}</div><span class="sep-bar">|</span><div>KD ${a.kd}</div></div><div style="font-size:0.8rem; font-weight:800; opacity:0.6; margin-bottom:15px;">CH25 COUNT: ${a.ch25}</div><div style="display:flex; gap:8px; justify-content:center;"><span class="badge" style="color:var(--brd-deads)">#${a.powerRank} PWR</span><span class="badge" style="color:var(--brd-heals)">#${a.mpRank} M/P</span><span class="badge" style="color:var(--primary)">CLASS ${a.class}</span>${a.isParagon ? '<span class="badge" style="color:var(--brd-kills)">★ PARAGON</span>' : ''}</div></div><div class="stat-grid"><div class="stat-box"><span class="stat-label">Power</span><div class="stat-value">${formatVal(a.power)}</div></div><div class="stat-box box-merits"><span class="stat-label">Merits</span><div class="stat-value">${formatVal(a.merits)}</div></div><div class="stat-box box-mp"><span class="stat-label">M/P Ratio</span><div class="stat-value">${Number(a.mp).toFixed(2)}%</div></div></div><div class="stat-grid"><div class="stat-box box-kills"><span class="stat-label">Kills</span><div class="stat-value">${formatVal(a.kills)}</div></div><div class="stat-box box-deads"><span class="stat-label">Deads</span><div class="stat-value">${formatVal(a.deads)}</div></div><div class="stat-box box-heals"><span class="stat-label">Heals</span><div class="stat-value">${formatVal(a.heals)}</div></div></div><div class="roster-section"><span class="stat-label" style="display:block; text-align:center; color:var(--accent-purple)">Troop Distribution</span><div class="roster-grid">${Object.entries(a.roster).map(([label, val]) => `<div class="roster-item" style="${val === 0 ? 'opacity:0.2' : ''}"><div class="stat-label" style="font-size:0.5rem;">${label}</div><div class="r-val">${val}</div></div>`).join('')}</div></div><div class="admin-card-controls" style="display: ${isAdmin ? 'flex' : 'none'}; gap:10px; border-top:1px solid var(--glass-border); padding-top:15px; justify-content:center; align-items:center;"><select onchange="updateLocalReg('${a.kd}', 'status', this.value)"><option value="Not Registered" ${a.status === 'Not Registered' ? 'selected' : ''}>Not Registered</option><option value="Registered" ${a.status === 'Registered' ? 'selected' : ''}>Registered</option></select><select onchange="updateLocalReg('${a.kd}', 'class', this.value)"><option value="TBD" ${a.class === 'TBD' ? 'selected' : ''}>TBD</option><option value="A" ${a.class === 'A' ? 'selected' : ''}>A</option><option value="B" ${a.class === 'B' ? 'selected' : ''}>B</option><option value="C" ${a.class === 'C' ? 'selected' : ''}>C</option><option value="D" ${a.class === 'D' ? 'selected' : ''}>D</option></select><label class="paragon-label"><input type="checkbox" class="paragon-checkbox" ${a.isParagon ? 'checked' : ''} onchange="updateLocalReg('${a.kd}', 'isParagon', this.checked)"> PARAGON</label></div>`;
            grid.appendChild(card);
        });
        itemsShown += pageSize; document.getElementById('loadMoreBtn').style.display = (itemsShown < filteredData.length) ? 'inline-block' : 'none';
    }
    function updateLocalReg(kd, field, value) { const entry = allData.find(x => x.kd === kd); if (entry) { entry[field] = value; handleSearch(); } }
    async function saveDedicatedJson() {
        const btn = document.getElementById('adminSaveBtn'); const fileName = document.getElementById('fileSelector').value; const jsonName = fileName.replace('.csv', '.json');
        const dataMap = {}; allData.filter(item => item.status === "Registered").forEach(item => { dataMap[item.kd] = { class: item.class, isParagon: item.isParagon }; });
        const payload = { kingdoms: allData.filter(item => item.status === "Registered").map(item => item.kd), data: dataMap };
        btn.textContent = "SAVING...";
        try { const resp = await fetch(`${RENDER_URL}/save-registration/${jsonName}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); if (resp.ok) { btn.textContent = "SAVED!"; setTimeout(() => btn.textContent = "SAVE CLOUD", 2000); } } catch (e) { alert("Save failed."); btn.textContent = "RETRY"; }
    }
    async function login() {
        const u = document.getElementById('user').value; const p = document.getElementById('pass').value;
        try {
            const resp = await fetch('Admin.json'); const data = await resp.json();
            if (data.users.find(u => u.username === u && u.password === p)) { isAdmin = true; document.getElementById('adminSaveBtn').style.display = 'inline-block'; document.getElementById('logoutBtn').style.display = 'inline-block'; document.getElementById('loginBtn').style.display = 'none'; toggleModal(false); handleSearch(); }
            else { document.getElementById('loginError').style.display = 'block'; }
        } catch (e) { console.error(e); }
    }
    function logout() { location.reload(); }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; if(!v) document.getElementById('loginError').style.display = 'none'; }
    function handleOutsideClick(e) { if (e.target.id === 'authModal') toggleModal(false); }
    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { if (n >= 1e9) return (n/1e9).toFixed(2)+'B'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; return n.toLocaleString(); }
</script>
</body>
</html>
