<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Kingdom PVP</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .brand-logo { position: fixed; bottom: 30px; z-index: 2000; opacity: 0.6; width: 200px; pointer-events: none; user-select: none; transition: 0.4s ease; }
        .logo-right { right: -9px; } .logo-left { left: 00px; }
        @media (max-width: 650px) { .brand-logo { width: 100px; bottom: 15px; } .logo-right { right: 15px; } .logo-left { left: 15px; } }
        
        :root { 
            --primary: #3b82f6; 
            --accent-purple: #a855f7; 
            --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --text: #f8fafc; 
            --muted: #94a3b8; 
            
            /* Border Colors */
            --brd-power: #22d3ee; /* New Cyan for Power */
            --brd-merits: #bb4dc5; 
            --brd-kills: #f59e0b; 
            --brd-deads: #ef4444; 
            --brd-heals: #10b981; 
            --brd-mp: #3b82f6;
        }

        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); background-attachment: fixed; color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .unified-container { max-width: 1600px; margin: 0 auto; width: 100%; padding: 0 25px; box-sizing: border-box; }
        .nav-container { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-top: 25px; margin-bottom: 20px; }
        .nav-side-box { display: flex; align-items: center; }
        .nav-side-box.right { justify-content: flex-end; gap: 10px; }
        .nav-container .home-link { position: static; margin: 0; backdrop-filter: none; }
        
        .tools-glass-bar { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .search-wrapper { flex: 1; display: flex; align-items: center; }
        .search-input { width: 100%; padding: 10px 18px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; }
        
        .sticky-wrapper { position: sticky; top: 15px; z-index: 1000; width: 100%; display: flex; justify-content: center; margin-bottom: 40px; padding: 0 25px; box-sizing: border-box; }
        .metrics-island { width: 100%; max-width: 1350px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 12px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; }
        .metric-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 4px 15px; width: 100%; }
        .metric-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; transition: 0.2s; color: var(--muted); }
        .metric-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .metric-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        
        #cardGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 25px; padding-bottom: 60px; }
        .pvp-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 20px; transition: 0.3s; }
        .pvp-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* Perfect Center Header Grid */
        .ally-name-row { 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            width: 100%; 
            margin-bottom: 5px;
        }
        .name-left { text-align: right; font-size: 1.3rem; font-weight: 900; color: var(--primary); }
        .kd-right { text-align: left; font-size: 1.3rem; font-weight: 900; color: var(--primary); }
        .sep-bar { 
            color: rgba(255, 255, 255, 0.25); 
            margin: 0 15px; 
            font-weight: 400; 
            font-size: 1.3rem;
        }

        .paragon-text { color: rgb(245, 158, 11) !important; font-weight: 950 !important; }
        .badge { font-size: 0.65rem; font-weight: 900; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; display: inline-block; }
        .rank-badge-pwr { background: rgba(34, 211, 238, 0.15) !important; color: #22d3ee !important; border: 1px solid rgba(34, 211, 238, 0.3); }
        .rank-badge-mp { background: rgba(16, 185, 129, 0.15) !important; color: #10b981 !important; border: 1px solid rgba(16, 185, 129, 0.3); }
        .paragon-badge { background: rgba(245, 158, 11, 0.15) !important; color: #f59e0b !important; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-std { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid var(--glass-border); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-box { padding: 14px 10px; border-radius: 16px; text-align: center; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-left-width: 5px; }
        .stat-label { font-size: 0.6rem; font-weight: 800; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 950; }
        
        /* New Color Assignments */
        .box-power { border-left-color: var(--brd-power); }
        .box-merits { border-left-color: var(--brd-merits); }
        .box-mp { border-left-color: var(--brd-mp); }
        .box-kills { border-left-color: var(--brd-kills); }
        .box-deads { border-left-color: var(--brd-deads); }
        .box-heals { border-left-color: var(--brd-heals); }

        .roster-section { background: rgba(168, 85, 247, 0.05); border-radius: 20px; padding: 18px; border: 1px solid rgba(168, 85, 247, 0.2); border-left: 5px solid var(--accent-purple); }
        .roster-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .roster-item { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid var(--glass-border); }
        .r-val { font-size: 0.85rem; font-weight: 900; color: var(--accent-purple); }
        
        .admin-card-controls { display: flex; gap: 10px; border-top: 1px solid var(--glass-border); padding-top: 15px; justify-content: center; align-items: center; }
        .paragon-label { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; color: var(--muted); }
        .paragon-checkbox { appearance: none; width: 16px; height: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 4px; cursor: pointer; position: relative; transition: all 0.3s; }
        .paragon-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .paragon-checkbox:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 10px; }
        
        .btn { padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--glass-border); font-size: 0.75rem; background: var(--glass); color: white; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        #authModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 24px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
    </style>
</head>
<body onclick="handleOutsideClick(event)">

<div id="loadingOverlay"><div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div><style>@keyframes spin { 100% { transform: rotate(360deg); } }</style></div>

<div class="unified-container">
    <div class="nav-container">
        <div class="nav-side-box"><a href="index.html" class="home-link">HOME PAGE</a></div>
        <h1 class="page-title-main">KINGDOM PVP STATS</h1>
        <div class="nav-side-box right">
            <button id="adminSaveBtn" class="btn" style="display:none; background:var(--accent-purple); border:none;" onclick="saveDedicatedJson()">SAVE CLOUD</button>
            <button id="logoutBtn" class="btn btn-red" style="display:none;" onclick="logout()">LOGOUT</button>
            <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<div class="unified-container">
    <div class="tools-glass-bar">
        <select id="fileSelector" onchange="processFile(this.value)" style="min-width: 150px;"></select>
        <select id="regFilter" onchange="handleSearch()"><option value="all" selected>All Status</option><option value="Registered">Registered</option><option value="Not Registered">Not Registered</option></select>
        <select id="classFilter" onchange="handleSearch()"><option value="all" selected>All Classes</option><option value="A">Class A</option><option value="B">Class B</option><option value="C">Class C</option><option value="D">Class D</option></select>
        <div class="search-wrapper"><input type="text" id="searchInput" class="search-input" placeholder="Search Alliance or Kingdom..." oninput="handleSearch()"></div>
    </div>
</div>

<div class="sticky-wrapper">
    <div class="metrics-island">
        <div class="metric-row">
            <button class="metric-btn" onclick="handleSort('kd', this)">Kingdom</button>
            <button class="metric-btn active" onclick="handleSort('power', this)">Power</button>
            <button class="metric-btn" onclick="handleSort('merits', this)">Merits</button>
            <button class="metric-btn" onclick="handleSort('mp', this)">M/P Ratio</button>
            <button class="metric-btn" onclick="handleSort('kills', this)">Kills</button>
            <button class="metric-btn" onclick="handleSort('deads', this)">Deads</button>
            <button class="metric-btn" onclick="handleSort('heals', this)">Heals</button>
            <button class="metric-btn" onclick="handleSort('ch25', this)">CH25</button>
        </div>
    </div>
</div>

<div class="unified-container">
    <div id="status" style="text-align:center; font-weight:800; color:var(--muted); margin-bottom:20px; text-transform:uppercase; font-size:0.75rem;">Initializing...</div>
    <div id="cardGrid"></div>
    <div style="text-align: center; padding: 40px;"><button id="loadMoreBtn" class="btn" style="display:none;" onclick="showNextPage()">LOAD MORE</button></div>
</div>

<div id="authModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="margin-top:0; font-weight:900;">ADMIN ACCESS</h2>
        <input type="email" id="email" style="width:100%; margin-bottom:10px; padding:10px;" placeholder="Email">
        <input type="password" id="pass" style="width:100%; margin-bottom:10px; padding:10px;" placeholder="Password">
        <button class="btn" style="width:100%;" onclick="login()">AUTHORIZE</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allData = [], filteredData = [], itemsShown = 0; const pageSize = 30;
    let currentSort = { field: 'power', direction: 'desc' }, isAdmin = false;
    let currentSnapshotReg = { kingdoms: [], data: {} }, sosMap = {};
    const possibleTroopHeaders = ["10M","20M","30M","40M","50M","60M+","80M+","100M+","125M+","150M+","200M+","250M+","300M+","10-20M","20-40M","40-60M","60-80M","80-100M","100-125M","125-150M","150-200M","200M+"];

    function kdClean(val) { if (!val) return ""; return String(parseInt(parseFloat(String(val).trim()))); }

    window.onload = async () => {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) enableAdminMode();
            const timestamp = `?t=${Date.now()}`;
            const [sRes, fRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/SosNames.json' + timestamp),
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/files.json' + timestamp)
            ]);
            sosMap = JSON.parse(await sRes.data.text());
            const files = JSON.parse(await fRes.data.text());
            const selector = document.getElementById('fileSelector');
            files.reverse().forEach(f => {
                const opt = document.createElement('option'); opt.value = f;
                const dateKey = f.replace(/\.csv/i, '');
                opt.textContent = sosMap[dateKey] ? `${sosMap[dateKey]} (${dateKey})` : f.replace(/\.csv/i, '').toUpperCase();
                selector.appendChild(opt);
            });
            if(files.length > 0) { selector.value = files[files.length-1]; await processFile(selector.value); }
        } catch (e) { console.error(e); } finally { hideOverlay(); }
    };

    function hideOverlay() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 300); }
    }

    async function processFile(fileName) {
        document.getElementById('status').textContent = "SYNCING SNAPSHOT...";
        try {
            const jsonName = fileName.replace(/\.csv/i, '.json');
            const timestamp = `?t=${Date.now()}`;
            const { data: regBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`SavedRegistrations/${jsonName}${timestamp}`);
            currentSnapshotReg = regBlob ? JSON.parse(await regBlob.text()) : { kingdoms: [], data: {} };
            const { data: csvBlob } = await supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${fileName}${timestamp}`);
            const result = Papa.parse(await csvBlob.text(), { skipEmptyLines: true });
            let rawRows = result.data; const headers = rawRows[0].map(h => String(h).trim());
            const idx = { kd: headers.indexOf('KD'), name: headers.indexOf('#1 Ally'), power: headers.indexOf('Top 300 Power'), merits: headers.indexOf('Top 300 Merits'), kills: headers.indexOf('Top 300 Kills'), deads: headers.indexOf('Top 300 Deads'), heals: headers.indexOf('Top 300 Heals'), ch25: headers.indexOf('CH25') };
            const registeredKDs = new Set();
            if (currentSnapshotReg.kingdoms) currentSnapshotReg.kingdoms.forEach(k => registeredKDs.add(kdClean(k)));
            allData = [];
            for (let i = 1; i < rawRows.length; i++) {
                const r = rawRows[i]; const cleanKd = kdClean(r[idx.kd]); if (!cleanKd) continue;
                const regInfo = currentSnapshotReg.data?.[cleanKd] || { class: "TBD", isParagon: false };
                const roster = {}; headers.forEach((h, hIdx) => { if (possibleTroopHeaders.includes(h)) roster[h] = cleanNum(r[hIdx]); });
                const pwr = cleanNum(r[idx.power]), merits = cleanNum(r[idx.merits]);
                allData.push({ kd: cleanKd, name: String(r[idx.name] || "Unknown").trim(), power: pwr, merits: merits, mp: pwr > 0 ? (merits / pwr) * 100 : 0, kills: cleanNum(r[idx.kills]), deads: cleanNum(r[idx.deads]), heals: cleanNum(r[idx.heals]), ch25: cleanNum(r[idx.ch25]), status: registeredKDs.has(cleanKd) ? "Registered" : "Not Registered", class: regInfo.class, isParagon: regInfo.isParagon, roster: roster });
            }
            handleSearch(); document.getElementById('status').textContent = `SNAPSHOT READY`;
        } catch (e) { document.getElementById('status').textContent = "ERROR LOADING DATA"; }
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const sFilter = document.getElementById('regFilter').value;
        const cFilter = document.getElementById('classFilter').value;
        let rankingPool = (sFilter === 'all') ? [...allData] : allData.filter(a => a.status === sFilter);
        const sortedByPower = [...rankingPool].sort((a,b) => b.power - a.power);
        const sortedByMP = [...rankingPool].sort((a,b) => b.mp - a.mp);
        allData.forEach(a => {
            const inPool = rankingPool.some(x => x.kd === a.kd);
            if (inPool) { a.powerRank = sortedByPower.findIndex(x => x.kd === a.kd) + 1; a.mpRank = sortedByMP.findIndex(x => x.kd === a.kd) + 1; }
            else { a.powerRank = "-"; a.mpRank = "-"; }
        });
        filteredData = rankingPool.filter(a => (a.name.toLowerCase().includes(query) || a.kd.includes(query)) && (cFilter === 'all' || a.class === cFilter));
        applySort(); resetAndRender();
    }

    function handleSort(field, btn) {
        if (currentSort.field === field) currentSort.direction = (currentSort.direction === 'desc') ? 'asc' : 'desc';
        else { currentSort.field = field; currentSort.direction = 'desc'; }
        document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); handleSearch();
    }

    function applySort() {
        filteredData.sort((a, b) => {
            let valA = a[currentSort.field], valB = b[currentSort.field];
            if(currentSort.field === 'powerRank' || currentSort.field === 'mpRank') { valA = (valA === "-") ? 999999 : valA; valB = (valB === "-") ? 999999 : valB; }
            return currentSort.direction === 'desc' ? (valB - valA) : (valA - valB);
        });
    }

    function resetAndRender() { itemsShown = 0; document.getElementById('cardGrid').innerHTML = ""; showNextPage(); }
    
    function showNextPage() {
        const grid = document.getElementById('cardGrid'); 
        const nextBatch = filteredData.slice(itemsShown, itemsShown + pageSize);
        nextBatch.forEach(a => {
            const card = document.createElement('div'); card.className = 'pvp-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="ally-name-row">
                        <div class="name-left ${a.isParagon ? 'paragon-text' : ''}">${a.name}</div>
                        <span class="sep-bar">|</span>
                        <div class="kd-right">KD ${a.kd}</div>
                    </div>
                    <div style="font-size:0.8rem; font-weight:950; text-align:center; color:var(--primary); margin-bottom:15px;">CH25 COUNT: ${a.ch25}</div>
                    <div style="display:flex; gap:8px; justify-content:center;">
                        <span class="badge rank-badge-pwr">#${a.powerRank} PWR</span>
                        <span class="badge rank-badge-mp">#${a.mpRank} M/P</span>
                        <span class="badge badge-std">CLASS ${a.class}</span>
                        ${a.isParagon ? '<span class="badge paragon-badge">★ PARAGON</span>' : ''}
                    </div>
                </div>
                <div class="stat-grid">
                    <div class="stat-box box-power"><span class="stat-label">Power</span><div class="stat-value">${formatVal(a.power)}</div></div>
                    <div class="stat-box box-merits"><span class="stat-label">Merits</span><div class="stat-value">${formatVal(a.merits)}</div></div>
                    <div class="stat-box box-mp"><span class="stat-label">M/P Ratio</span><div class="stat-value">${Number(a.mp).toFixed(2)}%</div></div>
                </div>
                <div class="stat-grid">
                    <div class="stat-box box-kills"><span class="stat-label">Kills</span><div class="stat-value">${formatVal(a.kills)}</div></div>
                    <div class="stat-box box-deads"><span class="stat-label">Deads</span><div class="stat-value">${formatVal(a.deads)}</div></div>
                    <div class="stat-box box-heals"><span class="stat-label">Heals</span><div class="stat-value">${formatVal(a.heals)}</div></div>
                </div>
                <div class="roster-section">
                    <span class="stat-label" style="display:block; text-align:center; color:var(--accent-purple)">Troop Distribution</span>
                    <div class="roster-grid">${Object.entries(a.roster).map(([label, val]) => `<div class="roster-item" style="${val === 0 ? 'opacity:0.2' : ''}"><div class="stat-label" style="font-size:0.5rem;">${label.replace('+', '')}</div><div class="r-val">${val}</div></div>`).join('')}</div>
                </div>
                <div class="admin-card-controls" style="display: ${isAdmin ? 'flex' : 'none'};">
                    <select onchange="updateLocalReg('${a.kd}', 'status', this.value)">
                        <option value="Not Registered" ${a.status === 'Not Registered' ? 'selected' : ''}>Not Registered</option>
                        <option value="Registered" ${a.status === 'Registered' ? 'selected' : ''}>Registered</option>
                    </select>
                    <select onchange="updateLocalReg('${a.kd}', 'class', this.value)">
                        <option value="TBD" ${a.class === 'TBD' ? 'selected' : ''}>TBD</option>
                        <option value="A" ${a.class === 'A' ? 'selected' : ''}>A</option>
                        <option value="B" ${a.class === 'B' ? 'selected' : ''}>B</option>
                        <option value="C" ${a.class === 'C' ? 'selected' : ''}>C</option>
                        <option value="D" ${a.class === 'D' ? 'selected' : ''}>D</option>
                    </select>
                    <label class="paragon-label"><input type="checkbox" class="paragon-checkbox" ${a.isParagon ? 'checked' : ''} onchange="updateLocalReg('${a.kd}', 'isParagon', this.checked)"> PARAGON</label>
                </div>`;
            grid.appendChild(card);
        });
        itemsShown += pageSize; 
        document.getElementById('loadMoreBtn').style.display = (itemsShown < filteredData.length) ? 'inline-block' : 'none';
    }

    function updateLocalReg(kd, field, value) { const entry = allData.find(x => x.kd === kd); if (entry) { entry[field] = value; handleSearch(); } }
    async function saveDedicatedJson() {
        if (!isAdmin) return; const btn = document.getElementById('adminSaveBtn');
        const fileName = document.getElementById('fileSelector').value; const jsonName = fileName.replace(/\.csv/i, '.json');
        const payload = { kingdoms: allData.filter(i => i.status === "Registered").map(i => i.kd), data: {} };
        allData.filter(i => i.status === "Registered").forEach(i => payload.data[i.kd] = { class: i.class, isParagon: i.isParagon });
        btn.textContent = "SAVING...";
        try { await supabaseClient.storage.from(BUCKET_CONFIGS).upload(`SavedRegistrations/${jsonName}`, JSON.stringify(payload, null, 2), { upsert: true }); btn.textContent = "SAVED!"; } 
        catch (e) { btn.textContent = "RETRY"; } finally { setTimeout(() => btn.textContent = "SAVE CLOUD", 2000); }
    }

    async function login() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; const { error } = await supabaseClient.auth.signInWithPassword({ email:e, password:p }); if(!error) location.reload(); }
    function enableAdminMode() { isAdmin = true; document.getElementById('adminSaveBtn').style.display = 'inline-block'; document.getElementById('logoutBtn').style.display = 'inline-block'; document.getElementById('loginBtn').style.display = 'none'; }
    async function logout() { await supabaseClient.auth.signOut(); location.reload(); }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }
    function handleOutsideClick(e) { if(e.target.id === 'authModal') toggleModal(false); }
    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { if (n >= 1e9) return (n/1e9).toFixed(2)+'B'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; return n.toLocaleString(); }
</script>
