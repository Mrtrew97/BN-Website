<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom PVP Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; --secondary: #10b981; --bg: #f1f5f9; 
            --card: #ffffff; --text: #1e293b; --muted: #64748b;
            --accent-purple: #f5f3ff; --border-purple: #8b5cf6;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .header-container { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; max-width: 1400px; margin-left: auto; margin-right: auto; position: relative; }
        .page-title { font-weight: 900; font-size: 1.5rem; text-transform: uppercase; letter-spacing: -0.02em; margin: 0; }
        .home-link { text-decoration: none; color: var(--muted); font-weight: 700; font-size: 0.8rem; background: #fff; padding: 8px 15px; border-radius: 8px; border: 1px solid #e2e8f0; position: absolute; left: 0; }

        .controls-wrapper { max-width: 1400px; margin: 0 auto 25px auto; display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .main-controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        
        input[type="text"], select { padding: 12px; border-radius: 12px; border: 2px solid #f1f5f9; font-weight: 600; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: var(--primary); }
        input[type="text"] { flex-grow: 1; min-width: 250px; }

        .sort-bar { display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid #f1f5f9; margin-top: 10px; padding-top: 15px; }
        .sort-btn { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer; color: var(--muted); transition: all 0.2s; }
        .sort-btn:hover { background: #f1f5f9; color: var(--text); }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .sort-btn.active::after { content: ' ↓'; }
        .sort-btn.active.asc::after { content: ' ↑'; }

        #cardGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }

        .pvp-card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 20px; position: relative; }
        .kd-tag { position: absolute; top: 24px; right: 24px; background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: var(--muted); }
        
        .rank-container { display: flex; gap: 8px; margin-top: 8px; }
        .rank-badge { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .rank-power { background: #fee2e2; color: #991b1b; }
        .rank-mp { background: #dcfce7; color: #166534; }

        .card-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; padding-right: 60px; }
        .ally-name { font-size: 1.4rem; font-weight: 900; color: var(--primary); }
        .ally-name.unknown { color: var(--muted); font-style: italic; font-weight: 700; }
        .main-power { font-size: 0.9rem; font-weight: 700; color: var(--muted); margin-top: 4px; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-box { padding: 12px; border-radius: 12px; background: #f8fafc; border: 1px solid #f1f5f9; }
        .stat-label { font-size: 0.6rem; font-weight: 800; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .stat-value { font-size: 1rem; font-weight: 900; color: #0f172a; }
        .highlight { color: var(--primary); }

        .roster-section { background: var(--accent-purple); border-radius: 16px; padding: 15px; border: 1px solid #ddd6fe; }
        .roster-title { font-size: 0.7rem; font-weight: 900; color: var(--border-purple); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .roster-item { display: flex; flex-direction: column; align-items: center; background: white; padding: 8px; border-radius: 8px; border: 1px solid #ede9fe; }
        .r-label { font-size: 0.55rem; font-weight: 700; color: var(--muted); }
        .r-val { font-size: 0.85rem; font-weight: 800; color: #4338ca; }

        .btn-load { background: #475569; color: white; padding: 12px 24px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin: 40px auto; display: none; }
        #status { text-align: center; font-weight: 700; color: var(--muted); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header-container">
    <a href="home.html" class="home-link">← HOME HUB</a>
    <h1 class="page-title">Kingdom PVP Analytics</h1>
</div>

<div class="controls-wrapper">
    <div class="main-controls">
        <select id="fileSelector" onchange="processFile(this.value)">
            <option value="">Select Snapshot Date...</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search by Alliance Name or Kingdom ID..." oninput="handleSearch()">
    </div>
    
    <div class="sort-bar" id="sortBar">
        <div style="font-size: 0.7rem; font-weight: 800; color: var(--muted); width: 100%; margin-bottom: 5px; text-transform: uppercase;">Sort By:</div>
        <button id="defaultSortBtn" class="sort-btn active asc" onclick="handleSort('kd', this)">Kingdom</button>
        <button class="sort-btn" onclick="handleSort('power', this)">Power</button>
        <button class="sort-btn" onclick="handleSort('merits', this)">Merits</button>
        <button class="sort-btn" onclick="handleSort('mp', this)">M/P Ratio</button>
        <button class="sort-btn" onclick="handleSort('kills', this)">Kills</button>
        <button class="sort-btn" onclick="handleSort('deads', this)">Deads</button>
        <button class="sort-btn" onclick="handleSort('heals', this)">Heals</button>
        <button class="sort-btn" onclick="handleSort('ch25', this)">CH25 Count</button>
        <button class="sort-btn" onclick="handleSort('ch25Avg', this)">CH25 Avg</button>
    </div>
</div>

<div id="status">Waiting for Selection...</div>
<div id="cardGrid"></div>
<div style="text-align: center;"><button id="loadMoreBtn" class="btn-load" onclick="showNextPage()">Load More Alliances</button></div>

<script>
    let allData = [];
    let filteredData = [];
    let itemsShown = 0;
    const pageSize = 30;
    // Default sort: Kingdom, Ascending
    let currentSort = { field: 'kd', direction: 'asc' };

    const ROSTER_MAP = {
        '10-20M': ['10-20M', '10M', '20M'],
        '20-40M': ['20-40M', '30M', '40M'],
        '40-60M': ['40-60M', '50M'],
        '60-80M': ['60-80M', '60M+', '60M'],
        '80-100M': ['80-100M', '80M+', '80M'],
        '100-125M': ['100-125M', '100M+', '100M'],
        '125-150M': ['125-150M', '125M+', '125M'],
        '150-200M': ['150-200M', '150M+', '150M'],
        '200M+': ['200M+', '250M+', '300M+']
    };

    window.onload = async () => {
        try {
            const resp = await fetch('Pull/files.json');
            const files = await resp.json();
            const selector = document.getElementById('fileSelector');
            files.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f.replace('.csv', '');
                selector.appendChild(opt);
            });
        } catch (e) { document.getElementById('status').textContent = "Error loading file list."; }
    };

    async function processFile(fileName) {
        if (!fileName) return;
        const status = document.getElementById('status');
        status.textContent = "Processing Snapshot...";
        document.getElementById('cardGrid').innerHTML = "";
        allData = [];
        
        try {
            const resp = await fetch(`Pull/${fileName}`);
            const text = await resp.text();
            const result = Papa.parse(text, { skipEmptyLines: true });
            let rawRows = result.data;
            const headers = rawRows[0].map(h => String(h).trim());
            
            const idx = {
                kd: headers.indexOf('KD'),
                name: headers.indexOf('#1 Ally'),
                power: headers.indexOf('Top 300 Power'),
                merits: headers.indexOf('Top 300 Merits'),
                mp: headers.indexOf('M/P'),
                kills: headers.indexOf('Top 300 Kills'),
                deads: headers.indexOf('Top 300 Deads'),
                heals: headers.indexOf('Top 300 Heals'),
                ch25: headers.indexOf('CH25'),
                ch25Avg: headers.indexOf('CH25 AP')
            };

            const rosterIndicesMap = {};
            for (const [target, sources] of Object.entries(ROSTER_MAP)) {
                rosterIndicesMap[target] = [];
                sources.forEach(srcName => {
                    const fIdx = headers.indexOf(srcName);
                    if (fIdx !== -1) rosterIndicesMap[target].push(fIdx);
                });
            }

            let rawAlliances = [];
            for (let i = 1; i < rawRows.length; i++) {
                const r = rawRows[i];
                const kdId = r[idx.kd] ? String(r[idx.kd]).trim() : "";
                const rawName = r[idx.name] ? String(r[idx.name]).trim() : "";
                
                if (!kdId && !rawName) continue;

                const processedRoster = {};
                for (const [target, colIndices] of Object.entries(rosterIndicesMap)) {
                    let sum = 0;
                    colIndices.forEach(cIdx => sum += cleanNum(r[cIdx]));
                    processedRoster[target] = sum;
                }

                rawAlliances.push({
                    kd: kdId || "??",
                    name: rawName || "Unknown",
                    power: cleanNum(r[idx.power]),
                    merits: cleanNum(r[idx.merits]),
                    mp: cleanNum(r[idx.mp], true),
                    kills: cleanNum(r[idx.kills]),
                    deads: cleanNum(r[idx.deads]),
                    heals: cleanNum(r[idx.heals]),
                    ch25: cleanNum(r[idx.ch25]),
                    ch25Avg: cleanNum(r[idx.ch25Avg]),
                    roster: processedRoster
                });
            }

            // Calculate Static Rankings for display
            const sortedByPower = [...rawAlliances].sort((a, b) => b.power - a.power);
            const sortedByMP = [...rawAlliances].sort((a, b) => b.mp - a.mp);

            allData = rawAlliances.map(a => {
                a.powerRank = sortedByPower.findIndex(x => x.kd === a.kd && x.name === a.name) + 1;
                a.mpRank = sortedByMP.findIndex(x => x.kd === a.kd && x.name === a.name) + 1;
                return a;
            });

            // Reset sort UI to default (Kingdom Ascending) when a new file is loaded
            currentSort = { field: 'kd', direction: 'asc' };
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active', 'asc'));
            const defaultBtn = document.getElementById('defaultSortBtn');
            defaultBtn.classList.add('active', 'asc');

            filteredData = [...allData];
            applySort();
            resetAndRender();
            status.textContent = `Analyzed ${allData.length} Kingdoms`;
        } catch (e) {
            status.textContent = "Error loading data.";
            console.error(e);
        }
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredData = allData.filter(a => 
            a.name.toLowerCase().includes(query) || 
            a.kd.toString().includes(query)
        );
        applySort(); // Re-apply current sort to filtered results
        resetAndRender();
    }

    function handleSort(field, btn) {
        if (currentSort.field === field) {
            currentSort.direction = (currentSort.direction === 'desc') ? 'asc' : 'desc';
        } else {
            currentSort.field = field;
            // Kingdom defaults to Asc (1, 2, 3...), everything else defaults to Desc (High to Low)
            currentSort.direction = (field === 'kd') ? 'asc' : 'desc';
        }

        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active', 'asc'));
        btn.classList.add('active');
        if (currentSort.direction === 'asc') btn.classList.add('asc');
        
        applySort();
        resetAndRender();
    }

    function applySort() {
        filteredData.sort((a, b) => {
            let valA = a[currentSort.field];
            let valB = b[currentSort.field];
            
            // Ensure Kingdom ID is treated numerically
            if (currentSort.field === 'kd') {
                valA = parseInt(valA) || 999999;
                valB = parseInt(valB) || 999999;
            }

            if (currentSort.direction === 'desc') return (valB > valA) ? 1 : -1;
            else return (valA > valB) ? 1 : -1;
        });
    }

    function resetAndRender() {
        itemsShown = 0;
        document.getElementById('cardGrid').innerHTML = "";
        showNextPage();
    }

    function showNextPage() {
        const grid = document.getElementById('cardGrid');
        const nextBatch = filteredData.slice(itemsShown, itemsShown + pageSize);
        
        nextBatch.forEach(a => {
            const card = document.createElement('div');
            card.className = 'pvp-card';
            const nameClass = a.name === "Unknown" ? "ally-name unknown" : "ally-name";
            card.innerHTML = `
                <div class="kd-tag">KD ${a.kd}</div>
                <div class="card-header">
                    <div class="${nameClass}">${a.name}</div>
                    <div class="main-power">Total Power: ${formatVal(a.power)}</div>
                    <div class="rank-container">
                        <span class="rank-badge rank-power">Power Rank: #${a.powerRank}</span>
                        <span class="rank-badge rank-mp">M/P Rank: #${a.mpRank}</span>
                    </div>
                </div>

                <div class="stat-grid">
                    <div class="stat-box"><span class="stat-label">Merits</span><div class="stat-value">${formatVal(a.merits)}</div></div>
                    <div class="stat-box"><span class="stat-label">M/P Ratio</span><div class="stat-value highlight">${a.mp.toFixed(2)}%</div></div>
                    <div class="stat-box"><span class="stat-label">Kills</span><div class="stat-value">${formatVal(a.kills)}</div></div>
                    <div class="stat-box"><span class="stat-label">Deads</span><div class="stat-value" style="color:#dc2626">${formatVal(a.deads)}</div></div>
                    <div class="stat-box"><span class="stat-label">Heals</span><div class="stat-value" style="color:#16a34a">${formatVal(a.heals)}</div></div>
                    <div class="stat-box"><span class="stat-label">CH25 Count</span><div class="stat-value">${a.ch25}</div></div>
                </div>

                <div class="stat-box" style="min-height: auto;">
                    <span class="stat-label">CH25 Avg Power</span>
                    <div class="stat-value">${formatVal(a.ch25Avg)}</div>
                </div>

                <div class="roster-section">
                    <span class="roster-title">Combined Power Distribution</span>
                    <div class="roster-grid">
                        ${Object.entries(a.roster).map(([label, val]) => {
                            const op = (val === 0) ? 'style="opacity:0.3"' : '';
                            return `<div class="roster-item" ${op}><span class="r-label">${label}</span><span class="r-val">${val}</span></div>`;
                        }).join('')}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        itemsShown += pageSize;
        document.getElementById('loadMoreBtn').style.display = (itemsShown < filteredData.length) ? 'inline-block' : 'none';
    }

    function cleanNum(v, isPct = false) {
        if (!v) return 0;
        let n = parseFloat(String(v).replace(/,/g, '').replace('%', ''));
        return isNaN(n) ? 0 : n;
    }

    function formatVal(n) {
        if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
        if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        return n.toLocaleString();
    }
</script>
</body>
</html>
