<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Kingdom PVP</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --accent-purple: #a855f7; 
            --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --text: #f8fafc; 
            --muted: #94a3b8; 
            
            /* Border Colors */
            --brd-power: #22d3ee; 
            --brd-merits: #bb4dc5; 
            --brd-kills: #f59e0b; 
            --brd-deads: #ef4444; 
            --brd-heals: #10b981; 
            --brd-mp: #3b82f6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }
        
        .unified-container { 
            max-width: 1600px; 
            margin: 0 auto; 
            width: 100%; 
            padding: 0 25px; 
            box-sizing: border-box; 
        }
        
        /* --- HEADER & NAVIGATION --- */
        .nav-container { 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            margin-top: 25px; 
            margin-bottom: 20px; 
        }
        
        .nav-side-box { display: flex; align-items: center; gap: 10px; }
        .nav-side-box.right { justify-content: flex-end; gap: 10px; }
        .nav-container .home-link { position: static; margin: 0; backdrop-filter: none; }
        
        .tools-glass-bar { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 12px 20px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex-wrap: wrap;
        }
        
        .search-wrapper { 
            max-width: 350px; 
            flex: 1; 
            display: flex; 
            align-items: center; 
        }

        .search-input { 
            width: 100%; 
            padding: 10px 18px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
        }

        /* View Toggle */
        .view-toggle-container {
            display: flex;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--glass-border);
            margin-left: auto;
        }
        .view-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--muted);
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .view-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }
        
        .sticky-wrapper { 
            position: sticky; 
            top: 15px; 
            z-index: 1000; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            margin-bottom: 40px; 
            padding: 0 25px; 
            box-sizing: border-box; 
        }

        @media (max-width: 600px) {
            .stat-grid, .roster-grid { grid-template-columns: repeat(2, 1fr); }
            .tools-glass-bar { flex-direction: column; align-items: stretch; }
            .view-toggle-container { margin-left: 0; justify-content: center; }
        }
        
        .metrics-island { 
            width: 100%; 
            max-width: 1350px; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 28px; 
            padding: 12px 0; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .metric-row { 
            display: flex; 
            gap: 8px; 
            justify-content: center; 
            flex-wrap: wrap; 
            padding: 4px 15px; 
            width: 100%; 
        }
        
        .metric-btn { 
            padding: 8px 16px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            transition: 0.2s; 
            color: var(--muted); 
        }
        
        .metric-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .metric-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary-glow); 
        }
        
        /* Cards View */
        #cardGrid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); 
            gap: 25px; 
            padding-bottom: 60px; 
        }
        
        .pvp-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            transition: 0.3s; 
        }
        
        .pvp-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .ally-name-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; margin-bottom: 5px; }
        .name-left { text-align: right; font-size: 1.3rem; font-weight: 900; color: var(--primary); }
        .kd-right { text-align: left; font-size: 1.3rem; font-weight: 900; color: var(--primary); }
        .sep-bar { color: rgba(255, 255, 255, 0.25); margin: 0 15px; font-weight: 400; font-size: 1.3rem; }

        .paragon-text { color: rgb(245, 158, 11) !important; font-weight: 950 !important; }
        .badge { font-size: 0.65rem; font-weight: 900; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; display: inline-block; white-space: nowrap; }
        .rank-badge-pwr { background: rgba(34, 211, 238, 0.15) !important; color: #22d3ee !important; border: 1px solid rgba(34, 211, 238, 0.3); }
        .rank-badge-mp { background: rgba(16, 185, 129, 0.15) !important; color: #10b981 !important; border: 1px solid rgba(16, 185, 129, 0.3); }
        .paragon-badge { background: rgba(245, 158, 11, 0.15) !important; color: #f59e0b !important; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-std { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid var(--glass-border); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-box { padding: 14px 10px; border-radius: 16px; text-align: center; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-left-width: 5px; }
        .stat-label { font-size: 0.6rem; font-weight: 800; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 950; }
        
        .box-power { border-left-color: var(--brd-power); }
        .box-merits { border-left-color: var(--brd-merits); }
        .box-mp { border-left-color: var(--brd-mp); }
        .box-kills { border-left-color: var(--brd-kills); }
        .box-deads { border-left-color: var(--brd-deads); }
        .box-heals { border-left-color: var(--brd-heals); }

        .roster-section { background: rgba(168, 85, 247, 0.05); border-radius: 20px; padding: 18px; border: 1px solid rgba(168, 85, 247, 0.2); border-left: 5px solid var(--accent-purple); }
        .roster-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .roster-item { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid var(--glass-border); }
        .r-val { font-size: 0.85rem; font-weight: 900; color: var(--accent-purple); }
        
        /* Table View */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            max-height: 75vh;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .table-responsive::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-responsive::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .table-responsive::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        /* Table structural updates for sticky cols */
        .data-table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0; 
            text-align: left; 
            min-width: 1600px; 
        }
        .data-table th, .data-table td { 
            padding: 14px 18px; 
            border-bottom: 1px solid var(--glass-border); 
            white-space: nowrap; 
            font-size: 0.85rem; 
        }
        
        .data-table th {
            font-weight: 900;
            color: var(--muted);
            text-transform: uppercase;
            position: sticky;
            top: 0;
            background: #0f172a;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
            box-shadow: 0 1px 0 var(--glass-border);
        }
        
        .data-table th:hover { color: white; background: #1e293b; }
        .data-table th.active-sort { color: var(--primary); background: #172439; }
        
        .data-table tr { transition: background 0.2s; }
        .data-table tr:hover td { background: rgba(255,255,255,0.05); }

        /* --- STICKY COLUMNS CSS --- */
        .data-table th:nth-child(1), .data-table td:nth-child(1) {
            position: sticky; left: 0; background: #0f172a; z-index: 5;
            min-width: 110px; max-width: 110px; box-sizing: border-box;
        }
        .data-table th:nth-child(2), .data-table td:nth-child(2) {
            position: sticky; left: 110px; background: #0f172a; z-index: 5; border-right: 1px solid var(--glass-border);
        }
        
        .data-table th:nth-child(1), .data-table th:nth-child(2) { z-index: 15; }
        .data-table td:nth-child(2) { box-shadow: 8px 0 10px -8px rgba(0,0,0,0.6); }
        .data-table th:nth-child(2) { box-shadow: 8px 0 10px -8px rgba(0,0,0,0.6), 0 1px 0 var(--glass-border); }
        .data-table tr:hover td:nth-child(1), .data-table tr:hover td:nth-child(2) { background: #172136; }
        .data-table th:nth-child(1).active-sort, .data-table th:nth-child(2).active-sort { background: #172439; }

        .table-select {
            background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border);
            color: white; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; outline: none; cursor: pointer;
        }

        /* Controls */
        .admin-card-controls { display: flex; gap: 10px; border-top: 1px solid var(--glass-border); padding-top: 15px; justify-content: center; align-items: center; }
        .paragon-label { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; color: var(--muted); }
        .paragon-checkbox { 
            appearance: none; width: 18px; height: 18px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 4px; cursor: pointer; position: relative; transition: all 0.3s; 
        }
        .paragon-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .paragon-checkbox:checked::after { content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 12px; }
        
        .btn { padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--glass-border); font-size: 0.75rem; background: var(--glass); color: white; text-transform: uppercase; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: var(--primary); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: white; }
        .btn-blue { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); color: white; }
        
        #authModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 24px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .modal-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; color: white; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        
        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="handleOutsideClick(event)">

<div id="loadingOverlay">
    <div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
</div>

<div class="unified-container">
    <div class="nav-container">
        <div class="nav-side-box"><a href="index.html" class="home-link btn">HOME PAGE</a></div>
        <h1 class="page-title-main">KINGDOM PVP STATS</h1>
        <div class="nav-side-box right">
            <button id="adminSaveBtn" class="btn" style="display:none; background:var(--accent-purple); border:none;" onclick="saveDedicatedJson()">SAVE CLOUD</button>
            <button id="logoutBtn" class="btn btn-red" style="display:none;" onclick="logout()">LOGOUT</button>
            <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<div class="unified-container">
    <div class="tools-glass-bar">
        <!-- GENERATION SELECTOR -->
        <select id="genSelector" onchange="handleGenFilterChange(this.value)">
            <option value="all">All Gens</option>
            <option value="G1">G1</option>
            <option value="G2">G2</option>
            <option value="G3">G3</option>
            <option value="G4">G4</option>
        </select>
        
        <!-- FILE SELECTOR -->
        <select id="fileSelector" onchange="processFile(this.value)" style="min-width: 150px;"></select>
        
        <select id="regFilter" onchange="handleSearch(true)">
            <option value="all" selected>All Status</option>
            <option value="Registered">Registered</option>
            <option value="Not Registered">Not Registered</option>
        </select>
        
        <select id="classFilter" onchange="handleSearch(true)">
            <option value="all" selected>All Classes</option>
            <option value="A">Class A</option>
            <option value="B">Class B</option>
            <option value="C">Class C</option>
            <option value="D">Class D</option>
        </select>
        
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Search Alliance or Kingdom..." oninput="handleSearch(true)">
        </div>

        <div class="view-toggle-container">
            <button id="btnViewCards" class="view-btn active" onclick="setView('cards')">Cards</button>
            <button id="btnViewTable" class="view-btn" onclick="setView('table')">Spreadsheet</button>
        </div>
    </div>
</div>

<div class="sticky-wrapper" id="sortBarContainer">
    <div class="metrics-island">
        <div class="metric-row">
            <button class="metric-btn" id="btn-kd" onclick="handleSort('kd')">Kingdom</button>
            <button class="metric-btn active" id="btn-power" onclick="handleSort('power')">Power</button>
            <button class="metric-btn" id="btn-merits" onclick="handleSort('merits')">Merits</button>
            <button class="metric-btn" id="btn-mp" onclick="handleSort('mp')">M/P Ratio</button>
            <button class="metric-btn" id="btn-kills" onclick="handleSort('kills')">Kills</button>
            <button class="metric-btn" id="btn-deads" onclick="handleSort('deads')">Deads</button>
            <button class="metric-btn" id="btn-heals" onclick="handleSort('heals')">Heals</button>
            <button class="metric-btn" id="btn-ch25" onclick="handleSort('ch25')">CH25</button>
        </div>
    </div>
</div>

<div class="unified-container">
    <div id="status" style="text-align:center; font-weight:800; color:var(--muted); margin-bottom:20px; text-transform:uppercase; font-size:0.75rem;">Initializing...</div>
    
    <!-- View 1: Cards -->
    <div id="cardGrid"></div>

    <!-- View 2: Spreadsheet -->
    <div id="tableContainer" class="table-responsive" style="display: none;">
        <table class="data-table">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- Spreadsheet Pagination Controls -->
    <div id="tablePagination" style="display: none; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border);">
        <select id="pageSizeSelector" onchange="changePageSize(this.value)" class="table-select" style="padding: 10px 15px; font-weight: 800;">
            <option value="20">20 Rows</option>
            <option value="50">50 Rows</option>
            <option value="100">100 Rows</option>
        </select>
        <button id="btnPrev" class="btn" onclick="prevPage()">&laquo; Prev</button>
        <span id="pageIndicator" style="font-weight: 900; color: var(--primary);">Page 1 of 1</span>
        <button id="btnNext" class="btn" onclick="nextPage()">Next &raquo;</button>
    </div>

    <!-- Cards Load More Controls -->
    <div style="text-align: center; padding: 40px;">
        <button id="loadMoreBtn" class="btn" style="display:none;" onclick="loadMoreCards()">LOAD MORE</button>
    </div>
</div>

<!-- SUPABASE AUTH MODAL -->
<div id="authModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="margin-top:0; font-weight:900;">ADMIN ACCESS</h2>
        <input type="email" id="email" class="modal-input" placeholder="Admin Email">
        <input type="password" id="pass" class="modal-input" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
        <div id="loginError" style="color: #ef4444; font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; display: none;"></div>
        <button id="loginActionBtn" class="btn btn-blue" style="width: 100%; padding: 15px;" onclick="login()">AUTHORIZE</button>
        <button onclick="toggleModal(false)" class="btn" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- STATE ---
    let allData = [];
    let filteredData = [];
    
    // Cards State
    let itemsShown = 30; 
    const pageSize = 30;

    // Table State
    let currentTablePage = 1;
    let tablePageSize = 20;
    
    let currentSort = { field: 'power', direction: 'desc' };
    let isAdmin = false;
    let currentSnapshotReg = { kingdoms: [], data: {} };
    let sosMap = {};
    let gPoolMap = {};
    let fullFileList = [];
    let currentView = 'cards'; // 'cards' or 'table'

    const sortLabels = { 
        kd: 'Kingdom', name: 'Alliance Name', powerRank: 'Power Rank', mpRank: 'M/P Rank',
        power: 'Power', merits: 'Merits', mp: 'M/P Ratio', kills: 'Kills', deads: 'Deads', heals: 'Heals', ch25: 'CH25' 
    };

    const possibleTroopHeaders = [
        "10M","20M","30M","40M","50M","60M+","80M+","100M+","125M+","150M+","200M+","250M+","300M+",
        "10-20M","20-40M","40-60M","60-80M","80-100M","100-125M","125-150M","150-200M","200-250M","250-300M"
    ];

    function kdClean(val) { return String(parseInt(parseFloat(String(val).trim()))) || ""; }
    function hideOverlay() { const o = document.getElementById('loadingOverlay'); if (o) { o.style.opacity = '0'; setTimeout(() => o.style.display = 'none', 300); } }

    // --- INITIALIZATION ---
    window.onload = async () => {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) enableAdminMode();

            let v = "1.0";
            try {
                const { data: vBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('version.json?t=' + Date.now());
                v = JSON.parse(await vBlob.text()).v;
                window.DATA_VERSION = v;
            } catch(e) { window.DATA_VERSION = "1.0"; }

            const [sRes, fRes, gRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/SosNames.json?v=${v}`),
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/files.json?v=${v}`),
                supabaseClient.storage.from(BUCKET_CONFIGS).download(`GPool.json?v=${v}`)
            ]);
            
            sosMap = sRes.data ? JSON.parse(await sRes.data.text()) : {};
            fullFileList = JSON.parse(await fRes.data.text());
            gPoolMap = gRes.data ? JSON.parse(await gRes.data.text()) : {};
            
            populateFileSelector('all');
            buildTableHeader(); 

        } catch (e) { console.error(e); } finally { hideOverlay(); }
    };

    function populateFileSelector(filterGen) {
        const selector = document.getElementById('fileSelector'); 
        selector.innerHTML = '';
        
        const filteredFiles = fullFileList.filter(file => (filterGen === 'all') || ((gPoolMap[file.replace('.csv', '')] || "G2") === filterGen));
        filteredFiles.reverse().forEach(f => {
            const opt = document.createElement('option'); opt.value = f;
            opt.textContent = sosMap[f.replace(/\.csv/i, '')] || f.replace(/\.csv/i, '').toUpperCase();
            selector.appendChild(opt);
        });
        
        if (filteredFiles.length > 0) { selector.value = filteredFiles[0]; processFile(selector.value); }
    }

    function handleGenFilterChange(val) { populateFileSelector(val); }

    async function processFile(fileName) {
        if (!fileName) return; 
        document.getElementById('status').textContent = "SYNCING SNAPSHOT...";
        try {
            const jsonName = fileName.replace(/\.csv/i, '.json');
            const { data: regBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`SavedRegistrations/${jsonName}?v=${window.DATA_VERSION}`);
            currentSnapshotReg = regBlob ? JSON.parse(await regBlob.text()) : { kingdoms: [], data: {} };

            const { data: csvBlob } = await supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${fileName}?v=${window.DATA_VERSION}`);
            const result = Papa.parse(await csvBlob.text(), { skipEmptyLines: true });
            
            let rawRows = result.data; 
            const headers = rawRows[0].map(h => String(h).trim());
            
            const idx = { 
                kd: headers.indexOf('KD'), name: headers.indexOf('#1 Ally'), power: headers.indexOf('Top 300 Power'), 
                merits: headers.indexOf('Top 300 Merits'), kills: headers.indexOf('Top 300 Kills'), 
                deads: headers.indexOf('Top 300 Deads'), heals: headers.indexOf('Top 300 Heals'), ch25: headers.indexOf('CH25') 
            };

            const registeredKDs = new Set(currentSnapshotReg.kingdoms ? currentSnapshotReg.kingdoms.map(k => kdClean(k)) : []);
            allData = [];

            for (let i = 1; i < rawRows.length; i++) {
                const r = rawRows[i]; 
                const cleanKd = kdClean(r[idx.kd]); 
                if (!cleanKd) continue;
                
                const regInfo = currentSnapshotReg.data?.[cleanKd] || { class: "TBD", isParagon: false };
                const roster = {}; 
                headers.forEach((h, hIdx) => { if (possibleTroopHeaders.includes(h)) roster[h] = cleanNum(r[hIdx]); });
                const pwr = cleanNum(r[idx.power]), merits = cleanNum(r[idx.merits]);
                
                allData.push({ 
                    kd: cleanKd, name: String(r[idx.name] || "Unknown").trim(), 
                    power: pwr, merits: merits, mp: pwr > 0 ? (merits / pwr) * 100 : 0, 
                    kills: cleanNum(r[idx.kills]), deads: cleanNum(r[idx.deads]), heals: cleanNum(r[idx.heals]), ch25: cleanNum(r[idx.ch25]), 
                    status: registeredKDs.has(cleanKd) ? "Registered" : "Not Registered", 
                    class: regInfo.class, isParagon: regInfo.isParagon, roster: roster 
                });
            }
            
            handleSearch(true); 
            document.getElementById('status').textContent = `SNAPSHOT READY`;
        } catch (e) { document.getElementById('status').textContent = "ERROR LOADING DATA"; }
    }

    async function saveDedicatedJson() {
        if (!isAdmin) return;
        const btn = document.getElementById('adminSaveBtn');
        const jsonName = document.getElementById('fileSelector').value.replace(/\.csv/i, '.json');
        
        const registeredList = allData.filter(item => item.status === "Registered").map(item => item.kd);
        const dataMap = {};
        allData.filter(item => item.status === "Registered").forEach(item => { dataMap[item.kd] = { class: item.class, isParagon: item.isParagon }; });

        btn.textContent = "SAVING..."; btn.disabled = true;
        try {
            await supabaseClient.storage.from(BUCKET_CONFIGS).upload(`SavedRegistrations/${jsonName}`, JSON.stringify({ kingdoms: registeredList, data: dataMap }, null, 2), { upsert: true, contentType: 'application/json' });
            btn.textContent = "SAVED!"; setTimeout(() => btn.textContent = "SAVE CLOUD", 2000);
        } catch (e) { btn.textContent = "RETRY"; } finally { btn.disabled = false; }
    }

    // --- AUTHENTICATION ---
    async function login() {
        const email = document.getElementById('email').value, password = document.getElementById('pass').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else { enableAdminMode(); toggleModal(false); }
    }

    function enableAdminMode() {
        isAdmin = true;
        document.getElementById('adminSaveBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        document.getElementById('loginBtn').style.display = 'none';
        buildTableHeader();
        handleSearch(false); 
    }
    async function logout() { await supabaseClient.auth.signOut(); location.reload(); }

    // --- VIEW TOGGLE & RENDER ---
    function setView(view) {
        currentView = view;
        document.getElementById('btnViewCards').classList.toggle('active', view === 'cards');
        document.getElementById('btnViewTable').classList.toggle('active', view === 'table');
        document.getElementById('sortBarContainer').style.display = view === 'cards' ? 'flex' : 'none';
        renderCurrentView();
    }

    function buildTableHeader() {
        const thead = document.getElementById('tableHead');
        let html = '<tr>';
        const mainCols = [ { f: 'kd', l: 'Kingdom' }, { f: 'name', l: 'Alliance' }, { f: 'powerRank', l: 'Pwr Rnk' }, { f: 'mpRank', l: 'M/P Rnk' }, { f: 'power', l: 'Power' }, { f: 'merits', l: 'Merits' }, { f: 'mp', l: 'M/P %' }, { f: 'kills', l: 'Kills' }, { f: 'deads', l: 'Deads' }, { f: 'heals', l: 'Heals' }, { f: 'ch25', l: 'CH25' } ];
        mainCols.forEach(c => { html += `<th onclick="handleSort('${c.f}')" data-sort="${c.f}">${c.l}</th>`; });
        possibleTroopHeaders.forEach(h => { html += `<th>${h}</th>`; });
        html += `<th>Status</th><th>Class</th><th>Paragon</th></tr>`;
        thead.innerHTML = html;
        updateSortUI();
    }

    function handleSearch(resetPage = false) {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const sFilter = document.getElementById('regFilter').value;
        const cFilter = document.getElementById('classFilter').value;
        
        let rankingPool = (sFilter === 'all') ? [...allData] : allData.filter(a => a.status === sFilter);
        const sortedByPower = [...rankingPool].sort((a,b) => b.power - a.power);
        const sortedByMP = [...rankingPool].sort((a,b) => b.mp - a.mp);
        
        allData.forEach(a => {
            if (rankingPool.some(x => x.kd === a.kd)) { 
                a.powerRank = sortedByPower.findIndex(x => x.kd === a.kd) + 1; 
                a.mpRank = sortedByMP.findIndex(x => x.kd === a.kd) + 1; 
            } else { a.powerRank = "-"; a.mpRank = "-"; }
        });
        
        filteredData = rankingPool.filter(a => (a.name.toLowerCase().includes(query) || a.kd.includes(query)) && (cFilter === 'all' || a.class === cFilter));
        applySort(); 
        
        if (resetPage) { currentTablePage = 1; itemsShown = pageSize; }
        renderCurrentView();
    }

    function handleSort(field) {
        if (currentSort.field === field) currentSort.direction = (currentSort.direction === 'desc') ? 'asc' : 'desc';
        else { currentSort.field = field; currentSort.direction = 'desc'; }
        
        updateSortUI(); applySort();
        currentTablePage = 1; itemsShown = pageSize;
        renderCurrentView();
    }

    function applySort() {
        filteredData.sort((a, b) => {
            let valA = a[currentSort.field], valB = b[currentSort.field];
            if (currentSort.field === 'powerRank' || currentSort.field === 'mpRank') { valA = (valA === "-") ? 999999 : valA; valB = (valB === "-") ? 999999 : valB; }
            if (typeof valA === 'string' && typeof valB === 'string') {
                if (currentSort.field === 'kd') return currentSort.direction === 'desc' ? Number(valB) - Number(valA) : Number(valA) - Number(valB);
                return currentSort.direction === 'desc' ? valB.localeCompare(valA) : valA.localeCompare(valB);
            }
            return currentSort.direction === 'desc' ? (valB - valA) : (valA - valB);
        });
    }

    function updateSortUI() {
        document.querySelectorAll('.metric-btn').forEach(b => { b.classList.remove('active'); b.textContent = b.textContent.replace(/[▼▲]/g, '').trim(); });
        const activeBtn = document.getElementById(`btn-${currentSort.field}`);
        if (activeBtn) { activeBtn.classList.add('active'); activeBtn.textContent += (currentSort.direction === 'desc' ? ' ▼' : ' ▲'); }

        document.querySelectorAll('#tableHead th[data-sort]').forEach(th => { th.textContent = th.textContent.replace(/[▼▲]/g, '').trim(); th.classList.remove('active-sort'); });
        const activeTh = document.querySelector(`#tableHead th[data-sort="${currentSort.field}"]`);
        if (activeTh) { activeTh.classList.add('active-sort'); activeTh.textContent += (currentSort.direction === 'desc' ? ' ▼' : ' ▲'); }
    }

    function renderCurrentView() {
        if (currentView === 'cards') {
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('tablePagination').style.display = 'none';
            document.getElementById('cardGrid').style.display = 'grid';
            
            const grid = document.getElementById('cardGrid'); grid.innerHTML = "";
            const batch = filteredData.slice(0, itemsShown);
            batch.forEach(a => grid.appendChild(buildCardHtml(a)));
            document.getElementById('loadMoreBtn').style.display = (itemsShown < filteredData.length) ? 'inline-block' : 'none';
        } else {
            document.getElementById('cardGrid').style.display = 'none';
            document.getElementById('loadMoreBtn').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
            document.getElementById('tablePagination').style.display = 'flex';
            
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = "";
            const totalPages = Math.max(1, Math.ceil(filteredData.length / tablePageSize));
            if (currentTablePage > totalPages) currentTablePage = totalPages;
            
            const start = (currentTablePage - 1) * tablePageSize;
            filteredData.slice(start, start + tablePageSize).forEach(a => tbody.appendChild(buildTableRowHtml(a)));
            
            document.getElementById('pageIndicator').innerText = `Page ${currentTablePage} of ${totalPages}`;
            document.getElementById('btnPrev').disabled = (currentTablePage === 1);
            document.getElementById('btnNext').disabled = (currentTablePage === totalPages);
        }
    }

    // --- PAGINATION & EVENT HANDLERS ---
    function changePageSize(size) { tablePageSize = parseInt(size); currentTablePage = 1; renderCurrentView(); }
    function prevPage() { if (currentTablePage > 1) { currentTablePage--; renderCurrentView(); } }
    function nextPage() { if (currentTablePage < Math.ceil(filteredData.length / tablePageSize)) { currentTablePage++; renderCurrentView(); } }
    function loadMoreCards() { itemsShown += pageSize; renderCurrentView(); }
    function updateLocalReg(kd, field, value) { const entry = allData.find(x => x.kd === kd); if (entry) { entry[field] = value; handleSearch(false); } }

    // --- HTML BUILDERS ---
    function buildCardHtml(a) {
        const card = document.createElement('div'); card.className = 'pvp-card';
        card.innerHTML = `
            <div class="card-header">
                <div class="ally-name-row"><div class="name-left ${a.isParagon ? 'paragon-text' : ''}">${a.name}</div><span class="sep-bar">|</span><div class="kd-right">KD ${a.kd}</div></div>
                <div style="font-size:0.8rem; font-weight:950; text-align:center; color:var(--primary); margin-bottom:15px;">CH25 COUNT: ${a.ch25}</div>
                <div style="display:flex; gap:8px; justify-content:center;"><span class="badge rank-badge-pwr">#${a.powerRank} PWR</span><span class="badge rank-badge-mp">#${a.mpRank} M/P</span><span class="badge badge-std">CLASS ${a.class}</span>${a.isParagon ? '<span class="badge paragon-badge">★ PARAGON</span>' : ''}</div>
            </div>
            <div class="stat-grid">
                <div class="stat-box box-power"><span class="stat-label">Power</span><div class="stat-value">${formatVal(a.power)}</div></div>
                <div class="stat-box box-merits"><span class="stat-label">Merits</span><div class="stat-value">${formatVal(a.merits)}</div></div>
                <div class="stat-box box-mp"><span class="stat-label">M/P Ratio</span><div class="stat-value">${Number(a.mp).toFixed(2)}%</div></div>
            </div>
            <div class="stat-grid">
                <div class="stat-box box-kills"><span class="stat-label">Kills</span><div class="stat-value">${formatVal(a.kills)}</div></div>
                <div class="stat-box box-deads"><span class="stat-label">Deads</span><div class="stat-value">${formatVal(a.deads)}</div></div>
                <div class="stat-box box-heals"><span class="stat-label">Heals</span><div class="stat-value">${formatVal(a.heals)}</div></div>
            </div>
            <div class="roster-section">
                <span class="stat-label" style="display:block; text-align:center; color:var(--accent-purple)"># of Accounts per power bracket</span>
                <div class="roster-grid">${Object.entries(a.roster).map(([label, val]) => `<div class="roster-item" style="${val === 0 ? 'opacity:0.2' : ''}"><div class="stat-label" style="font-size:0.5rem;">${label.replace('+', '')}</div><div class="r-val">${val}</div></div>`).join('')}</div>
            </div>
            <div class="admin-card-controls" style="display: ${isAdmin ? 'flex' : 'none'};">
                <select onchange="updateLocalReg('${a.kd}', 'status', this.value)" style="background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; padding: 6px; border-radius: 8px;">
                    <option value="Not Registered" ${a.status === 'Not Registered' ? 'selected' : ''}>Not Registered</option>
                    <option value="Registered" ${a.status === 'Registered' ? 'selected' : ''}>Registered</option>
                </select>
                <select onchange="updateLocalReg('${a.kd}', 'class', this.value)" style="background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; padding: 6px; border-radius: 8px;">
                    <option value="TBD" ${a.class === 'TBD' ? 'selected' : ''}>TBD</option><option value="A" ${a.class === 'A' ? 'selected' : ''}>A</option><option value="B" ${a.class === 'B' ? 'selected' : ''}>B</option><option value="C" ${a.class === 'C' ? 'selected' : ''}>C</option><option value="D" ${a.class === 'D' ? 'selected' : ''}>D</option>
                </select>
                <label class="paragon-label"><input type="checkbox" class="paragon-checkbox" ${a.isParagon ? 'checked' : ''} onchange="updateLocalReg('${a.kd}', 'isParagon', this.checked)"> PARAGON</label>
            </div>`;
        return card;
    }

    function buildTableRowHtml(a) {
        const tr = document.createElement('tr');
        let html = `<td style="font-weight:900;">${a.kd}</td><td style="font-weight:bold; color:${a.isParagon ? '#f59e0b' : 'var(--primary)'};">${a.name}</td>
            <td><span class="badge rank-badge-pwr">#${a.powerRank}</span></td><td><span class="badge rank-badge-mp">#${a.mpRank}</span></td>
            <td>${formatVal(a.power)}</td><td>${formatVal(a.merits)}</td><td style="color:#10b981; font-weight:bold;">${Number(a.mp).toFixed(2)}%</td>
            <td>${formatVal(a.kills)}</td><td>${formatVal(a.deads)}</td><td>${formatVal(a.heals)}</td><td>${a.ch25}</td>`;

        possibleTroopHeaders.forEach(h => { const val = a.roster[h] || 0; html += `<td style="${val === 0 ? 'opacity:0.3;' : 'font-weight:700; color:var(--accent-purple);'}">${val}</td>`; });

        if (isAdmin) {
            html += `<td><select onchange="updateLocalReg('${a.kd}', 'status', this.value)" class="table-select"><option value="Not Registered" ${a.status === 'Not Registered' ? 'selected' : ''}>Not Registered</option><option value="Registered" ${a.status === 'Registered' ? 'selected' : ''}>Registered</option></select></td>
                <td><select onchange="updateLocalReg('${a.kd}', 'class', this.value)" class="table-select"><option value="TBD" ${a.class === 'TBD' ? 'selected' : ''}>TBD</option><option value="A" ${a.class === 'A' ? 'selected' : ''}>A</option><option value="B" ${a.class === 'B' ? 'selected' : ''}>B</option><option value="C" ${a.class === 'C' ? 'selected' : ''}>C</option><option value="D" ${a.class === 'D' ? 'selected' : ''}>D</option></select></td>
                <td style="text-align:center;"><input type="checkbox" class="paragon-checkbox" ${a.isParagon ? 'checked' : ''} onchange="updateLocalReg('${a.kd}', 'isParagon', this.checked)"></td>`;
        } else {
            html += `<td><span class="badge badge-std">${a.status}</span></td><td><span class="badge badge-std">${a.class}</span></td><td style="text-align:center;">${a.isParagon ? '<span class="badge paragon-badge">★</span>' : '<span style="opacity:0.2">-</span>'}</td>`;
        }
        tr.innerHTML = html; return tr;
    }

    // --- UTILITIES ---
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }
    function handleOutsideClick(e) { if (e.target.id === 'authModal') toggleModal(false); }
    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { if (n >= 1e9) return (n/1e9).toFixed(2)+'B'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; return n.toLocaleString(); }
</script>
</body>
</html>
