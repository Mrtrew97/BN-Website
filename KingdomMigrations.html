<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Kingdom Migrations</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- 1. SCROLLBARS: HIDDEN ON MAIN, VISIBLE IN MODAL --- */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { 
            display: none; 
        }

        /* Custom scrollbars for internal areas */
        .scroll-area::-webkit-scrollbar, 
        #soloModal::-webkit-scrollbar { 
            display: block; 
            width: 8px !important; 
        }
        
        .scroll-area::-webkit-scrollbar-track, 
        #soloModal::-webkit-scrollbar-track { 
            background: rgba(0,0,0,0.3) !important; 
            border-radius: 10px; 
        }
        
        .scroll-area::-webkit-scrollbar-thumb, 
        #soloModal::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.15) !important; 
            border-radius: 10px; 
        }
        
        .scroll-area::-webkit-scrollbar-thumb:hover, 
        #soloModal::-webkit-scrollbar-thumb:hover { 
            background: var(--primary) !important; 
        }

        /* --- CORE STYLING --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden; 
        }
        
        .header-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px; 
            padding-top: 40px; 
        }
        
        .page-title-main { 
            font-size: 3.5rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: -2px; 
            margin: 0; 
            text-align: center;
        }
        
        .disclaimer-bar { 
            text-align: center; 
            margin: 15px auto 25px auto; 
            font-weight: 900; 
            color: var(--muted); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 2px; 
            background: rgba(255,255,255,0.05); 
            width: fit-content; 
            padding: 8px 30px; 
            border-radius: 50px; 
            border: 1px solid var(--glass-border); 
        }

        /* Navigation */
        .nav-btn { 
            position: fixed; 
            top: 20px; 
            z-index: 1000; 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        
        .nav-btn:hover { 
            background: var(--primary); 
            border-color: var(--primary); 
            transform: translateY(-2px); 
        }
        
        .home-btn { left: 20px; } 
        .top-btn { right: 20px; }

        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { display: flex; }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- FIXED CENTERED LOADING MODAL --- */
        #loadingOverlay { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.4s ease;
        }
        
        .spinner {
            width: 50px; 
            height: 50px; 
            border: 5px solid rgba(255,255,255,0.1); 
            border-top-color: #3b82f6; 
            border-radius: 50%; 
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        
        #progressContainer { 
            width: 100%; 
            max-width: 400px; 
            height: 8px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid var(--glass-border);
            margin-bottom: 15px;
        }
        
        #progressBar { 
            width: 0%; 
            height: 100%; 
            background: var(--primary); 
            transition: width 0.1s ease; 
            box-shadow: 0 0 15px var(--primary); 
        }
        
        #status-msg-loading { 
            text-align: center; 
            font-weight: 800; 
            color: var(--muted); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 2px;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Selector */
        .selector-island { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 25px; 
            display: flex; 
            gap: 20px; 
            align-items: flex-end; 
            margin-bottom: 30px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        
        .select-group { display: flex; flex-direction: column; gap: 8px; }
        .select-group label { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: var(--muted); 
            font-weight: 800; 
        }
        
        select { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--glass-border); 
            color: white; 
            padding: 12px 20px; 
            border-radius: 12px; 
            font-family: 'Inter', sans-serif; 
            font-weight: 600; 
            outline: none; 
            min-width: 220px; 
        }

        #genSelector {
            color: var(--primary);
            font-weight: 900;
        }
        
        .compare-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 0 30px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s; 
            height: 46px; 
        }

        .compare-btn:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
        }

        /* Search & Sort */
        .search-type-toggle { 
            display: flex; 
            background: rgba(0,0,0,0.4); 
            padding: 5px; 
            border-radius: 50px; 
            border: 1px solid var(--glass-border); 
            margin-bottom: 15px; 
            gap: 5px; 
        }
        
        .st-btn { 
            background: transparent; 
            border: none; 
            color: var(--muted); 
            padding: 8px 20px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }
        
        .st-btn.active { 
            background: var(--primary); 
            color: white; 
        }
        
        .search-box { 
            padding: 16px; 
            border-radius: 16px; 
            border: 1px solid var(--glass-border); 
            width: 100%; 
            max-width: 500px; 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
            font-weight: 600; 
            text-align: center; 
            font-size: 1rem; 
            margin-bottom: 20px; 
        }
        
        .sort-bar { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }
        
        .sort-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            color: var(--muted); 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        
        .sort-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }

        /* Cards */
        #cardGrid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            max-width: 1400px; 
        }
        
        .kd-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border-radius: 24px; 
            padding: 24px; 
            border: 1px solid var(--glass-border); 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        
        .kd-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--primary); 
            background: rgba(255,255,255,0.06); 
        }
        
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--glass-border); 
            padding-bottom: 15px; 
        }
        
        .kd-id { font-size: 1.3rem; font-weight: 900; color: var(--primary); text-transform: uppercase; }
        .kd-ally { font-weight: 800; color: white; font-size: 1rem; text-align: right; text-transform: uppercase; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .stat-box { 
            padding: 16px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            border-left-width: 6px; 
            display: flex; 
            flex-direction: column; 
            min-height: 80px; 
            justify-content: center; 
            background: rgba(255,255,255,0.02); 
        }
        
        .stat-label { 
            font-size: 0.65rem; 
            font-weight: 900; 
            color: var(--muted); 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }
        
        .stat-value { font-size: 1.35rem; font-weight: 950; color: white; margin-top: 4px; }
        
        .box-players { border-left-color: #3b82f6; } 
        .box-pwr { border-left-color: #06b6d4; } 
        .box-kills { border-left-color: #f59e0b; } 
        .box-deads { border-left-color: #ef4444; } 
        .box-heals { border-left-color: #10b981; }
        
        .card-hint { 
            text-align: center; 
            font-size: 0.7rem; 
            font-weight: 800; 
            color: var(--muted); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 10px; 
            opacity: 0.6; 
        }

        /* Modal */
        #soloModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.98), #000); 
            z-index: 3000; 
            backdrop-filter: blur(25px); 
            overflow-y: auto; 
            padding: 40px 20px; 
        }
        
        .modal-container { 
            width: 95%; 
            max-width: 1400px; 
            margin: 0 auto; 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            border-radius: 40px; 
            padding: 60px; 
            position: relative; 
            box-shadow: 0 0 100px rgba(0,0,0,0.5); 
        }
        
        .modal-header { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            margin-bottom: 50px; 
            border-bottom: 1px solid var(--glass-border); 
            padding-bottom: 30px; 
        }
        
        .solo-main-title { 
            font-size: 5rem; 
            font-weight: 950; 
            text-transform: uppercase; 
            letter-spacing: -4px; 
            color: var(--primary); 
            margin: 0; 
            line-height: 1; 
        }
        
        .solo-sub-title { 
            font-size: 1.3rem; 
            font-weight: 800; 
            color: white; 
            opacity: 0.8; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-top: 15px; 
        }
        
        .close-view-btn { 
            position: absolute; 
            top: 30px; 
            right: 30px; 
            background: rgba(239, 68, 68, 0.2); 
            border: 1px solid rgba(239, 68, 68, 0.4); 
            color: #ef4444; 
            padding: 12px 25px; 
            border-radius: 15px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .modal-metrics-list { 
            display: flex; 
            flex-direction: column; 
            gap: 0; 
            margin-bottom: 50px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }
        
        .metric-grid-base {
            display: grid; 
            grid-template-columns: 1fr 1.5fr 1fr; 
            align-items: end; 
            text-align: center;
        }

        .metric-header-row { 
            padding: 25px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        .metric-header-row span { 
            font-size: 0.8rem; 
            font-weight: 900; 
            color: var(--muted); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        .metric-card-row { 
            padding: 30px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .m-in { color: #10b981; font-weight: 900; font-size: 1.6rem; }
        .m-out { color: #ef4444; font-weight: 900; font-size: 1.6rem; }

        .m-center-stack { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .m-name { 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: var(--muted); 
            text-transform: uppercase; 
            letter-spacing: 2.5px; 
            margin-bottom: 8px; 
        }
        .m-delta { font-weight: 950; letter-spacing: -1px; font-size: 2.2rem; color: white; line-height: 1; }

        .migration-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .zone-box { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--glass-border); 
            border-radius: 32px; 
            padding: 30px; 
            height: 750px; 
            display: flex; 
            flex-direction: column; 
        }
        
        .zone-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding-bottom: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        .zone-title { 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        
        .scroll-area { overflow-y: auto; flex-grow: 1; padding: 0 10px; scrollbar-gutter: stable; }
        
        .departure-zone .zone-header { flex-direction: row-reverse; }
        .departure-zone .scroll-area { direction: rtl; }
        .departure-zone .scroll-area > * { direction: ltr; text-align: right; }

        .player-chip { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: 0.2s; 
            text-align: left; 
        }
        
        .player-chip:hover { 
            background: rgba(255,255,255,0.08); 
            border-color: var(--primary); 
        }
        
        .whale-gold { border-color: #ffd700 !important; box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
        .whale-gold b { color: #ffd700 !important; }
        .whale-silver { border-color: #e2e8f0 !important; box-shadow: 0 0 15px rgba(226, 232, 240, 0.1); }
        .whale-silver b { color: #e2e8f0 !important; }
        .whale-copper { border-color: #cd7f32 !important; box-shadow: 0 0 15px rgba(205, 127, 50, 0.1); }
        .whale-copper b { color: #cd7f32 !important; }
        .whale-purple { border-color: #a855f7 !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.1); }
        .whale-purple b { color: #a855f7 !important; }

        .chip-main { display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .departure-zone .chip-main { flex-direction: row-reverse; }
        .arrow { font-size: 1.2rem; color: var(--primary); transition: 0.3s; }
        .player-chip.active .arrow { transform: rotate(180deg); }
        
        .chip-details { 
            display: none; 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
        }
        
        .player-chip.active .chip-details { display: block; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .det-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; }
        .det-label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .det-val { font-size: 0.85rem; font-weight: 800; color: white; }
        
        .swap-history { 
            background: rgba(255,255,255,0.02); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        
        .swap-item { margin-bottom: 12px; }
        .swap-header { 
            font-size: 0.6rem; 
            color: var(--primary); 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            display: block; 
            margin-bottom: 4px; 
        }
        .swap-path { font-size: 0.85rem; font-weight: 700; color: white; display: block; }

        .pos-text { color: #10b981; } 
        .neg-text { color: #ef4444; } 
        .neu-text { color: var(--muted); }
        
        /* --- UPDATED MOBILE MODAL VIEW --- */
        @media (max-width: 1000px) {
            .migration-zones { 
                grid-template-columns: 1fr !important; 
            }

            .metric-grid-base {
                grid-template-columns: 1fr 1.2fr 1fr !important; 
                gap: 5px !important;
                padding: 15px 0 !important;
                align-items: center !important;
            }

            .metric-header-row { 
                display: grid !important; 
            }
            
            .metric-header-row span {
                font-size: 0.5rem !important;
                letter-spacing: 1px !important;
            }

            .m-in, .m-out { 
                font-size: 1rem !important; 
            }
            
            .m-delta { 
                font-size: 1.3rem !important; 
            }
            
            .m-name { 
                font-size: 0.55rem !important; 
                letter-spacing: 1px !important;
                margin-bottom: 4px !important;
            }

            .modal-container {
                padding: 40px 15px !important;
                width: 98% !important;
            }

            .solo-main-title {
                font-size: 2.5rem !important;
            }

            .close-view-btn {
                top: 15px;
                right: 15px;
                padding: 8px 15px;
                font-size: 0.7rem;
            }

            .departure-zone .scroll-area { direction: ltr; }
            .departure-zone .scroll-area > * { text-align: left; }
            .departure-zone .chip-main { flex-direction: row; }
        }    
</style>
</head>
<body>

<div id="rotate-hint">
    <div class="rotate-content">
        <div class="phone-icon"></div>
        <p>Landscape view recommended</p>
        <button onclick="document.getElementById('rotate-hint').style.setProperty('display', 'none', 'important')">Dismiss</button>
    </div>
</div>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="progressContainer"><div id="progressBar"></div></div>
    <div id="status-msg-loading">Initializing Hub...</div>
</div>

<a href="index.html" class="nav-btn home-btn">HOME PAGE</a>
<button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="nav-btn top-btn">TO THE TOP</button>

<div class="header-container">
    <h1 class="page-title-main">Kingdom Migrations</h1>
</div>

<div class="disclaimer-bar">⚠️ This data is based on the top 50,000 players of each G2 KvK ⚠️</div>

<div class="selector-island">
    <div class="select-group">
        <label>Generation Filter</label>
        <select id="genSelector">
            <option value="all" selected>All Gens</option>
            <option value="G1">G1</option>
            <option value="G2">G2</option>
            <option value="G3">G3</option>
            <option value="G4">G4</option>
            <option value="NoG">NoG</option>
        </select>
    </div>
    <div class="select-group">
        <label>Start Snapshot</label>
        <select id="startSelect"></select>
    </div>
    <div class="select-group">
        <label>End Snapshot</label>
        <select id="endSelect"></select>
    </div>
    <button class="compare-btn" id="analyzeBtn" onclick="runComparison()">Analyze Range</button>
</div>

<div class="search-type-toggle">
    <button id="st-kd" class="st-btn active" onclick="setSearchType('kd')">Search Kingdoms</button>
    <button id="st-player" class="st-btn" onclick="setSearchType('player')">Search Players</button>
</div>

<input type="text" id="kdSearch" class="search-box" placeholder="Search Kingdom# or Alliance Name..." oninput="handleSearch()" autocomplete="off">

<div class="sort-bar">
    <button id="btn-kd" class="sort-btn" onclick="handleSort('kd', this)">Kingdom #</button>
    <button id="btn-count" class="sort-btn active" onclick="handleSort('count', this)">Players</button>
    <button id="btn-pwr" class="sort-btn" onclick="handleSort('pwr', this)">Power</button>
    <button id="btn-kills" class="sort-btn" onclick="handleSort('kills', this)">Kills</button>
    <button id="btn-deads" class="sort-btn" onclick="handleSort('deads', this)">Deads</button>
    <button id="btn-heals" class="sort-btn" onclick="handleSort('heals', this)">Heals</button>
</div>

<div id="status-msg" style="margin-bottom: 20px; font-weight: 800; color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;"></div>
<div id="cardGrid"></div>
<div style="text-align: center;"><button id="loadMoreBtn" class="sort-btn" style="width: 250px; margin: 40px auto; display: none;" onclick="loadMore()">Load More Profiles</button></div>

<!-- MODAL -->
<div id="soloModal">
    <div class="modal-container">
        <button class="close-view-btn" onclick="closeModal()">CLOSE VIEW</button>
        <div class="modal-header">
            <h1 class="solo-main-title" id="modalTitle">KD --</h1>
            <div class="solo-sub-title" id="modalAlly">UNKNOWN ALLIANCE</div>
        </div>

        <div class="modal-metrics-list">
            <div class="metric-header-row metric-grid-base">
                <span>Total In</span>
                <span>Differential (A-D)</span>
                <span>Total Out</span>
            </div>
            <div id="modalMetricsBody"></div>
        </div>

        <div class="migration-zones">
            <div class="zone-box" style="border-top: 4px solid #10b981;">
                <div class="zone-header">
                    <span class="zone-title">Arrivals</span>
                    <span class="neu-text" id="arrivalCount">0</span>
                </div>
                <div id="arrivalsList" class="scroll-area"></div>
            </div>
            <div class="zone-box departure-zone" style="border-top: 4px solid #ef4444;">
                <div class="zone-header">
                    <span class="neu-text" id="departureCount">0</span>
                    <span class="zone-title">Departures</span>
                </div>
                <div id="departuresList" class="scroll-area"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE CONFIGURATION ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU"; 
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let migrationData = [];
    let filteredData = [];
    let fullFilesList = [];
    let latestAllianceMap = {};
    let sosMap = {};
    let currentGenPools = {}; // Maps KD to Gen for END snapshot
    let currentSort = { key: 'count', direction: 'desc' };
    let searchType = 'kd';
    let itemsShown = 30;
    let pageSize = 30;

    const sortLabels = { kd: 'Kingdom #', count: 'Players', pwr: 'Power', kills: 'Kills', deads: 'Deads', heals: 'Heals' };

    function idClean(val) {
        if (!val) return "";
        let cleaned = String(val).trim().replace(/["',]/g, '');
        let num = Math.floor(parseFloat(cleaned));
        return isNaN(num) ? "" : String(num);
    }

    function kdClean(val) { 
        if (!val || val === "N/A") return "N/A"; 
        return idClean(val);
    }

    function cleanNum(val) { 
        if (!val) return 0; 
        return parseFloat(String(val).replace(/["',%]/g, '')) || 0; 
    }

    function formatShorthand(v) { 
        if (v === 0) return "0"; 
        const absV = Math.abs(v); 
        let res = ""; 
        if (absV >= 1e9) res = (absV / 1e9).toFixed(2) + 'B'; 
        else if (absV >= 1e6) res = (absV / 1e6).toFixed(2) + 'M'; 
        else if (absV >= 1e3) res = (absV / 1e3).toFixed(1) + 'K'; 
        else res = Math.round(absV).toLocaleString(); 
        return (v < 0 ? "-" : "") + res; 
    }

    async function fetchLatest(bucket, path, forceFresh = false) {
        let v = "1.0";
        try {
            const { data: vBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('version.json?t=' + Date.now());
            v = JSON.parse(await vBlob.text()).v;
            window.DATA_VERSION = v;
        } catch(e) { window.DATA_VERSION = "1.0"; }

        const timestamp = forceFresh ? `?t=${Date.now()}` : `?v=${v}`;
        const url = `${SUPABASE_URL}/storage/v1/object/authenticated/${bucket}/${path}${timestamp}`;
        const response = await fetch(url, {
            method: 'GET',
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status} for ${path}`);
        return response;
    }

    function updateProgress(pct, text) {
        const bar = document.getElementById('progressBar');
        const overlay = document.getElementById('loadingOverlay');
        const status = document.getElementById('status-msg-loading');
        if (overlay) { overlay.style.display = 'flex'; overlay.style.opacity = '1'; }
        if (bar) bar.style.width = pct + '%';
        if (status && text) status.innerText = text;
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) { 
            overlay.style.opacity = '0'; 
            setTimeout(() => { overlay.style.display = 'none'; }, 400); 
        }
    }

    window.onload = init;

    async function init() {
        try {
            updateProgress(10, "Fetching Metadata...");
            const [sRes, fRes] = await Promise.all([
                fetchLatest(BUCKET_DATA, 'Players/SosNames.json'),
                fetchLatest(BUCKET_DATA, 'Players/files.json')
            ]);
            
            sosMap = await sRes.json();
            fullFilesList = await fRes.json();

            populateSelectors();
            hideLoading();
        } catch (err) { 
            console.error(err); 
            document.getElementById('status-msg-loading').innerText = "Sync Failed."; 
        }
    }

    function populateSelectors() {
        const startSelect = document.getElementById('startSelect');
        const endSelect = document.getElementById('endSelect');
        startSelect.innerHTML = ''; 
        endSelect.innerHTML = '';

        [...fullFilesList].reverse().forEach(file => {
            const date = file.replace('.csv','');
            const name = sosMap[date] || date;
            startSelect.add(new Option(name, file)); 
            endSelect.add(new Option(name, file));
        });

        if(endSelect.options.length > 1) { 
            endSelect.selectedIndex = 0; 
            startSelect.selectedIndex = 1; 
        }
    }

    async function fetchCSVFull(filename, progressOffset, progressScale) {
        const res = await fetchLatest(BUCKET_DATA, `Players/${filename}`);
        const text = await res.text();
        return await parseCSVChunked(text, (pct) => {
            updateProgress(progressOffset + (pct * progressScale), `Analyzing ${filename}...`);
        });
    }

    function parseCSVChunked(text, onProgress) {
        const lines = text.split('\n');
        const header = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.trim().replace(/["']/g, ""));
        
        const fIdx = (names) => { for(let n of names) { let i = header.indexOf(n); if(i!==-1) return i; } return -1; };
        const idx = { 
            id: fIdx(['Lord ID', 'LordID', 'ID']), 
            kd: fIdx(['KD', 'KD#']), 
            name: header.indexOf('Name'), 
            ally: header.indexOf('Ally'), 
            pwr: fIdx(['H - Power', 'Power']), 
            merits: header.indexOf('Merits'), 
            kills: header.indexOf('Kills'), 
            deads: header.indexOf('Deads'), 
            heals: header.indexOf('Heals') 
        };
        
        const dataMap = new Map();
        const total = lines.length;
        const chunkSize = 2500;
        
        return new Promise((resolve) => {
            let cur = 1;
            function process() {
                const end = Math.min(cur + chunkSize, total);
                for (let i = cur; i < end; i++) {
                    const r = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (r.length < 5) continue;
                    const id = idClean(r[idx.id]);
                    if (!id) continue;
                    dataMap.set(id, { 
                        id, 
                        kd: r[idx.kd]?.trim().replace(/"/g, ''), 
                        name: r[idx.name]?.trim().replace(/"/g, ''), 
                        ally: r[idx.ally]?.trim().replace(/"/g, ''), 
                        pwr: cleanNum(r[idx.pwr]), 
                        merits: cleanNum(r[idx.merits]), 
                        kills: cleanNum(r[idx.kills]), 
                        deads: cleanNum(r[idx.deads]), 
                        heals: cleanNum(r[idx.heals]) 
                    });
                }
                cur = end;
                if (onProgress) onProgress(Math.floor((cur / total) * 100));
                if (cur < total) requestAnimationFrame(process); else resolve(dataMap);
            }
            process();
        });
    }

    async function runComparison() {
        const startFile = document.getElementById('startSelect').value;
        const endFile = document.getElementById('endSelect').value;
        if (!startFile || !endFile || startFile === endFile) return;

        const btn = document.getElementById('analyzeBtn'); 
        btn.disabled = true;
        updateProgress(5, "Analyzing snapshots...");

        // Determine correct range order
        let files = [...fullFilesList];
        let startIdx = files.indexOf(startFile);
        let endIdx = files.indexOf(endFile);
        if(startIdx > endIdx) [startIdx, endIdx] = [endIdx, startIdx];
        const rangeFiles = files.slice(startIdx, endIdx + 1);

        try {
            // LOAD GEN POOLS FOR END SNAPSHOT SPECIFICALLY
            const cleanEndName = endFile.replace(/\.csv/i, '');
            const gens = ['G1', 'G2', 'G3', 'G4', 'NoG'];
            currentGenPools = {};
            await Promise.all(gens.map(async (g) => {
                try {
                    const { data } = await fetchLatest(BUCKET_CONFIGS, `Gen Pools/${cleanEndName}-${g}.json`);
                    const kdList = await data.json();
                    kdList.forEach(kd => { currentGenPools[kdClean(kd)] = g; });
                } catch(e) {}
            }));

            const rangeMaps = []; 
            for(let i=0; i<rangeFiles.length; i++) {
                rangeMaps.push(await fetchCSVFull(rangeFiles[i], (i * (0.9/rangeFiles.length) * 100), (0.9/rangeFiles.length)));
            }

            updateProgress(95, "Calculating flows...");
            latestAllianceMap = {}; 
            const stats = {};
            const ensureKD = (kd) => { 
                if(!stats[kd]) stats[kd] = { kd, gen: currentGenPools[kd] || 'NoG', count:{in:0,out:0}, pwr:{in:0,out:0}, kills:{in:0,out:0}, deads:{in:0,out:0}, heals:{in:0,out:0}, arrivalsList:[], departuresList:[] }; 
            };

            const allIDs = new Set();
            rangeMaps.forEach(m => m.forEach((v, k) => allIDs.add(k)));
            
            allIDs.forEach(id => {
                const playerTimeline = [];
                for (let i = 0; i < rangeMaps.length; i++) {
                    const p = rangeMaps[i].get(id);
                    const cleanK = kdClean(p?.kd);
                    playerTimeline.push({ kd: cleanK, data: p, snapIdx: i });
                }

                let historyTrail = [];
                for (let k = 0; k < playerTimeline.length - 1; k++) {
                    if (playerTimeline[k].kd !== playerTimeline[k+1].kd) {
                        const dP = rangeFiles[k].replace('.csv','');
                        const dN = rangeFiles[k+1].replace('.csv','');
                        historyTrail.push({ fromDate: sosMap[dP]||dP, toDate: sosMap[dN]||dN, fromKD: playerTimeline[k].kd, toKD: playerTimeline[k+1].kd });
                    }
                }

                const activePoints = playerTimeline.filter(pt => pt.kd !== "N/A");
                for (let j = 0; j < activePoints.length - 1; j++) {
                    const prev = activePoints[j];
                    const next = activePoints[j+1];
                    if (prev.kd !== next.kd) {
                        const growth = { 
                            kills: Math.max(0, next.data.kills - prev.data.kills), 
                            deads: Math.max(0, next.data.deads - prev.data.deads), 
                            heals: Math.max(0, next.data.heals - prev.data.heals) 
                        };
                        ensureKD(prev.kd);
                        stats[prev.kd].count.out++; stats[prev.kd].pwr.out += prev.data.pwr;
                        stats[prev.kd].departuresList.push({ p: prev.data, info: `to KD ${next.kd}`, growth: {kills:0, deads:0, heals:0}, swaps: historyTrail });
                        ensureKD(next.kd);
                        stats[next.kd].count.in++; stats[next.kd].pwr.in += next.data.pwr;
                        stats[next.kd].kills.in += growth.kills; stats[next.kd].deads.in += growth.deads; stats[next.kd].heals.in += growth.heals;
                        stats[next.kd].arrivalsList.push({ p: next.data, info: `from KD ${prev.kd}`, growth: growth, swaps: historyTrail });
                        if (!latestAllianceMap[next.kd]) latestAllianceMap[next.kd] = next.data.ally;
                    }
                }

                if (activePoints.length > 0) {
                    const first = activePoints[0];
                    const last = activePoints[activePoints.length - 1];
                    if (first.snapIdx > 0) {
                        ensureKD(first.kd);
                        stats[first.kd].count.in++; stats[first.kd].pwr.in += first.data.pwr;
                        stats[first.kd].arrivalsList.push({ p: first.data, info: "New to Rankings", growth: {kills:0, deads:0, heals:0}, swaps: historyTrail });
                    }
                    if (last.snapIdx < playerTimeline.length - 1) {
                        ensureKD(last.kd);
                        stats[last.kd].count.out++; stats[last.kd].pwr.out += last.data.pwr;
                        stats[last.kd].departuresList.push({ p: last.data, info: "Exit Rankings", growth: {kills:0, deads:0, heals:0}, swaps: historyTrail });
                    }
                }
            });
            
            migrationData = Object.entries(stats).map(([kd, s]) => ({
                kd, gen: s.gen, count: s.count.in - s.count.out, pwr: s.pwr.in - s.pwr.out, 
                kills: s.kills.in - s.kills.out, deads: s.deads.in - s.deads.out, heals: s.heals.in - s.heals.out, raw: s 
            })).filter(x => Math.abs(x.count) > 0 || Math.abs(x.pwr) > 0);
            
            applySort(); hideLoading();
        } catch (err) { console.error(err); } finally { btn.disabled = false; }
    }

    function handleSort(k, btn) { 
        if(currentSort.key === k) currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc'; 
        else { currentSort.key = k; currentSort.direction = 'desc'; } 
        document.querySelectorAll('.sort-bar .sort-btn').forEach(b => {
            b.classList.remove('active');
            const key = b.id.replace('btn-', '');
            b.textContent = sortLabels[key];
        });
        btn.classList.add('active');
        btn.textContent += (currentSort.direction === 'desc' ? ' ▼' : ' ▲');
        applySort(); 
    }
    
    function applySort() { 
        migrationData.sort((a,b) => { 
            let vA = a[currentSort.key], vB = b[currentSort.key]; 
            if(currentSort.key === 'kd') { vA = parseInt(vA); vB = parseInt(vB); } 
            return currentSort.direction === 'asc' ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1); 
        }); 
        handleSearch(); 
    }
    
    function handleSearch() { 
        const q = document.getElementById('kdSearch').value.toLowerCase(); 
        const selectedGen = document.getElementById('genSelector').value;
        
        filteredData = migrationData.filter(item => {
            const matchesGen = (selectedGen === 'all' || item.gen === selectedGen);
            let matchesQuery = false;
            if (searchType === 'kd') {
                matchesQuery = item.kd.includes(q) || (latestAllianceMap[item.kd]||"").toLowerCase().includes(q);
            } else {
                matchesQuery = item.raw.arrivalsList.some(x => x.p.name.toLowerCase().includes(q) || x.p.id.includes(q)) || item.raw.departuresList.some(x => x.p.name.toLowerCase().includes(q) || x.p.id.includes(q));
            }
            return matchesGen && matchesQuery;
        });

        itemsShown = pageSize; renderGrid(); 
    }
    
    function renderGrid() {
        const grid = document.getElementById('cardGrid'); grid.innerHTML = '';
        filteredData.slice(0, itemsShown).forEach(item => {
            const card = document.createElement('div'); card.className = 'kd-card';
            card.onclick = () => openModal(item);
            const sig = (n) => (n > 0 ? '+' : '');
            card.innerHTML = `
                <div class="card-header">
                    <div style="display:flex; flex-direction:column;">
                        <div class="kd-id">KD ${item.kd}</div>
                        <div style="font-size:0.6rem; color:var(--primary); font-weight:900; letter-spacing:1px; margin-top:2px;">GEN: ${item.gen}</div>
                    </div>
                    <div class="kd-ally">${latestAllianceMap[item.kd]||"N/A"}</div>
                </div>
                <div class="stat-grid">
                    <div class="stat-box box-players"><span class="stat-label">Players</span><div class="stat-value ${item.count >= 0 ? 'pos-text' : 'neg-text'}">${sig(item.count)}${item.count}</div></div>
                    <div class="stat-box box-pwr"><span class="stat-label">Power</span><div class="stat-value ${item.pwr >= 0 ? 'pos-text' : 'neg-text'}">${sig(item.pwr)}${formatShorthand(item.pwr)}</div></div>
                    <div class="stat-box box-kills"><span class="stat-label">Kills</span><div class="stat-value ${item.kills >= 0 ? 'pos-text' : 'neg-text'}">${sig(item.kills)}${formatShorthand(item.kills)}</div></div>
                    <div class="stat-box box-deads"><span class="stat-label">Deads</span><div class="stat-value ${item.deads >= 0 ? 'pos-text' : 'neg-text'}">${sig(item.deads)}${formatShorthand(item.deads)}</div></div>
                    <div class="stat-box box-heals"><span class="stat-label">Heals</span><div class="stat-value ${item.heals >= 0 ? 'pos-text' : 'neg-text'}">${sig(item.heals)}${formatShorthand(item.heals)}</div></div>
                </div>
                <div class="card-hint">Click card for detailed list</div>`;
            grid.appendChild(card);
        });
        document.getElementById('loadMoreBtn').style.display = itemsShown < filteredData.length ? 'inline-block' : 'none';
    }

    function openModal(item) {
        const s = item.raw;
        document.getElementById('modalTitle').innerText = `KD ${item.kd}`;
        document.getElementById('modalAlly').innerText = latestAllianceMap[item.kd] || "Unknown Alliance";
        const body = document.getElementById('modalMetricsBody'); body.innerHTML = '';
        
        [{l:'Player Count',k:'count'},{l:'Power',k:'pwr'},{l:'Kills',k:'kills'},{l:'Deads',k:'deads'},{l:'Heals',k:'heals'}].forEach(m => {
            const delta = s[m.k].in - s[m.k].out;
            body.innerHTML += `<div class="metric-card-row metric-grid-base"><div class="m-in">+${formatShorthand(s[m.k].in)}</div><div class="m-center-stack"><span class="m-name">${m.l}</span><div class="m-delta ${delta >= 0 ? 'pos-text' : 'neg-text'}">${delta > 0 ? '+' : ''}${formatShorthand(delta)}</div></div><div class="m-out">-${formatShorthand(s[m.k].out)}</div></div>`;
        });

        const uniqueArr = Array.from(new Map(s.arrivalsList.map(x => [x.p.id + x.info, x])).values()).sort((a,b)=>b.p.pwr-a.p.pwr);
        const uniqueDep = Array.from(new Map(s.departuresList.map(x => [x.p.id + x.info, x])).values()).sort((a,b)=>b.p.pwr-a.p.pwr);

        document.getElementById('arrivalCount').innerText = uniqueArr.length;
        document.getElementById('departureCount').innerText = uniqueDep.length;
        document.getElementById('arrivalsList').innerHTML = uniqueArr.map(x => generatePlayerChip(x, 'in')).join('');
        document.getElementById('departuresList').innerHTML = uniqueDep.map(x => generatePlayerChip(x, 'out')).join('');
        document.getElementById('soloModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function generatePlayerChip(data, type) {
        const p = data.p; const g = data.growth; const endPwr = p.pwr;
        let whaleClass = 'whale-purple'; if (endPwr >= 200000000) whaleClass = 'whale-gold'; else if (endPwr >= 100000000) whaleClass = 'whale-silver'; else if (endPwr >= 70000000) whaleClass = 'whale-copper';
        const historyHTML = data.swaps.map(s => `<div class="swap-item"><span class="swap-header">${s.fromDate} ➔ ${s.toDate}</span><span class="swap-path">KD ${s.fromKD} ➔ KD ${s.toKD}</span></div>`).join('');
        return `<div class="player-chip ${whaleClass}" onclick="this.classList.toggle('active')">
            <div class="chip-main"><div><b>${p.id}</b> | ${p.name} <span style="opacity:0.6; font-size:0.7rem;">${data.info}</span></div><span class="arrow">⌄</span></div>
            <div class="chip-details">
                <div class="detail-grid">
                    <div class="det-box"><span class="det-label">Snapshot Power</span><span class="det-val">${formatShorthand(endPwr)}</span></div>
                    <div class="det-box"><span class="det-label">Kills Growth</span><span class="det-val">${formatShorthand(g?.kills || 0)}</span></div>
                    <div class="det-box"><span class="det-label">Deads Growth</span><span class="det-val">${formatShorthand(g?.deads || 0)}</span></div>
                    <div class="det-box"><span class="det-label">Heals Growth</span><span class="det-val">${formatShorthand(g?.heals || 0)}</span></div>
                </div>
                <div class="swap-history">${historyHTML}</div>
            </div></div>`;
    }

    function closeModal() { document.getElementById('soloModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function loadMore() { itemsShown += pageSize; renderGrid(); }
    function setSearchType(type) { searchType = type; document.querySelectorAll('.st-btn').forEach(b => b.classList.remove('active')); document.getElementById(`st-${type}`).classList.add('active'); handleSearch(); }
</script>
