<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Matchups Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; 
            --text: #1e293b; --muted: #64748b; --accent: #8b5cf6;
            --highlight: #9961ff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; overflow-x: hidden; }

        .sticky-header { position: sticky; top: 0; background: var(--bg); z-index: 1000; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 0; }
        
        .search-container { width: 100%; margin-bottom: 10px; }
        .search-input { width: 100%; padding: 12px 20px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 0.9rem; outline: none; box-sizing: border-box; }

        .sort-row { width: 100%; display: flex; align-items: center; gap: 8px; overflow-x: auto; padding: 5px 0; white-space: nowrap; scrollbar-width: none; }
        .sort-row::-webkit-scrollbar { display: none; }
        .sort-label { font-size: 0.7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-right: 5px; }
        .sort-btn { padding: 6px 12px; background: white; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--muted); }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .btn { padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 0.75rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-purple { background: var(--accent); color: white; }
        .btn-ghost { background: white; border: 1px solid #e2e8f0; color: var(--muted); }
        .btn-red { background: #fee2e2; color: #dc2626; }
        .btn-add-row { background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; }

        .matchup-card { background: white; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 30px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card-header { background: #f8fafc; padding: 15px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .name-input { font-size: 1.1rem; font-weight: 900; border: 1px solid transparent; background: transparent; color: var(--primary); padding: 4px 8px; border-radius: 6px; width: 300px; }

        .table-wrapper { width: 100%; overflow-x: auto; } 
        table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1400px; }
        th { text-align: center; padding: 15px 2px; color: var(--text); font-size: 0.82rem; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; background: #ffffff; }
        td { padding: 12px 2px; border-bottom: 1px solid #f8fafc; font-size: 0.8rem; text-align: center; }

        .row-total-a, .row-total-b { background: #f0f7ff !important; color: #1e40af !important; font-weight: 800; }
        .row-differentials-(a-b) { background: #fffbeb !important; color: #92400e !important; font-weight: 900; }
        
        .id-input { width: 85px; padding: 4px; border: 1px solid #e2e8f0; border-radius: 4px; text-align: center; font-weight: 700; color: var(--primary); }
        .drag-handle { cursor: grab; color: #cbd5e1; width: 25px; }
        .no-drag .drag-handle { visibility: hidden; pointer-events: none; }
        
        .del-row-btn { color: #ef4444; cursor: pointer; font-weight: 900; font-size: 1.2rem; }
        #adminArea { display: none; gap: 8px; align-items: center; }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="top-nav">
        <div style="display:flex; align-items:center; gap:10px;">
            <a href="home.html" class="btn btn-ghost">← HUB</a>
            <span id="activeFile" style="font-size:0.7rem; font-weight:800; color:var(--muted);">SYNCING...</span>
        </div>
        <div id="adminArea">
            <button class="btn btn-purple" id="saveBtn" onclick="saveMatchups()">SAVE CONFIG</button>
            <button class="btn btn-ghost" onclick="manualRefresh()">REFRESH ↻</button>
            <button class="btn btn-green" onclick="addNewMatchup()">+ NEW MATCHUP</button>
            <button class="btn btn-ghost" onclick="location.reload()">LOGOUT</button>
        </div>
        <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
    </div>
    
    <div class="search-container">
        <input type="search" id="mSearch" class="search-input" placeholder="Search Matchups..." oninput="renderAll()">
    </div>

    <div class="sort-row" id="sortRow">
        <span class="sort-label">Sort By Differential:</span>
        <button class="sort-btn active" onclick="setSort('none', this)">Original</button>
        <button class="sort-btn" onclick="setSort('power', this)">Power</button>
        <button class="sort-btn" onclick="setSort('merits', this)">Merits</button>
        <button class="sort-btn" onclick="setSort('mp', this)">M/P %</button>
        <button class="sort-btn" onclick="setSort('avgAp', this)">CH25 AVG</button>
        <button class="sort-btn" onclick="setSort('10M', this)">10M</button>
        <button class="sort-btn" onclick="setSort('20M', this)">20M</button>
        <button class="sort-btn" onclick="setSort('30M', this)">30M</button>
        <button class="sort-btn" onclick="setSort('40M', this)">40M</button>
        <button class="sort-btn" onclick="setSort('50M', this)">50M</button>
    </div>
</div>

<div id="matchupsContainer"></div>

<div id="authModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:2000;">
    <div style="background:white; padding:30px; border-radius:15px; width:300px;">
        <h3 style="margin-top:0">Admin Login</h3>
        <input type="text" id="user" placeholder="User" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input type="password" id="pass" placeholder="Pass" style="width:100%; padding:10px; margin-bottom:15px; box-sizing:border-box;">
        <button class="btn btn-blue" style="width:100%" onclick="login()">Login</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:8px;" onclick="toggleModal(false)">Cancel</button>
    </div>
</div>

<script>
    const RENDER_URL = "https://kd-backend-icbu.onrender.com";
    let isAdmin = false;
    let masterData = new Map();
    let currentMatchups = [];
    let currentSort = 'none';
    const csvKeys = ["10M","20M","30M","40M","50M","80M+","100M+","125M+","150M+","200M+","250M+","300M+"];
    const displayHeaders = ["10M","20M","30M","40M","50M","80M","100M","125M","150M","200M","250M","300M"];

    window.onload = async () => {
        try {
            // 1. Load CSV data through Render Middleman
            const fResp = await fetch(`${RENDER_URL}/Pull/files.json?cb=${Date.now()}`);
            const files = await fResp.json();
            
            if (files && files.length > 0) {
                const latest = files[files.length - 1];
                document.getElementById('activeFile').textContent = latest.replace('.csv','').toUpperCase();
                
                const csvResp = await fetch(`${RENDER_URL}/Pull/${latest}?cb=${Date.now()}`);
                const text = await csvResp.text();
                
                const result = Papa.parse(text, { header: true, skipEmptyLines: 'greedy' });
                const cleanedPool = [];
                
                result.data.forEach(row => {
                    const kd = String(row.KD || row['KD#'] || "").trim();
                    const p = cleanNum(row['Top 300 Power'] || row.T300P);
                    const m = cleanNum(row['Top 300 Merits'] || row.Merits);
                    const ap = cleanNum(row['CH25 AP'] || row.AP);
                    if (kd && p > 0) {
                        cleanedPool.push({
                            kd, power: p, merits: m, mp: m/p, ap: ap,
                            alliance: (row['#1 Ally'] || row.Ally || row.Alliance || "").trim(),
                            raw: row
                        });
                    }
                });

                const sortedP = [...cleanedPool].sort((a,b) => b.power - a.power);
                const sortedMP = [...cleanedPool].sort((a,b) => b.mp - a.mp);
                cleanedPool.forEach(item => {
                    item.powerRank = sortedP.findIndex(x => x.kd === item.kd) + 1;
                    item.mpRank = sortedMP.findIndex(x => x.kd === item.kd) + 1;
                    masterData.set(item.kd, item);
                });
            } else {
                document.getElementById('activeFile').textContent = "NO CSV DATA";
            }

            // 2. Load Matchup Config
            await fetchMatchups();
            renderAll();
        } catch (e) { 
            console.error("Init Error:", e);
            document.getElementById('activeFile').textContent = "ERROR LOADING";
        }
    };

    async function fetchMatchups() {
        try {
            const r = await fetch(`${RENDER_URL}/load-matchups?t=${Date.now()}`);
            if(r.ok) {
                currentMatchups = await r.json();
            } else {
                currentMatchups = [];
            }
        } catch(e) { 
            console.error("Matchup Load Error:", e);
            currentMatchups = [];
        }
    }

    function renderAll() {
        const container = document.getElementById('matchupsContainer');
        const sT = document.getElementById('mSearch').value.toLowerCase().trim();
        container.innerHTML = '';

        let displayList = currentMatchups.map((m, idx) => ({ ...m, originalIdx: idx, stats: calculateMatchupData(m.ids) }));

        if (sT) {
            displayList = displayList.filter(m => m.name.toLowerCase().includes(sT));
        }

        if (currentSort !== 'none') {
            displayList.sort((a, b) => {
                const diffA = a.stats.diffRow;
                const diffB = b.stats.diffRow;
                // If diffRow is empty/not calculated, default to 0
                const valA = diffA.b ? (diffA[currentSort] !== undefined ? diffA[currentSort] : (diffA.b[currentSort] || 0)) : 0;
                const valB = diffB.b ? (diffB[currentSort] !== undefined ? diffB[currentSort] : (diffB.b[currentSort] || 0)) : 0;
                return Math.abs(valB) - Math.abs(valA);
            });
        }

        displayList.forEach((m) => {
            if (!isAdmin && m.active === false) return;
            const mIdx = m.originalIdx;
            const card = document.createElement('div');
            card.className = 'matchup-card';
            if (m.active === false) card.style.opacity = '0.5';

            let tableRows = m.ids.map((id, rIdx) => {
                const upperId = String(id).toUpperCase().trim();
                const isTotalA = upperId === "TOTAL A";
                const isTotalB = upperId === "TOTAL B";
                const isDiff = upperId === "DIFFERENTIALS (A-B)";
                const rowData = m.stats.rows[rIdx] || {};

                if (isTotalA || isTotalB || isDiff) {
                    const rowClass = `row-${upperId.replace(/\s+/g, '-').replace(/[()]/g, '').toLowerCase()}`;
                    return `
                        <tr class="${rowClass} no-drag">
                            ${isAdmin ? `<td class="drag-handle">≡</td>` : ''}
                            <td colspan="2" style="text-align:left; padding-left:20px;">
                                <div style="display:flex; align-items:center; gap:15px;">
                                    <span style="font-weight:900;">${upperId}</span>
                                    ${isAdmin && !isDiff ? `<button class="btn-add-row" onclick="addRow(${mIdx}, '${upperId}')">+ ID</button>` : ''}
                                </div>
                            </td>
                            <td>-</td>
                            <td>${formatVal(rowData.power || 0)}</td>
                            <td>${formatVal(rowData.merits || 0)}</td>
                            <td>${(rowData.power && rowData.power !== 0) ? ((rowData.merits/rowData.power)*100).toFixed(1)+'%' : '0%'}</td>
                            <td>${rowData.totalMpRank || '0'}</td>
                            <td>${formatVal(rowData.avgAp || 0)}</td>
                            ${csvKeys.map(k => `<td>${formatVal(rowData.b ? rowData.b[k] : 0)}</td>`).join('')}
                        </tr>
                    `;
                }

                const d = masterData.get(id);
                return `
                    <tr class="movable-row">
                        ${isAdmin ? `<td class="drag-handle">≡</td>` : ''}
                        <td style="font-weight:700">${d ? d.powerRank : '-'}</td>
                        <td>
                            <div style="display:flex; align-items:center; justify-content:center; gap:5px;">
                                ${isAdmin ? `<span class="del-row-btn" onclick="removeRow(${mIdx}, ${rIdx})">×</span>` : ''}
                                ${isAdmin ? `<input class="id-input" value="${id}" onchange="updateId(${mIdx}, ${rIdx}, this.value)">` : `<strong>${id}</strong>`}
                            </div>
                        </td>
                        <td>${d ? d.alliance : '-'}</td>
                        <td>${d ? formatVal(d.power) : '-'}</td>
                        <td>${d ? formatVal(d.merits) : '-'}</td>
                        <td>${d ? ((d.merits/d.power)*100).toFixed(1)+'%' : '-'}</td>
                        <td>${d ? d.mpRank : '-'}</td>
                        <td>${d ? formatVal(d.ap) : '-'}</td>
                        ${csvKeys.map(k => `<td>${d ? formatVal(cleanNum(d.raw[k])) : '-'}</td>`).join('')}
                    </tr>
                `;
            }).join('');

            card.innerHTML = `
                <div class="card-header">
                    <div style="display:flex; align-items:center; gap:10px;">
                        ${isAdmin ? `<input class="name-input" value="${m.name}" onchange="currentMatchups[${mIdx}].name=this.value">` : `<div class="name-input">${m.name}</div>`}
                        ${isAdmin ? `<input type="checkbox" ${m.active !== false ? 'checked' : ''} onchange="toggleStatus(${mIdx})">` : ''}
                    </div>
                    ${isAdmin ? `<button class="btn btn-red" onclick="deleteMatchup(${mIdx})">DEL</button>` : ''}
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                ${isAdmin ? '<th style="width:25px"></th>' : ''}
                                <th style="width:50px">RANK</th>
                                <th style="width:100px">KD#</th>
                                <th>ALLIANCE</th>
                                <th>POWER</th>
                                <th>MERITS</th>
                                <th>M/P %</th>
                                <th style="width:60px">M/P R</th>
                                <th style="width:75px">CH25 AVG</th>
                                ${displayHeaders.map(h => `<th>${h}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody id="tbody-${mIdx}">${tableRows}</tbody>
                    </table>
                </div>
            `;
            container.appendChild(card);
            if(isAdmin) setupSortable(mIdx);
        });
    }

    function calculateMatchupData(ids) {
        let resRows = [];
        let groupA = { power:0, merits:0, totalMpRank:0, apSum:0, count:0, b:{} };
        let groupB = { power:0, merits:0, totalMpRank:0, apSum:0, count:0, b:{} };
        csvKeys.forEach(k => { groupA.b[k]=0; groupB.b[k]=0; });

        let current = groupA;
        ids.forEach(id => {
            const u = String(id).toUpperCase().trim();
            if (u === "TOTAL A") current = groupB;
            else if (u !== "DIFFERENTIALS (A-B)" && u !== "TOTAL B") {
                const d = masterData.get(id);
                if (d) {
                    current.power += d.power; current.merits += d.merits;
                    current.totalMpRank += d.mpRank; current.apSum += d.ap;
                    current.count++;
                    csvKeys.forEach(k => current.b[k] += cleanNum(d.raw[k]));
                }
            }
        });

        let diffRow = {};
        ids.forEach((id, idx) => {
            const u = String(id).toUpperCase().trim();
            if (u === "TOTAL A") {
                resRows[idx] = {...groupA, avgAp: groupA.count > 0 ? groupA.apSum/groupA.count : 0};
            } else if (u === "TOTAL B") {
                resRows[idx] = {...groupB, avgAp: groupB.count > 0 ? groupB.apSum/groupB.count : 0};
            } else if (u === "DIFFERENTIALS (A-B)") {
                let d = { 
                    power: groupA.power - groupB.power, 
                    merits: groupA.merits - groupB.merits,
                    avgAp: (groupA.count > 0 ? groupA.apSum/groupA.count : 0) - (groupB.count > 0 ? groupB.apSum/groupB.count : 0),
                    totalMpRank: groupA.totalMpRank - groupB.totalMpRank,
                    b: {} 
                };
                csvKeys.forEach(k => d.b[k] = groupA.b[k] - groupB.b[k]);
                resRows[idx] = d;
                diffRow = d;
            } else resRows[idx] = {};
        });
        return { rows: resRows, diffRow: diffRow };
    }

    function cleanNum(v) { return v ? parseFloat(String(v).replace(/,/g, '')) || 0 : 0; }
    
    function formatVal(n) {
        if (n === 0) return "0";
        if (!n && n !== 0) return "-";
        const absN = Math.abs(n);
        let str = "";
        if (absN >= 1e9) str = (n/1e9).toFixed(2) + 'B';
        else if (absN >= 1e6) str = (n/1e6).toFixed(2) + 'M';
        else if (absN < 1000) str = n.toFixed(2);
        else str = Math.floor(n).toLocaleString();
        return n < 0 ? `(${str.replace('-','')})` : str;
    }

    function setSort(key, btn) {
        currentSort = (key === 'mpRank') ? 'totalMpRank' : key;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAll();
    }

    function addRow(mIdx, type) {
        const ids = currentMatchups[mIdx].ids;
        if (type === "TOTAL A") ids.splice(ids.indexOf("TOTAL A"), 0, "1001");
        else ids.splice(ids.indexOf("TOTAL B"), 0, "1002");
        renderAll();
    }
    function removeRow(mIdx, rIdx) { currentMatchups[mIdx].ids.splice(rIdx, 1); renderAll(); }
    function updateId(mIdx, rIdx, val) { currentMatchups[mIdx].ids[rIdx] = val; renderAll(); }
    function toggleStatus(idx) { currentMatchups[idx].active = !currentMatchups[idx].active; renderAll(); }
    function addNewMatchup() { currentMatchups.unshift({ name: "New Matchup", ids: ["1001", "TOTAL A", "DIFFERENTIALS (A-B)", "TOTAL B", "1002"], active: true }); renderAll(); }
    function deleteMatchup(idx) { if(confirm("Delete?")) { currentMatchups.splice(idx,1); renderAll(); } }

    async function saveMatchups() {
        const btn = document.getElementById('saveBtn'); 
        const originalText = btn.textContent;
        btn.textContent = "SAVING...";
        try {
            const resp = await fetch(`${RENDER_URL}/save-matchups`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(currentMatchups) 
            });
            if (resp.ok) {
                btn.textContent = "SAVED!";
            } else {
                throw new Error("Save failed");
            }
        } catch (e) {
            alert("Save failed. Check console.");
            console.error(e);
        }
        setTimeout(() => btn.textContent = originalText, 2000);
    }

    function login() {
        if(document.getElementById('user').value === "Admin" && document.getElementById('pass').value === "Password123") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'flex';
            document.getElementById('loginBtn').style.display = 'none';
            toggleModal(false); renderAll();
        }
    }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }
    function setupSortable(mIdx) {
        new Sortable(document.getElementById(`tbody-${mIdx}`), { draggable: '.movable-row', handle: '.drag-handle', animation: 150, onEnd: (e) => {
            const item = currentMatchups[mIdx].ids.splice(e.oldIndex, 1)[0];
            currentMatchups[mIdx].ids.splice(e.newIndex, 0, item);
            renderAll();
        }});
    }
    async function manualRefresh() { await fetchMatchups(); renderAll(); }
</script>
</body>
</html>
