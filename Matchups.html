<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Official Matchups</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. SCROLLBARS --- */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { 
            display: none; 
        }

        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { 
                display: flex; 
            }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- BASE STYLING --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }
        
        .unified-container { 
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 0 25px; 
            box-sizing: border-box; 
            width: 100%; 
        }
        
        .header-top-row { 
            margin-top: 25px; 
            margin-bottom: 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            width: 100%; 
        }
        .nav-side-box { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .nav-side-box.right { 
            justify-content: flex-end; 
            gap: 10px; 
        }
        .header-top-row .home-link { 
            position: static; 
            margin: 0; 
            backdrop-filter: none; 
        }

        /* --- ROW 1: SEARCH ROW (CENTERED) --- */
        .search-glass-row { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 15px 20px; 
            display: flex;
            justify-content: center;
            margin-bottom: 15px; 
        }
        .search-center-box { 
            width: 550px; 
            display: flex; 
            justify-content: center; 
        }
        .search-input { 
            width: 100%; 
            padding: 12px 20px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
            font-size: 1rem;
            font-weight: 600;
        }
        
        /* --- ROW 2: FILTERS & SELECTORS --- */
        .filters-glass-row { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 25px; 
        }

        .zone-cluster { 
            display: flex; 
            gap: 8px; 
            justify-content: flex-end; 
            flex-wrap: nowrap; 
            white-space: nowrap;
        }

        .filter-btn { 
            padding: 10px 18px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 700; 
            cursor: pointer; 
            color: var(--muted); 
            transition: 0.2s; 
            text-transform: uppercase; 
            white-space: nowrap;
        }
        .filter-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .filter-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary-glow); 
        }

        /* --- ROW 3: STICKY METRICS ISLAND --- */
        .sticky-wrapper { 
            position: sticky; 
            top: 15px; 
            z-index: 1000; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            margin-bottom: 50px; 
            padding: 0 25px; 
            box-sizing: border-box; 
        }
        .metrics-island { 
            width: 100%; 
            max-width: 1350px; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 28px; 
            padding: 12px 0; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .metric-row { 
            display: flex; 
            gap: 8px; 
            justify-content: center; 
            flex-wrap: wrap; 
            padding: 4px 15px; 
            width: 100%; 
        }
        .metric-btn { 
            padding: 10px 18px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            cursor: pointer; 
            color: var(--muted); 
            transition: 0.2s; 
            text-transform: uppercase; 
        }
        .metric-btn:hover { 
            background: rgba(255,255,255,0.1); 
            color: white; 
        }
        .metric-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary-glow); 
        }

        .expand-rows { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s ease-out; 
            width: 100%; 
        }
        .expand-rows.open { 
            max-height: 350px; 
            margin-top: 10px; 
            border-top: 1px solid var(--glass-border); 
            padding-top: 10px; 
        }
        .toggle-trigger { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            cursor: pointer; 
            color: var(--muted); 
            padding-top: 8px; 
            transition: 0.3s; 
        }

        /* --- CARDS & TABLES --- */
        #matchupsContainer { 
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
            padding-bottom: 60px; 
        }
        .matchup-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 25px; 
        }
        
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            border-bottom: 1px solid var(--glass-border); 
            padding-bottom: 15px; 
        }
        .name-input { 
            font-size: 1.6rem; 
            font-weight: 900; 
            border: 1px solid transparent; 
            background: transparent; 
            color: var(--primary); 
            padding: 0px 8px; 
            border-radius: 6px; 
            width: 100%; 
            outline: none; 
            box-sizing: border-box;
            text-overflow: ellipsis; 
        }

        .table-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            border-radius: 15px; 
        } 
        
        /* --- PRO STICKY TABLE LOCKING --- */
        table { 
            width: auto; 
            border-collapse: separate; 
            border-spacing: 0 4px; 
            table-layout: fixed !important; 
            min-width: 2500px; 
        }

        th { 
            text-align: center; 
            padding: 15px 2px; 
            color: var(--muted); 
            font-size: 0.9rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        th:hover {
            color: var(--primary);
        }

        td { 
            padding: 15px 2px; 
            text-align: center; 
            background: rgba(255,255,255,0.02); 
            border-top: 1px solid var(--glass-border); 
            border-bottom: 1px solid var(--glass-border); 
            font-size: 1rem; 
        }
        
        /* PRO STICKY COLUMN POSITIONS */
        .col-del, .col-drag {
            position: sticky !important;
            z-index: 40;
            background-color: #0f172a !important;
            width: 30px !important;
            min-width: 30px !important;
            max-width: 30px !important;
        }
        .col-del { left: 0; }
        .col-drag { left: 30px; }

        /* RANK Column (Sticky Left 1) */
        .sticky-col-rank {
            position: sticky !important;
            left: 0; 
            z-index: 30;
            background-color: #1e293b !important; 
            width: 100px !important;
            min-width: 100px !important;
            max-width: 100px !important; 
            border-right: 1px solid var(--glass-border);
            text-align: center !important;
        }

        /* Alliance Column (Sticky Left 2) */
        .sticky-col-ally {
            position: sticky !important;
            left: 100px !important; 
            z-index: 30;
            background-color: #0f172a !important; 
            width: 160px !important;
            min-width: 160px !important;
            max-width: 160px !important; 
            border-right: none !important;
            text-align: center !important;
        }

        /* Kingdom ID Column (Sticky Left 3) */
        .sticky-col-kd {
            position: sticky !important;
            left: 260px !important; 
            z-index: 30; 
            background-color: #1e293b !important; 
            width: 70px !important;
            min-width: 70px !important;
            max-width: 70px !important; 
            border-right: 1px solid var(--glass-border);
            text-align: center !important;
        }

        /* Admin Mode Offsets (+60px for buttons) */
        .admin-active .sticky-col-rank { left: 60px !important; }
        .admin-active .sticky-col-ally { left: 160px !important; }
        .admin-active .sticky-col-kd { left: 320px !important; }

        th.sticky-col-rank, th.sticky-col-kd, th.sticky-col-ally {
            z-index: 31;
            background-color: #1e293b !important; 
        }

        /* STYLE FOR SPECIAL ROWS (TOTALS & TEAM A - TEAM B) */
        .row-total-a .sticky-col-rank, 
        .row-total-b .sticky-col-rank, 
        .row-team-a---team-b .sticky-col-rank,
        .row-differentials-a-b .sticky-col-rank {
            border-right: none !important;
        }

        .row-total-a .sticky-col-rank, .row-total-a .sticky-col-kd, .row-total-a .sticky-col-ally, .row-total-a .col-del, .row-total-a .col-drag,
        .row-total-b .sticky-col-rank, .row-total-b .sticky-col-kd, .row-total-b .sticky-col-ally, .row-total-b .col-del, .row-total-b .col-drag {
            background-color: #131d33 !important; 
        }

        .row-team-a---team-b .sticky-col-rank, .row-team-a---team-b .sticky-col-kd, .row-team-a---team-b .sticky-col-ally, .row-team-a---team-b .col-del, .row-team-a---team-b .col-drag,
        .row-differentials-a-b .sticky-col-rank, .row-differentials-a-b .sticky-col-kd, .row-differentials-a-b .sticky-col-ally, .row-differentials-a-b .col-del, .row-differentials-a-b .col-drag {
            background-color: #191932 !important; 
        }

        .highlight-sort { 
            background: rgba(59, 130, 246, 0.15) !important; 
            color: white !important; 
            font-weight: 950 !important; 
        }
        .winning-val {
            color: #10b981 !important; /* EMERALD GREEN */
            font-weight: 900 !important;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }
        .row-total-a, .row-total-b { 
            background: rgba(59, 130, 246, 0.1) !important; 
            color: var(--primary) !important; 
        }
        .row-team-a---team-b, .row-differentials-a-b { 
            background: rgba(168, 85, 247, 0.1) !important; 
            color: var(--accent) !important; 
        }
        .paragon-text { 
            color: rgb(245, 158, 11) !important; 
            font-weight: 900 !important; 
            text-decoration: none !important; 
        }
        
        .id-input { 
            width: 55px; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid var(--glass-border); 
            color: #3b82f6; 
            text-align: center; 
            font-weight: 800; 
            border-radius: 4px; 
            outline: none; 
        }
        
        /* --- BUTTONS --- */
        .btn { 
            padding: 8px 14px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            border: 1px solid var(--glass-border); 
            font-size: 0.85rem; 
            background: var(--glass); 
            color: white; 
            text-transform: uppercase; 
            transition: 0.2s; 
        }
        .btn:hover { 
            background: var(--primary); 
            transform: translateY(-2px); 
        }
        .btn-red { 
            background: rgba(239, 68, 68, 0.2); 
            border-color: rgba(239, 68, 68, 0.4); 
            color: white; 
        }
        .btn-blue { 
            background: rgba(59, 130, 246, 0.2); 
            border-color: rgba(59, 130, 246, 0.4); 
            color: white; 
        }
        .btn-green { 
            background: rgba(16, 185, 129, 0.2); 
            border-color: rgba(16, 185, 129, 0.4); 
            color: white; 
        }
        
        #authModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
        }
        .modal-content { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 24px; 
            width: 320px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
        }
        
        #loadingOverlay { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.3s; 
        }
        #progressContainer { 
            width: 100%; 
            max-width: 500px; 
            height: 10px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            margin: 20px auto; 
            display: none; 
            overflow: hidden; 
            border: 1px solid var(--glass-border); 
        }
        #progressBar { 
            width: 0%; 
            height: 100%; 
            background: var(--primary); 
            transition: width 0.1s ease; 
        }
        #status-msg { 
            text-align: center; 
            font-weight: 800; 
            color: var(--muted); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1px; 
            margin-bottom: 20px; 
            min-height: 1em; 
        }
        
        /* --- VOTING UI --- */
        .voting-section {
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .voting-header {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }
        .voting-header h4 {
            margin: 0; 
            font-size: 1.1rem; 
            font-weight: 900; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .voting-stats-row {
            font-size: 0.85rem; 
            font-weight: 800; 
            color: var(--muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .voting-bar-container {
            width: 100%; 
            height: 16px; 
            background: rgba(239, 68, 68, 0.3); 
            border-radius: 8px; 
            overflow: hidden; 
            display: flex; 
            margin-bottom: 15px;
        }
        .voting-bar-fill {
            height: 100%; 
            background: var(--primary); 
            transition: width 0.5s ease-out;
        }
        .voting-buttons { 
            display: flex; 
            gap: 10px; 
            width: 100%; 
        }
        .vote-btn {
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            font-weight: 800; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); 
            color: white; 
            transition: 0.2s; 
            text-transform: uppercase;
        }
        .vote-btn:hover:not(:disabled) { 
            background: rgba(255,255,255,0.15); 
        }
        .vote-btn:disabled { 
            opacity: 0.5; 
            cursor: default; 
        }
        .vote-btn.voted-a { 
            border-color: var(--primary); 
            color: var(--primary); 
            background: rgba(59, 130, 246, 0.1); 
        }
        .vote-btn.voted-b { 
            border-color: #ef4444; 
            color: #ef4444; 
            background: rgba(239, 68, 68, 0.1); 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="hideDropdown()">

<div id="rotate-hint">
    <div class="rotate-content">
        <div class="phone-icon"></div>
        <p>Landscape view recommended</p>
        <button onclick="document.getElementById('rotate-hint').style.setProperty('display', 'none', 'important')">Dismiss</button>
    </div>
</div>    

<div id="loadingOverlay">
    <div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <div id="status-msg">Initializing Supabase...</div>
</div>

<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box">
            <a href="index.html" class="home-link btn">HOME PAGE</a>
        </div>
        <h1 class="page-title-main">Matchups (Official)</h1>
        <div class="nav-side-box right">
            <div id="adminArea" style="display:none; gap:10px;">
                <button id="copyKvkBtn" class="btn" style="background:#f59e0b; display:none;" onclick="copyKvkStartToFinal()">COPY KVK START</button>
                <button class="btn btn-red" onclick="toggleFilteredPolls(true)">CLOSE THE POLLS</button>
                <button class="btn btn-blue" onclick="toggleFilteredPolls(false)">OPEN POLLS</button>
                <button class="btn" style="background:#a855f7;" id="saveStatusBtn" onclick="saveToCloud()">SAVE CLOUD</button>
                <button class="btn btn-green" onclick="addNewMatchup()">+ NEW MATCHUP</button>
                <button class="btn btn-red" onclick="logout()">LOGOUT</button>
            </div>
            <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<!-- ROW 1: SEARCH ROW (CENTERED) -->
<div class="unified-container">
    <div class="search-glass-row">
        <div class="search-center-box">
            <input type="text" id="teamSearch" class="search-input" placeholder="Search Matchup, Alliance, or ID..." oninput="handleSearchInput()" autocomplete="off">
        </div>
    </div>
</div>

<!-- ROW 2: FILTERS & SELECTORS -->
<div class="unified-container">
    <div class="filters-glass-row">
        <div class="nav-side-box">
            <select id="genSelector" onchange="renderAll()" style="padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; font-weight: 700;">
                <option value="all" selected>All Gens</option>
                <option value="G1">G1</option>
                <option value="G2">G2</option>
                <option value="G3">G3</option>
                <option value="G4">G4</option>
                <option value="NoG">NoG</option>
            </select>
            <select id="fileSelector" onchange="loadSpecificFile(this.value)" style="min-width: 180px; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; font-weight: 700;"></select>
        </div>
        <div class="zone-cluster" id="zoneFilterRow">
            <button class="filter-btn active" onclick="setZoneFilter('all', this)">ALL</button>
            <button class="filter-btn" onclick="setZoneFilter('predictions', this)">PREDICTIONS</button>
            <button class="filter-btn" onclick="setZoneFilter('overall', this)">KVK START</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 2', this)">Z2</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 3', this)">Z3</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 4', this)">Z4</button>
            <button class="filter-btn" onclick="setZoneFilter('final', this)">FINAL ZONE</button>
        </div>
    </div>
</div>

<!-- ROW 3: STICKY SORTING ISLAND -->
<div class="sticky-wrapper">
    <div class="metrics-island">
        <div class="metric-row">
            <button class="metric-btn" id="btn-name" onclick="setSort('name', this)">Group Name</button>
            <button class="metric-btn active" id="btn-power" onclick="setSort('power', this)">Power</button>
            <button class="metric-btn" id="btn-merits" onclick="setSort('merits', this)">Merits</button>
            <button class="metric-btn" id="btn-mp" onclick="setSort('mp', this)">M/P %</button>
            <button class="metric-btn" id="btn-mpRank" onclick="setSort('mpRank', this)">M/P R</button>
            <button class="metric-btn" id="btn-kills" onclick="setSort('kills', this)">Kills</button>
            <button class="metric-btn" id="btn-deads" onclick="setSort('deads', this)">Deads</button>
            <button class="metric-btn" id="btn-heals" onclick="setSort('heals', this)">Heals</button>
            <button class="metric-btn" id="btn-ch25" onclick="setSort('ch25', this)">CH25</button>
            <button class="metric-btn" id="btn-ap" onclick="setSort('ap', this)">CH25 AVG</button>
        </div>
        <div id="troopRow" class="expand-rows">
            <div class="metric-row"></div>
        </div>
        <div class="toggle-trigger" id="troopToggle" onclick="toggleTroops()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:20px; height:20px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>
</div>

<div class="unified-container">
    <div id="matchupsContainer"></div>
</div>

<div id="authModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="margin-top:0; font-weight:900; color: white;">ADMIN ACCESS</h2>
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <input type="email" id="email" class="modal-input" placeholder="Admin Email" autocomplete="username" required style="width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white;">
            <input type="password" id="pass" class="modal-input" placeholder="Password" autocomplete="current-password" required style="width: 100%; margin-bottom: 20px; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white;" onkeydown="if(event.key==='Enter') login()">
            <div id="loginError" style="color: #ef4444; font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; display: none;"></div>
            <button type="submit" id="loginActionBtn" class="btn btn-blue" style="width: 100%; padding: 15px; font-weight: 900;">AUTHORIZE</button>
        </form>
        <button onclick="toggleModal(false)" class="btn" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
    </div>
</div>

<script>
    // --- SUPABASE CONFIGURATION ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- GLOBAL APPLICATION STATE ---
    let isAdmin = false;
    let masterData = new Map();
    let allCloudData = {};
    let allTeamsData = {};
    let currentMatchups = [];
    let currentSort = { field: 'power', direction: 'desc' };
    let currentZoneFilter = 'all';
    let currentRegistrations = {};
    let currentGenPools = {}; 
    let selectedFileName = "";
    let activeTroopKeys = [];
    let sosMap = {};
    let fullFileList = []; 
    let allVotes = []; 

    const sortLabels = { 
        name: 'Group Name', power: 'Power', merits: 'Merits', mp: 'M/P %', mpRank: 'M/P R', kills: 'Kills', deads: 'Deads', heals: 'Heals', ch25: 'CH25', ap: 'CH25 AVG',
        "10-20M Merits": "10-20M M", "20-30M Merits": "20-30M M", "30-40M Merits": "30-40M M", "40-50M Merits": "40-50M M", "50M+ Merits": "50M+ M",
        "10M+ Merits": "10M+ M", "20M+ Merits": "20M+ M", "30M+ Merits": "30M+ M", "40M+ Merits": "40M+ M"
    };

    let zoneWinners = { "zone 2": {}, "zone 3": {}, "zone 4": {}, "final": {} };
    
    const possibleTroopHeaders = [
        "10M","20M","30M","40M","50M","60M+","80M+","100M+","125M+","150M+","200M+","250M+","300M+",
        "10-20M","20-40M","40-60M","60-80M","80-100M","100-125M","125-150M","150-200M","200-250M","250-300M",
        "10-20M Merits", "20-30M Merits", "30-40M Merits", "40-50M Merits", "50M+ Merits",
        "10M+ Merits", "20M+ Merits", "30M+ Merits", "40M+ Merits"
    ];

    const zoneFileMap = { "zone 2": "z2winners.json", "zone 3": "z3winners.json", "zone 4": "z4winners.json", "final": "kvkwinners.json" };

    // --- UTILITIES ---
    function kdClean(val) { if (!val) return ""; return String(parseInt(parseFloat(String(val).trim()))); }
    function hideLoading() { const overlay = document.getElementById('loadingOverlay'); if (overlay) { overlay.style.opacity = '0'; setTimeout(() => { overlay.style.display = 'none'; }, 300); } }
    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { 
        if (!n && n !== 0) return "0.00"; const abs = Math.abs(n); 
        let s = abs >= 1e9 ? (abs / 1e9).toFixed(2) + 'B' : abs >= 1e6 ? (abs / 1e6).toFixed(1) + 'M' : abs.toLocaleString(); 
        return n < 0 ? "-" + s : s; 
    }
    function formatValNoDec(n) { 
        if (!n && n !== 0) return "0"; const abs = Math.floor(Math.abs(n)); 
        let s = abs >= 1e6 ? (abs / 1e6).toFixed(1) + 'M' : abs.toLocaleString(); 
        return n < 0 ? "-" + s : s; 
    }

    // --- SEARCH & DEEP LINKING ---
    function handleSearchInput() {
        const searchVal = document.getElementById('teamSearch').value.trim();
        if (searchVal) window.location.hash = encodeURIComponent(searchVal);
        else history.replaceState(null, null, ' ');
        renderAll();
    }
    function syncSearchFromHash() { if (window.location.hash) { const hashVal = decodeURIComponent(window.location.hash.substring(1)); const searchInput = document.getElementById('teamSearch'); if (searchInput) searchInput.value = hashVal; } }
    window.addEventListener('hashchange', () => { syncSearchFromHash(); renderAll(); });

    // --- AUTHENTICATION ---
    function enableAdminMode() { isAdmin = true; document.body.classList.add('admin-active'); document.getElementById('adminArea').style.display = 'flex'; document.getElementById('loginBtn').style.display = 'none'; setZoneFilter(currentZoneFilter, document.querySelector(`.filter-btn[onclick*="${currentZoneFilter}"]`)); renderAll(); }
    async function login() {
        const email = document.getElementById('email').value; const password = document.getElementById('pass').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else { enableAdminMode(); toggleModal(false); }
    }
    async function logout() { await supabaseClient.auth.signOut(); location.reload(); }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }

    // --- CLOUD DATA FETCHING ---
    window.onload = async () => {
        try {
            syncSearchFromHash();
            const { data: { session } } = await supabaseClient.auth.getSession(); if (session) enableAdminMode();
            let versionNum = "1.0";
            try { const { data: vBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('version.json?t=' + Date.now()); versionNum = JSON.parse(await vBlob.text()).v; } catch(e) {}
            window.DATA_VERSION = versionNum;
            const [sosRes, filesRes] = await Promise.all([ supabaseClient.storage.from(BUCKET_DATA).download(`Pull/SosNames.json?v=${versionNum}`), supabaseClient.storage.from(BUCKET_DATA).download(`Pull/files.json?v=${versionNum}`) ]);
            sosMap = sosRes.data ? JSON.parse(await sosRes.data.text()) : {}; fullFileList = JSON.parse(await filesRes.data.text());
            await fetchMatchupsFromCloud(); await fetchTeamsFromCloud(); await fetchAllWinnersFromCloud(); populateFileSelector();
        } catch (e) { console.error(e); } finally { hideLoading(); }
    };

    async function fetchMatchupsFromCloud() { const v = window.DATA_VERSION || "1.0"; try { const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`MatchupsConfig.json?v=${v}`); if (data) allCloudData = JSON.parse(await data.text()); } catch (e) { allCloudData = {}; } }
    async function fetchTeamsFromCloud() { const v = window.DATA_VERSION || "1.0"; try { const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`TeamsConfig.json?v=${v}`); if (data) allTeamsData = JSON.parse(await data.text()); } catch (e) { allTeamsData = {}; } }
    async function fetchAllWinnersFromCloud() {
        const v = window.DATA_VERSION || "1.0";
        await Promise.all(Object.entries(zoneFileMap).map(async ([zone, filename]) => {
            try { const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`${filename}?v=${v}`); if (data) zoneWinners[zone] = JSON.parse(await data.text()); } catch (e) { zoneWinners[zone] = {}; }
        }));
    }
    async function fetchVotes() {
        if (!selectedFileName) return; const cleanKey = selectedFileName.replace(/\.csv/i, '');
        try { const { data, error } = await supabaseClient.from('matchup_votes').select('*').eq('snapshot_id', cleanKey); if (!error) allVotes = data; } catch(e) {}
    }

    function populateFileSelector() {
        const selector = document.getElementById('fileSelector'); selector.innerHTML = '';
        fullFileList.slice().reverse().forEach(file => {
            const opt = document.createElement('option'); opt.value = file; const dateKey = file.replace(/\.csv/i, '');
            opt.textContent = sosMap[dateKey] || dateKey.toUpperCase(); selector.appendChild(opt);
        });
        if (fullFileList.length > 0) { selector.value = fullFileList[fullFileList.length - 1]; loadSpecificFile(selector.value); }
    }

    async function loadSpecificFile(fileName) {
        selectedFileName = fileName; const cleanName = fileName.replace(/\.csv/i, ''); const v = window.DATA_VERSION || "1.0"; const timestamp = `?v=${v}`;
        try {
            currentGenPools = {};
            await Promise.all(['G1', 'G2', 'G3', 'G4', 'NoG'].map(async (g) => {
                try { const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`Gen Pools/${cleanName}-${g}.json${timestamp}`); if (data) JSON.parse(await data.text()).forEach(kd => { currentGenPools[kdClean(kd)] = g; }); } catch(e) {}
            }));
            const [regRes, csvRes] = await Promise.all([ supabaseClient.storage.from(BUCKET_CONFIGS).download(`SavedRegistrations/${cleanName}.json${timestamp}`), supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${fileName}${timestamp}`), fetchVotes() ]);
            if (regRes.data) currentRegistrations = JSON.parse(await regRes.data.text()).data || {};
            if (csvRes.data) {
                const result = Papa.parse(await csvRes.data.text(), { header: true, skipEmptyLines: 'greedy' });
                activeTroopKeys = result.meta.fields.filter(h => possibleTroopHeaders.includes(h)); updateSortBar(); masterData.clear(); let pool = [];
                result.data.forEach(row => {
                    const id = kdClean(row.KD || row['KD#']); const p = cleanNum(row['Top 300 Power'] || row.Power);
                    if (id && p > 0) {
                        const reg = currentRegistrations[id];
                        const obj = { kd: id, power: p, merits: cleanNum(row['Top 300 Merits'] || row.Merits), kills: cleanNum(row['Top 300 Kills'] || row.Kills), deads: cleanNum(row['Top 300 Deads'] || row.Deads), heals: cleanNum(row['Top 300 Heals'] || row.Heals), ch25: cleanNum(row['CH25']), ap: cleanNum(row['CH25 AP']), mp: p > 0 ? (cleanNum(row['Top 300 Merits'] || row.Merits) / p) : 0, class: reg ? (reg.class || "TBD") : "-", isParagon: reg?.isParagon === true, alliance: (row['#1 Ally'] || row.Alliance || "").trim() || "-", gen: currentGenPools[id] || 'NoG', raw: row };
                        masterData.set(id, obj); pool.push(obj);
                    }
                });
                pool.sort((a,b) => b.power - a.power).forEach((d, i) => d.powerRank = i + 1); pool.sort((a,b) => b.mp - a.mp).forEach((d, i) => d.mpRank = i + 1);
            }
            currentMatchups = allCloudData[cleanName] || allCloudData[fileName] || []; syncSearchFromHash(); renderAll();
        } catch (e) { console.error(e); }
    }

    async function castVote(matchupName, side) {
        if (!selectedFileName) return; const cleanKey = selectedFileName.replace(/\.csv/i, ''); const voteKey = `vote_${cleanKey}_${matchupName}`;
        if (localStorage.getItem(voteKey)) { alert("You have already voted!"); return; }
        try {
            const { error } = await supabaseClient.from('matchup_votes').insert([{ snapshot_id: cleanKey, matchup_name: matchupName, vote_side: side }]);
            if (!error) { localStorage.setItem(voteKey, side); await fetchVotes(); renderAll(); }
        } catch(e) {}
    }

    async function saveToCloud() {
        if (!isAdmin) return; const btn = document.getElementById('saveStatusBtn'); btn.textContent = "SAVING..."; btn.disabled = true;
        const cleanKey = selectedFileName.replace(/\.csv/i,''); allCloudData[cleanKey] = currentMatchups;
        try {
            await supabaseClient.storage.from(BUCKET_CONFIGS).upload('MatchupsConfig.json', JSON.stringify(allCloudData, null, 2), { upsert: true, contentType: 'application/json' });
            for (const [zone, filename] of Object.entries(zoneFileMap)) {
                let serverFile = {}; try { const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`${filename}?t=${Date.now()}`); if (data) serverFile = JSON.parse(await data.text()); } catch(e) {}
                serverFile[cleanKey] = zoneWinners[zone][cleanKey] || {};
                await supabaseClient.storage.from(BUCKET_CONFIGS).upload(filename, JSON.stringify(serverFile, null, 2), { upsert: true, contentType: 'application/json' });
            }
            btn.textContent = "SAVED!"; setTimeout(() => btn.textContent = "SAVE CLOUD", 2000);
        } catch (e) { btn.textContent = "RETRY"; } finally { btn.disabled = false; }
    }

    function sortMatchupIds(mIdx, field) {
        const scrollMap = Array.from(document.querySelectorAll('.table-wrapper')).map(el => el.scrollLeft);
        const m = currentMatchups[mIdx];
        const idxA = m.ids.indexOf("TOTAL A"); const idxB = m.ids.indexOf("TOTAL B");
        if (idxA === -1 || idxB === -1) return;

        const nextDir = m.localSortState && m.localSortState[field] === 'desc' ? 'asc' : 'desc';
        m.localSortState = {}; // EXCLUSIVE INDICATOR FIX
        m.localSortState[field] = nextDir;
        const isDesc = nextDir === 'desc';

        const sortFn = (id1, id2) => {
            const d1 = masterData.get(kdClean(id1)), d2 = masterData.get(kdClean(id2));
            if (!d1 || !d2) return 0;
            let v1, v2;
            if (field === 'rank') { v1 = d1.powerRank || 99999; v2 = d2.powerRank || 99999; }
            else if (field === 'kd') { v1 = parseInt(d1.kd); v2 = parseInt(d2.kd); }
            else if (d1[field] !== undefined) { v1 = d1[field]; v2 = d2[field]; }
            else { v1 = cleanNum(d1.raw[field]); v2 = cleanNum(d2.raw[field]); }
            return isDesc ? v2 - v1 : v1 - v2;
        };

        let teamA = m.ids.slice(0, idxA).sort(sortFn);
        let teamB = m.ids.slice(idxB + 1).sort(sortFn);
        m.ids = [...teamA, ...m.ids.slice(idxA, idxB + 1), ...teamB];
        
        renderAll();
        
        // SCROLL RESTORATION FIX
        document.querySelectorAll('.table-wrapper').forEach((el, idx) => { 
            if (scrollMap[idx] !== undefined) el.scrollLeft = scrollMap[idx]; 
        });
    }

    function renderAll() {
        const scrollMap = Array.from(document.querySelectorAll('.table-wrapper')).map(el => el.scrollLeft);
        const container = document.getElementById('matchupsContainer'); const sT = document.getElementById('teamSearch').value.toLowerCase().trim(); const gF = document.getElementById('genSelector').value;
        container.innerHTML = '';
        
        let displayList = currentMatchups.map((m, idx) => ({ ...m, originalIdx: idx, stats: calculateMatchupStats(m.ids) }));
        if (currentZoneFilter !== 'all') displayList = displayList.filter(m => m.zone === currentZoneFilter);
        if (gF !== 'all') displayList = displayList.filter(m => m.ids.some(id => currentGenPools[kdClean(id)] === gF));
        if (sT) displayList = displayList.filter(m => m.name.toLowerCase().includes(sT) || m.ids.some(id => { const d = masterData.get(kdClean(id)); return kdClean(id).includes(sT) || (d && d.alliance.toLowerCase().includes(sT)); }));

        if (currentSort.field === 'name') {
            displayList.sort((a,b) => {
                const cmp = a.name.localeCompare(b.name, undefined, { numeric: true });
                return currentSort.direction === 'asc' ? cmp : -cmp;
            });
        } else {
            displayList.sort((a,b) => {
                let vA = 0, vB = 0;
                if (a.stats.diff[currentSort.field] !== undefined) vA = Math.abs(a.stats.diff[currentSort.field]);
                else if (a.stats.diff.b?.[currentSort.field] !== undefined) vA = Math.abs(a.stats.diff.b[currentSort.field]);
                if (b.stats.diff[currentSort.field] !== undefined) vB = Math.abs(b.stats.diff[currentSort.field]);
                else if (b.stats.diff.b?.[currentSort.field] !== undefined) vB = Math.abs(b.stats.diff.b[currentSort.field]);
                return currentSort.direction === 'desc' ? vB - vA : vA - vB;
            });
        }

        displayList.forEach(matchup => {
            const mIdx = matchup.originalIdx; const sums = matchup.stats;
            const card = document.createElement('div'); card.className = 'matchup-card';
            const allTbd = matchup.ids.every(id => { const d = masterData.get(kdClean(id)); return !d || d.class === "TBD" || d.class === "-"; });
            function getArrow(m, field) { if (!m.localSortState || m.localSortState[field] === undefined) return ""; return m.localSortState[field] === 'asc' ? " ▲" : " ▼"; }
            const statsA = sums.rows[matchup.ids.indexOf("TOTAL A")], statsB = sums.rows[matchup.ids.indexOf("TOTAL B")];
            
            let rowsHtml = matchup.ids.map((id, rowIdx) => {
                const upperId = String(id).toUpperCase().trim(); const isSpecial = ["TOTAL A", "TOTAL B", "TEAM A - TEAM B", "DIFFERENTIALS (A-B)"].includes(upperId);
                const rowStats = sums.rows[rowIdx];
                if (isSpecial) {
                    const rowClass = upperId.replace(/\s+/g, '-').replace(/[()]/g, '').toLowerCase();
                    const isTotalA = upperId === "TOTAL A", isTotalB = upperId === "TOTAL B";
                    function winCls(f, v, sub = null) {
                        if (!statsA || !statsB || (!isTotalA && !isTotalB)) return "";
                        let vA = sub ? statsA.b?.[sub] : statsA[f], vB = sub ? statsB.b?.[sub] : statsB[f];
                        if (vA === vB) return ""; return ((isTotalA && vA > vB) || (isTotalB && vB > vA)) ? "winning-val" : "";
                    }
                    return `<tr class="row-${rowClass}">${isAdmin ? '<td></td><td></td>' : ''}<td class="sticky-col-rank"></td><td class="sticky-col-ally" style="color:white !important; font-weight:900;">${upperId === "DIFFERENTIALS (A-B)" ? "TEAM A - TEAM B" : upperId}</td><td class="sticky-col-kd"></td>${!allTbd ? '<td></td>' : ''}<td class="${currentSort.field === 'power' ? 'highlight-sort' : ''} ${winCls('power', rowStats.power)}">${formatVal(rowStats.power)}</td><td class="${currentSort.field === 'merits' ? 'highlight-sort' : ''} ${winCls('merits', rowStats.merits)}">${formatVal(rowStats.merits)}</td><td class="${currentSort.field === 'mp' ? 'highlight-sort' : ''} ${winCls('mp', rowStats.mp)}">${(rowStats.mp * 100).toFixed(2)}%</td><td class="${currentSort.field === 'mpRank' ? 'highlight-sort' : ''} ${winCls('mpRankSum', rowStats.mpRankSum)}">${rowStats.mpRankSum || 0}</td><td class="${currentSort.field === 'kills' ? 'highlight-sort' : ''} ${winCls('kills', rowStats.kills)}">${formatVal(rowStats.kills)}</td><td class="${currentSort.field === 'deads' ? 'highlight-sort' : ''} ${winCls('deads', rowStats.deads)}">${formatVal(rowStats.deads)}</td><td class="${currentSort.field === 'heals' ? 'highlight-sort' : ''} ${winCls('heals', rowStats.heals)}">${formatVal(rowStats.heals)}</td><td class="${currentSort.field === 'ch25' ? 'highlight-sort' : ''} ${winCls('ch25', rowStats.ch25)}">${formatValNoDec(rowStats.ch25)}</td><td class="${currentSort.field === 'ap' ? 'highlight-sort' : ''} ${winCls('ap', rowStats.ap)}">${formatVal(rowStats.ap)}</td>${activeTroopKeys.map(k => `<td class="${currentSort.field === k ? 'highlight-sort' : ''} ${winCls(null, rowStats.b[k], k)}">${formatValNoDec(rowStats.b[k])}</td>`).join('')}</tr>`;
                }
                const d = masterData.get(kdClean(id));
                if (!d) return `<tr>${isAdmin ? `<td class="col-del" onclick="removeRow(${mIdx}, ${rowIdx})">×</td><td class="col-drag">≡</td>` : ''}<td class="sticky-col-rank">-</td><td class="sticky-col-ally" style="color:#ef4444;">NOT FOUND</td><td class="sticky-col-kd">${isAdmin ? `<input value="${id}" onchange="updateId(${mIdx}, ${rowIdx}, this.value)" class="id-input">` : id}</td>${!allTbd ? '<td></td>' : ''}<td colspan="${activeTroopKeys.length + 9}">---</td></tr>`;
                return `<tr>${isAdmin ? `<td class="col-del" onclick="removeRow(${mIdx}, ${rowIdx})">×</td><td class="col-drag">≡</td>` : ''}<td class="sticky-col-rank">${d.powerRank || '-'}</td><td class="sticky-col-ally ${d.isParagon ? 'paragon-text' : ''}">${d.alliance}</td><td class="sticky-col-kd">${isAdmin ? `<input value="${id}" onchange="updateId(${mIdx}, ${rowIdx}, this.value)" class="id-input">` : id}</td>${!allTbd ? `<td>${d.class}</td>` : ''}<td class="${currentSort.field === 'power' ? 'highlight-sort' : ''}">${formatVal(d.power)}</td><td class="${currentSort.field === 'merits' ? 'highlight-sort' : ''}">${formatVal(d.merits)}</td><td class="${currentSort.field === 'mp' ? 'highlight-sort' : ''}">${(d.mp * 100).toFixed(2)}%</td><td class="${currentSort.field === 'mpRank' ? 'highlight-sort' : ''}">${d.mpRank || 0}</td><td class="${currentSort.field === 'kills' ? 'highlight-sort' : ''}">${formatVal(d.kills)}</td><td class="${currentSort.field === 'deads' ? 'highlight-sort' : ''}">${formatVal(d.deads)}</td><td class="${currentSort.field === 'heals' ? 'highlight-sort' : ''}">${formatVal(d.heals)}</td><td class="${currentSort.field === 'ch25' ? 'highlight-sort' : ''}">${formatValNoDec(d.ch25)}</td><td class="${currentSort.field === 'ap' ? 'highlight-sort' : ''}">${formatVal(d.ap)}</td>${activeTroopKeys.map(k => `<td class="${currentSort.field === k ? 'highlight-sort' : ''}">${formatValNoDec(cleanNum(d.raw[k]))}</td>`).join('')}</tr>`;
            }).join('');

            const dateKey = selectedFileName.replace(/\.csv/i,''); let winSect = '';
            if (['zone 2', 'zone 3', 'zone 4', 'final'].includes(matchup.zone)) {
                let curWin = (zoneWinners[matchup.zone]?.[dateKey]?.[matchup.name]) || '';
                const clr = matchup.zone === 'final' ? '#fbbf24' : '#3b82f6';
                winSect = `<div style="margin-bottom:15px; background:${clr}11; border:1px solid ${clr}44; padding:12px; border-radius:12px; display:flex; align-items:center; gap:12px;"><span style="color:${clr}; font-weight:900; font-size:0.9rem;">WINNER:</span>${isAdmin ? `<input type="text" value="${curWin}" onchange="updateWinner(${mIdx}, this.value)" style="background:rgba(0,0,0,0.5); border:1px solid ${clr}44; color:white; padding:8px; border-radius:8px; flex:1;">` : `<span style="color:white; font-weight:950;">${curWin || 'TBD'}</span>`}</div>`;
            }

            const mVotes = allVotes.filter(v => v.matchup_name === matchup.name); const cntA = mVotes.filter(v => v.vote_side === 'A').length, cntB = mVotes.filter(v => v.vote_side === 'B').length;
            const totalV = cntA + cntB, perA = totalV > 0 ? Math.round((cntA / totalV) * 100) : 50;
            const userV = localStorage.getItem(`vote_${dateKey}_${matchup.name}`);
            const votingUI = `<div class="voting-section"><div class="voting-header"><h4>${matchup.pollsClosed ? 'POLLS CLOSED' : 'PREDICTIONS'}</h4><div class="voting-stats-row">TEAM A - ${cntA} (${perA}%) | TEAM B - ${cntB} (${100 - perA}%)</div></div><div class="voting-bar-container"><div class="voting-bar-fill" style="width: ${perA}%"></div></div>${!matchup.pollsClosed ? `<div class="voting-buttons"><button class="vote-btn ${userV==='A'?'voted-a':''}" ${userV?'disabled':''} onclick="castVote('${matchup.name}', 'A')">VOTE A</button><button class="vote-btn ${userV==='B'?'voted-b':''}" ${userV?'disabled':''} onclick="castVote('${matchup.name}', 'B')">VOTE B</button></div>` : ''}</div>`;

            card.innerHTML = `
                <div class="card-header"><div style="flex:1;">${isAdmin ? `<input class="name-input" value="${matchup.name}" onchange="updateMatchupName(${mIdx}, this.value)">` : `<div class="name-input">${matchup.name}</div>`}</div><div style="display:flex; align-items:center; gap:10px;">${isAdmin ? `<select onchange="currentMatchups[${mIdx}].zone=this.value; renderAll();" style="background:#0f172a; color:white; border-radius:5px;"><option value="overall" ${matchup.zone==='overall'?'selected':''}>KVK START</option><option value="predictions" ${matchup.zone==='predictions'?'selected':''}>PREDICTIONS</option><option value="zone 2" ${matchup.zone==='zone 2'?'selected':''}>ZONE 2</option><option value="zone 3" ${matchup.zone==='zone 3'?'selected':''}>ZONE 3</option><option value="zone 4" ${matchup.zone==='zone 4'?'selected':''}>ZONE 4</option><option value="final" ${matchup.zone==='final'?'selected':''}>FINAL ZONE</option></select><button class="btn btn-green" onclick="addRowA(${mIdx})">+ A</button><button class="btn btn-blue" onclick="addRowB(${mIdx})">+ B</button><button class="btn btn-red" onclick="deleteMatchup(${mIdx})">DEL</button>` : `<span class="btn" style="font-size:0.7rem;">${matchup.zone.toUpperCase()}</span>`}</div></div>
                ${winSect}${votingUI}
                <div class="table-wrapper">
                    <table>
                        <colgroup>
                            ${isAdmin ? '<col style="width:30px;"><col style="width:30px;">' : ''}
                            <col style="width:100px;"><col style="width:160px;"><col style="width:70px;">
                            ${!allTbd ? '<col style="width:80px;">' : ''}
                            <col style="width:120px;"><col style="width:120px;"><col style="width:100px;"><col style="width:100px;"><col style="width:140px;"><col style="width:140px;"><col style="width:140px;"><col style="width:100px;"><col style="width:120px;">
                            ${activeTroopKeys.map(() => '<col style="width:100px;">').join('')}
                        </colgroup>
                        <thead>
                            <tr>
                                ${isAdmin ? '<th></th><th></th>' : ''}
                                <th class="sticky-col-rank" onclick="sortMatchupIds(${mIdx}, 'rank')">RANK${getArrow(matchup, 'rank')}</th>
                                <th class="sticky-col-ally">ALLIANCE</th>
                                <th class="sticky-col-kd" onclick="sortMatchupIds(${mIdx}, 'kd')">KD#${getArrow(matchup, 'kd')}</th>
                                ${!allTbd ? '<th>CLASS</th>' : ''}
                                <th onclick="sortMatchupIds(${mIdx}, 'power')">POWER${getArrow(matchup, 'power')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'merits')">MERITS${getArrow(matchup, 'merits')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'mp')">M/P${getArrow(matchup, 'mp')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'mpRank')">M/P R${getArrow(matchup, 'mpRank')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'kills')">KILLS${getArrow(matchup, 'kills')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'deads')">DEADS${getArrow(matchup, 'deads')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'heals')">HEALS${getArrow(matchup, 'heals')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'ch25')">CH25${getArrow(matchup, 'ch25')}</th>
                                <th onclick="sortMatchupIds(${mIdx}, 'ap')">AVG${getArrow(matchup, 'ap')}</th>
                                ${activeTroopKeys.map(k => `<th onclick="sortMatchupIds(${mIdx}, '${k}')">${sortLabels[k] || k.replace('+', '')}${getArrow(matchup, k)}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody id="tbody-${mIdx}">${rowsHtml}</tbody>
                    </table>
                </div>
            `;
            container.appendChild(card); if(isAdmin) setupSortable(mIdx);
        });
        
        // FINAL SCROLL RESTORATION FIX
        const newWrappers = document.querySelectorAll('.table-wrapper');
        newWrappers.forEach((el, idx) => { if (scrollMap[idx] !== undefined) el.scrollLeft = scrollMap[idx]; });
    }

    function calculateMatchupStats(ids) {
        let sA = { power:0, merits:0, kills:0, deads:0, heals:0, ch25:0, ap:0, count:0, mpRankSum:0, b:{} }, sB = JSON.parse(JSON.stringify(sA)), target = sA;
        activeTroopKeys.forEach(k => { sA.b[k] = 0; sB.b[k] = 0; });
        ids.forEach(id => { 
            const u = String(id).toUpperCase().trim(); if (u === "TOTAL A") target = sB;
            else if (!["TOTAL B", "TEAM A - TEAM B", "DIFFERENTIALS (A-B)"].includes(u)) { 
                const d = masterData.get(kdClean(id)); if (d) { target.power += d.power; target.merits += d.merits; target.kills += d.kills; target.deads += d.deads; target.heals += d.heals; target.ch25 += d.ch25; target.ap += d.ap; target.count++; target.mpRankSum += (d.mpRank || 0); activeTroopKeys.forEach(k => target.b[k] += cleanNum(d.raw[k])); }
            } 
        });
        const fA = { ...sA, mp: sA.power > 0 ? sA.merits/sA.power : 0, ap: sA.count > 0 ? sA.ap/sA.count : 0 }, fB = { ...sB, mp: sB.power > 0 ? sB.merits/sB.power : 0, ap: sB.count > 0 ? sB.ap/sB.count : 0 };
        const diff = { power: fA.power - fB.power, merits: fA.merits - fB.merits, kills: fA.kills - fB.kills, deads: fA.deads - fB.deads, heals: fA.heals - fB.heals, ch25: fA.ch25 - fB.ch25, ap: fA.ap - fB.ap, mp: fA.mp - fB.mp, mpRankSum: fA.mpRankSum - fB.mpRankSum, b: {} };
        activeTroopKeys.forEach(k => diff.b[k] = fA.b[k] - fB.b[k]);
        return { rows: ids.map(id => { const u = String(id).toUpperCase().trim(); return u === "TOTAL A" ? fA : u === "TOTAL B" ? fB : ["TEAM A - TEAM B", "DIFFERENTIALS (A-B)"].includes(u) ? diff : {}; }), diff };
    }

    function setSort(field, btn) { 
        if (currentSort.field === field) currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc'; else { currentSort.field = field; currentSort.direction = 'desc'; }
        document.querySelectorAll('.metrics-island .metric-btn').forEach(b => { b.classList.remove('active'); const fk = b.id.replace('btn-', ''); if (sortLabels[fk]) b.textContent = sortLabels[fk]; });
        if (btn) { btn.classList.add('active'); btn.textContent += (currentSort.direction === 'desc' ? ' ▼' : ' ▲'); } renderAll(); 
    }
    function setZoneFilter(zone, btn) { currentZoneFilter = zone; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); if(btn) btn.classList.add('active'); renderAll(); }
    function toggleTroops() { const r = document.getElementById('troopRow'); const t = document.getElementById('troopToggle'); r.classList.toggle('open'); t.style.transform = r.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; }
    function updateSortBar() { const c = document.querySelector('#troopRow .metric-row'); if (c) c.innerHTML = activeTroopKeys.map(k => `<button class="metric-btn ${currentSort.field === k ? 'active' : ''}" onclick="setSort('${k}', this)">${sortLabels[k] || k.replace('+', '')}</button>`).join(''); }

    function updateId(mIdx, rIdx, v) { currentMatchups[mIdx].ids[rIdx] = v; renderAll(); }
    function addRowA(mIdx) { const ids = currentMatchups[mIdx].ids; const target = ids.indexOf("TOTAL A"); ids.splice(target !== -1 ? target : ids.length, 0, "000"); renderAll(); }
    function addRowB(mIdx) { const ids = currentMatchups[mIdx].ids; const target = ids.indexOf("TOTAL B"); ids.splice(target !== -1 ? target + 1 : ids.length, 0, "000"); renderAll(); }
    function removeRow(mIdx, rIdx) { currentMatchups[mIdx].ids.splice(rIdx, 1); renderAll(); }
    function deleteMatchup(idx) { if(confirm("Delete Group?")) { currentMatchups.splice(idx, 1); renderAll(); } }
    function updateMatchupName(mIdx, newName) { currentMatchups[mIdx].name = newName; }
    function updateWinner(mIdx, val) { const cleanKey = selectedFileName.replace(/\.csv/i,''); const m = currentMatchups[mIdx]; if (!zoneWinners[m.zone]) zoneWinners[m.zone] = {}; if (!zoneWinners[m.zone][cleanKey]) zoneWinners[m.zone][cleanKey] = {}; zoneWinners[m.zone][cleanKey][m.name] = val; }
    function addNewMatchup() { currentMatchups.unshift({ name: "A New Group", zone: currentZoneFilter==='all'?'overall':currentZoneFilter, ids: ["TOTAL A", "TEAM A - TEAM B", "TOTAL B"] }); renderAll(); }
    function setupSortable(mIdx) { const el = document.getElementById(`tbody-${mIdx}`); if (el) new Sortable(el, { handle: '.col-drag', animation: 150, onEnd: (evt) => { const moved = currentMatchups[mIdx].ids.splice(evt.oldIndex, 1)[0]; currentMatchups[mIdx].ids.splice(evt.newIndex, 0, moved); renderAll(); }}); }
    function hideDropdown() {}

    async function toggleFilteredPolls(shouldClose) {
        if (!isAdmin) return;
        currentMatchups.forEach(m => {
            let match = true;
            if (currentZoneFilter !== 'all' && m.zone !== currentZoneFilter) match = false;
            if (match) m.pollsClosed = shouldClose;
        });
        alert(`${shouldClose ? 'CLOSED' : 'OPENED'} polls. Click SAVE CLOUD.`);
        renderAll();
    }
    function copyKvkStartToFinal() {
        if (!isAdmin) return;
        const kvkStartMatchups = currentMatchups.filter(m => m.zone === 'overall');
        kvkStartMatchups.forEach(m => {
            const clonedMatchup = JSON.parse(JSON.stringify(m));
            clonedMatchup.zone = 'final';
            currentMatchups.push(clonedMatchup);
        });
        alert(`Successfully copied ${kvkStartMatchups.length} matchups. SAVE CLOUD.`);
        renderAll();
    }
</script>
</body>
</html>
