<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Matchups Dashboard</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); background-attachment: fixed; color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* --- UNIFIED CONTAINER SYSTEM --- */
        .unified-container { max-width: 1600px; margin: 0 auto; padding: 0 25px; box-sizing: border-box; width: 100%; }

        /* --- ROW 1: TOP NAV (HUB, TITLE, ADMIN) --- */
        .header-top-row { margin-top: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-side-box { display: flex; align-items: center; min-width: 180px; }
        .nav-side-box.right { justify-content: flex-end; }
        .header-top-row .home-link { position: static; margin: 0; backdrop-filter: none; }

        /* --- ROW 2: TOOLS (FILE, SEARCH, ZONE) --- */
        .tools-glass-row {
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 12px 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
        }
        .search-wrapper { flex: 1; display: flex; justify-content: center; }
        .search-input { width: 100%; max-width: 600px; padding: 10px 18px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; font-size: 0.9rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        .zone-cluster { display: flex; gap: 6px; flex-shrink: 0; }

        /* --- ROW 3: STICKY METRICS ISLAND --- */
        .sticky-wrapper { position: sticky; top: 0px; z-index: 1000; width: 100%; display: flex; justify-content: center; padding-top: 15px; margin-bottom: 40px; }
        .metrics-island { 
            width: calc(100% - 50px); max-width: 1550px;
            background: var(--glass); backdrop-filter: blur(20px); 
            padding: 8px 0; border: 1px solid var(--glass-border);
            border-radius: 24px; display: flex; flex-direction: column; gap: 2px;
            box-shadow: none !important; /* Point 2: Removed shadow */
        }

        /* --- BUTTONS --- */
        .sort-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .sort-btn, .filter-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--muted); transition: 0.2s; text-transform: uppercase; }
        .sort-btn.active, .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* --- MATCHUP CARDS --- */
        #matchupsContainer { display: flex; flex-direction: column; gap: 40px; padding-bottom: 60px; }
        .matchup-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .name-input { font-size: 1.2rem; font-weight: 900; border: 1px solid transparent; background: transparent; color: var(--primary); padding: 4px 8px; border-radius: 6px; width: 350px; outline: none; }
        
        .header-right-side { display: flex; align-items: center; gap: 15px; } /* Point 3 Fix */

        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 15px; } 
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; min-width: 1850px; }
        th { text-align: center; padding: 12px 2px; color: var(--muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px 2px; text-align: center; background: rgba(255,255,255,0.02); border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); font-size: 0.8rem; }
        
        .highlight-sort { background: rgba(59, 130, 246, 0.15) !important; color: white !important; font-weight: 950 !important; }
        .row-total-a, .row-total-b { background: rgba(59, 130, 246, 0.1) !important; color: var(--primary) !important; }
        .row-differentials-a-b { background: rgba(168, 85, 247, 0.1) !important; color: var(--accent) !important; }
        
        .id-input { width: 90%; padding: 4px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; text-align: center; font-weight: 700; color: #3b82f6; font-size: 0.8rem; outline: none; }
        .btn { padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--glass-border); font-size: 0.75rem; background: var(--glass); color: white; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .col-drag { width: 30px; cursor: grab; opacity: 0.3; }
        .col-del { width: 30px; color: var(--danger); font-weight: 900; cursor: pointer; }

        .toggle-trigger { width: 100%; display: flex; justify-content: center; cursor: pointer; color: var(--muted); margin-top: 5px; }
        .troop-row-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .troop-row-container.open { max-height: 100px; padding-bottom: 5px; }

        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<!-- ROW 1: HEADER NAVIGATION (HUB, TITLE, ADMIN) -->
<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box">
            <a href="index.html" class="home-link">← Kingdom Hub</a>
        </div>
        <h1 class="page-title-main">Matchups (Official)</h1>
        <div class="nav-side-box right">
            <div id="adminArea" style="display:none; gap:10px;">
                <button class="btn" style="background:#a855f7; border:none;" id="saveStatusBtn" onclick="saveToCloud()">SAVE CLOUD</button>
                <button class="btn" style="background:#10b981; border:none;" onclick="addNewMatchup()">+ NEW MATCHUP</button>
                <button class="btn" style="background:#ef4444; border:none;" onclick="logout()">LOGOUT</button>
            </div>
            <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<!-- ROW 2: TOOLS (FILE, SEARCH, ZONE) -->
<div class="unified-container">
    <div class="tools-glass-row">
        <select id="fileSelector" onchange="loadSpecificFile(this.value)" style="min-width: 150px;"></select>
        <div class="search-wrapper">
            <input type="text" id="teamSearch" class="search-input" placeholder="Search Matchup Group, Alliance, or Kingdom ID..." oninput="renderAll()">
        </div>
        <div class="zone-cluster" id="zoneFilterRow">
            <button class="filter-btn active" onclick="setZoneFilter('all', this)">ALL</button>
            <button class="filter-btn" onclick="setZoneFilter('overall', this)">KVK START</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 2', this)">Z2</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 3', this)">Z3</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 4', this)">Z4</button>
        </div>
    </div>
</div>

<!-- ROW 3: STICKY METRICS ISLAND -->
<div class="sticky-wrapper">
    <div class="metrics-island" id="sortBar">
        <div class="sort-row">
            <button class="sort-btn" onclick="setSort('name', this)">Group Name</button>
            <button class="sort-btn active" onclick="setSort('power', this)">Power</button>
            <button class="sort-btn" onclick="setSort('merits', this)">Merits</button>
            <button class="sort-btn" onclick="setSort('mp', this)">M/P %</button>
            <button class="sort-btn" onclick="setSort('mpRank', this)">M/P R</button>
            <button class="sort-btn" onclick="setSort('kills', this)">Kills</button>
            <button class="sort-btn" onclick="setSort('deads', this)">Deads</button>
            <button class="sort-btn" onclick="setSort('heals', this)">Heals</button>
            <button class="sort-btn" onclick="setSort('ch25', this)">CH25</button>
            <button class="sort-btn" onclick="setSort('ap', this)">CH25 AVG</button>
        </div>
        <div id="troopRow" class="troop-row-container">
            <div class="sort-row" style="padding-top:4px;">
                <script>
                    ["10M","20M","30M","40M","50M","80M","100M","125M","150M","200M","250M","300M"].forEach(k => {
                        document.write(`<button class="sort-btn" onclick="setSort('${k}', this)">${k}</button>`);
                    });
                </script>
            </div>
        </div>
        <div class="toggle-trigger" id="troopToggle" onclick="toggleTroops()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:14px; height:14px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>
</div>

<!-- ROW 4: MATCHUPS -->
<div class="unified-container">
    <div id="matchupsContainer"></div>
</div>

<div id="authModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items:center; justify-content:center; z-index:2000;">
    <div class="modal-content" style="background: #1e293b; padding: 30px; border-radius: 24px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 320px;">
        <h2 style="margin-top:0; font-weight:900;">ADMIN ACCESS</h2>
        <input type="text" id="user" class="modal-input" placeholder="Username" style="width:100%; margin-bottom:10px;">
        <input type="password" id="pass" class="modal-input" placeholder="Password" style="width:100%; margin-bottom:15px;" onkeydown="if(event.key==='Enter') login()">
        <div id="loginError" style="color: #ef4444; font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; display: none;">INVALID CREDENTIALS</div>
        <button class="btn btn-blue" style="width: 100%; padding: 15px;" onclick="login()">AUTHORIZE</button>
        <button onclick="toggleModal(false)" class="btn" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
    </div>
</div>

<script>
    const RENDER_URL = "https://kd-backend-icbu.onrender.com";
    let isAdmin = false; let masterData = new Map(); let allCloudData = {}; let currentMatchups = []; let currentSort = 'power'; let currentZoneFilter = 'all'; let currentRegistrations = {}; let selectedFileName = "";
    const csvKeys = ["10M","20M","30M","40M","50M","80M+","100M+","125M+","150M+","200M+","250M+","300M+"];
    const displayKeys = ["10M","20M","30M","40M","50M","80M","100M","125M","150M","200M","250M","300M"];

    window.onload = async () => {
        try {
            const fResp = await fetch(`./Pull/files.json?cb=${Date.now()}`);
            const files = await fResp.json();
            const selector = document.getElementById('fileSelector'); selector.innerHTML = '';
            files.reverse().forEach(f => {
                const opt = document.createElement('option'); opt.value = f;
                opt.textContent = f.toUpperCase().replace('.CSV', ''); selector.appendChild(opt);
            });
            await fetchMatchupsFromCloud(); if (files.length > 0) await loadSpecificFile(files[0]);
        } catch (e) { console.error(e); } finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    };

    function toggleTroops() {
        document.getElementById('troopRow').classList.toggle('open');
        document.getElementById('troopToggle').style.transform = document.getElementById('troopRow').classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    async function loadSpecificFile(fileName) {
        selectedFileName = fileName; const cleanName = fileName.replace('.csv', '').replace('.CSV', '');
        const jsonName = cleanName + ".json"; const csvFile = fileName.toUpperCase().endsWith('.CSV') ? fileName : fileName + ".csv";
        try {
            const regResp = await fetch(`${RENDER_URL}/load-registration/${jsonName}?cb=${Date.now()}`);
            const regWrapper = regResp.ok ? await regResp.json() : { kingdoms: [], data: {} };
            currentRegistrations = regWrapper.data || {}; var registeredIDs = new Set(regWrapper.kingdoms || []);
            const csvResp = await fetch(`./Pull/${csvFile}?cb=${Date.now()}`);
            const result = Papa.parse(await csvResp.text(), { header: true, skipEmptyLines: 'greedy' });
            masterData.clear(); let rankedPool = [];
            result.data.forEach(row => {
                const kd = String(row.KD || row['KD#'] || "").trim(); const p = cleanNum(row['Top 300 Power'] || row.Power);
                if (kd && p > 0) {
                    const regInfo = currentRegistrations[kd];
                    const obj = { kd, power: p, merits: cleanNum(row['Top 300 Merits'] || row.Merits), kills: cleanNum(row['Top 300 Kills'] || row.Kills), deads: cleanNum(row['Top 300 Deads'] || row.Deads), heals: cleanNum(row['Top 300 Heals'] || row.Heals), ch25: cleanNum(row['CH25']), ap: cleanNum(row['CH25 AP']), mp: p > 0 ? (cleanNum(row['Top 300 Merits'] || row.Merits)/p) : 0, class: regInfo ? (regInfo.class || "TBD") : "-", isParagon: regInfo?.isParagon === true, alliance: (row['#1 Ally'] || row.Alliance || "").trim() || "-", raw: row };
                    masterData.set(kd, obj); if (registeredIDs.has(kd)) rankedPool.push(obj);
                }
            });
            rankedPool.sort((a,b) => b.power - a.power).forEach((d, i) => d.powerRank = i + 1);
            rankedPool.sort((a,b) => b.mp - a.mp).forEach((d, i) => d.mpRank = i + 1);
            currentMatchups = allCloudData[cleanName] || allCloudData[fileName] || [];
            renderAll();
        } catch (e) { console.error(e); }
    }

    async function fetchMatchupsFromCloud() { try { const resp = await fetch(`${RENDER_URL}/load-matchups?cb=${Date.now()}`); if (resp.ok) allCloudData = await resp.json(); } catch (e) { console.error(e); } }
    async function saveToCloud() { if (!isAdmin) return; allCloudData[selectedFileName.replace('.csv','').replace('.CSV','')] = currentMatchups; try { const resp = await fetch(`${RENDER_URL}/save-matchups`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(allCloudData) }); if (resp.ok) { document.getElementById('saveStatusBtn').textContent = "SAVED!"; setTimeout(() => document.getElementById('saveStatusBtn').textContent="SAVE CLOUD", 2000); } } catch (e) { alert("Save failed."); } }

    function renderAll() {
        const container = document.getElementById('matchupsContainer'); const sT = document.getElementById('teamSearch').value.toLowerCase().trim(); container.innerHTML = '';
        let displayList = currentMatchups.map((m, idx) => ({ ...m, originalIdx: idx, stats: calculateMatchupStats(m.ids) }));
        if (currentZoneFilter !== 'all') displayList = displayList.filter(m => m.zone === currentZoneFilter);
        if (sT) { displayList = displayList.filter(m => m.name.toLowerCase().includes(sT) || m.ids.some(id => masterData.get(String(id).trim())?.alliance.toLowerCase().includes(sT) || String(id).includes(sT))); }
        if (currentSort === 'name') { displayList.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' })); }
        else { displayList.sort((a, b) => { let valA, valB; if (displayKeys.includes(currentSort)) { valA = Math.abs(a.stats.diff.b[currentSort] || 0); valB = Math.abs(b.stats.diff.b[currentSort] || 0); } else { valA = Math.abs(a.stats.diff[currentSort] || 0); valB = Math.abs(b.stats.diff[currentSort] || 0); } return valB - valA; }); }

        displayList.forEach(matchup => {
            const mIdx = matchup.originalIdx; const card = document.createElement('div'); card.className = 'matchup-card';
            const allTbd = matchup.ids.every(id => { const d = masterData.get(String(id).trim()); return !d || d.class === "TBD" || d.class === "-"; });
            const dataColsSpan = 21 + (!allTbd ? 1 : 0);
            const delBtn = (r) => isAdmin ? `<td class="col-drag">≡</td><td class="col-del" onclick="removeRow(${mIdx}, ${r})">×</td>` : '';

            let rowsHtml = matchup.ids.map((id, rIdx) => {
                const upper = String(id).toUpperCase().trim(); const isSpecial = ["TOTAL A", "TOTAL B", "DIFFERENTIALS (A-B)"].includes(upper); const rowData = matchup.stats.rows[rIdx];
                if (isSpecial) {
                    const rowClass = upper.replace(/\s+/g, '-').replace(/[()]/g, '').toLowerCase();
                    return `<tr class="row-${rowClass}">${isAdmin ? '<td></td><td></td>' : ''}<td style="text-align:left; padding-left:20px; font-weight:950;" colspan="${!allTbd ? 4 : 3}">${upper}</td><td class="${currentSort === 'power' ? 'highlight-sort' : ''}">${formatVal(rowData.power)}</td><td class="${currentSort === 'merits' ? 'highlight-sort' : ''}">${formatVal(rowData.merits)}</td><td class="${currentSort === 'mp' ? 'highlight-sort' : ''}">${(rowData.mp * 100).toFixed(2)}%</td><td class="${currentSort === 'mpRank' ? 'highlight-sort' : ''}">${rowData.mpRankSum || 0}</td><td class="${currentSort === 'kills' ? 'highlight-sort' : ''}">${formatVal(rowData.kills)}</td><td class="${currentSort === 'deads' ? 'highlight-sort' : ''}">${formatVal(rowData.deads)}</td><td class="${currentSort === 'heals' ? 'highlight-sort' : ''}">${formatVal(rowData.heals)}</td><td class="${currentSort === 'ch25' ? 'highlight-sort' : ''}">${formatValNoDec(rowData.ch25)}</td><td class="${currentSort === 'ap' ? 'highlight-sort' : ''}">${formatVal(rowData.ap)}</td>${displayKeys.map(k => `<td class="${currentSort === k ? 'highlight-sort' : ''}">${formatValNoDec(rowData.b[k])}</td>`).join('')}</tr>`;
                }
                const d = masterData.get(String(id).trim());
                if (!d) return `<tr>${delBtn(rIdx)}<td class="col-small">-</td><td style="color:var(--primary); font-weight:800;">${isAdmin ? `<input class="id-input" value="${id}" onchange="updateId(${mIdx}, ${rIdx}, this.value)">` : id}</td><td colspan="${dataColsSpan}" style="color:var(--danger); text-align:left; padding-left:20px;">ID [${id}] Not Found</td></tr>`;
                return `<tr>${delBtn(rIdx)}<td>${d.powerRank || '-'}</td><td style="color:var(--primary); font-weight:800;">${isAdmin ? `<input class="id-input" value="${id}" onchange="updateId(${mIdx}, ${rIdx}, this.value)">` : id}</td>${!allTbd ? `<td style="font-weight:900;">${d.class}</td>` : ''}<td style="text-align:left; font-weight:700;" class="${d.isParagon ? 'paragon-text' : ''}">${d.alliance}</td><td class="${currentSort === 'power' ? 'highlight-sort' : ''}">${formatVal(d.power)}</td><td class="${currentSort === 'merits' ? 'highlight-sort' : ''}">${formatVal(d.merits)}</td><td class="${currentSort === 'mp' ? 'highlight-sort' : ''}">${(d.mp * 100).toFixed(2)}%</td><td class="${currentSort === 'mpRank' ? 'highlight-sort' : ''}">${d.mpRank || 0}</td><td class="${currentSort === 'kills' ? 'highlight-sort' : ''}">${formatVal(d.kills)}</td><td class="${currentSort === 'deads' ? 'highlight-sort' : ''}">${formatVal(d.deads)}</td><td class="${currentSort === 'heals' ? 'highlight-sort' : ''}">${formatVal(d.heals)}</td><td class="${currentSort === 'ch25' ? 'highlight-sort' : ''}">${formatValNoDec(d.ch25)}</td><td class="${currentSort === 'ap' ? 'highlight-sort' : ''}">${formatVal(d.ap)}</td>${csvKeys.map((k, idx) => `<td class="${currentSort === displayKeys[idx] ? 'highlight-sort' : ''}">${formatValNoDec(cleanNum(d.raw[k]))}</td>`).join('')}</tr>`;
            }).join('');

            const zoneLabel = matchup.zone === 'overall' ? 'KVK START' : matchup.zone.toUpperCase();
            const adminZoneSelect = isAdmin ? `<select style="background:#0f172a; border:1px solid var(--glass-border); color:white; font-size:0.7rem; border-radius:5px;" onchange="currentMatchups[${mIdx}].zone=this.value; renderAll();"><option value="overall" ${matchup.zone === 'overall' ? 'selected' : ''}>KVK START</option><option value="zone 2" ${matchup.zone === 'zone 2' ? 'selected' : ''}>ZONE 2</option><option value="zone 3" ${matchup.zone === 'zone 3' ? 'selected' : ''}>ZONE 3</option><option value="zone 4" ${matchup.zone === 'zone 4' ? 'selected' : ''}>ZONE 4</option></select>` : `<span class="btn" style="font-size:0.6rem; padding:4px 10px;">${zoneLabel}</span>`;

            card.innerHTML = `<div class="card-header"><div>${isAdmin ? `<input class="name-input" value="${matchup.name}" onchange="currentMatchups[${mIdx}].name=this.value;">` : `<div class="name-input">${matchup.name}</div>`}</div><div class="header-right-side">${adminZoneSelect}${isAdmin ? `<button class="btn" style="background:#10b981; border:none;" onclick="addRowA(${mIdx})">+ A</button><button class="btn" style="background:#3b82f6; border:none;" onclick="addRowB(${mIdx})">+ B</button><button class="btn" style="background:#ef4444; border:none;" onclick="deleteMatchup(${mIdx})">DELETE</button>` : ''}</div></div><div class="table-wrapper"><table><thead><tr>${isAdmin ? '<th></th><th></th>' : ''}<th>RANK</th><th>KD#</th>${!allTbd ? '<th>CLASS</th>' : ''}<th>ALLIANCE</th><th>POWER</th><th>MERITS</th><th>M/P</th><th>M/P R</th><th>KILLS</th><th>DEADS</th><th>HEALS</th><th>CH25</th><th>CH25 AVG</th>${displayKeys.map(k => `<th>${k}</th>`).join('')}</tr></thead><tbody id="tbody-${mIdx}">${rowsHtml}</tbody></table></div>`;
            container.appendChild(card); if(isAdmin) setupSortable(mIdx);
        });
    }

    function calculateMatchupStats(ids) {
        let a = { power:0, merits:0, kills:0, deads:0, heals:0, ch25:0, ap:0, count:0, mpRankSum:0, b:{} }; let b = { power:0, merits:0, kills:0, deads:0, heals:0, ch25:0, ap:0, count:0, mpRankSum:0, b:{} }; displayKeys.forEach(k => { a.b[k]=0; b.b[k]=0; }); let current = a;
        ids.forEach(id => { const u = String(id).toUpperCase().trim(); if (u === "TOTAL A") current = b; else if (!["TOTAL B", "DIFFERENTIALS (A-B)"].includes(u)) { const d = masterData.get(String(id).trim()); if (d) { current.power += d.power; current.merits += d.merits; current.kills += d.kills; current.deads += d.deads; current.heals += d.heals; current.ch25 += d.ch25; current.ap += d.ap; current.count++; current.mpRankSum += (d.mpRank || 0); displayKeys.forEach((k, idx) => { current.b[k] += cleanNum(d.raw[k] || d.raw[csvKeys[idx]]); }); } } });
        const statsA = { ...a, mp: a.power > 0 ? a.merits/a.power : 0, ap: a.count > 0 ? a.ap/a.count : 0 }; const statsB = { ...b, mp: b.power > 0 ? b.merits/b.power : 0, ap: b.count > 0 ? b.ap/b.count : 0 };
        const diff = { power: statsA.power - statsB.power, merits: statsA.merits - statsB.merits, kills: statsA.kills - statsB.kills, deads: statsA.deads - statsB.deads, heals: statsA.heals - statsB.heals, ch25: statsA.ch25 - statsB.ch25, ap: statsA.ap - statsB.ap, mp: statsA.mp - statsB.mp, mpRank: statsA.mpRankSum - statsB.mpRankSum, b: displayKeys.reduce((acc, k) => ({...acc, [k]: statsA.b[k] - statsB.b[k]}), {}) };
        return { rows: ids.map(id => { const u = String(id).toUpperCase().trim(); if (u === "TOTAL A") return statsA; if (u === "TOTAL B") return statsB; if (u === "DIFFERENTIALS (A-B)") return { ...diff, mpRankSum: diff.mpRank }; return {}; }), diff };
    }

    function addRowA(mIdx) { const ids = currentMatchups[mIdx].ids; const target = ids.findIndex(id => String(id).toUpperCase().trim() === "TOTAL A"); ids.splice(target !== -1 ? target : ids.length, 0, "000"); renderAll(); }
    function addRowB(mIdx) { const ids = currentMatchups[mIdx].ids; const target = ids.findIndex(id => String(id).toUpperCase().trim() === "TOTAL B"); ids.splice(target !== -1 ? target + 1 : ids.length, 0, "000"); renderAll(); }
    function removeRow(mIdx, rIdx) { currentMatchups[mIdx].ids.splice(rIdx, 1); renderAll(); }
    function updateId(mIdx, rIdx, val) { currentMatchups[mIdx].ids[rIdx] = val; renderAll(); }
    function deleteMatchup(idx) { if(confirm("Delete Group?")) { currentMatchups.splice(idx, 1); renderAll(); } }
    function addNewMatchup() { currentMatchups.unshift({ name: "NEW GROUP", zone: currentZoneFilter === 'all' ? 'overall' : currentZoneFilter, ids: ["TOTAL A", "DIFFERENTIALS (A-B)", "TOTAL B"] }); renderAll(); }
    function setupSortable(mIdx) { new Sortable(document.getElementById(`tbody-${mIdx}`), { handle: '.col-drag', animation: 150, onEnd: (evt) => { const team = currentMatchups[mIdx]; const moved = team.ids.splice(evt.oldIndex, 1)[0]; team.ids.splice(evt.newIndex, 0, moved); renderAll(); }}); }
    function setSort(key, btn) { currentSort = key; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); if (btn) btn.classList.add('active'); renderAll(); }
    function setZoneFilter(zone, btn) { currentZoneFilter = zone; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderAll(); }
    async function login() {
        const u = document.getElementById('user').value; const p = document.getElementById('pass').value;
        try { const resp = await fetch('Admin.json'); const data = await resp.json();
            if(data.users.find(x => x.username === u && x.password === p)) { isAdmin = true; document.getElementById('adminArea').style.display = 'flex'; document.getElementById('loginBtn').style.display = 'none'; toggleModal(false); renderAll(); }
            else { document.getElementById('loginError').style.display = 'block'; }
        } catch (e) { alert("Admin.json error."); }
    }
    function logout() { location.reload(); }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }
    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { if (!n && n !== 0) return "0.00"; const abs = Math.abs(n); let s = abs >= 1e9 ? (abs/1e9).toFixed(2)+'B' : abs >= 1e6 ? (abs/1e6).toFixed(1)+'M' : abs.toLocaleString(); return n < 0 ? "-" + s : s; }
    function formatValNoDec(n) { if (!n && n !== 0) return "0"; const abs = Math.floor(Math.abs(n)); let s = abs >= 1e6 ? (abs/1e6).toFixed(1)+'M' : abs.toLocaleString(); return n < 0 ? "-" + s : s; }
</script>
