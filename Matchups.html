<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Official Matchups</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. SCROLLBARS --- */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { 
            display: none; 
        }

        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { 
                display: flex; 
            }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- BASE STYLING --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }
        
        .unified-container { max-width: 1600px; margin: 0 auto; padding: 0 25px; box-sizing: border-box; width: 100%; }
        
        .header-top-row { margin-top: 25px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; }
        .nav-side-box { display: flex; align-items: center; gap: 10px; }
        .nav-side-box.right { justify-content: flex-end; gap: 10px; }
        .header-top-row .home-link { position: static; margin: 0; backdrop-filter: none; }
        
        .tools-glass-row { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; margin-bottom: 20px; }
        .search-center-box { width: 500px; display: flex; justify-content: center; }
        .search-input { width: 100%; padding: 10px 18px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; }
        
        .zone-cluster { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--muted); transition: 0.2s; text-transform: uppercase; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .sticky-wrapper { position: sticky; top: 15px; z-index: 1000; width: 100%; display: flex; justify-content: center; margin-bottom: 50px; padding: 0 25px; box-sizing: border-box; }
        .metrics-island { width: 100%; max-width: 1350px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 12px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; }
        .metric-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 4px 15px; width: 100%; }
        .metric-btn { padding: 10px 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.65rem; font-weight: 800; cursor: pointer; color: var(--muted); transition: 0.2s; text-transform: uppercase; }
        .metric-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .metric-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .expand-rows { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; width: 100%; }
        .expand-rows.open { max-height: 250px; margin-top: 10px; border-top: 1px solid var(--glass-border); padding-top: 10px; }
        .toggle-trigger { width: 100%; display: flex; justify-content: center; cursor: pointer; color: var(--muted); padding-top: 8px; transition: 0.3s; }

        /* --- CARDS & TABLES --- */
        #matchupsContainer { display: flex; flex-direction: column; gap: 40px; padding-bottom: 60px; }
        .matchup-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .name-input { 
            font-size: 1.3rem; 
            font-weight: 900; 
            border: 1px solid transparent; 
            background: transparent; 
            color: var(--primary); 
            padding: 0px 8px; 
            border-radius: 6px; 
            width: 100%; 
            outline: none; 
            box-sizing: border-box;
            text-overflow: ellipsis; 
        }

        input.name-input { text-overflow: ellipsis; }

        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 15px; } 
        
        /* --- PRO STRICT TABLE LOCKING --- */
        table { 
            width: auto; 
            border-collapse: separate; 
            border-spacing: 0 4px; 
            table-layout: fixed !important; 
            min-width: 2200px; 
        }

        th { text-align: center; padding: 12px 2px; color: var(--muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px 2px; text-align: center; background: rgba(255,255,255,0.02); border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); font-size: 0.8rem; }
        
        /* PRO STICKY COLUMN LOGIC */
        
        /* Admin Button Sticky Units */
        .col-del, .col-drag {
            position: sticky !important;
            z-index: 40;
            background-color: #0f172a !important;
            width: 30px !important;
            min-width: 30px !important;
            max-width: 30px !important;
        }
        .col-del { left: 0; }
        .col-drag { left: 30px; }

        /* Alliance Column (Sticky Left 1) */
        .sticky-col-ally {
            position: sticky !important;
            left: 0; 
            z-index: 30;
            background-color: #0f172a !important; 
            width: 160px !important;
            min-width: 160px !important;
            max-width: 160px !important; 
            border-right: none !important;
            text-align: center !important;
            box-shadow: none !important;
        }

        /* Kingdom ID Column (Sticky Left 2) */
        .sticky-col-kd {
            position: sticky !important;
            left: 160px !important; 
            z-index: 30; 
            background-color: #1e293b !important; 
            width: 70px !important;
            min-width: 70px !important;
            max-width: 70px !important; 
            border-right: none !important;
            text-align: center !important;
            box-shadow: none !important;
        }

        /* Admin Mode Offsets (30+30=60) */
        .admin-active .sticky-col-ally { left: 60px !important; }
        .admin-active .sticky-col-kd { left: 220px !important; }

        th.sticky-col-kd, th.sticky-col-ally {
            z-index: 31;
            background-color: #1e293b !important; 
        }

        /* THEMED SOLID WALLS FOR SPECIAL ROWS */
        .row-total-a .sticky-col-kd, .row-total-a .sticky-col-ally, .row-total-a .col-del, .row-total-a .col-drag,
        .row-total-b .sticky-col-kd, .row-total-b .sticky-col-ally, .row-total-b .col-del, .row-total-b .col-drag {
            background-color: #131d33 !important; 
        }

        .row-differentials-a-b .sticky-col-kd, .row-differentials-a-b .sticky-col-ally, .row-differentials-a-b .col-del, .row-differentials-a-b .col-drag {
            background-color: #191932 !important; 
        }

        /* Font Shrink for Differentials label */
        .row-differentials-a-b .sticky-col-ally {
            font-size: 0.7rem !important;
            padding: 0 5px !important;
        }

        .highlight-sort { background: rgba(59, 130, 246, 0.15) !important; color: white !important; font-weight: 950 !important; }
        .row-total-a, .row-total-b { background: rgba(59, 130, 246, 0.1) !important; color: var(--primary) !important; }
        .row-differentials-a-b { background: rgba(168, 85, 247, 0.1) !important; color: var(--accent) !important; }
        .paragon-text { color: rgb(245, 158, 11) !important; font-weight: 900 !important; text-decoration: none !important; }
        
        .id-input { width: 55px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #3b82f6; text-align: center; font-weight: 800; border-radius: 4px; outline: none; }
        
        /* --- BUTTONS --- */
        .btn { padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--glass-border); font-size: 0.75rem; background: var(--glass); color: white; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: white; }
        .btn-blue { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); color: white; }
        .btn-green { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: white; }
        
        /* --- MODALS & OVERLAYS --- */
        #authModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 24px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
        #progressContainer { width: 100%; max-width: 500px; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 20px auto; display: none; overflow: hidden; border: 1px solid var(--glass-border); }
        #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s ease; }
        #status-msg { text-align: center; font-weight: 800; color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 20px; min-height: 1em; }
        
        /* --- VOTING UI --- */
        .voting-section {
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .voting-header {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }
        .voting-header h4 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .voting-stats-row {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .voting-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(239, 68, 68, 0.3); /* Default Team B Red */
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            margin-bottom: 15px;
        }
        .voting-bar-fill {
            height: 100%;
            background: var(--primary); /* Team A Blue */
            transition: width 0.5s ease-out;
        }
        .voting-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .vote-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .vote-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
        }
        .vote-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }
        .vote-btn.voted-a { border-color: var(--primary); color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .vote-btn.voted-b { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="hideDropdown()">

</div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- STATE ---
    let isAdmin = false;
    let masterData = new Map();
    let allCloudData = {};
    let allTeamsData = {};
    let currentMatchups = [];
    let currentSort = { field: 'power', direction: 'desc' };
    let currentZoneFilter = 'all';
    let currentRegistrations = {};
    let currentGenPools = {}; // NEW: Maps KD to Gen for selected file
    let selectedFileName = "";
    let activeTroopKeys = [];
    let sosMap = {};
    let fullFileList = []; 
    let allVotes = []; // Holds all votes for the currently selected file

    const sortLabels = { name: 'Group Name', power: 'Power', merits: 'Merits', mp: 'M/P %', mpRank: 'M/P R', kills: 'Kills', deads: 'Deads', heals: 'Heals', ch25: 'CH25', ap: 'CH25 AVG' };

    let zoneWinners = {
        "zone 2": {},
        "zone 3": {},
        "zone 4": {},
        "final": {}
    };
    
    const possibleTroopHeaders = [
        "10M","20M","30M","40M","50M","60M+","80M+","100M+","125M+","150M+","200M+","250M+","300M+",
        "10-20M","20-40M","40-60M","60-80M","80-100M","100-125M","125-150M","150-200M","200-250M","250-300M"
    ];

    const zoneFileMap = {
        "zone 2": "z2winners.json",
        "zone 3": "z3winners.json",
        "zone 4": "z4winners.json",
        "final": "kvkwinners.json"
    };

    function kdClean(val) {
        if (!val) return "";
        return String(parseInt(parseFloat(String(val).trim())));
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => { 
                overlay.style.display = 'none'; 
            }, 300);
        }
    }

    function enableAdminMode() {
        isAdmin = true;
        document.body.classList.add('admin-active');
        const area = document.getElementById('adminArea');
        const lBtn = document.getElementById('loginBtn');
        if (area) area.style.display = 'flex';
        if (lBtn) lBtn.style.display = 'none';
        renderAll();
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const errorDiv = document.getElementById('loginError');
        const btn = document.getElementById('loginActionBtn');
        errorDiv.style.display = 'none';
        btn.textContent = "AUTHORIZING...";
        btn.disabled = true;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { 
            errorDiv.textContent = error.message; 
            errorDiv.style.display = 'block'; 
            btn.disabled = false; 
            btn.textContent = "AUTHORIZE";

            enableAdminMode();

    async function logout() { 
        await supabaseClient.auth.signOut(); 
        location.reload(); 
    }

    window.onload = async () => {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) enableAdminMode();

            let v = "1.0";
            try {
                const { data: vBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('version.json?t=' + Date.now());
                const vData = JSON.parse(await vBlob.text());
                v = vData.v;
                window.DATA_VERSION = v;
            } catch(e) { window.DATA_VERSION = "1.0"; }

            const timestamp = `?v=${v}`;
            const [fRes, sRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/files.json' + timestamp),
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/SosNames.json' + timestamp)
            ]);
            
            if (fRes.error) throw fRes.error;
            fullFileList = JSON.parse(await fRes.data.text());
            if (sRes.data) sosMap = JSON.parse(await sRes.data.text());

            await fetchMatchupsFromCloud();
            await fetchTeamsFromCloud();
            await fetchAllWinnersFromCloud(); 
            
            populateFileSelector();

        } catch (e) { 
            console.error("Init Error:", e); 
        } finally { 
            hideLoading(); 
        }
    };

    function populateFileSelector() {
        const selector = document.getElementById('fileSelector'); 
        selector.innerHTML = '';
        fullFileList.slice().reverse().forEach(file => {
            const opt = document.createElement('option'); 
            opt.value = file;
            const dateKey = file.replace(/\.csv/i, '');
            opt.textContent = sosMap[dateKey] || dateKey.toUpperCase();
            selector.appendChild(opt);
        });
        if (fullFileList.length > 0) {
            selector.value = fullFileList[fullFileList.length - 1];
            loadSpecificFile(selector.value);
        }
    }

    async function loadSpecificFile(fileName) {
        selectedFileName = fileName; 
        const cleanName = fileName.replace(/\.csv/i, ''); 
        const jsonName = cleanName + ".json";
        const v = window.DATA_VERSION || "1.0";
        const timestamp = `?v=${v}`;
        
        try {
            // LOAD GEN POOLS FOR THIS FILE
            const gens = ['G1', 'G2', 'G3', 'G4', 'NoG'];
            currentGenPools = {};
            await Promise.all(gens.map(async (g) => {
                try {
                    const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`Gen Pools/${cleanName}-${g}.json${timestamp}`);
                    if (data) {
                        const kdList = JSON.parse(await data.text());
                        kdList.forEach(kd => { currentGenPools[kdClean(kd)] = g; });
                    }
                } catch(e) {}
            }));

            const [regRes, csvRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_CONFIGS).download(`SavedRegistrations/${jsonName}${timestamp}`),
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${fileName}${timestamp}`)
            ]);
            
            if (regRes.data) {
                const regWrapper = JSON.parse(await regRes.data.text());
                currentRegistrations = regWrapper.data || {};
                var registeredIDs = new Set();
                if (regWrapper.kingdoms) {
                    regWrapper.kingdoms.forEach(k => registeredIDs.add(kdClean(k)));
                }
            } else { 
                currentRegistrations = {}; 
                var registeredIDs = new Set(); 
            }

            if (csvRes.data) {
                const result = Papa.parse(await csvRes.data.text(), { header: true, skipEmptyLines: 'greedy' });
                const headers = result.meta.fields; 
                activeTroopKeys = headers.filter(h => possibleTroopHeaders.includes(h));
                updateSortBar(); 
                
                masterData.clear(); 
                let rankedPool = [];
                result.data.forEach(row => {
                    const cleanId = kdClean(row.KD || row['KD#']);
                    const p = cleanNum(row['Top 300 Power'] || row.Power);
                    if (cleanId && p > 0) {
                        const regInfo = currentRegistrations[cleanId];
                        const obj = { 
                            kd: cleanId, 
                            power: p, 
                            merits: cleanNum(row['Top 300 Merits'] || row.Merits), 
                            kills: cleanNum(row['Top 300 Kills'] || row.Kills), 
                            deads: cleanNum(row['Top 300 Deads'] || row.Deads), 
                            heals: cleanNum(row['Top 300 Heals'] || row.Heals), 
                            ch25: cleanNum(row['CH25']), 
                            ap: cleanNum(row['CH25 AP']), 
                            mp: p > 0 ? (cleanNum(row['Top 300 Merits'] || row.Merits)/p) : 0, 
                            class: regInfo ? (regInfo.class || "TBD") : "-", 
                            isParagon: regInfo?.isParagon === true, 
                            alliance: (row['#1 Ally'] || row.Alliance || "").trim() || "-", 
                            gen: currentGenPools[cleanId] || 'NoG',
                            raw: row 
                        };
                        masterData.set(cleanId, obj); 
                        if (registeredIDs.has(cleanId)) rankedPool.push(obj);
                    }
                });
                rankedPool.sort((a,b) => b.power - a.power).forEach((d, i) => d.powerRank = i + 1);
                rankedPool.sort((a,b) => b.mp - a.mp).forEach((d, i) => d.mpRank = i + 1);
            }
            
            await fetchVotes(); // Fetch community prediction votes

            currentMatchups = allCloudData[cleanName] || []; 
            renderAll();
        } catch (e) { 
            console.error("Load Error:", e); 
        }
    }

    async function fetchMatchupsFromCloud() { 
        const v = window.DATA_VERSION || "1.0";
        try { 
            const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`MatchupsConfig.json?v=${v}`); 
            if (data) allCloudData = JSON.parse(await data.text()); 
        } catch (e) { allCloudData = {}; } 
    }

    async function fetchTeamsFromCloud() {
        const v = window.DATA_VERSION || "1.0";
        try { 
            const { data, error } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`TeamsConfig.json?v=${v}`); 
            if (error) { allTeamsData = {}; return; }
            if (data) allTeamsData = JSON.parse(await data.text()); 
        } catch (e) { allTeamsData = {}; }
    }

    async function fetchAllWinnersFromCloud() {
        const v = window.DATA_VERSION || "1.0";
        const promises = Object.entries(zoneFileMap).map(async ([zone, filename]) => {
            try {
                const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`${filename}?v=${v}`);
                if (data) zoneWinners[zone] = JSON.parse(await data.text());
            } catch (e) { zoneWinners[zone] = {}; }
        });
        await Promise.all(promises);
    }

    async function fetchVotes() {
        if (!selectedFileName) return;
        const cleanKey = selectedFileName.replace(/\.csv/i, '');
        try {
            const { data, error } = await supabaseClient
                .from('matchup_votes')
                .select('*')
                .eq('snapshot_id', cleanKey);
            if (!error) {
                allVotes = data;
            }
        } catch(e) { console.error("Vote fetch error:", e); }
    }

    async function castVote(mName, side) {
        if (!selectedFileName) return;
        const cleanKey = selectedFileName.replace(/\.csv/i, '');
        const voteKey = `vote_${cleanKey}_${mName}`;

        if (localStorage.getItem(voteKey)) {
            alert("You have already voted for this matchup!");
            return;
        }

        try {
            const { error } = await supabaseClient
                .from('matchup_votes')
                .insert([{ 
                    snapshot_id: cleanKey, 
                    matchup_name: mName, 
                    vote_side: side 
                }]);

            if (!error) {
                localStorage.setItem(voteKey, side);
                await fetchVotes();
                renderAll();
            } else {
                console.error("Vote insert error:", error);
            }
        } catch(e) { console.error(e); }
    }

    function toggleFilteredPolls(shouldClose) {
        if (!isAdmin) return;
        const sT = document.getElementById('teamSearch').value.toLowerCase().trim(); 
        const gF = document.getElementById('genSelector').value;
        
        let targetMatchups = currentMatchups.map((m, idx) => ({ ...m, originalIdx: idx }));

        if (currentZoneFilter !== 'all') {
            targetMatchups = targetMatchups.filter(m => m.zone === currentZoneFilter);
        }

        if (gF !== 'all') {
            targetMatchups = targetMatchups.filter(m => {
                return m.ids.some(id => currentGenPools[kdClean(id)] === gF);
            });
        }
        
        if (sT) { 
            targetMatchups = targetMatchups.filter(m => 
                m.name.toLowerCase().includes(sT) || 
                m.ids.some(id => { 
                    const d = masterData.get(kdClean(id)); 
                    return kdClean(id).includes(sT) || (d && d.alliance.toLowerCase().includes(sT)); 
                })
            ); 
        }

        targetMatchups.forEach(m => {
            currentMatchups[m.originalIdx].pollsClosed = shouldClose;
        });

        alert(`${shouldClose ? 'CLOSED' : 'OPENED'} polls for ${targetMatchups.length} matchups. Click SAVE CLOUD to persist.`);
        renderAll();
    }

    async function saveToCloud() { 
        if (!isAdmin) return; 
        const btn = document.getElementById('saveStatusBtn'); 
        btn.textContent = "SAVING..."; 
        btn.disabled = true;
        const cleanKey = selectedFileName.replace(/\.csv/i,''); 
        allCloudData[cleanKey] = currentMatchups; 
        try { 
            const currentGroupNames = new Set(currentMatchups.map(m => m.name));
            for (const zone of Object.keys(zoneWinners)) {
                if (zoneWinners[zone][cleanKey]) {
                    const winnersForDate = zoneWinners[zone][cleanKey];
                    Object.keys(winnersForDate).forEach(name => {
                        if (!currentGroupNames.has(name)) delete winnersForDate[name];
                    });
                }
            }
            await supabaseClient.storage.from(BUCKET_CONFIGS).upload('MatchupsConfig.json', JSON.stringify(allCloudData, null, 2), { upsert: true, contentType: 'application/json' }); 
            for (const [zone, filename] of Object.entries(zoneFileMap)) {
                let serverFile = {};
                try {
                    const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`${filename}?t=${Date.now()}`);
                    if (data) serverFile = JSON.parse(await data.text());
                } catch(e) {}
                serverFile[cleanKey] = zoneWinners[zone][cleanKey] || {};
                await supabaseClient.storage.from(BUCKET_CONFIGS).upload(filename, JSON.stringify(serverFile, null, 2), { upsert: true, contentType: 'application/json' });
            }
            btn.textContent = "SAVED!"; 
            setTimeout(() => btn.textContent="SAVE CLOUD", 2000); 
        } catch (e) { 
            btn.textContent = "RETRY"; 
            console.error(e); 
        } finally { btn.disabled = false; }
    }

    function applyTeamToMatchup(mIdx, side, teamName) {
        if (!teamName) return;
        const fileTeams = allTeamsData[selectedFileName] || [];
        const team = fileTeams.find(t => t.name === teamName);
        if (!team) return;
        let ids = [...currentMatchups[mIdx].ids];
        const idxTotalA = ids.indexOf("TOTAL A");
        const idxTotalB = ids.indexOf("TOTAL B");
        if (side === 'A') {
            const markersAndB = ids.slice(idxTotalA);
            currentMatchups[mIdx].ids = [...team.ids, ...markersAndB];
        } else {
            const everythingBeforeTeamB = ids.slice(0, idxTotalB + 1);
            currentMatchups[mIdx].ids = [...everythingBeforeTeamB, ...team.ids];
        }
        renderAll();
    }

    function updateMatchupName(mIdx, newName) {
        const cleanKey = selectedFileName.replace(/\.csv/i,'');
        const matchup = currentMatchups[mIdx];
        const oldName = matchup.name;
        const zone = matchup.zone;
        matchup.name = newName;
        if (zoneWinners[zone] && zoneWinners[zone][cleanKey] && zoneWinners[zone][cleanKey][oldName]) {
            zoneWinners[zone][cleanKey][newName] = zoneWinners[zone][cleanKey][oldName];
            delete zoneWinners[zone][cleanKey][oldName];
        }
    }

    function updateWinner(mIdx, val) {
        const cleanKey = selectedFileName.replace(/\.csv/i,'');
        const matchup = currentMatchups[mIdx];
        const zone = matchup.zone;
        if (!zoneWinners[zone]) zoneWinners[zone] = {};
        if (!zoneWinners[zone][cleanKey]) zoneWinners[zone][cleanKey] = {};
        zoneWinners[zone][cleanKey][matchup.name] = val;
    }

                    </div>
                    <div class="voting-bar-container">
                        <div class="voting-bar-fill" style="width: ${percentA}%"></div>
                    </div>
                    ${!isClosed ? `
                    <div class="voting-buttons">
                        <button class="vote-btn ${hasVoted === 'A' ? 'voted-a' : ''}" 
                                ${hasVoted ? 'disabled' : ''} 
                                onclick="castVote('${mName}', 'A')">
                            ${hasVoted === 'A' ? '✓ VOTED A' : 'VOTE TEAM A'}
                        </button>
                        <button class="vote-btn ${hasVoted === 'B' ? 'voted-b' : ''}" 
                                ${hasVoted ? 'disabled' : ''} 
                                onclick="castVote('${mName}', 'B')">
                            ${hasVoted === 'B' ? '✓ VOTED B' : 'VOTE TEAM B'}
                        </button>
                    </div>` : ''}
                </div>
            `;

            const adminZoneSelect = isAdmin ? `
                <select style="background:#0f172a; border:1px solid var(--glass-border); color:white; font-size:0.7rem; border-radius:5px;" onchange="currentMatchups[${mIdx}].zone=this.value; renderAll();">
                    <option value="overall" ${matchup.zone === 'overall' ? 'selected' : ''}>KVK START</option>
                    <option value="zone 2" ${matchup.zone === 'zone 2' ? 'selected' : ''}>ZONE 2</option>
                    <option value="zone 3" ${matchup.zone === 'zone 3' ? 'selected' : ''}>ZONE 3</option>
                    <option value="zone 4" ${matchup.zone === 'zone 4' ? 'selected' : ''}>ZONE 4</option>
                    <option value="final" ${matchup.zone === 'final' ? 'selected' : ''}>FINAL ZONE</option>
                </select>
            ` : `<span class="btn" style="font-size:0.6rem; padding:4px 10px;">${matchup.zone.toUpperCase()}</span>`;
            
            const adminTeamSelects = isAdmin ? `
                <div style="display:flex; gap:10px; margin-top:10px; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.02); border-radius:10px; border:1px solid var(--glass-border);">
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <span style="font-size:0.6rem; color:var(--muted); font-weight:800;">AUTO-FILL A</span>
                        <select class="admin-select" onchange="applyTeamToMatchup(${mIdx}, 'A', this.value)">${teamOptions}</select>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <span style="font-size:0.6rem; color:var(--muted); font-weight:800;">AUTO-FILL B</span>
                        <select class="admin-select" onchange="applyTeamToMatchup(${mIdx}, 'B', this.value)">${teamOptions}</select>
                    </div>
                </div>` : '';
            
            card.innerHTML = `
                <div class="card-header" style="align-items: flex-start; gap: 20px;">
                    <div style="flex: 1; min-width: 0;">
                        ${isAdmin ? 
                            `<input class="name-input" value="${matchup.name}" onchange="updateMatchupName(${mIdx}, this.value)">` : 
                            `<div class="name-input" style="word-wrap: break-word;">${matchup.name}</div>`
                        }
                    </div>
                    <div style="display:flex; align-items:center; gap:10px; flex-shrink: 0;">
                        ${adminZoneSelect}
                        ${isAdmin ? `
                            <button class="btn btn-green" onclick="addRowA(${mIdx})">+ A</button>
                            <button class="btn btn-blue" onclick="addRowB(${mIdx})">+ B</button>
                            <button class="btn btn-red" onclick="deleteMatchup(${mIdx})">DEL</button>
                        ` : ''}
                    </div>
                </div>
                ${adminTeamSelects}
                ${winnerUI}
                ${votingUI}
                <div class="table-wrapper">
                    <table>
                        <colgroup>
                            ${isAdmin ? '<col style="width:30px;"><col style="width:30px;">' : ''}
                            <col style="width:160px;"> <!-- ALLIANCE -->
                            <col style="width:70px;"> <!-- KD -->
                            ${!allTbd ? '<col style="width:80px;">' : ''} <!-- CLASS -->
                            <col style="width:80px;"> <!-- RANK -->
                            <col style="width:120px;"> <!-- POWER -->
                            <col style="width:120px;"> <!-- MERITS -->
                            <col style="width:100px;"> <!-- M/P -->
                            <col style="width:100px;"> <!-- M/P R -->
                            <col style="width:140px;"> <!-- KILLS -->
                            <col style="width:140px;"> <!-- DEADS -->
                            <col style="width:140px;"> <!-- HEALS -->
                            <col style="width:100px;"> <!-- CH25 -->
                            <col style="width:120px;"> <!-- CH25 AVG -->
                            ${activeTroopKeys.map(() => '<col style="width:100px;">').join('')}
                        </colgroup>
                        <thead>
                            <tr>
                                ${isAdmin ? '<th></th><th></th>' : ''}
                                <th class="sticky-col-ally">ALLIANCE</th>
                                <th class="sticky-col-kd">KD#</th>
                                ${!allTbd ? '<th>CLASS</th>' : ''}
                                <th>RANK</th>
                                <th>POWER</th><th>MERITS</th><th>M/P</th><th>M/P R</th><th>KILLS</th><th>DEADS</th><th>HEALS</th><th>CH25</th><th>CH25 AVG</th>
                                ${activeTroopKeys.map(k => `<th>${k.replace('+', '')}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody id="tbody-${mIdx}">${rowsHtml}</tbody>
                    </table>
                </div>
            `;
            container.appendChild(card);
            if(isAdmin) setupSortable(mIdx);
        });
    }

    function calculateMatchupStats(ids) {
        let a = { power:0, merits:0, kills:0, deads:0, heals:0, ch25:0, ap:0, count:0, mpRankSum:0, b:{} };
        let b = { power:0, merits:0, kills:0, deads:0, heals:0, ch25:0, ap:0, count:0, mpRankSum:0, b:{} }; 
        activeTroopKeys.forEach(k => { a.b[k]=0; b.b[k]=0; }); 
        let current = a; 
        ids.forEach(id => { 
            const u = String(id).toUpperCase().trim(); 
            if (u === "TOTAL A") { current = b; } 
            else if (!["TOTAL B", "DIFFERENTIALS (A-B)"].includes(u)) { 
                const d = masterData.get(kdClean(id)); 
                if (d) { 
                    current.power += d.power; current.merits += d.merits; current.kills += d.kills; current.deads += d.deads; current.heals += d.heals; current.ch25 += d.ch25; current.ap += d.ap; current.count++; current.mpRankSum += (d.mpRank || 0); 
                    activeTroopKeys.forEach(k => current.b[k] += cleanNum(d.raw[k])); 
                } 
            } 
        });
        const statsA = { ...a, mp: a.power > 0 ? a.merits/a.power : 0, ap: a.count > 0 ? a.ap/a.count : 0 };
        const statsB = { ...b, mp: b.power > 0 ? b.merits/b.power : 0, ap: b.count > 0 ? b.ap/b.count : 0 };
        const diff = { power: statsA.power - statsB.power, merits: statsA.merits - statsB.merits, kills: statsA.kills - statsB.kills, deads: statsA.deads - statsB.deads, heals: statsA.heals - statsB.heals, ch25: statsA.ch25 - statsB.ch25, ap: statsA.ap - statsB.ap, mp: statsA.mp - statsB.mp, mpRank: statsA.mpRankSum - statsB.mpRankSum, b: {} };
        activeTroopKeys.forEach(k => diff.b[k] = statsA.b[k] - statsB.b[k]);
        return { rows: ids.map(id => { const u = String(id).toUpperCase().trim(); if (u === "TOTAL A") return statsA; if (u === "TOTAL B") return statsB; if (u === "DIFFERENTIALS (A-B)") return { ...diff, mpRankSum: diff.mpRank }; return {}; }), diff };
    }

    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { if (!n && n !== 0) return "0.00"; const abs = Math.abs(n); let s = abs >= 1e9 ? (abs/1e9).toFixed(2)+'B' : abs >= 1e6 ? (abs/1e6).toFixed(1)+'M' : abs.toLocaleString(); return n < 0 ? "-" + s : s; }
    function formatValNoDec(n) { if (!n && n !== 0) return "0"; const abs = Math.floor(Math.abs(n)); let s = abs >= 1e6 ? (abs/1e6).toFixed(1)+'M' : abs.toLocaleString(); return n < 0 ? "-" + s : s; }
    
    function setSort(key, btn) { 
        if (currentSort.field === key) currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc';
        else { currentSort.field = key; currentSort.direction = 'desc'; }
        document.querySelectorAll('.metrics-island .metric-btn').forEach(b => { b.classList.remove('active'); const fieldKey = b.id.replace('btn-', ''); if (sortLabels[fieldKey]) b.textContent = sortLabels[fieldKey]; });
        if (btn) { btn.classList.add('active'); btn.textContent += (currentSort.direction === 'desc' ? ' ▼' : ' ▲'); }
        renderAll(); 
    }

    function setZoneFilter(zone, btn) { currentZoneFilter = zone; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderAll(); }
    function toggleTroops() { document.getElementById('troopRow').classList.toggle('open'); document.getElementById('troopToggle').style.transform = document.getElementById('troopRow').classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; }
    function updateSortBar() { const container = document.querySelector('#troopRow .metric-row'); if (container) container.innerHTML = activeTroopKeys.map(k => `<button class="metric-btn ${currentSort.field === k ? 'active' : ''}" onclick="setSort('${k}', this)">${k.replace('+', '')}</button>`).join(''); }
    function updateId(mIdx, rIdx, val) { currentMatchups[mIdx].ids[rIdx] = val; renderAll(); }
    function addRowA(mIdx) { const ids = currentMatchups[mIdx].ids; const target = ids.indexOf("TOTAL A"); ids.splice(target !== -1 ? target : ids.length, 0, "000"); renderAll(); }
    function addRowB(mIdx) { const ids = currentMatchups[mIdx].ids; const target = ids.indexOf("TOTAL B"); ids.splice(target !== -1 ? target + 1 : ids.length, 0, "000"); renderAll(); }
    function removeRow(mIdx, rIdx) { currentMatchups[mIdx].ids.splice(rIdx, 1); renderAll(); }
    function deleteMatchup(idx) { if(confirm("Delete Group?")) { const matchup = currentMatchups[idx]; const cleanKey = selectedFileName.replace(/\.csv/i,''); if (zoneWinners[matchup.zone] && zoneWinners[matchup.zone][cleanKey]) delete zoneWinners[matchup.zone][cleanKey][matchup.name]; currentMatchups.splice(idx, 1); renderAll(); } }
    function addNewMatchup() { currentMatchups.unshift({ name: "A New Group", zone: currentZoneFilter === 'all' ? 'overall' : currentZoneFilter, ids: ["TOTAL A", "DIFFERENTIALS (A-B)", "TOTAL B"] }); setSort('name', document.getElementById('btn-name')); }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; if(!v) document.getElementById('loginError').style.display = 'none'; }
    function hideDropdown() {}
    function setupSortable(mIdx) { const el = document.getElementById(`tbody-${mIdx}`); if (el) new Sortable(el, { handle: '.col-drag', animation: 150, onEnd: (evt) => { const moved = currentMatchups[mIdx].ids.splice(evt.oldIndex, 1)[0]; currentMatchups[mIdx].ids.splice(evt.newIndex, 0, moved); renderAll(); } }); }
</script>
