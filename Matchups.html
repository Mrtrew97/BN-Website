<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Official Matchups</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { 
                display: flex; 
            }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- BASE STYLING --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }
        
        .unified-container { max-width: 1600px; margin: 0 auto; padding: 0 25px; box-sizing: border-box; width: 100%; }
        
        .header-top-row { margin-top: 25px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; }
        .nav-side-box { display: flex; align-items: center; }
        .nav-side-box.right { justify-content: flex-end; gap: 10px; }
        .header-top-row .home-link { position: static; margin: 0; backdrop-filter: none; }
        
        .tools-glass-row { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; margin-bottom: 20px; }
        .search-center-box { width: 500px; display: flex; justify-content: center; }
        .search-input { width: 100%; padding: 10px 18px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; }
        
        .zone-cluster { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--muted); transition: 0.2s; text-transform: uppercase; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .sticky-wrapper { position: sticky; top: 15px; z-index: 1000; width: 100%; display: flex; justify-content: center; margin-bottom: 50px; padding: 0 25px; box-sizing: border-box; }
        .metrics-island { width: 100%; max-width: 1350px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 12px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; }
        .metric-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 4px 15px; width: 100%; }
        .metric-btn { padding: 10px 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.65rem; font-weight: 800; cursor: pointer; color: var(--muted); transition: 0.2s; text-transform: uppercase; }
        .metric-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .metric-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .expand-rows { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; width: 100%; }
        .expand-rows.open { max-height: 250px; margin-top: 10px; border-top: 1px solid var(--glass-border); padding-top: 10px; }
        .toggle-trigger { width: 100%; display: flex; justify-content: center; cursor: pointer; color: var(--muted); padding-top: 8px; transition: 0.3s; }

        /* --- CARDS & TABLES --- */
        #matchupsContainer { display: flex; flex-direction: column; gap: 40px; padding-bottom: 60px; }
        .matchup-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .name-input { 
            font-size: 1.3rem; 
            font-weight: 900; 
            border: 1px solid transparent; 
            background: transparent; 
            color: var(--primary); 
            padding: 0px 8px; 
            border-radius: 6px; 
            width: 100%; 
            outline: none; 
            box-sizing: border-box;
            text-overflow: ellipsis; 
        }

        input.name-input { text-overflow: ellipsis; }

        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 15px; } 
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; min-width: 1850px; }
        th { text-align: center; padding: 12px 2px; color: var(--muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px 2px; text-align: center; background: rgba(255,255,255,0.02); border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); font-size: 0.8rem; }
        
        .highlight-sort { background: rgba(59, 130, 246, 0.15) !important; color: white !important; font-weight: 950 !important; }
        .row-total-a, .row-total-b { background: rgba(59, 130, 246, 0.1) !important; color: var(--primary) !important; }
        .row-differentials-a-b { background: rgba(168, 85, 247, 0.1) !important; color: var(--accent) !important; }
        .paragon-text { color: rgb(245, 158, 11) !important; font-weight: 900 !important; text-decoration: none !important; }
        
        .id-input { width: 50px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #3b82f6; text-align: center; font-weight: 800; border-radius: 4px; outline: none; }
        
        /* --- BUTTONS --- */
        .btn { padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--glass-border); font-size: 0.75rem; background: var(--glass); color: white; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: white; }
        .btn-blue { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); color: white; }
        .btn-green { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: white; }
        
        .col-drag { width: 30px; cursor: grab; opacity: 0.3; color: var(--muted); }
        .col-del { width: 30px; color: #ef4444; font-weight: 900; cursor: pointer; }
        .admin-select { background: rgba(15, 23, 42, 0.9); border: 1px solid var(--glass-border); color: #3b82f6; font-size: 0.65rem; border-radius: 6px; padding: 4px; font-weight: 700; outline: none; cursor: pointer; }
        
        /* --- MODALS & OVERLAYS --- */
        #authModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 24px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
        #progressContainer { width: 100%; max-width: 500px; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 20px auto; display: none; overflow: hidden; border: 1px solid var(--glass-border); }
        #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s ease; }
        #status-msg { text-align: center; font-weight: 800; color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 20px; min-height: 1em; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="hideDropdown()">

<!-- ROTATE HINT OVERLAY -->
<div id="rotate-hint">
    <div class="rotate-content">
        <div class="phone-icon"></div>
        <p>Landscape view recommended</p>
        <button onclick="document.getElementById('rotate-hint').style.setProperty('display', 'none', 'important')">Dismiss</button>
    </div>
</div>    

<div id="loadingOverlay">
    <div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <div id="progressContainer"><div id="progressBar"></div></div>
    <div id="status-msg">Initializing Supabase...</div>
</div>

<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box"><a href="index.html" class="home-link btn">HOME PAGE</a></div>
        <h1 class="page-title-main">Matchups (Official)</h1>
        <div class="nav-side-box right">
            <div id="adminArea" style="display:none; gap:10px;">
                <button class="btn" style="background:#a855f7;" id="saveStatusBtn" onclick="saveToCloud()">SAVE CLOUD</button>
                <button class="btn btn-green" onclick="addNewMatchup()">+ NEW MATCHUP</button>
                <button class="btn btn-red" onclick="logout()">LOGOUT</button>
            </div>
            <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<div class="unified-container">
    <div class="tools-glass-row">
        <div class="nav-side-box">
            <select id="fileSelector" onchange="loadSpecificFile(this.value)" style="min-width: 150px;"></select>
        </div>
        <div class="search-center-box">
            <input type="text" id="teamSearch" class="search-input" placeholder="Search Matchup, Alliance, or ID..." oninput="renderAll()" autocomplete="off">
        </div>
        <div class="zone-cluster" id="zoneFilterRow">
            <button class="filter-btn active" onclick="setZoneFilter('all', this)">ALL</button>
            <button class="filter-btn" onclick="setZoneFilter('overall', this)">KVK START</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 2', this)">Z2</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 3', this)">Z3</button>
            <button class="filter-btn" onclick="setZoneFilter('zone 4', this)">Z4</button>
            <button class="filter-btn" onclick="setZoneFilter('final', this)">FINAL ZONE</button>
        </div>
    </div>
</div>

<div class="sticky-wrapper">
    <div class="metrics-island">
        <div class="metric-row">
            <button class="metric-btn" id="btnSortName" onclick="setSort('name', this)">Group Name</button>
            <button class="metric-btn active" id="btnSortPower" onclick="setSort('power', this)">Power</button>
            <button class="metric-btn" onclick="setSort('merits', this)">Merits</button>
            <button class="metric-btn" onclick="setSort('mp', this)">M/P %</button>
            <button class="metric-btn" onclick="setSort('mpRank', this)">M/P R</button>
            <button class="metric-btn" onclick="setSort('kills', this)">Kills</button>
            <button class="metric-btn" onclick="setSort('deads', this)">Deads</button>
            <button class="metric-btn" onclick="setSort('heals', this)">Heals</button>
            <button class="metric-btn" onclick="setSort('ch25', this)">CH25</button>
            <button class="metric-btn" onclick="setSort('ap', this)">CH25 AVG</button>
        </div>
        <div id="troopRow" class="expand-rows">
            <div class="metric-row"></div>
        </div>
        <div class="toggle-trigger" id="troopToggle" onclick="toggleTroops()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>
</div>

<div class="unified-container">
    <div id="matchupsContainer"></div>
</div>

<!-- SUPABASE AUTH MODAL -->
<div id="authModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="margin-top:0; font-weight:900;">ADMIN ACCESS</h2>
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <input type="email" id="email" class="modal-input" placeholder="Admin Email" autocomplete="username" required style="width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: none;">
            <input type="password" id="pass" class="modal-input" placeholder="Password" autocomplete="current-password" required style="width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 8px; border: none;">
            <div id="loginError" style="color: #ef4444; font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; display: none;"></div>
            <button type="submit" id="loginActionBtn" class="btn btn-blue" style="width: 100%; padding: 15px;">AUTHORIZE</button>
        </form>
        <button onclick="toggleModal(false)" class="btn" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
    </div>
</div>

<script>
    // --- SUPABASE CONFIGURATION ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- STATE ---
    let isAdmin = false;
    let masterData = new Map();
    let allCloudData = {};
    let allTeamsData = {};
    let currentMatchups = [];
    let currentSort = 'power';
    let currentZoneFilter = 'all';
    let currentRegistrations = {};
    let selectedFileName = "";
    let activeTroopKeys = [];
    let sosMap = {};
    let kvkWinners = {};
    
    const possibleTroopHeaders = [
        "10M","20M","30M","40M","50M","60M+","80M+","100M+","125M+","150M+","200M+","250M+","300M+",
        "10-20M","20-40M","40-60M","60-80M","80-100M","100-125M","125-150M","150-200M","200M+"
    ];

    function kdClean(val) {
        if (!val) return "";
        return String(parseInt(parseFloat(String(val).trim())));
    }

    function updateProgress(pct, text) {
        const bar = document.getElementById('progressBar');
        const container = document.getElementById('progressContainer');
        const status = document.getElementById('status-msg');
        
        if (container) container.style.display = 'block';
        if (bar) bar.style.width = pct + '%';
        if (status && text) status.innerText = text;
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                if(document.getElementById('progressContainer')) {
                    document.getElementById('progressContainer').style.display = 'none';
                }
            }, 300);
        }
    }

    function enableAdminMode() {
        isAdmin = true;
        const area = document.getElementById('adminArea');
        const lBtn = document.getElementById('loginBtn');
        
        if (area) area.style.display = 'flex';
        if (lBtn) lBtn.style.display = 'none';
        renderAll();
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const errorDiv = document.getElementById('loginError');
        const btn = document.getElementById('loginActionBtn');
        
        errorDiv.style.display = 'none';
        btn.textContent = "AUTHORIZING...";
        btn.disabled = true;
        
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) { 
            errorDiv.textContent = error.message; 
            errorDiv.style.display = 'block'; 
            btn.disabled = false; 
            btn.textContent = "AUTHORIZE"; 
        } else { 
            enableAdminMode(); 
            toggleModal(false); 
        }
    }

    async function logout() { 
        await supabaseClient.auth.signOut(); 
        location.reload(); 
    }

    window.onload = async () => {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) enableAdminMode();

            updateProgress(20, "Fetching metadata...");
            
            const [fRes, sRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/files.json?t=' + Date.now()),
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/SosNames.json?t=' + Date.now())
            ]);
            
            if (fRes.error) throw fRes.error;
            
            const files = JSON.parse(await fRes.data.text());
            if (sRes.data) sosMap = JSON.parse(await sRes.data.text());

            const selector = document.getElementById('fileSelector'); 
            selector.innerHTML = '';
            
            files.reverse().forEach(f => {
                const opt = document.createElement('option'); 
                opt.value = f;
                const dateKey = f.replace(/\.csv/i, '');
                opt.textContent = sosMap[dateKey] ? `${sosMap[dateKey]} (${dateKey})` : f.toUpperCase().replace(/\.CSV/i, '');
                selector.appendChild(opt);
            });

            await fetchMatchupsFromCloud();
            await fetchTeamsFromCloud();
            await fetchWinnersFromCloud(); 
            
            if (files.length > 0) {
                await loadSpecificFile(files[0]);
            }

        } catch (e) { 
            console.error("Init Error:", e); 
        } finally { 
            hideLoading(); 
        }
    };

    async function loadSpecificFile(fileName) {
        selectedFileName = fileName; 
        const cleanName = fileName.replace(/\.csv/i, ''); 
        const jsonName = cleanName + ".json";
        
        try {
            const [regRes, csvRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_CONFIGS).download(`SavedRegistrations/${jsonName}?t=${Date.now()}`),
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${fileName}?t=${Date.now()}`)
            ]);
            
            if (regRes.data) {
                const regWrapper = JSON.parse(await regRes.data.text());
                currentRegistrations = regWrapper.data || {};
                var registeredIDs = new Set();
                if (regWrapper.kingdoms) {
                    regWrapper.kingdoms.forEach(k => registeredIDs.add(kdClean(k)));
                }
            } else { 
                currentRegistrations = {}; 
                var registeredIDs = new Set(); 
            }

            if (csvRes.data) {
                const result = Papa.parse(await csvRes.data.text(), { header: true, skipEmptyLines: 'greedy' });
                const headers = result.meta.fields; 
                activeTroopKeys = headers.filter(h => possibleTroopHeaders.includes(h));
                updateSortBar(); 
                
                masterData.clear(); 
                let rankedPool = [];
                
                result.data.forEach(row => {
                    const cleanId = kdClean(row.KD || row['KD#']);
                    const p = cleanNum(row['Top 300 Power'] || row.Power);
                    if (cleanId && p > 0) {
                        const regInfo = currentRegistrations[cleanId];
                        const obj = { 
                            kd: cleanId, 
                            power: p, 
                            merits: cleanNum(row['Top 300 Merits'] || row.Merits), 
                            kills: cleanNum(row['Top 300 Kills'] || row.Kills), 
                            deads: cleanNum(row['Top 300 Deads'] || row.Deads), 
                            heals: cleanNum(row['Top 300 Heals'] || row.Heals), 
                            ch25: cleanNum(row['CH25']), 
                            ap: cleanNum(row['CH25 AP']), 
                            mp: p > 0 ? (cleanNum(row['Top 300 Merits'] || row.Merits)/p) : 0, 
                            class: regInfo ? (regInfo.class || "TBD") : "-", 
                            isParagon: regInfo?.isParagon === true, 
                            alliance: (row['#1 Ally'] || row.Alliance || "").trim() || "-", 
                            raw: row 
                        };
                        masterData.set(cleanId, obj); 
                        if (registeredIDs.has(cleanId)) rankedPool.push(obj);
                    }
                });
                
                rankedPool.sort((a,b) => b.power - a.power).forEach((d, i) => d.powerRank = i + 1);
                rankedPool.sort((a,b) => b.mp - a.mp).forEach((d, i) => d.mpRank = i + 1);
            }
            
            currentMatchups = allCloudData[cleanName] || []; 
            renderAll();
        } catch (e) { 
            console.error("Load Error:", e); 
        }
    }

    async function fetchMatchupsFromCloud() { 
        try { 
            const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('MatchupsConfig.json?t=' + Date.now()); 
            if (data) allCloudData = JSON.parse(await data.text()); 
        } catch (e) { 
            allCloudData = {}; 
        } 
    }

    async function fetchTeamsFromCloud() {
        try { 
            const { data, error } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('TeamsConfig.json?t=' + Date.now()); 
            if (error) {
                allTeamsData = {};
                return;
            }
            if (data) allTeamsData = JSON.parse(await data.text()); 
        } catch (e) { 
            allTeamsData = {}; 
        }
    }

    async function fetchWinnersFromCloud() {
        try { 
            const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('kvkwinners.json?t=' + Date.now()); 
            if (data) kvkWinners = JSON.parse(await data.text()); 
        } catch (e) { 
            kvkWinners = {}; 
        }
    }

    async function saveToCloud() { 
        if (!isAdmin) return; 
        
        const btn = document.getElementById('saveStatusBtn'); 
        btn.textContent = "SAVING..."; 
        btn.disabled = true;
        
        const cleanKey = selectedFileName.replace(/\.csv/i,''); 
        allCloudData[cleanKey] = currentMatchups; 
        
        try { 
            await supabaseClient.storage.from(BUCKET_CONFIGS).upload('MatchupsConfig.json', JSON.stringify(allCloudData, null, 2), { upsert: true, contentType: 'application/json' }); 
            await supabaseClient.storage.from(BUCKET_CONFIGS).upload('kvkwinners.json', JSON.stringify(kvkWinners, null, 2), { upsert: true, contentType: 'application/json' }); 
            
            btn.textContent = "SAVED!"; 
            setTimeout(() => btn.textContent="SAVE CLOUD", 2000); 
        } catch (e) { 
            btn.textContent = "RETRY"; 
            console.error(e); 
        } finally { 
            btn.disabled = false; 
        }
    }

    function applyTeamToMatchup(mIdx, side, teamName) {
        if (!teamName) return;
        
        const fileTeams = allTeamsData[selectedFileName] || [];
        const team = fileTeams.find(t => t.name === teamName);
        if (!team) return;

        let ids = [...currentMatchups[mIdx].ids];
        const idxTotalA = ids.indexOf("TOTAL A");
        const idxTotalB = ids.indexOf("TOTAL B");

        if (side === 'A') {
            const markersAndB = ids.slice(idxTotalA);
            currentMatchups[mIdx].ids = [...team.ids, ...markersAndB];
        } else {
            const everythingBeforeTeamB = ids.slice(0, idxTotalB + 1);
            currentMatchups[mIdx].ids = [...everythingBeforeTeamB, ...team.ids];
        }
        renderAll();
    }

    function setupSortable(mIdx) { 
        const el = document.getElementById(`tbody-${mIdx}`);
        if (!el) return;
        
        new Sortable(el, { 
            handle: '.col-drag', 
            animation: 150, 
            onEnd: (evt) => { 
                const team = currentMatchups[mIdx]; 
                const moved = team.ids.splice(evt.oldIndex, 1)[0]; 
                team.ids.splice(evt.newIndex, 0, moved); 
                renderAll(); 
            }
        }); 
    }

    function updateMatchupName(mIdx, newName) {
        const cleanKey = selectedFileName.replace(/\.csv/i,'');
        const oldName = currentMatchups[mIdx].name;
        
        currentMatchups[mIdx].name = newName;

        if (kvkWinners[cleanKey] && kvkWinners[cleanKey][oldName] !== undefined) {
            kvkWinners[cleanKey][newName] = kvkWinners[cleanKey][oldName];
            delete kvkWinners[cleanKey][oldName];
        }
    }

    function updateWinner(mIdx, val) {
        const cleanKey = selectedFileName.replace(/\.csv/i,'');
        if (!kvkWinners[cleanKey]) kvkWinners[cleanKey] = {};
        
        const mName = currentMatchups[mIdx].name;
        kvkWinners[cleanKey][mName] = val;
    }

    function renderAll() {
        const container = document.getElementById('matchupsContainer');
        const sT = document.getElementById('teamSearch').value.toLowerCase().trim(); 
        container.innerHTML = '';
        
        let displayList = currentMatchups.map((m, idx) => ({ 
            ...m, 
            originalIdx: idx, 
            stats: calculateMatchupStats(m.ids) 
        }));
        
        if (currentZoneFilter !== 'all') {
            displayList = displayList.filter(m => m.zone === currentZoneFilter);
        }
        
        if (sT) { 
            displayList = displayList.filter(m => 
                m.name.toLowerCase().includes(sT) || 
                m.ids.some(id => { 
                    const d = masterData.get(kdClean(id)); 
                    return kdClean(id).includes(sT) || (d && d.alliance.toLowerCase().includes(sT)); 
                })
            ); 
        }
        
        if (currentSort === 'name') { 
            displayList.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true })); 
        } else { 
            displayList.sort((a, b) => { 
                let valA = Math.abs(a.stats.diff[currentSort] || (a.stats.diff.b && a.stats.diff.b[currentSort]) || 0);
                let valB = Math.abs(b.stats.diff[currentSort] || (b.stats.diff.b && b.stats.diff.b[currentSort]) || 0); 
                return valB - valA; 
            }); 
        }
        
        const fileTeams = allTeamsData[selectedFileName] || [];
        const teamOptions = `<option value="">-- Pick a Team --</option>` + fileTeams.map(t => `<option value="${t.name}">${t.name}</option>`).join('');

        displayList.forEach(matchup => {
            const mIdx = matchup.originalIdx;
            const card = document.createElement('div'); 
            card.className = 'matchup-card';
            
            const allTbd = matchup.ids.every(id => { 
                const d = masterData.get(kdClean(id)); 
                return !d || d.class === "TBD" || d.class === "-"; 
            });
            
            const dataColsSpan = 9 + activeTroopKeys.length + (!allTbd ? 1 : 0);
            
            let rowsHtml = matchup.ids.map((id, rIdx) => {
                const upper = String(id).toUpperCase().trim(); 
                const isSpecial = ["TOTAL A", "TOTAL B", "DIFFERENTIALS (A-B)"].includes(upper); 
                const rowData = matchup.stats.rows[rIdx];
                
                if (isSpecial) { 
                    const rowClass = upper.replace(/\s+/g, '-').replace(/[()]/g, '').toLowerCase(); 
                    return `
                        <tr class="row-${rowClass}">
                            ${isAdmin ? '<td></td><td></td>' : ''}
                            <td class="sticky-special-label" colspan="${!allTbd ? 4 : 3}">${upper}</td>
                            <td class="${currentSort === 'power' ? 'highlight-sort' : ''}">${formatVal(rowData.power)}</td>
                            <td class="${currentSort === 'merits' ? 'highlight-sort' : ''}">${formatVal(rowData.merits)}</td>
                            <td class="${currentSort === 'mp' ? 'highlight-sort' : ''}">${(rowData.mp * 100).toFixed(2)}%</td>
                            <td class="${currentSort === 'mpRank' ? 'highlight-sort' : ''}">${rowData.mpRankSum || 0}</td>
                            <td class="${currentSort === 'kills' ? 'highlight-sort' : ''}">${formatVal(rowData.kills)}</td>
                            <td class="${currentSort === 'deads' ? 'highlight-sort' : ''}">${formatVal(rowData.deads)}</td>
                            <td class="${currentSort === 'heals' ? 'highlight-sort' : ''}">${formatVal(rowData.heals)}</td>
                            <td class="${currentSort === 'ch25' ? 'highlight-sort' : ''}">${formatValNoDec(rowData.ch25)}</td>
                            <td class="${currentSort === 'ap' ? 'highlight-sort' : ''}">${formatVal(rowData.ap)}</td>
                            ${activeTroopKeys.map(k => `
                                <td class="${currentSort === k ? 'highlight-sort' : ''}">${formatValNoDec(rowData.b[k])}</td>
                            `).join('')}
                        </tr>
                    `; 
                }
                
                const cleanId = kdClean(id); 
                const d = masterData.get(cleanId);
                
                if (!d) {
                    return `
                        <tr>
                            ${isAdmin ? `<td class="col-del" onclick="removeRow(${mIdx}, ${rIdx})">×</td><td class="col-drag">≡</td>` : ''}
                            <td class="col-small">-</td>
                            <td class="sticky-col-kd" style="color:var(--primary); font-weight:800;">
                                ${isAdmin ? `<input class="id-input" value="${id}" onchange="updateId(${mIdx}, ${rIdx}, this.value)">` : id}
                            </td>
                            <td colspan="${activeTroopKeys.length + 9}" style="color:#ef4444; text-align:center;">ID [${id}] Not Found</td>
                        </tr>
                    `;
                }
                
                return `
                    <tr>
                        ${isAdmin ? `<td class="col-del" onclick="removeRow(${mIdx}, ${rIdx})">×</td><td class="col-drag">≡</td>` : ''}
                        <td>${d.powerRank || '-'}</td>
                        <td class="sticky-col-kd" style="color:var(--primary); font-weight:800;">
                            ${isAdmin ? `<input class="id-input" value="${id}" onchange="updateId(${mIdx}, ${rIdx}, this.value)">` : id}
                        </td>
                        ${!allTbd ? `<td style="font-weight:900;">${d.class}</td>` : ''}
                        <td class="sticky-col-ally ${d.isParagon ? 'paragon-text' : ''}" style="text-align:center; font-weight:700;">${d.alliance}</td>
                        <td class="${currentSort === 'power' ? 'highlight-sort' : ''}">${formatVal(d.power)}</td>
                        <td class="${currentSort === 'merits' ? 'highlight-sort' : ''}">${formatVal(d.merits)}</td>
                        <td class="${currentSort === 'mp' ? 'highlight-sort' : ''}">${(d.mp * 100).toFixed(2)}%</td>
                        <td class="${currentSort === 'mpRank' ? 'highlight-sort' : ''}">${d.mpRank || 0}</td>
                        <td class="${currentSort === 'kills' ? 'highlight-sort' : ''}">${formatVal(d.kills)}</td>
                        <td class="${currentSort === 'deads' ? 'highlight-sort' : ''}">${formatVal(d.deads)}</td>
                        <td class="${currentSort === 'heals' ? 'highlight-sort' : ''}">${formatVal(d.heals)}</td>
                        <td class="${currentSort === 'ch25' ? 'highlight-sort' : ''}">${formatValNoDec(d.ch25)}</td>
                        <td class="${currentSort === 'ap' ? 'highlight-sort' : ''}">${formatVal(d.ap)}</td>
                        ${activeTroopKeys.map(k => `
                            <td class="${currentSort === k ? 'highlight-sort' : ''}">${formatValNoDec(cleanNum(d.raw[k]))}</td>
                        `).join('')}
                    </tr>
                `;
            }).join('');
            
            const adminZoneSelect = isAdmin ? `
                <select style="background:#0f172a; border:1px solid var(--glass-border); color:white; font-size:0.7rem; border-radius:5px;" onchange="currentMatchups[${mIdx}].zone=this.value; renderAll();">
                    <option value="overall" ${matchup.zone === 'overall' ? 'selected' : ''}>KVK START</option>
                    <option value="zone 2" ${matchup.zone === 'zone 2' ? 'selected' : ''}>ZONE 2</option>
                    <option value="zone 3" ${matchup.zone === 'zone 3' ? 'selected' : ''}>ZONE 3</option>
                    <option value="zone 4" ${matchup.zone === 'zone 4' ? 'selected' : ''}>ZONE 4</option>
                    <option value="final" ${matchup.zone === 'final' ? 'selected' : ''}>FINAL ZONE</option>
                </select>
            ` : `<span class="btn" style="font-size:0.6rem; padding:4px 10px;">${matchup.zone.toUpperCase()}</span>`;
            
            const adminTeamSelects = isAdmin ? `
                <div style="display:flex; gap:10px; margin-top:10px; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.02); border-radius:10px; border:1px solid var(--glass-border);">
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <span style="font-size:0.6rem; color:var(--muted); font-weight:800;">AUTO-FILL SIDE A</span>
                        <select class="admin-select" onchange="applyTeamToMatchup(${mIdx}, 'A', this.value)">
                            ${teamOptions}
                        </select>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <span style="font-size:0.6rem; color:var(--muted); font-weight:800;">AUTO-FILL SIDE B</span>
                        <select class="admin-select" onchange="applyTeamToMatchup(${mIdx}, 'B', this.value)">
                            ${teamOptions}
                        </select>
                    </div>
                </div>
            ` : '';

            let winnerUI = '';
            if (matchup.zone === 'final') {
                const cleanKey = selectedFileName.replace(/\.csv/i,'');
                const currentWinner = (kvkWinners[cleanKey] && kvkWinners[cleanKey][matchup.name]) || "";
                
                if (isAdmin) {
                    winnerUI = `
                        <div style="margin-bottom:15px; background:rgba(251, 191, 36, 0.1); border:1px solid rgba(251, 191, 36, 0.3); padding:10px 15px; border-radius:10px; display:flex; align-items:center; gap:10px;">
                            <span style="color:#fbbf24; font-weight:900; font-size:0.85rem; text-transform:uppercase; display:flex; align-items:center; gap:5px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                Who Won:
                            </span>
                            <input type="text" value="${currentWinner}" placeholder="Enter KD# (e.g. 94, 102)" style="background:rgba(0,0,0,0.5); border:1px solid rgba(251, 191, 36, 0.5); color:white; padding:6px 12px; border-radius:6px; outline:none; font-weight:800; font-size:0.9rem; flex:1;" onchange="updateWinner(${mIdx}, this.value)">
                        </div>`;
                } else if (currentWinner) {
                    winnerUI = `
                        <div style="margin-bottom:15px; background:rgba(251, 191, 36, 0.1); border:1px solid rgba(251, 191, 36, 0.3); padding:10px 15px; border-radius:10px; display:flex; align-items:center; gap:10px;">
                            <span style="color:#fbbf24; font-weight:900; font-size:0.85rem; text-transform:uppercase; display:flex; align-items:center; gap:5px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                Winner:
                            </span>
                            <span style="color:white; font-weight:950; font-size:1.1rem; letter-spacing:1px;">${currentWinner}</span>
                        </div>`;
                }
            }
            
            card.innerHTML = `
                <div class="card-header" style="align-items: flex-start; gap: 20px;">
                    <div style="flex: 1; min-width: 0;">
                        ${isAdmin ? 
                            `<input class="name-input" value="${matchup.name}" onchange="updateMatchupName(${mIdx}, this.value)">` : 
                            `<div class="name-input" style="word-wrap: break-word;">${matchup.name}</div>`
                        }
                    </div>
                    <div style="display:flex; align-items:center; gap:10px; flex-shrink: 0;">
                        ${adminZoneSelect}
                        ${isAdmin ? `
                            <button class="btn btn-green" onclick="addRowA(${mIdx})">+ A</button>
                            <button class="btn btn-blue" onclick="addRowB(${mIdx})">+ B</button>
                            <button class="btn btn-red" onclick="deleteMatchup(${mIdx})">DEL</button>
                        ` : ''}
                    </div>
                </div>
                ${adminTeamSelects}
                ${winnerUI}
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                ${isAdmin ? '<th></th><th></th>' : ''}
                                <th>RANK</th>
                                <th class="sticky-col-kd">KD#</th>
                                ${!allTbd ? '<th>CLASS</th>' : ''}
                                <th class="sticky-col-ally">ALLIANCE</th>
                                <th>POWER</th>
                                <th>MERITS</th>
                                <th>M/P</th>
                                <th>M/P R</th>
                                <th>KILLS</th>
                                <th>DEADS</th>
                                <th>HEALS</th>
                                <th>CH25</th>
                                <th>CH25 AVG</th>
                                ${activeTroopKeys.map(k => `<th>${k.replace('+', '')}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody id="tbody-${mIdx}">
                            ${rowsHtml}
                        </tbody>
                    </table>
                </div>
            `;
            
            container.appendChild(card); 
            if(isAdmin) setupSortable(mIdx);
        });
    }

    function calculateMatchupStats(ids) {
        let a = { power:0, merits:0, kills:0, deads:0, heals:0, ch25:0, ap:0, count:0, mpRankSum:0, b:{} };
        let b = { power:0, merits:0, kills:0, deads:0, heals:0, ch25:0, ap:0, count:0, mpRankSum:0, b:{} }; 
        
        activeTroopKeys.forEach(k => { 
            a.b[k] = 0; 
            b.b[k] = 0; 
        }); 
        
        let current = a; 
        
        ids.forEach(id => { 
            const u = String(id).toUpperCase().trim(); 
            if (u === "TOTAL A") {
                current = b; 
            } else if (!["TOTAL B", "DIFFERENTIALS (A-B)"].includes(u)) { 
                const d = masterData.get(kdClean(id)); 
                if (d) { 
                    current.power += d.power; 
                    current.merits += d.merits; 
                    current.kills += d.kills; 
                    current.deads += d.deads; 
                    current.heals += d.heals; 
                    current.ch25 += d.ch25; 
                    current.ap += d.ap; 
                    current.count++; 
                    current.mpRankSum += (d.mpRank || 0); 
                    activeTroopKeys.forEach(k => current.b[k] += cleanNum(d.raw[k])); 
                } 
            } 
        });
        
        const statsA = { 
            ...a, 
            mp: a.power > 0 ? a.merits/a.power : 0, 
            ap: a.count > 0 ? a.ap/a.count : 0 
        };
        
        const statsB = { 
            ...b, 
            mp: b.power > 0 ? b.merits/b.power : 0, 
            ap: b.count > 0 ? b.ap/b.count : 0 
        };
        
        const diff = { 
            power: statsA.power - statsB.power, 
            merits: statsA.merits - statsB.merits, 
            kills: statsA.kills - statsB.kills, 
            deads: statsA.deads - statsB.deads, 
            heals: statsA.heals - statsB.heals, 
            ch25: statsA.ch25 - statsB.ch25, 
            ap: statsA.ap - statsB.ap, 
            mp: statsA.mp - statsB.mp, 
            mpRank: statsA.mpRankSum - statsB.mpRankSum, 
            b: {} 
        };
        
        activeTroopKeys.forEach(k => diff.b[k] = statsA.b[k] - statsB.b[k]);
        
        return { 
            rows: ids.map(id => { 
                const u = String(id).toUpperCase().trim(); 
                if (u === "TOTAL A") return statsA; 
                if (u === "TOTAL B") return statsB; 
                if (u === "DIFFERENTIALS (A-B)") return { ...diff, mpRankSum: diff.mpRank }; 
                return {}; 
            }), 
            diff 
        };
    }

    function cleanNum(v) { 
        if (!v) {
            return 0;
        }
        return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; 
    }

    function formatVal(n) { 
        if (!n && n !== 0) {
            return "0.00";
        }
        const abs = Math.abs(n); 
        let s = abs >= 1e9 ? (abs/1e9).toFixed(2)+'B' : abs >= 1e6 ? (abs/1e6).toFixed(1)+'M' : abs.toLocaleString(); 
        return n < 0 ? "-" + s : s; 
    }

    function formatValNoDec(n) { 
        if (!n && n !== 0) {
            return "0";
        }
        const abs = Math.floor(Math.abs(n)); 
        let s = abs >= 1e6 ? (abs/1e6).toFixed(1)+'M' : abs.toLocaleString(); 
        return n < 0 ? "-" + s : s; 
    }

    function setSort(key, btn) { 
        currentSort = key; 
        document.querySelectorAll('.metric-btn').forEach(b => {
            b.classList.remove('active');
        }); 
        if (btn) {
            btn.classList.add('active'); 
        } else if (key === 'name') { 
            const b = document.getElementById('btnSortName'); 
            if(b) b.classList.add('active'); 
        } 
        renderAll(); 
    }

    function setZoneFilter(zone, btn) { 
        currentZoneFilter = zone; 
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
        }); 
        btn.classList.add('active'); 
        renderAll(); 
    }

    function toggleTroops() { 
        const row = document.getElementById('troopRow');
        const trigger = document.getElementById('troopToggle');
        row.classList.toggle('open'); 
        trigger.style.transform = row.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; 
    }

    function updateSortBar() { 
        const container = document.querySelector('#troopRow .metric-row'); 
        if (!container) return; 
        
        container.innerHTML = activeTroopKeys.map(k => `
            <button class="metric-btn ${currentSort === k ? 'active' : ''}" onclick="setSort('${k}', this)">${k.replace('+', '')}</button>
        `).join(''); 
    }

    function updateId(mIdx, rIdx, val) { 
        currentMatchups[mIdx].ids[rIdx] = val; 
        renderAll(); 
    }

    function addRowA(mIdx) { 
        const ids = currentMatchups[mIdx].ids; 
        const target = ids.indexOf("TOTAL A"); 
        ids.splice(target !== -1 ? target : ids.length, 0, "000"); 
        renderAll(); 
    }

    function addRowB(mIdx) { 
        const ids = currentMatchups[mIdx].ids; 
        const target = ids.indexOf("TOTAL B"); 
        ids.splice(target !== -1 ? target : ids.length, 0, "000"); 
        renderAll(); 
    }

    function removeRow(mIdx, rIdx) { 
        currentMatchups[mIdx].ids.splice(rIdx, 1); 
        renderAll(); 
    }

    function deleteMatchup(idx) { 
        if(confirm("Delete Group?")) { 
            currentMatchups.splice(idx, 1); 
            renderAll(); 
        } 
    }

    function addNewMatchup() { 
        currentMatchups.unshift({ 
            name: "A New Group", 
            zone: currentZoneFilter === 'all' ? 'overall' : currentZoneFilter, 
            ids: ["TOTAL A", "DIFFERENTIALS (A-B)", "TOTAL B"] 
        }); 
        // Automatically switch to Name Sort so "A New Group" is visible at the top
        setSort('name', document.getElementById('btnSortName'));
    }

    function toggleModal(v) { 
        const modal = document.getElementById('authModal');
        const errorDiv = document.getElementById('loginError');
        modal.style.display = v ? 'flex' : 'none'; 
        if(!v) {
            errorDiv.style.display = 'none'; 
        }
    }

    function hideDropdown() {}

    function setupSortable(mIdx) { 
        const el = document.getElementById(`tbody-${mIdx}`); 
        if (el) {
            new Sortable(el, { 
                handle: '.col-drag', 
                animation: 150, 
                onEnd: (evt) => { 
                    const moved = currentMatchups[mIdx].ids.splice(evt.oldIndex, 1)[0]; 
                    currentMatchups[mIdx].ids.splice(evt.newIndex, 0, moved); 
                    renderAll(); 
                } 
            });
        }
    }

    async function applyTeamToMatchup(mIdx, side, teamName) {
        const team = (allTeamsData[selectedFileName] || []).find(t => t.name === teamName);
        if (!team) return;
        let ids = [...currentMatchups[mIdx].ids];
        if (side === 'A') {
            currentMatchups[mIdx].ids = [...team.ids, ...ids.slice(ids.indexOf("TOTAL A"))];
        } else {
            currentMatchups[mIdx].ids = [...ids.slice(0, ids.indexOf("TOTAL B") + 1), ...team.ids];
        }
        renderAll();
    }
</script>
