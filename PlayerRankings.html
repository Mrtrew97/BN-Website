<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player Rankings | BN Analytics</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    <!-- Supabase & Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .brand-logo { position: fixed; bottom: 30px; z-index: 2000; opacity: 0.6; width: 200px; pointer-events: none; user-select: none; transition: 0.4s ease; }
        .logo-right { right: 30px; } .logo-left { left: 30px; }
        @media (max-width: 650px) { .brand-logo { width: 100px; bottom: 15px; } .logo-right { right: 15px; } .logo-left { left: 15px; } }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); background-attachment: fixed; color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .unified-container { max-width: 1400px; margin: 0 auto; padding: 0 25px; box-sizing: border-box; width: 100%; }
        .header-top-row { margin-top: 25px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; }
        
        /* Disclaimer Bar Styling */
        .disclaimer-bar { text-align: center; margin: 0 auto 30px auto; font-weight: 900; color: var(--muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; background: rgba(255,255,255,0.05); width: fit-content; padding: 8px 30px; border-radius: 50px; border: 1px solid var(--glass-border); }

        .mode-toggle-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .mode-btn { padding: 12px 28px; border-radius: 14px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--muted); cursor: pointer; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; transition: 0.3s; }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        .selectors-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; }
        
        #progressContainer { width: 100%; max-width: 500px; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 20px auto; display: none; overflow: hidden; border: 1px solid var(--glass-border); }
        #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s ease; }
        #status-msg { text-align: center; font-weight: 800; color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 20px; min-height: 1em; }

        .search-row { display: flex; justify-content: center; margin-bottom: 40px; position: relative; z-index: 1100; }
        .search-wrapper { position: relative; width: 100%; max-width: 600px; }
        .search-input { width: 100%; padding: 18px 24px; border-radius: 16px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); color: white; outline: none; font-weight: 600; text-align: center; font-size: 1.1rem; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.7); box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .search-dropdown { position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; max-height: 350px; overflow-y: auto; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 1200; }
        .dropdown-item { padding: 15px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .dropdown-item:hover { background: var(--primary); }
        
        .podium-container { display: grid; grid-template-columns: 1.2fr 1.2fr 1.2fr; gap: 30px; align-items: end; max-width: 1100px; margin: 100px auto 60px auto; padding: 0 20px; }
        .podium-wrapper { position: relative; display: flex; flex-direction: column; }
        .podium-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px 20px 20px 20px; display: flex; flex-direction: column; justify-content: center; backdrop-filter: blur(15px); border-radius: 28px; text-align: center; position: relative; z-index: 5; overflow: hidden; }
        .rank-num-display { position: absolute; top: 0px; right: 20px; left: auto; font-size: 6.5rem; font-weight: 900; font-style: italic; z-index: 6; line-height: 1; pointer-events: none; opacity: 0.3; }
        .podium-card > span, .podium-card > div { position: relative; z-index: 7; }
        .rank-1-wrapper { order: 2; } .rank-2-wrapper { order: 1; } .rank-3-wrapper { order: 3; }
        @keyframes glow-1 { 0%, 100% { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); } 50% { border-color: #fcd34d; box-shadow: 0 0 45px rgba(251, 191, 36, 0.4); } }
        @keyframes glow-2 { 0%, 100% { border-color: #e2e8f0; box-shadow: 0 0 15px rgba(226, 232, 240, 0.1); } 50% { border-color: #ffffff; box-shadow: 0 0 35px rgba(226, 232, 240, 0.3); } }
        @keyframes glow-3 { 0%, 100% { border-color: #d97706; box-shadow: 0 0 15px rgba(217, 119, 6, 0.1); } 50% { border-color: #f59e0b; box-shadow: 0 0 35px rgba(217, 119, 6, 0.3); } }
        .rank-1-wrapper .podium-card { height: 300px; animation: glow-1 4s ease-in-out infinite; } .rank-1-wrapper .rank-num-display { color: #fbbf24; text-shadow: 0 0 30px rgba(251, 191, 36, 0.5); }
        .rank-2-wrapper .podium-card { height: 260px; animation: glow-2 4s ease-in-out infinite; } .rank-2-wrapper .rank-num-display { color: #e2e8f0; text-shadow: 0 0 20px rgba(226, 232, 240, 0.4); }
        .rank-3-wrapper .podium-card { height: 230px; animation: glow-3 4s ease-in-out infinite; } .rank-3-wrapper .rank-num-display { color: #d97706; text-shadow: 0 0 20px rgba(217, 119, 6, 0.4); }
        .pod-name { font-size: 1.6rem; font-weight: 950; color: white; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 5px; }
        .pod-meta { font-size: 0.8rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .pod-stat-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 18px; border: 1px solid var(--glass-border); }
        .pod-val { font-size: 1.8rem; font-weight: 900; color: white; display: block; }
        .pod-lbl { font-size: 0.6rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .sticky-wrapper { position: sticky; top: 15px; z-index: 1000; width: 100%; display: flex; justify-content: center; margin-bottom: 50px; padding: 0 25px; box-sizing: border-box; }
        .metrics-island { width: 100%; max-width: 1350px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 12px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; }
        .metric-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 4px 15px; width: 100%; }
        .metric-btn { padding: 10px 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.65rem; font-weight: 800; cursor: pointer; color: var(--muted); transition: 0.2s; text-transform: uppercase; }
        .metric-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .metric-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .expand-rows { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; width: 100%; }
        .expand-rows.open { max-height: 250px; margin-top: 10px; border-top: 1px solid var(--glass-border); padding-top: 10px; }
        .toggle-trigger { width: 100%; display: flex; justify-content: center; cursor: pointer; color: var(--muted); padding-top: 8px; }
        
        #playerGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding-bottom: 100px; }
        .player-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 50px 25px 25px 25px; position: relative; transition: 0.3s; text-align: center; }
        .rank-badge { position: absolute; top: 15px; right: 15px; font-weight: 950; font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 10px; color: var(--muted); border: 1px solid var(--glass-border); }
        .p-name { font-size: 1.4rem; font-weight: 950; color: white; display: block; margin-bottom: 2px; line-height: 1.2; word-break: break-word; }
        .p-id { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 12px; }
        .p-meta { font-size: 0.75rem; font-weight: 800; color: var(--primary); background: rgba(59, 130, 246, 0.1); padding: 6px 14px; border-radius: 12px; display: inline-block; margin-bottom: 20px; }
        .metric-focus-box { padding: 20px 10px; border-top: 1px solid var(--glass-border); }
        .focus-label { font-size: 0.6rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .focus-value { font-size: 1.8rem; font-weight: 950; color: white; }
        .diff-tag { font-size: 0.8rem; font-weight: 950; margin-left: 10px; }
        .pos { color: #10b981; } .neg { color: #ef4444; }
        .no-results { grid-column: 1 / -1; padding: 80px 20px; text-align: center; background: var(--glass); border-radius: 30px; border: 2px dashed var(--glass-border); }
        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
    </style>
</head>
<body onclick="hideDropdown()">

<div id="loadingOverlay"><div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div></div>

<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box"><a href="index.html" class="home-link">HOME PAGE</a></div>
        <h1 class="page-title-main">Player Rankings</h1>
        <div class="nav-side-box right"></div>
    </div>

    <!-- NEW: Disclaimer Bar -->
    <div class="disclaimer-bar">⚠️ This data is based on the top 50,000 players of each G2 KvK ⚠️</div>

    <div class="mode-toggle-container">
        <button id="modeTotal" class="mode-btn active" onclick="setMode('total')">Snapshot</button>
        <button id="modeDiff" class="mode-btn" onclick="setMode('diff')">Overview</button>
    </div>

    <div class="selectors-row">
        <div id="singleSelectArea"><select id="fileSelector" onchange="refreshData()"></select></div>
        <div id="doubleSelectArea" style="display:none; align-items: center; gap: 15px;">
            <select id="startSelector" onchange="refreshData()"></select>
            <div style="font-weight:900; color:var(--primary); font-size:0.7rem; opacity:0.8;">TO</div>
            <select id="endSelector" onchange="refreshData()"></select>
        </div>
    </div>

    <!-- Progress UI -->
    <div id="progressContainer"><div id="progressBar"></div></div>
    <div id="status-msg">Initializing...</div>

    <div class="search-row">
        <div class="search-wrapper" onclick="event.stopPropagation()">
            <input type="text" id="playerSearch" class="search-input" placeholder="Search Rank 1-100 by Name or ID..." oninput="handleSearchInput(this.value)">
            <div id="searchDropdown" class="search-dropdown"></div>
        </div>
    </div>
</div>

<div id="podiumArea" class="podium-container"></div>

<div class="sticky-wrapper">
    <div class="unified-container">
        <div class="metrics-island">
            <div class="metric-row">
                <button class="metric-btn active" onclick="setSort('H - Power', this)">Power</button>
                <button class="metric-btn" onclick="setSort('Merits', this)">Merits</button>
                <button class="metric-btn" onclick="setSort('M/P', this)">M/P %</button>
                <button class="metric-btn" onclick="setSort('Kills', this)">Total Kills</button>
                <button class="metric-btn" onclick="setSort('Deads', this)">Total Deads</button>
                <button class="metric-btn" onclick="setSort('Heals', this)">Total Heals</button>
                <button class="metric-btn" onclick="setSort('RSS', this)">Total Resources</button>
            </div>
            <div id="extraMetrics" class="expand-rows">
                <div class="metric-row">
                    <button class="metric-btn" onclick="setSort('T1 Kills', this)">T1 Kills</button>
                    <button class="metric-btn" onclick="setSort('T2 Kills', this)">T2 Kills</button>
                    <button class="metric-btn" onclick="setSort('T3 Kills', this)">T3 Kills</button>
                    <button class="metric-btn" onclick="setSort('T4 Kills', this)">T4 Kills</button>
                    <button class="metric-btn" onclick="setSort('T5 Kills', this)">T5 Kills</button>
                </div>
                <div class="metric-row">
                    <button class="metric-btn" onclick="setSort('Gold', this)">Gold</button>
                    <button class="metric-btn" onclick="setSort('Wood', this)">Wood</button>
                    <button class="metric-btn" onclick="setSort('Ore', this)">Ore</button>
                    <button class="metric-btn" onclick="setSort('Mana', this)">Mana</button>
                </div>
            </div>
            <div class="toggle-trigger" onclick="toggleMetrics()">
                <svg id="arrowIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="transition:0.3s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        </div>
    </div>
</div>

<div class="unified-container">
    <div id="playerGrid"></div>
</div>

<script>
    // --- SUPABASE CONFIGURATION ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU"; 
    const BUCKET_DATA = "kvk-data";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- STATE ---
    let currentMode = 'total'; 
    let fullFileList = []; 
    let sosMap = {}; 
    let processedData = []; 
    let top100Data = []; 
    let currentSortKey = 'H - Power';

    const headerDisplayMap = {
        "H - Power": "Power", "Merits": "Merits", "M/P": "M/P Ratio", "Kills": "Total Kills", "Deads": "Total Deads", "Heals": "Total Heals", "RSS": "Resources Gathered",
        "T1 Kills": "T1 Kills", "T2 Kills": "T2 Kills", "T3 Kills": "T3 Kills", "T4 Kills": "T4 Kills", "T5 Kills": "T5 Kills",
        "Gold": "Gold Gathered", "Wood": "Wood Gathered", "Ore": "Ore Gathered", "Mana": "Mana Gathered"
    };

    // --- CACHE BUSTING FETCH HELPER ---
    async function fetchLatest(path) {
        const url = `${SUPABASE_URL}/storage/v1/object/authenticated/${BUCKET_DATA}/${path}?t=${Date.now()}`;
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Cache-Control': 'no-cache'
            }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status} for ${path}`);
        return response;
    }

    // --- INITIALIZATION ---
    window.onload = async () => {
        try {
            updateProgress(10, "Fetching Metadata...");
            const [sRes, fRes] = await Promise.all([
                fetchLatest('Players/SosNames.json'),
                fetchLatest('Players/files.json')
            ]);
            
            sosMap = await sRes.json();
            fullFileList = await fRes.json();
            
            populateSelectors();
            setMode('total');
        } catch (e) { 
            console.error(e); 
            document.getElementById('status-msg').innerText = "Initialization Failed.";
        } finally { 
            hideLoading();
        }
    };

    function updateProgress(pct, text) {
        const bar = document.getElementById('progressBar');
        const container = document.getElementById('progressContainer');
        const status = document.getElementById('status-msg');
        if (container) container.style.display = 'block';
        if (bar) bar.style.width = pct + '%';
        if (status && text) status.innerText = text;
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                document.getElementById('progressContainer').style.display = 'none';
            }, 300);
        }
    }

    function populateSelectors() {
        const createOpts = (el) => {
            el.innerHTML = '';
            [...fullFileList].reverse().forEach(f => {
                const opt = document.createElement('option'); opt.value = f; const d = f.replace('.csv','');
                opt.textContent = sosMap[d] ? `${sosMap[d]} (${d})` : d; el.appendChild(opt);
            });
        };
        createOpts(document.getElementById('fileSelector')); createOpts(document.getElementById('startSelector')); createOpts(document.getElementById('endSelector'));
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('modeTotal').classList.toggle('active', mode === 'total');
        document.getElementById('modeDiff').classList.toggle('active', mode === 'diff');
        document.getElementById('singleSelectArea').style.display = mode === 'total' ? 'block' : 'none';
        document.getElementById('doubleSelectArea').style.display = mode === 'diff' ? 'flex' : 'none';
        refreshData();
    }

    // --- DATA HANDLING ---
    async function refreshData() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) { overlay.style.display = 'flex'; overlay.style.opacity = '1'; }
        
        const file = currentMode === 'total' ? document.getElementById('fileSelector').value : document.getElementById('endSelector').value;
        const startFile = document.getElementById('startSelector').value;

        try {
            if (currentMode === 'total') {
                updateProgress(20, `Downloading ${file}...`);
                const res = await fetchLatest(`Players/${file}`);
                const csvText = await res.text();
                
                updateProgress(60, "Parsing Data...");
                const result = Papa.parse(csvText, { header: true, skipEmptyLines: true });
                processedData = result.data;
            } else {
                updateProgress(10, `Downloading snapshots...`);
                const [sRes, eRes] = await Promise.all([
                    fetchLatest(`Players/${startFile}`), 
                    fetchLatest(`Players/${file}`)
                ]);
                
                updateProgress(50, "Parsing Season Snapshots...");
                const sData = Papa.parse(await sRes.text(), { header: true, skipEmptyLines: true }).data;
                const eData = Papa.parse(await eRes.text(), { header: true, skipEmptyLines: true }).data;
                
                updateProgress(80, "Calculating Differentials...");
                const sMap = new Map(sData.map(p => [p["Lord ID"], p]));
                processedData = eData.map(pEnd => {
                    let row = { ...pEnd }; 
                    const pStart = sMap.get(pEnd["Lord ID"]);
                    Object.keys(headerDisplayMap).forEach(h => {
                        row[h] = cleanNum(pEnd[h]) - (pStart ? cleanNum(pStart[h]) : 0);
                    });
                    return row;
                });
            }
            updateTop100();
            updateProgress(100, "Standings Updated");
            setTimeout(hideLoading, 500);
        } catch (e) { 
            console.error(e); 
            document.getElementById('status-msg').innerText = "Error: File missing or access denied.";
        }
    }

    function updateTop100() {
        let fullSorted = [...processedData].sort((a, b) => cleanNum(b[currentSortKey]) - cleanNum(a[currentSortKey]));
        top100Data = fullSorted.slice(0, 100).map((p, index) => ({ ...p, globalRank: index + 1 }));
        renderUI();
    }

    // --- UI LOGIC ---
    function handleSearchInput(val) {
        const query = val.toLowerCase().trim(); const dropdown = document.getElementById('searchDropdown');
        if (query.length < 2) { dropdown.style.display = 'none'; renderUI(); return; }
        const matches = top100Data.filter(p => (p.Name && p.Name.toLowerCase().includes(query)) || (p["Lord ID"] && p["Lord ID"].toLowerCase().includes(query))).slice(0, 10);
        if (matches.length > 0) {
            dropdown.innerHTML = matches.map(p => `<div class="dropdown-item" onclick="selectPlayer('${p.Name.replace(/'/g, "\\'")}')"><span class="d-name" style="font-weight:900;">${p.Name}</span><span style="font-size:0.7rem; color:var(--muted)">Rank #${p.globalRank}</span></div>`).join('');
            dropdown.style.display = 'block';
        } else { dropdown.style.display = 'none'; }
        renderUI();
    }

    function selectPlayer(name) { document.getElementById('playerSearch').value = name; hideDropdown(); renderUI(); }
    function hideDropdown() { document.getElementById('searchDropdown').style.display = 'none'; }

    function renderUI() {
        const query = document.getElementById('playerSearch').value.toLowerCase().trim();
        const podium = document.getElementById('podiumArea');
        const grid = document.getElementById('playerGrid');
        let filtered = query ? top100Data.filter(p => (p.Name && p.Name.toLowerCase().includes(query)) || (p["Lord ID"] && p["Lord ID"].toLowerCase().includes(query))) : top100Data;

        if (!query) {
            podium.style.display = 'grid';
            const top3 = top100Data.slice(0, 3);
            const order = [1, 0, 2]; // 2nd, 1st, 3rd layout
            
            podium.innerHTML = order.map(idx => {
                const p = top3[idx]; if(!p) return '';
                const mainVal = cleanNum(p[currentSortKey]);
                const formatted = (currentSortKey === "M/P" ? (mainVal * 100).toFixed(2) + '%' : Math.floor(mainVal).toLocaleString());
                
                return `<div class="podium-wrapper rank-${idx+1}-wrapper">
                    <div class="podium-card">
                        <div class="rank-num-display">0${idx+1}</div>
                        <span class="pod-name">${p.Name}</span>
                        <div class="pod-meta">KD ${p.KD || '??'} • ${p.Ally || '??'}</div>
                        <div class="pod-stat-box">
                            <span class="pod-val">${formatted}</span>
                            <span class="pod-lbl">${headerDisplayMap[currentSortKey]}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
            renderGrid(top100Data.slice(3, 100), grid);
        } else {
            podium.style.display = 'none';
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results"><h3>Player Not Found</h3><p>This player wasn't in the Top 100 for <strong>${headerDisplayMap[currentSortKey]}</strong>.</p></div>`;
            } else { renderGrid(filtered, grid); }
        }
    }

    function renderGrid(data, container) {
        container.innerHTML = data.map(p => {
            const mainVal = cleanNum(p[currentSortKey]);
            const formatted = (currentSortKey === "M/P" ? (mainVal * 100).toFixed(2) + '%' : Math.floor(mainVal).toLocaleString());
            return `<div class="player-card">
                <div class="rank-badge">RANK ${p.globalRank}</div>
                <span class="p-name">${p.Name || 'Unknown'}</span>
                <span class="p-id">LORD ID: ${p["Lord ID"] || 'N/A'}</span>
                <div class="p-meta">KD ${p.KD || '??'} • ${p.Ally || '??'}</div>
                <div class="metric-focus-box">
                    <span class="focus-label">${headerDisplayMap[currentSortKey]}</span>
                    <div class="focus-value">${formatted}${currentMode === 'diff' ? `<span class="diff-tag ${mainVal >= 0 ? 'pos' : 'neg'}">${mainVal >= 0 ? '▲' : '▼'}</span>` : ''}</div>
                </div>
            </div>`;
        }).join('');
    }

    function setSort(key, btn) {
        currentSortKey = key; document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); updateTop100();
    }

    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function toggleMetrics() {
        const row = document.getElementById('extraMetrics'); const arrow = document.getElementById('arrowIcon');
        row.classList.toggle('open'); arrow.style.transform = row.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }
</script>
</body>
</html>
