<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom History Tracker</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- COLOR & VARIABLE CONFIGURATION --- */
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --text: #f8fafc; 
            --muted: #94a3b8;
            --chart-grid: rgba(255, 255, 255, 0.05);
        }

        /* --- BASE STYLES --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        /* --- HEADER SECTION --- */
        .header { 
            background: var(--glass); 
            backdrop-filter: blur(15px);
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border); 
            margin-bottom: 20px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            width: 100%; 
            max-width: 350px;
        }
        
        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            width: 100%; 
        }

        .alliance-label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: var(--muted); 
            font-weight: 800; 
            letter-spacing: 0.1em; 
        }

        input { 
            padding: 14px; 
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            font-size: 1rem; 
            width: 100%; 
            outline: none; 
            text-align: center;
            box-sizing: border-box;
            color: white;
            font-weight: 600;
        }
        input:focus { border-color: var(--primary); }
        
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: 0.2s;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* --- STICKY INFO --- */
        .sticky-info {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            margin-bottom: 25px;
            text-align: center;
        }
        
        #allianceName { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: -1px; }

        /* --- CHART GRID --- */
        .charts-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); 
            gap: 25px; 
        }
        
        .chart-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border);
            height: 400px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #status { 
            text-align: center; 
            margin-bottom: 15px; 
            font-weight: 800; 
            color: var(--muted); 
            font-size: 0.75rem; 
            text-transform: uppercase;
        }
        
        /* --- RESPONSIVE --- */
        @media (max-width: 1200px) { 
            .header { padding-top: 20px; }
            .charts-grid { grid-template-columns: 1fr; }
            .chart-card { height: 350px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="home-link">← Kingdom Hub</a>

<div class="container">
    <div class="header">
        <div class="search-area">
            <div class="input-group">
                <label class="alliance-label">Kingdom ID or Alliance Name</label>
                <input type="text" id="kdInput" placeholder="EX: 509 or -I-" onkeypress="if(event.key==='Enter') fetchAllData()">
            </div>
            <button onclick="fetchAllData()">Generate Graphs</button>
        </div>
    </div>

    <div class="sticky-info">
        <div class="alliance-label">Active Alliance Record</div>
        <div id="allianceName">---</div>
    </div>

    <div id="status">System Standby</div>

    <div class="charts-grid">
        <div class="chart-card"><canvas id="chart-Power"></canvas></div>
        <div class="chart-card"><canvas id="chart-Merits"></canvas></div>
        <div class="chart-card"><canvas id="chart-MP"></canvas></div>
        <div class="chart-card"><canvas id="chart-Kills"></canvas></div>
        <div class="chart-card"><canvas id="chart-Deads"></canvas></div>
        <div class="chart-card"><canvas id="chart-Heals"></canvas></div>
        <div class="chart-card"><canvas id="chart-CH25"></canvas></div>
        <div class="chart-card"><canvas id="chart-CH25AP"></canvas></div>
    </div>
</div>

<script>
    let fileList = [];
    let charts = {};
    const metrics = [
        { id: 'Power', label: 'Power', index: 2, showRaw: true },
        { id: 'Merits', label: 'Merits', index: 3, showRaw: true },
        { id: 'MP', label: 'M/P', index: 4, isPercent: true, showRaw: false },
        { id: 'Kills', label: 'Kills', index: 5, showRaw: true },
        { id: 'Deads', label: 'Deads', index: 6, showRaw: true },
        { id: 'Heals', label: 'Heals', index: 7, showRaw: true },
        { id: 'CH25', label: 'CH25', index: 8, showRaw: false },
        { id: 'CH25AP', label: 'CH25 AP', index: 9, showRaw: true }
    ];

    function formatValue(value, isPercent) {
        if (value === null) return "N/A";
        if (isPercent) return (value * 100).toFixed(2) + '%';
        if (value >= 1e9) return (value / 1e9).toFixed(2) + 'B';
        if (value >= 1e6) return (value / 1e6).toFixed(2) + 'M';
        return value.toLocaleString();
    }

    function formatRaw(value) {
        if (value === null) return "N/A";
        return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    async function init() {
        try {
            const response = await fetch('Pull/files.json');
            fileList = await response.json();
            fileList.sort(); 
            setupCharts();
            document.getElementById('status').textContent = `LIVE: ${fileList.length} SNAPSHOTS LOADED`;
        } catch (err) {
            document.getElementById('status').textContent = "ERROR: FILES.JSON NOT FOUND";
        }
    }

    function setupCharts() {
        metrics.forEach(m => {
            const ctx = document.getElementById(`chart-${m.id}`).getContext('2d');
            charts[m.id] = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: [], 
                    datasets: [{ 
                        label: m.label, 
                        data: [], 
                        alliances: [], 
                        borderColor: '#3b82f6', 
                        backgroundColor: 'rgba(59, 130, 246, 0.1)', 
                        fill: true, 
                        tension: 0.3, 
                        pointRadius: 5, 
                        pointBackgroundColor: '#3b82f6',
                        borderWidth: 3
                    }] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        title: { 
                            display: true, 
                            text: m.label, 
                            color: '#fff',
                            font: { size: 16, weight: '900' } 
                        }, 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#3b82f6',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            padding: 12,
                            callbacks: {
                                title: function(tooltipItems) {
                                    const index = tooltipItems[0].dataIndex;
                                    const date = tooltipItems[0].label;
                                    const alliance = tooltipItems[0].dataset.alliances[index];
                                    return `${date} | ${alliance || '---'}`;
                                },
                                label: function(context) {
                                    const val = context.parsed.y;
                                    const formatted = formatValue(val, m.isPercent);
                                    let label = ` ${context.dataset.label}: ${formatted}`;
                                    if (m.showRaw) label += ` | ${formatRaw(val)}`;
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { 
                                color: '#94a3b8',
                                callback: function(value) { return formatValue(value, m.isPercent); }, 
                                font: { weight: '600', size: 10 } 
                            }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { 
                                color: '#94a3b8',
                                font: { weight: '600', size: 10 } 
                            }
                        }
                    }
                }
            });
        });
    }

    async function fetchAllData() {
        const userInput = document.getElementById('kdInput').value.trim().toLowerCase();
        if (!userInput) return;

        document.getElementById('allianceName').textContent = "---";
        document.getElementById('status').textContent = "SEARCHING DATABASE...";

        let targetId = null;

        try {
            const lastFileName = fileList[fileList.length - 1];
            const response = await fetch(`Pull/${lastFileName}`);
            const csvText = await response.text();
            const results = Papa.parse(csvText, { skipEmptyLines: true });
            
            const match = results.data.find(r => 
                String(r[0]).trim().toLowerCase() === userInput || 
                String(r[1]).trim().toLowerCase() === userInput
            );

            if (match) {
                targetId = String(match[0]).trim();
                document.getElementById('allianceName').textContent = match[1] || "---";
            } else {
                if (!isNaN(userInput)) {
                    targetId = userInput;
                } else {
                    document.getElementById('status').textContent = "TARGET NOT FOUND IN LATEST SNAPSHOT";
                    return;
                }
            }
        } catch (e) { console.error(e); }

        document.getElementById('status').textContent = `RECONSTRUCTING HISTORY FOR ID: ${targetId}...`;
        
        const fetchPromises = fileList.map(async (fileName) => {
            try {
                const response = await fetch(`Pull/${fileName}`);
                const csvText = await response.text();
                const results = Papa.parse(csvText, { skipEmptyLines: true });
                const row = results.data.find(r => String(r[0]).trim() === targetId);
                
                if (row) {
                    const point = { fileName: fileName, alliance: row[1] || "---", vals: {} };
                    metrics.forEach(m => {
                        let val = row[m.index];
                        if (typeof val === 'string') {
                            val = val.replace(/,/g, '');
                            if (val.includes('%')) val = parseFloat(val) / 100;
                            else val = parseFloat(val);
                        }
                        point.vals[m.id] = isNaN(val) ? null : val;
                    });
                    return point;
                }
            } catch (e) { console.error(e); }
            return null;
        });

        const results = await Promise.all(fetchPromises);
        const history = results.filter(r => r !== null);

        if (history.length > 0) {
            const labels = history.map(h => h.fileName.replace('.csv', ''));
            const alliances = history.map(h => h.alliance);

            metrics.forEach(m => {
                charts[m.id].data.labels = labels;
                charts[m.id].data.datasets[0].data = history.map(h => h.vals[m.id]);
                charts[m.id].data.datasets[0].alliances = alliances;
                charts[m.id].update();
            });
            document.getElementById('status').textContent = `DISPLAYING ${history.length} DATA POINTS FOR ID: ${targetId}`;
        } else {
            document.getElementById('status').textContent = "NO HISTORICAL DATA FOUND";
        }
    }

    window.onload = init;
</script>
</body>
</html>
