<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Official Teams Dashboard</title>

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. SCROLLBARS --- */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { 
            display: none; 
        }

        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { 
                display: flex; 
            }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- BASE STYLING --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        .unified-container { 
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 0 25px; 
            box-sizing: border-box; 
            width: 100%; 
        }

        .header-top-row { 
            margin-top: 25px; 
            margin-bottom: 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            width: 100%; 
        }

        .nav-side-box { 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        .nav-side-box.right { 
            justify-content: flex-end; 
            gap: 10px; 
        }

        .tools-glass-row { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 12px 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 20px; 
        }

        .search-center-box { 
            width: 500px; 
            display: flex; 
            justify-content: center; 
        }

        .search-input { 
            width: 100%; 
            padding: 10px 18px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
            font-size: 1rem;
            font-weight: 600;
        }
        
        .sticky-wrapper { 
            position: sticky; 
            top: 15px; 
            z-index: 1000; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            margin-bottom: 50px; 
            padding: 0 25px; 
            box-sizing: border-box; 
        }

        .metrics-island { 
            width: 100%; 
            max-width: 1350px; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 28px; 
            padding: 12px 0; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .metric-row { 
            display: flex; 
            gap: 8px; 
            justify-content: center; 
            flex-wrap: wrap; 
            padding: 4px 15px; 
            width: 100%; 
        }

        .metric-btn { 
            padding: 10px 18px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            cursor: pointer; 
            color: var(--muted); 
            transition: 0.2s; 
            text-transform: uppercase; 
        }

        .metric-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary-glow); 
        }
        
        .expand-rows { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s ease-out; 
            width: 100%; 
        }

        .expand-rows.open { 
            max-height: 350px; 
            margin-top: 10px; 
            border-top: 1px solid var(--glass-border); 
            padding-top: 10px; 
        }

        .toggle-trigger { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            cursor: pointer; 
            color: var(--muted); 
            padding-top: 8px; 
            transition: 0.3s; 
        }

        /* --- CARDS & TABLES --- */
        #teamsContainer { 
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
            width: 100%; 
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 0 25px 60px 25px; 
            box-sizing: border-box; 
        }

        .team-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 25px; 
        }

        .team-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }

        .name-input { 
            font-size: 1.6rem; 
            font-weight: 950; 
            border: 1px solid transparent; 
            background: transparent; 
            color: var(--primary); 
            padding: 0px 8px; 
            border-radius: 6px; 
            width: 100%; 
            outline: none; 
            box-sizing: border-box;
            word-wrap: break-word; 
        }

        .note-display { 
            font-size: 0.9rem; 
            color: var(--muted); 
            font-style: italic; 
            margin-bottom: 10px; 
            padding-left: 8px; 
        }

        .note-input { 
            width: 100%; 
            max-width: 450px; 
            margin-bottom: 10px; 
            padding: 6px 12px; 
            border: 1px solid var(--glass-border); 
            border-radius: 10px; 
            font-size: 0.85rem; 
            background: rgba(0,0,0,0.2); 
            color: var(--muted); 
            outline: none; 
            display: block;
        }

        .table-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            border-radius: 15px; 
        } 

        table { 
            width: auto; 
            border-collapse: separate; 
            border-spacing: 0 4px; 
            table-layout: fixed !important; 
            min-width: 2500px; 
        }

        th { 
            text-align: center !important; 
            padding: 15px 2px; 
            color: var(--muted); 
            font-size: 0.9rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--glass-border); 
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        th:hover {
            color: var(--primary);
        }

        td { 
            padding: 15px 2px; 
            text-align: center !important; 
            font-size: 1rem; 
            background: rgba(255,255,255,0.02); 
            border-top: 1px solid var(--glass-border); 
            border-bottom: 1px solid var(--glass-border); 
        }

        /* --- STICKY COLUMN POSITIONS --- */
        .col-del, .drag-handle {
            position: sticky !important;
            z-index: 40;
            background-color: #0f172a !important;
            width: 30px !important;
            min-width: 30px !important;
            text-align: center !important;
        }
        .col-del { left: 0; }
        .drag-handle { left: 30px; opacity: 0.3; cursor: grab; }

        .sticky-col-rank {
            position: sticky !important;
            left: 0; 
            z-index: 30;
            background-color: #1e293b !important; 
            width: 60px !important;
            min-width: 60px !important;
            border-right: 1px solid var(--glass-border);
            text-align: center !important;
        }
        .sticky-col-ally {
            position: sticky !important;
            left: 60px !important; 
            z-index: 30;
            background-color: #0f172a !important; 
            width: 140px !important;
            min-width: 140px !important;
            text-align: center !important;
            border-right: none !important;
        }
        .sticky-col-kd {
            position: sticky !important;
            left: 200px !important; 
            z-index: 30; 
            background-color: #1e293b !important; 
            width: 70px !important;
            min-width: 70px !important;
            border-right: 1px solid var(--glass-border);
            text-align: center !important;
            border-left: none !important;
        }

        /* Admin Mode Offsets (+60px for buttons) */
        .admin-active .sticky-col-rank { left: 60px !important; }
        .admin-active .sticky-col-ally { left: 120px !important; }
        .admin-active .sticky-col-kd { left: 260px !important; }

        th.sticky-col-rank, th.sticky-col-kd, th.sticky-col-ally {
            z-index: 31;
            background-color: #1e293b !important; 
            text-align: center !important;
        }

        .summary-row td { 
            background: rgba(168, 85, 247, 0.1) !important; 
            color: var(--accent) !important; 
            font-weight: 950 !important; 
            border-color: rgba(168, 85, 247, 0.2); 
            text-align: center !important;
        }

        .summary-row .sticky-col-rank, .summary-row .sticky-col-kd, .summary-row .sticky-col-ally {
            background-color: #191932 !important; 
        }

        .highlight-sort { 
            background: rgba(59, 130, 246, 0.15) !important; 
            color: white !important; 
            font-weight: 950 !important; 
        }

        .paragon-text { 
            color: rgb(245, 158, 11) !important; 
            font-weight: 900 !important; 
            text-decoration: none !important; 
        }

        .id-input { 
            width: 100%; 
            max-width: 60px; 
            background: rgba(0,0,0,0.5) !important; 
            border: 1px solid var(--glass-border); 
            color: #3b82f6; 
            text-align: center; 
            font-weight: 800; 
            border-radius: 6px; 
            outline: none; 
            padding: 5px 0;
            box-sizing: border-box; 
        }

        /* --- BUTTONS --- */
        .btn { 
            padding: 8px 14px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            border: 1px solid var(--glass-border); 
            font-size: 0.85rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            background: var(--glass); 
            color: white; 
            text-transform: uppercase; 
            transition: 0.2s; 
        }
        .btn:hover { 
            background: var(--primary); 
            transform: translateY(-2px); 
        }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: white; }
        .btn-green { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: white; }

        #loadingOverlay { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.3s; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="hideDropdown()">

<div id="rotate-hint">

<div class="unified-container">

        <input type="email" id="email" class="modal-input" placeholder="Admin Email" style="width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white;">
        <input type="password" id="pass" class="modal-input" placeholder="Password" style="width: 100%; margin-bottom: 20px; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white;" onkeydown="if(event.key==='Enter') login()">

<script>
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isAdmin = false;
    let masterData = new Map();
    let allTeamsData = {};
    let currentTeams = [];
    let selectedFileName = "";
    let currentSort = { field: 'teamName', direction: 'desc' };
    let currentRegistrations = {};
    let currentGenPools = {}; 
    let activeTroopKeys = [];
    let sosMap = {};
    let fullFileList = []; 

    const sortLabels = { 
        teamName: 'Team Name', power: 'Power', merits: 'Merits', mp: 'M/P %', mpRank: 'M/P R', kills: 'Kills', deads: 'Deads', totalCh25: 'CH25', avgAp: 'CH25 AVG',
        "10-20M Merits": "10-20M M", "20-30M Merits": "20-30M M", "30-40M Merits": "30-40M M", "40-50M Merits": "40-50M M", "50M+ Merits": "50M+ M",
        "10M+ Merits": "10M+ M", "20M+ Merits": "20M+ M", "30M+ Merits": "30M+ M", "40M+ Merits": "40M+ M"
    };
    
    const possibleTroopHeaders = [
        "10M","20M","30M","40M","50M","60M+","80M+","100M+","125M+","150M+","200M+","250M+","300M+",
        "10-20M","20-40M","40-60M","60-80M","80-100M","100-125M","125-150M","150-200M","200-250M","250-300M",
        "10-20M Merits", "20-30M Merits", "30-40M Merits", "40-50M Merits", "50M+ Merits",
        "10M+ Merits", "20M+ Merits", "30M+ Merits", "40M+ Merits"
    ];

    function kdClean(val) { if (!val) return ""; return String(parseInt(parseFloat(String(val).trim()))); }
    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { 
        if (!n && n !== 0) return "0.00"; 
        const abs = Math.abs(n); 
        let s = abs >= 1e9 ? (abs / 1e9).toFixed(2) + 'B' : 
                abs >= 1e6 ? (abs / 1e6).toFixed(1) + 'M' : 
                abs.toLocaleString(); 
        return n < 0 ? "-" + s : s; 
    }
    function formatValNoDec(n) { 
        if (!n && n !== 0) return "0"; 
        const abs = Math.floor(Math.abs(n)); 
        let s = abs >= 1e6 ? (abs / 1e6).toFixed(1) + 'M' : 
                abs.toLocaleString(); 
        return n < 0 ? "-" + s : s; 
    }

    function handleSearchInput() {
        const val = document.getElementById('teamSearch').value.trim();
        if (val) window.location.hash = encodeURIComponent(val);
        else history.replaceState(null, null, ' ');
        renderAll();
    }

    function syncSearchFromHash() {
        if (window.location.hash) {
            const hashVal = decodeURIComponent(window.location.hash.substring(1));
            const searchInput = document.getElementById('teamSearch');
            if (searchInput) searchInput.value = hashVal;
        }
    }

    window.addEventListener('hashchange', () => { syncSearchFromHash(); renderAll(); });

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) { overlay.style.opacity = '0'; setTimeout(() => { overlay.style.display = 'none'; }, 300); }
    }

    function enableAdminMode() {
        isAdmin = true;
        document.body.classList.add('admin-active');
        document.getElementById('adminArea').style.display = 'flex';
        document.getElementById('loginBtn').style.display = 'none';
        renderAll();
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else { enableAdminMode(); toggleModal(false); }
    }

    async function logout() { await supabaseClient.auth.signOut(); location.reload(); }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }

    window.onload = async () => {
        try {
            syncSearchFromHash();
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) enableAdminMode();

            let v = "1.0";
            try {
                const { data: vBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('version.json?t=' + Date.now());
                v = JSON.parse(await vBlob.text()).v;
            } catch(e) {}
            window.DATA_VERSION = v;

            const [sRes, fRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/SosNames.json?v=${v}`),
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/files.json?v=${v}`)
            ]);
            
            sosMap = JSON.parse(await sRes.data.text());
            fullFileList = JSON.parse(await fRes.data.text());
            
            await fetchTeamsFromCloud(); 
            populateFileSelector();
        } catch (e) { console.error(e); } finally { hideLoading(); }
    };

    function populateFileSelector() {
        const selector = document.getElementById('fileSelector'); 
        selector.innerHTML = '';
        fullFileList.slice().reverse().forEach(file => {
            const opt = document.createElement('option'); 
            opt.value = file;
            const dateKey = file.replace(/\.csv/i, '');
            opt.textContent = sosMap[dateKey] || dateKey.toUpperCase();
            selector.appendChild(opt);
        });
        if (fullFileList.length > 0) {
            selector.value = fullFileList[fullFileList.length - 1];
            loadSelectedFile(selector.value);
        }
    }

    async function loadSelectedFile(fileName) {
        selectedFileName = fileName; 
        const cleanName = fileName.replace(/\.csv/i, '');
        const v = window.DATA_VERSION || "1.0";
        const timestamp = `?v=${v}`;
        
        try {
            const gens = ['G1', 'G2', 'G3', 'G4', 'NoG'];
            currentGenPools = {};
            await Promise.all(gens.map(async (g) => {
                try {
                    const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`Gen Pools/${cleanName}-${g}.json${timestamp}`);
                    if (data) JSON.parse(await data.text()).forEach(kd => { currentGenPools[kdClean(kd)] = g; });
                } catch(e) {}
            }));

            const [regRes, csvRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_CONFIGS).download(`SavedRegistrations/${cleanName}.json${timestamp}`),
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${fileName}${timestamp}`)
            ]);
            
            if (regRes.data) currentRegistrations = JSON.parse(await regRes.data.text()).data || {};
            
            const result = Papa.parse(await csvRes.data.text(), { header: true, skipEmptyLines: 'greedy' });
            activeTroopKeys = result.meta.fields.filter(h => possibleTroopHeaders.includes(h));
            updateSortBar(); 
            
            masterData.clear(); 
            let pool = [];
            result.data.forEach(row => {
                const id = kdClean(row.KD || row['KD#']);
                const p = cleanNum(row['Top 300 Power'] || row.Power);
                if (id && p > 0) {
                    const reg = currentRegistrations[id];
                    const obj = { 
                        kd: id, power: p, merits: cleanNum(row['Top 300 Merits'] || row.Merits), 
                        kills: cleanNum(row['Top 300 Kills'] || row.Kills), deads: cleanNum(row['Top 300 Deads'] || row.Deads), 
                        heals: cleanNum(row['Top 300 Heals'] || row.Heals), ch25: cleanNum(row['CH25']), ap: cleanNum(row['CH25 AP']), 
                        mp: p > 0 ? (cleanNum(row['Top 300 Merits'] || row.Merits)/p) : 0, 
                        class: reg ? (reg.class || "TBD") : "-", isParagon: reg?.isParagon === true, 
                        alliance: (row['#1 Ally'] || row.Alliance || "").trim() || "-", gen: currentGenPools[id] || 'NoG', raw: row 
                    };
                    masterData.set(id, obj); pool.push(obj);
                }
            });
            
            pool.sort((a,b) => b.power - a.power).forEach((d, i) => d.powerRank = i + 1);
            pool.sort((a,b) => b.mp - a.mp).forEach((d, i) => d.mpRank = i + 1);
            
            currentTeams = allTeamsData[fileName] || []; 
            syncSearchFromHash();
            renderAll();
        } catch (e) { console.error(e); }
    }

    async function fetchTeamsFromCloud() {
        try {
            const v = window.DATA_VERSION || "1.0";
            const { data } = await supabaseClient.storage.from(BUCKET_CONFIGS).download(`TeamsConfig.json?v=${v}`);
            if (data) allTeamsData = JSON.parse(await data.text());
        } catch (e) { allTeamsData = {}; }
    }

    async function saveToCloud() {
        if (!isAdmin) return;
        const btn = document.getElementById('saveStatusBtn');
        btn.textContent = "SAVING..."; btn.disabled = true;
        allTeamsData[selectedFileName] = currentTeams;
        try {
            await supabaseClient.storage.from(BUCKET_CONFIGS).upload('TeamsConfig.json', JSON.stringify(allTeamsData, null, 2), { upsert: true, contentType: 'application/json' });
            btn.textContent = "SAVED!"; setTimeout(() => btn.textContent="SAVE CLOUD", 2000);
        } catch (e) { btn.textContent="RETRY"; } finally { btn.disabled = false; }
    }

    function sortTeamIds(tIdx, field) {
        // Capture horizontal scroll of all wrappers
        const scrollMap = Array.from(document.querySelectorAll('.table-wrapper')).map(el => el.scrollLeft);

        const team = currentTeams[tIdx];
        const nextDir = team.localSortState && team.localSortState[field] === 'desc' ? 'asc' : 'desc';
        team.localSortState = {};
        team.localSortState[field] = nextDir;

        const isDesc = nextDir === 'desc';

        team.ids.sort((a, b) => {
            const d1 = masterData.get(kdClean(a));
            const d2 = masterData.get(kdClean(b));
            if (!d1 || !d2) return 0;
            let v1, v2;
            if (field === 'rank') { v1 = d1.powerRank || 99999; v2 = d2.powerRank || 99999; }
            else if (field === 'kd') { v1 = parseInt(d1.kd); v2 = parseInt(d2.kd); }
            else if (d1[field] !== undefined) { v1 = d1[field]; v2 = d2[field]; }
            else { v1 = cleanNum(d1.raw[field]); v2 = cleanNum(d2.raw[field]); }
            return isDesc ? v2 - v1 : v1 - v2;
        });

        renderAll();

        // Restore horizontal scroll
        const newWrappers = document.querySelectorAll('.table-wrapper');
        newWrappers.forEach((el, idx) => {
            if (scrollMap[idx] !== undefined) el.scrollLeft = scrollMap[idx];
        });
    }

    function renderAll() {
        // Capture scroll positions before rebuilding container
        const scrollMap = Array.from(document.querySelectorAll('.table-wrapper')).map(el => el.scrollLeft);

        const container = document.getElementById('teamsContainer');
        const sT = document.getElementById('teamSearch').value.toLowerCase().trim(); 
        const gF = document.getElementById('genSelector').value;
        container.innerHTML = '';
        
        let displayTeams = currentTeams.map((t, idx) => ({ ...t, originalIdx: idx, stats: calculateTeamTotals(t) }));
        if (gF !== 'all') displayTeams = displayTeams.filter(t => t.ids.some(id => currentGenPools[kdClean(id)] === gF));

        displayTeams.sort((a, b) => { 
            if (currentSort.field === 'teamName') {
                const cmp = a.name.localeCompare(b.name, undefined, { numeric: true });
                return currentSort.direction === 'asc' ? cmp : -cmp;
            }
            let vA = currentSort.field === 'mpRank' ? (a.stats.totalMpRank || 0) : (a.stats[currentSort.field] || (a.stats.b && a.stats.b[currentSort.field]) || 0);
            let vB = currentSort.field === 'mpRank' ? (b.stats.totalMpRank || 0) : (b.stats[currentSort.field] || (b.stats.b && b.stats.b[currentSort.field]) || 0); 
            return currentSort.direction === 'desc' ? vB - vA : vA - vB; 
        }); 
        
        if (sT) { 
            displayTeams = displayTeams.filter(t => t.name.toLowerCase().includes(sT) || t.ids.some(id => {
                const d = masterData.get(kdClean(id));
                return (d && d.alliance.toLowerCase().includes(sT)) || kdClean(id).includes(sT);
            })); 
        }

        function getArrow(team, field) {
            if (!team.localSortState || team.localSortState[field] === undefined) return "";
            return team.localSortState[field] === 'asc' ? " ▲" : " ▼";
        }
        
        displayTeams.forEach(team => {
            const tIdx = team.originalIdx;
            const sums = team.stats;
            const card = document.createElement('div'); card.className = 'team-card';
            const allTbd = team.ids.every(id => { const d = masterData.get(kdClean(id)); return !d || d.class === "TBD" || d.class === "-"; });
            
            let rowsHtml = team.ids.map((id, rowIdx) => {
                const cleanId = kdClean(id); const d = masterData.get(cleanId);
                if (!d) return `<tr>${isAdmin ? `<td class="col-del" onclick="removeRow(${tIdx}, ${rowIdx})">×</td><td class="drag-handle">≡</td>` : ''}<td class="sticky-col-rank">-</td><td class="sticky-col-ally" style="color:#ef4444;">NOT FOUND</td><td class="sticky-col-kd">${isAdmin ? `<input value="${id}" onchange="updateId(${tIdx}, ${rowIdx}, this.value)" class="id-input">` : id}</td>${!allTbd ? `<td>-</td>` : ''}<td colspan="${activeTroopKeys.length + 8}">---</td></tr>`;
                
                return `<tr>${isAdmin ? `<td class="col-del" onclick="removeRow(${tIdx}, ${rowIdx})">×</td><td class="drag-handle">≡</td>` : ''}<td class="sticky-col-rank" style="color:var(--muted); font-weight:800;">${d.powerRank || '-'}</td><td class="sticky-col-ally ${d.isParagon ? 'paragon-text' : ''}" style="font-weight:700;">${d.alliance}</td><td class="sticky-col-kd" style="color:var(--primary); font-weight:800;">${isAdmin ? `<input value="${id}" onchange="updateId(${tIdx}, ${rowIdx}, this.value)" class="id-input">` : id}</td>${!allTbd ? `<td>${d.class}</td>` : ''}<td class="${currentSort.field === 'power' ? 'highlight-sort' : ''}">${formatVal(d.power)}</td><td class="${currentSort.field === 'merits' ? 'highlight-sort' : ''}">${formatVal(d.merits)}</td><td class="${currentSort.field === 'mp' ? 'highlight-sort' : ''}">${(d.mp * 100).toFixed(2)}%</td><td class="${currentSort.field === 'mpRank' ? 'highlight-sort' : ''}">${d.mpRank || '-'}</td><td class="${currentSort.field === 'kills' ? 'highlight-sort' : ''}">${formatVal(d.kills)}</td><td class="${currentSort.field === 'deads' ? 'highlight-sort' : ''}">${formatVal(d.deads)}</td><td class="${currentSort.field === 'totalCh25' ? 'highlight-sort' : ''}">${formatValNoDec(d.ch25)}</td><td class="${currentSort.field === 'avgAp' ? 'highlight-sort' : ''}">${formatVal(d.ap)}</td>${activeTroopKeys.map(k => `<td class="${currentSort.field === k ? 'highlight-sort' : ''}">${formatValNoDec(cleanNum(d.raw[k]))}</td>`).join('')}</tr>`;
            }).join('');

            card.innerHTML = `
                <div class="team-header">
                    <div style="flex: 1;">
                        ${isAdmin ? `<input class="name-input" value="${team.name}" onchange="updateName(${tIdx}, this.value)">` : `<div class="name-input">${team.name}</div>`}
                        ${team.note ? `<div class="note-display">${team.note}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:10px;">${isAdmin ? `<button class="btn btn-green" onclick="addRow(${tIdx})">+ ROW</button><button class="btn btn-red" onclick="deleteTeam(${tIdx})">DEL TEAM</button>` : ''}</div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <colgroup>
                            ${isAdmin ? '<col style="width:30px;"><col style="width:30px;">' : ''}
                            <col style="width:60px;"><col style="width:140px;"><col style="width:70px;">
                            ${!allTbd ? '<col style="width:80px;">' : ''}
                            <col style="width:120px;"><col style="width:120px;"><col style="width:100px;"><col style="width:100px;"><col style="width:140px;"><col style="width:140px;"><col style="width:100px;"><col style="width:120px;">
                            ${activeTroopKeys.map(() => '<col style="width:100px;">').join('')}
                        </colgroup>
                        <thead>
                            <tr>
                                ${isAdmin ? '<th></th><th></th>' : ''}
                                <th class="sticky-col-rank" onclick="sortTeamIds(${tIdx}, 'rank')">RANK${getArrow(team,'rank')}</th>
                                <th class="sticky-col-ally">ALLIANCE</th>
                                <th class="sticky-col-kd" onclick="sortTeamIds(${tIdx}, 'kd')">KD#${getArrow(team,'kd')}</th>
                                ${!allTbd ? '<th>CLASS</th>' : ''}
                                <th onclick="sortTeamIds(${tIdx}, 'power')">POWER${getArrow(team,'power')}</th>
                                <th onclick="sortTeamIds(${tIdx}, 'merits')">MERITS${getArrow(team,'merits')}</th>
                                <th onclick="sortTeamIds(${tIdx}, 'mp')">M/P${getArrow(team,'mp')}</th>
                                <th onclick="sortTeamIds(${tIdx}, 'mpRank')">M/P R${getArrow(team,'mpRank')}</th>
                                <th onclick="sortTeamIds(${tIdx}, 'kills')">KILLS${getArrow(team,'kills')}</th>
                                <th onclick="sortTeamIds(${tIdx}, 'deads')">DEADS${getArrow(team,'deads')}</th>
                                <th onclick="sortTeamIds(${tIdx}, 'totalCh25')">CH25${getArrow(team,'totalCh25')}</th>
                                <th onclick="sortTeamIds(${tIdx}, 'avgAp')">AVG${getArrow(team,'avgAp')}</th>
                                ${activeTroopKeys.map(k => `<th onclick="sortTeamIds(${tIdx}, '${k}')">${k.replace('+', '').replace(' Merits', ' M')}${getArrow(team, k)}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody id="tbody-${tIdx}">${rowsHtml}</tbody>
                        <tr class="summary-row">
                            ${isAdmin ? '<td></td><td></td>' : ''}
                            <td class="sticky-col-rank"></td><td class="sticky-col-ally">TEAM TOTALS</td><td class="sticky-col-kd"></td>
                            ${!allTbd ? `<td></td>` : ''}
                            <td class="${currentSort.field === 'power' ? 'highlight-sort' : ''}">${formatVal(sums.power)}</td>
                            <td class="${currentSort.field === 'merits' ? 'highlight-sort' : ''}">${formatVal(sums.merits)}</td>
                            <td class="${currentSort.field === 'mp' ? 'highlight-sort' : ''}">${(sums.mp*100).toFixed(2)}%</td>
                            <td class="${currentSort.field === 'mpRank' ? 'highlight-sort' : ''}">${sums.totalMpRank || 0}</td>
                            <td class="${currentSort.field === 'kills' ? 'highlight-sort' : ''}">${formatVal(sums.kills)}</td>
                            <td class="${currentSort.field === 'deads' ? 'highlight-sort' : ''}">${formatVal(sums.deads)}</td>
                            <td class="${currentSort.field === 'totalCh25' ? 'highlight-sort' : ''}">${formatValNoDec(sums.totalCh25)}</td>
                            <td class="${currentSort.field === 'avgAp' ? 'highlight-sort' : ''}">${formatVal(sums.avgAp)}</td>
                            ${activeTroopKeys.map(k => `<td class="${currentSort.field === k ? 'highlight-sort' : ''}">${formatValNoDec(sums.b[k])}</td>`).join('')}
                        </tr>
                    </table>
                </div>
            `;
            container.appendChild(card); if(isAdmin) setupSortable(tIdx);
        });

        // Restore horizontal scroll immediately after building
        const newWrappers = document.querySelectorAll('.table-wrapper');
        newWrappers.forEach((el, idx) => {
            if (scrollMap[idx] !== undefined) el.scrollLeft = scrollMap[idx];
        });
    }

    function calculateTeamTotals(team) {
        let s = { power:0, merits:0, kills:0, deads:0, totalCh25:0, ap:0, count:0, totalMpRank: 0, b: {} }; 
        activeTroopKeys.forEach(k => s.b[k] = 0);
        team.ids.forEach(id => { 
            const d = masterData.get(kdClean(id)); 
            if (d) { 
                s.power += d.power; s.merits += d.merits; s.kills += d.kills; s.deads += d.deads; s.totalCh25 += d.ch25; s.ap += d.ap; s.count++; 
                if (d.mpRank) s.totalMpRank += d.mpRank; 
                activeTroopKeys.forEach(k => s.b[k] += cleanNum(d.raw[k])); 
            } 
        });
        return { ...s, mp: s.power > 0 ? (s.merits / s.power) : 0, avgAp: s.count > 0 ? (s.ap / s.count) : 0 };
    }

    function toggleTroops() { 
        const row = document.getElementById('troopRow'); const arrow = document.getElementById('arrowIcon'); 
        row.classList.toggle('open'); arrow.style.transform = row.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; 
    }

    function updateSortBar() { 
        const container = document.querySelector('#troopRow .metric-row'); if (!container) return; 
        container.innerHTML = activeTroopKeys.map(k => `<button class="metric-btn ${currentSort.field === k ? 'active' : ''}" onclick="setSort('${k}', this)">${sortLabels[k] || k.replace('+', '')}</button>`).join(''); 
    }

    function setSort(key, btn) { 
        if (currentSort.field === key) currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc';
        else { currentSort.field = key; currentSort.direction = 'desc'; }
        document.querySelectorAll('.metrics-island .metric-btn').forEach(b => {
            b.classList.remove('active'); const fk = b.id.replace('btn-', ''); if (sortLabels[fk]) b.textContent = sortLabels[fk];
        });
        if (btn) { btn.classList.add('active'); btn.textContent += (currentSort.direction === 'desc' ? ' ▼' : ' ▲'); }
        renderAll(); 
    }

    function updateId(tIdx, rIdx, val) { currentTeams[tIdx].ids[rIdx] = val; renderAll(); }
    function updateName(tIdx, val) { currentTeams[tIdx].name = val; }
    function updateNote(tIdx, val) { currentTeams[tIdx].note = val; }
    function addRow(tIdx) { currentTeams[tIdx].ids.push("000"); renderAll(); }
    function removeRow(tIdx, rIdx) { currentTeams[tIdx].ids.splice(rIdx, 1); renderAll(); }
    function deleteTeam(tIdx) { if(confirm("Delete Team?")) { currentTeams.splice(tIdx, 1); renderAll(); } }
    function addNewTeam() { currentTeams.unshift({ name: "A New Team", ids: ["000"], note: "" }); renderAll(); }

    function setupSortable(tIdx) { 
        const el = document.getElementById(`tbody-${tIdx}`);
        if(el) new Sortable(el, { handle: '.drag-handle', animation: 150, onEnd: (evt) => { 
            const moved = currentTeams[tIdx].ids.splice(evt.oldIndex, 1)[0]; 
            currentTeams[tIdx].ids.splice(evt.newIndex, 0, moved); renderAll(); 
        }}); 
    }

    function hideDropdown() {}
</script>
</body>
</html>
