<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Teams Dashboard</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); background-attachment: fixed; color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* --- UNIFIED CONTAINER SYSTEM --- */
        .unified-container { max-width: 1600px; margin: 0 auto; padding: 0 25px; box-sizing: border-box; width: 100%; }

        /* --- ROW 1: NAVIGATION (GRID CENTERED) --- */
        .header-top-row { 
            margin-top: 25px; 
            margin-bottom: 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            width: 100%;
        }
        .nav-side-box { display: flex; align-items: center; }
        .nav-side-box.right { justify-content: flex-end; gap: 10px; }
        .header-top-row .home-link { position: static; margin: 0; backdrop-filter: none; }

        /* --- ROW 2: TOOLS (GRID CENTERED) --- */
        .tools-glass-row {
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 12px 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 20px;
        }
        .search-center-box { width: 500px; display: flex; justify-content: center; }
        .search-input { width: 100%; padding: 10px 18px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; font-size: 0.9rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

        /* --- ROW 3: STICKY METRICS ISLAND --- */
        .sticky-wrapper { position: sticky; top: 15px; z-index: 1000; width: 100%; display: flex; justify-content: center; margin-bottom: 40px; padding: 0 25px; box-sizing: border-box; }
        .metrics-island { 
            width: 100%; max-width: 1550px;
            background: var(--glass); backdrop-filter: blur(20px); 
            padding: 8px 0; border: 1px solid var(--glass-border);
            border-radius: 24px; display: flex; flex-direction: column; gap: 2px;
            box-shadow: none !important;
        }

        .sort-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .sort-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--muted); transition: 0.2s; text-transform: uppercase; }
        .sort-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* --- TEAM CARDS & TABLES --- */
        #teamsContainer { display: flex; flex-direction: column; gap: 40px; width: 100%; max-width: 1600px; margin: 0 auto; padding: 0 25px 60px 25px; box-sizing: border-box; }
        .team-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; }
        .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .name-input { font-size: 1.2rem; font-weight: 900; border: 1px solid transparent; background: transparent; color: var(--primary); padding: 4px 8px; border-radius: 6px; width: 350px; outline: none; }
        .note-display { font-size: 0.85rem; color: var(--muted); font-style: italic; margin-bottom: 10px; padding-left: 8px; }
        .note-input { width: 100%; margin-bottom: 10px; padding: 8px 12px; border: 1px solid var(--glass-border); border-radius: 10px; font-size: 0.8rem; background: rgba(0,0,0,0.2); color: var(--muted); outline: none; }

        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 15px; } 
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; min-width: 1850px; }
        th { text-align: center; padding: 12px 2px; color: var(--muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px 2px; text-align: center; font-size: 0.85rem; background: rgba(255,255,255,0.02); border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); }
        
        .summary-row td { background: rgba(168, 85, 247, 0.1); color: var(--accent); font-weight: 950 !important; border-color: rgba(168, 85, 247, 0.2); }
        .highlight-sort { background: rgba(59, 130, 246, 0.15) !important; color: white !important; font-weight: 900 !important; }

        .paragon-text { color: var(--paragon) !important; font-weight: 900; text-decoration: underline; }
        .drag-handle { cursor: grab; color: var(--muted); width: 25px; opacity: 0.3; }

        .btn { padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--glass-border); font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; background: var(--glass); color: white; text-decoration: none; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: white; }

        .toggle-trigger { width: 100%; display: flex; justify-content: center; cursor: pointer; color: var(--muted); padding-bottom: 5px; }
        .troop-row-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .troop-row-container.open { max-height: 100px; padding-bottom: 5px; }

        #loadingOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loadingOverlay" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;"><div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div><style>@keyframes spin { 100% { transform: rotate(360deg); } }</style></div>

<!-- ROW 1: HEADER (HUB, TITLE, ADMIN) -->
<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box">
            <a href="index.html" class="home-link">← Kingdom Hub</a>
        </div>
        <h1 class="page-title-main">Teams (Official)</h1>
        <div class="nav-side-box right">
            <div id="adminArea" style="display:none; gap:10px;">
                <button class="btn" style="background:#a855f7; border:none;" id="saveStatusBtn" onclick="saveToCloud()">SAVE CLOUD</button>
                <button class="btn" style="background:#10b981; border:none;" onclick="addNewTeam()">+ NEW TEAM</button>
                <button class="btn" style="background:#ef4444; border:none;" onclick="logout()">LOGOUT</button>
            </div>
            <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<!-- ROW 2: TOOLS (FILE, SEARCH) -->
<div class="unified-container">
    <div class="tools-glass-row">
        <div class="nav-side-box">
            <select id="fileSelector" onchange="loadSelectedFile(this.value)" style="min-width: 150px;"></select>
        </div>
        <div class="search-center-box">
            <input type="text" id="teamSearch" class="search-input" placeholder="Search Team, Kingdom, or Alliance..." oninput="renderAll()">
        </div>
        <div class="nav-side-box right">
            <!-- Empty side to maintain grid centering -->
        </div>
    </div>
</div>

<!-- ROW 3: STICKY METRICS ISLAND -->
<div class="sticky-wrapper">
    <div class="unified-container">
        <div class="metrics-island" id="sortBar">
            <div class="sort-row">
                <button class="sort-btn active" id="nameSort" onclick="setSort('teamName', this)">Team Name</button>
                <button class="sort-btn" onclick="setSort('power', this)">Power</button>
                <button class="sort-btn" onclick="setSort('merits', this)">Merits</button>
                <button class="sort-btn" onclick="setSort('mp', this)">M/P %</button>
                <button class="sort-btn" onclick="setSort('mpRank', this)">M/P R</button>
                <button class="sort-btn" onclick="setSort('kills', this)">Kills</button>
                <button class="sort-btn" onclick="setSort('deads', this)">Deads</button>
                <button class="sort-btn" onclick="setSort('totalCh25', this)">CH25</button>
                <button class="sort-btn" onclick="setSort('avgAp', this)">CH25 AVG</button>
            </div>
            <div id="troopRow" class="troop-row-container">
                <div class="sort-row" style="padding-top:4px;">
                    <script>
                        ["10M","20M","30M","40M","50M","80M","100M","125M","150M","200M","250M","300M"].forEach(k => {
                            document.write(`<button class="sort-btn" onclick="setSort('${k}', this)">${k}</button>`);
                        });
                    </script>
                </div>
            </div>
            <div class="toggle-trigger" onclick="toggleTroops()">
                <svg id="arrowIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px; transition: transform 0.3s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        </div>
    </div>
</div>

<div id="teamsContainer"></div>

<!-- UNIFIED ADMIN MODAL -->
<div id="authModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items:center; justify-content:center; z-index:2000;">
    <div class="modal-content" style="background: #1e293b; padding: 40px; border-radius: 24px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 320px;">
        <h2 style="margin-top:0; font-weight:900;">ADMIN ACCESS</h2>
        <input type="text" id="user" class="modal-input" placeholder="Username" style="width:100%; margin-bottom:10px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:10px; color:white;">
        <input type="password" id="pass" class="modal-input" placeholder="Password" style="width:100%; margin-bottom:15px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:10px; color:white;" onkeydown="if(event.key==='Enter') login()">
        <div id="loginError" style="color: #ef4444; font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; display: none;">INVALID CREDENTIALS</div>
        <button class="btn btn-blue" style="width: 100%; padding: 15px;" onclick="login()">AUTHORIZE</button>
        <button onclick="toggleModal(false)" class="btn" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
    </div>
</div>

<script>
    const RENDER_URL = "https://kd-backend-icbu.onrender.com";
    let isAdmin = false; let masterData = new Map(); let allTeamsData = {}; let currentTeams = []; let selectedFileName = ""; let currentSort = 'teamName'; let currentRegistrations = {};
    const csvKeys = ["10M","20M","30M","40M","50M","80M+","100M+","125M+","150M+","200M+","250M+","300M+"];
    const displayKeys = ["10M","20M","30M","40M","50M","80M","100M","125M","150M","200M","250M","300M"];

    window.onload = async () => {
        try {
            const fResp = await fetch(`./Pull/files.json?cb=${Date.now()}`);
            const files = await fResp.json();
            const selector = document.getElementById('fileSelector'); selector.innerHTML = '';
            files.reverse().forEach(file => { const opt = document.createElement('option'); opt.value = file; opt.textContent = file.replace('.csv','').toUpperCase(); selector.appendChild(opt); });
            await fetchTeamsFromCloud(); if (files.length > 0) await loadSelectedFile(files[0]);
        } catch (e) { console.error(e); } finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    };

    function toggleTroops() {
        const row = document.getElementById('troopRow');
        const arrow = document.getElementById('arrowIcon');
        row.classList.toggle('open');
        arrow.style.transform = row.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    async function loadSelectedFile(fileName) {
        selectedFileName = fileName; const jsonName = fileName.replace('.csv', '.json');
        try {
            const regResp = await fetch(`${RENDER_URL}/load-registration/${jsonName}?cb=${Date.now()}`);
            const regWrapper = regResp.ok ? await regResp.json() : { kingdoms: [], data: {} };
            currentRegistrations = regWrapper.data || {}; var registeredIDs = new Set(regWrapper.kingdoms || []);
            const csvResp = await fetch(`./Pull/${fileName}?cb=${Date.now()}`);
            const result = Papa.parse(await csvResp.text(), { header: true, skipEmptyLines: 'greedy' });
            masterData.clear(); let rankedPool = [];
            result.data.forEach(row => {
                const kd = String(row.KD || row['KD#'] || "").trim(); const p = cleanNum(row['Top 300 Power'] || row.Power);
                if (kd && p > 0) {
                    const regInfo = currentRegistrations[kd];
                    const obj = { kd, power: p, merits: cleanNum(row['Top 300 Merits'] || row.Merits), kills: cleanNum(row['Top 300 Kills'] || row.Kills), deads: cleanNum(row['Top 300 Deads'] || row.Deads), heals: cleanNum(row['Top 300 Heals'] || row.Heals), ch25: cleanNum(row['CH25']), ap: cleanNum(row['CH25 AP']), mp: p > 0 ? (cleanNum(row['Top 300 Merits'] || row.Merits)/p) : 0, class: regInfo ? (regInfo.class || "TBD") : "-", isParagon: regInfo?.isParagon === true, alliance: (row['#1 Ally'] || row.Alliance || "").trim() || "-", raw: row };
                    masterData.set(kd, obj); if (registeredIDs.has(kd)) rankedPool.push(obj);
                }
            });
            rankedPool.sort((a,b) => b.power - a.power).forEach((d, i) => d.powerRank = i + 1);
            rankedPool.sort((a,b) => b.mp - a.mp).forEach((d, i) => d.mpRank = i + 1);
            currentTeams = allTeamsData[fileName] || []; renderAll();
        } catch (e) { console.error(e); }
    }

    async function fetchTeamsFromCloud() { try { const resp = await fetch(`${RENDER_URL}/load-teams?cb=${Date.now()}`); if (resp.ok) allTeamsData = await resp.json(); } catch (e) { console.error(e); } }
    async function saveToCloud() {
        if (!isAdmin) return; const btn = document.getElementById('saveStatusBtn'); btn.textContent = "SAVING..."; allTeamsData[selectedFileName] = currentTeams;
        try { const resp = await fetch(`${RENDER_URL}/save-teams`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(allTeamsData) }); if (resp.ok) { btn.textContent = "SAVED!"; setTimeout(() => btn.textContent="SAVE CLOUD", 2000); } } catch (e) { btn.textContent="RETRY"; }
    }

    function renderAll() {
        const container = document.getElementById('teamsContainer'); const sT = document.getElementById('teamSearch').value.toLowerCase().trim(); container.innerHTML = '';
        let displayTeams = currentTeams.map((t, idx) => ({ ...t, originalIdx: idx, stats: calculateTeamTotals(t) }));
        if (currentSort !== 'teamName') {
            displayTeams.sort((a, b) => { if (currentSort === 'mpRank') return a.stats.totalMpRank - b.stats.totalMpRank; let valA = a.stats[currentSort] || (a.stats.b && a.stats.b[currentSort]) || 0; let valB = b.stats[currentSort] || (b.stats.b && b.stats.b[currentSort]) || 0; if (displayKeys.includes(currentSort)) { valA = a.stats.b[csvKeys[displayKeys.indexOf(currentSort)]] || 0; valB = b.stats.b[csvKeys[displayKeys.indexOf(currentSort)]] || 0; } return valB - valA; });
        }
        if (sT) { displayTeams = displayTeams.filter(t => t.name.toLowerCase().includes(sT) || t.ids.some(id => masterData.get(String(id).trim())?.alliance.toLowerCase().includes(sT) || String(id).includes(sT))); }
        
        displayTeams.forEach(team => {
            const tIdx = team.originalIdx; const sums = team.stats; const card = document.createElement('div'); card.className = 'team-card';
            const allTbd = team.ids.every(id => { const d = masterData.get(String(id).trim()); return !d || d.class === "TBD" || d.class === "-"; });
            const dataColsSpan = 21 + (!allTbd ? 1 : 0); 
            const deleteBtn = (rIdx) => isAdmin ? `<td><button class="btn-red" style="padding:2px 8px; border:none; cursor:pointer;" onclick="removeRow(${tIdx}, ${rIdx})">×</button></td>` : '';

            let rowsHtml = team.ids.map((id, rowIdx) => {
                const d = masterData.get(String(id).trim());
                if (!d) return `<tr>${isAdmin ? '<td class="drag-handle">≡</td>' : ''}<td class="col-small">-</td><td class="col-kd">${isAdmin ? `<input value="${id}" onchange="updateId(${tIdx}, ${rowIdx}, this.value)" style="width:40px; background:transparent; border:1px solid rgba(255,255,255,0.1); color:#3b82f6; text-align:center;">` : id}</td><td colspan="${dataColsSpan}" style="color:#ef4444; text-align:center;">ID [${id}] Not Found</td>${deleteBtn(rowIdx)}</tr>`;
                return `<tr>${isAdmin ? '<td class="drag-handle">≡</td>' : ''}<td>${d.powerRank || '-'}</td><td class="col-kd">${isAdmin ? `<input value="${id}" onchange="updateId(${tIdx}, ${rowIdx}, this.value)" style="width:50px; background:transparent; border:1px solid rgba(255,255,255,0.1); color:#3b82f6; text-align:center;">` : id}</td>${!allTbd ? `<td>${d.class}</td>` : ''}<td style="text-align:center; font-weight:700;" class="${d.isParagon ? 'paragon-text' : ''}">${d.alliance}</td><td class="${currentSort === 'power' ? 'highlight-sort' : ''}">${formatVal(d.power)}</td><td class="${currentSort === 'merits' ? 'highlight-sort' : ''}">${formatVal(d.merits)}</td><td class="${currentSort === 'mp' ? 'highlight-sort' : ''}">${(d.mp * 100).toFixed(2)}%</td><td class="${currentSort === 'mpRank' ? 'highlight-sort' : ''}">${d.mpRank || '-'}</td><td class="${currentSort === 'kills' ? 'highlight-sort' : ''}">${formatVal(d.kills)}</td><td class="${currentSort === 'deads' ? 'highlight-sort' : ''}">${formatVal(d.deads)}</td><td class="${currentSort === 'totalCh25' ? 'highlight-sort' : ''}">${formatValNoDec(d.ch25)}</td><td class="${currentSort === 'avgAp' ? 'highlight-sort' : ''}">${formatVal(d.ap)}</td>${csvKeys.map((k, kIdx) => `<td class="${currentSort === displayKeys[kIdx] ? 'highlight-sort' : ''}">${formatValNoDec(cleanNum(d.raw[k]))}</td>`).join('')}${deleteBtn(rowIdx)}</tr>`;
            }).join('');

            const labelColSpan = (isAdmin ? 4 : 3) + (allTbd ? 0 : 1);
            card.innerHTML = `<div class="team-header"><div style="display:flex; flex-direction:column;"><input class="name-input" value="${team.name}" ${!isAdmin ? 'disabled' : ''} onchange="updateName(${tIdx}, this.value)">${!isAdmin && team.note ? `<div class="note-display">${team.note}</div>` : ''}${isAdmin ? `<input class="note-input" placeholder="Add note..." value="${team.note || ''}" onchange="updateNote(${tIdx}, this.value)">` : ''}</div><div style="display:flex; gap:10px;">${isAdmin ? `<button class="btn btn-green" onclick="addRow(${tIdx})">+ ROW</button><button class="btn btn-red" onclick="deleteTeam(${tIdx})">DEL</button>` : ''}</div></div><div class="table-wrapper"><table><thead><tr>${isAdmin ? '<th></th>' : ''}<th>RANK</th><th>KD#</th>${!allTbd ? '<th>CLASS</th>' : ''}<th>ALLIANCE</th><th>POWER</th><th>MERITS</th><th>M/P</th><th>M/P R</th><th>KILLS</th><th>DEADS</th><th>CH25</th><th>CH25 AVG</th>${displayKeys.map(k => `<th>${k}</th>`).join('')}${isAdmin ? '<th></th>' : ''}</tr></thead><tbody id="tbody-${tIdx}">${rowsHtml}</tbody><tr class="summary-row"><td colspan="${labelColSpan}" class="summary-label">TEAM TOTALS</td><td class="${currentSort === 'power' ? 'highlight-sort' : ''}">${formatVal(sums.power)}</td><td class="${currentSort === 'merits' ? 'highlight-sort' : ''}">${formatVal(sums.merits)}</td><td class="${currentSort === 'mp' ? 'highlight-sort' : ''}">${(sums.mp*100).toFixed(2)}%</td><td class="${currentSort === 'mpRank' ? 'highlight-sort' : ''}">${sums.totalMpRank || 0}</td><td class="${currentSort === 'kills' ? 'highlight-sort' : ''}">${formatVal(sums.kills)}</td><td class="${currentSort === 'deads' ? 'highlight-sort' : ''}">${formatVal(sums.deads)}</td><td class="${currentSort === 'totalCh25' ? 'highlight-sort' : ''}">${formatValNoDec(sums.totalCh25)}</td><td class="${currentSort === 'avgAp' ? 'highlight-sort' : ''}">${formatVal(sums.avgAp)}</td>${displayKeys.map((k, kIdx) => `<td class="${currentSort === k ? 'highlight-sort' : ''}">${formatValNoDec(sums.b[csvKeys[kIdx]])}</td>`).join('')}${isAdmin ? '<td></td>' : ''}</tr></table></div>`;
            container.appendChild(card); if(isAdmin) setupSortable(tIdx);
        });
    }

    function calculateTeamTotals(team) {
        let s = { power:0, merits:0, kills:0, deads:0, totalCh25:0, ap:0, count:0, totalMpRank: 0, b: {} }; csvKeys.forEach(k => s.b[k] = 0);
        team.ids.forEach(id => { const d = masterData.get(String(id).trim()); if (d) { s.power += d.power; s.merits += d.merits; s.kills += d.kills; s.deads += d.deads; s.totalCh25 += d.ch25; s.ap += d.ap; s.count++; if (typeof d.mpRank === 'number') s.totalMpRank += d.mpRank; csvKeys.forEach(k => s.b[k] += cleanNum(d.raw[k])); } });
        return { ...s, mp: s.power > 0 ? (s.merits / s.power) : 0, avgAp: s.count > 0 ? (s.ap / s.count) : 0 };
    }

    function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; }
    function formatVal(n) { if (!n) return "-"; if (n >= 1e9) return (n/1e9).toFixed(2) + 'B'; if (n >= 1e6) return (n/1e6).toFixed(2) + 'M'; return n.toLocaleString(); }
    function formatValNoDec(n) { return n ? Math.floor(n).toLocaleString() : "-"; }
    function setSort(key, btn) { currentSort = key; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); if (btn) btn.classList.add('active'); else if (key === 'teamName') document.getElementById('nameSort').classList.add('active'); renderAll(); }
    async function login() {
        const u = document.getElementById('user').value; const p = document.getElementById('pass').value;
        try { const resp = await fetch('Admin.json'); const data = await resp.json(); if (data.users.find(x => x.username === u && x.password === p)) { isAdmin = true; document.getElementById('adminArea').style.display = 'flex'; document.getElementById('loginBtn').style.display = 'none'; toggleModal(false); renderAll(); } else { document.getElementById('loginError').style.display = 'block'; } } catch (e) { alert("Admin.json not found."); }
    }
    function updateId(tIdx, rIdx, val) { currentTeams[tIdx].ids[rIdx] = val; renderAll(); }
    function updateName(tIdx, val) { currentTeams[tIdx].name = val; }
    function updateNote(tIdx, val) { currentTeams[tIdx].note = val; }
    function addRow(tIdx) { currentTeams[tIdx].ids.push("000"); renderAll(); }
    function removeRow(tIdx, rIdx) { currentTeams[tIdx].ids.splice(rIdx, 1); renderAll(); }
    function deleteTeam(tIdx) { if(confirm("Delete Team?")) { currentTeams.splice(tIdx, 1); renderAll(); } }
    function addNewTeam() { currentTeams.unshift({ name: "A New Group", ids: ["000"], note: "" }); renderAll(); }
    function setupSortable(tIdx) { new Sortable(document.getElementById(`tbody-${tIdx}`), { handle: '.drag-handle', animation: 150, onEnd: (evt) => { const team = currentTeams[tIdx]; const moved = team.ids.splice(evt.oldIndex, 1)[0]; team.ids.splice(evt.newIndex, 0, moved); renderAll(); } }); }
    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }
    function logout() { location.reload(); }
</script>
</body>
</html>
