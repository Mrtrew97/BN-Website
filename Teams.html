<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Mrtrew97/BN-Website/main/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BN Analytics | Official Teams Dashboard</title>
    
    <!-- GLOBAL VERSION CONTROL -->
    <script src="version.js"></script>

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="mobile.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. SCROLLBARS --- */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar { 
            display: none; 
        }

        /* --- ROTATE HINT OVERLAY --- */
        #rotate-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 900px) and (orientation: portrait) {
            #rotate-hint { 
                display: flex; 
            }
        }

        .rotate-content p {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin: 20px 0;
            color: var(--primary);
        }

        .rotate-content button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* PHONE ROTATION ANIMATION */
        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid white;
            border-radius: 6px;
            position: relative;
            margin: 0 auto;
            animation: rotatePhone 3s ease-in-out infinite;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
        }

        @keyframes rotatePhone {
            0%, 20% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(90deg); }
            80%, 100% { transform: rotate(0deg); }
        }

        /* --- BASE STYLING --- */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        .unified-container { 
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 0 25px; 
            box-sizing: border-box; 
            width: 100%; 
        }

        .header-top-row { 
            margin-top: 25px; 
            margin-bottom: 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            width: 100%; 
        }

        .nav-side-box { 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        .nav-side-box.right { 
            justify-content: flex-end; 
            gap: 10px; 
        }

        .header-top-row .home-link { 
            position: static; 
            margin: 0; 
            backdrop-filter: none; 
        }
        
        .tools-glass-row { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 12px 20px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 20px; 
        }

        .search-center-box { 
            width: 500px; 
            display: flex; 
            justify-content: center; 
        }

        .search-input { 
            width: 100%; 
            padding: 10px 18px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
        }
        
        .sticky-wrapper { 
            position: sticky; 
            top: 15px; 
            z-index: 1000; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            margin-bottom: 50px; 
            padding: 0 25px; 
            box-sizing: border-box; 
        }

        .metrics-island { 
            width: 100%; 
            max-width: 1350px; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 28px; 
            padding: 12px 0; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .metric-row { 
            display: flex; 
            gap: 8px; 
            justify-content: center; 
            flex-wrap: wrap; 
            padding: 4px 15px; 
            width: 100%; 
        }

        .metric-btn { 
            padding: 10px 18px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            cursor: pointer; 
            color: var(--muted); 
            transition: 0.2s; 
            text-transform: uppercase; 
        }

        .metric-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary-glow); 
        }
        
        .expand-rows { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s ease-out; 
            width: 100%; 
        }

        .expand-rows.open { 
            max-height: 250px; 
            margin-top: 10px; 
            border-top: 1px solid var(--glass-border); 
            padding-top: 10px; 
        }

        .toggle-trigger { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            cursor: pointer; 
            color: var(--muted); 
            padding-top: 8px; 
            transition: 0.3s; 
        }

        /* --- CARDS & TABLES --- */
        #teamsContainer { 
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
            width: 100%; 
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 0 25px 60px 25px; 
            box-sizing: border-box; 
        }

        .team-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 25px; 
        }

        .team-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }

        .name-input { 
            font-size: 1.3rem; 
            font-weight: 950; 
            border: 1px solid transparent; 
            background: transparent; 
            color: var(--primary); 
            padding: 0px 8px; 
            border-radius: 6px; 
            width: 100%; 
            outline: none; 
            box-sizing: border-box;
            word-wrap: break-word; 
        }

        input.name-input { 
            text-overflow: ellipsis; 
        }

        .note-display { 
            font-size: 0.85rem; 
            color: var(--muted); 
            font-style: italic; 
            margin-bottom: 10px; 
            padding-left: 8px; 
        }

        .note-input { 
            width: 100%; 
            margin-bottom: 10px; 
            padding: 8px 12px; 
            border: 1px solid var(--glass-border); 
            border-radius: 10px; 
            font-size: 0.8rem; 
            background: rgba(0,0,0,0.2); 
            color: var(--muted); 
            outline: none; 
        }

        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 15px; } 

        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 4px; 
            table-layout: fixed; 
            min-width: 1850px; 
        }

        th { 
            text-align: center; 
            padding: 12px 2px; 
            color: var(--muted); 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--glass-border); 
        }

        td { 
            padding: 12px 2px; 
            text-align: center; 
            font-size: 0.85rem; 
            background: rgba(255,255,255,0.02); 
            border-top: 1px solid var(--glass-border); 
            border-bottom: 1px solid var(--glass-border); 
        }

        /* --- SOLID STICKY COLUMN LOGIC --- */
        
        /* 1. Alliance Column (1st) */
        .sticky-col-ally {
            position: sticky !important;
            left: 0; 
            z-index: 30;
            background-color: #0f172a !important; /* Solid dark color */
            width: 140px;
            min-width: 140px;
            border-right: none !important; /* NO WHITE LINE */
            text-align: center !important;
        }

        /* 2. Kingdom ID Column (2nd) */
        .sticky-col-kd {
            position: sticky !important;
            left: 140px; 
            z-index: 30; 
            background-color: #0f172a !important; /* Solid dark color */
            width: 70px;
            min-width: 70px;
            border-right: none !important; /* NO WHITE LINE */
            text-align: center !important;
        }

        /* Admin buttons offset (30px + 30px = 60px) */
        .admin-active .sticky-col-ally { left: 60px !important; }
        .admin-active .sticky-col-kd { left: 200px !important; }

        th.sticky-col-kd, th.sticky-col-ally {
            z-index: 31;
            background-color: #1e293b !important; 
        }

        .summary-row td { 
            background: rgba(168, 85, 247, 0.1); 
            color: var(--accent); 
            font-weight: 950 !important; 
            border-color: rgba(168, 85, 247, 0.2); 
        }

        /* Ensure sticky cells in summary row are solid */
        .summary-row .sticky-col-kd, .summary-row .sticky-col-ally {
            background-color: #191932 !important; /* Solid Dark Purple summary */
        }

        .highlight-sort { 
            background: rgba(59, 130, 246, 0.15) !important; 
            color: white !important; 
            font-weight: 950 !important; 
        }

        .paragon-text { 
            color: rgb(245, 158, 11) !important; 
            font-weight: 900 !important; 
            text-decoration: none !important; 
        }

        /* --- THEMED ID INPUT STYLING --- */
        .id-input { 
            width: 100%; 
            max-width: 60px; 
            background: rgba(0,0,0,0.5) !important; 
            border: 1px solid var(--glass-border); 
            color: #3b82f6; 
            text-align: center; 
            font-weight: 800; 
            border-radius: 6px; 
            outline: none; 
            padding: 5px 0;
            box-sizing: border-box; 
            display: inline-block;
        }
        .id-input:focus { border-color: #3b82f6; }

        .drag-handle { cursor: grab; color: var(--muted); width: 30px !important; opacity: 0.3; }
        .col-del { width: 30px !important; color: #ef4444; font-weight: 900; cursor: pointer; }

        /* --- BUTTONS --- */
        .btn { 
            padding: 8px 14px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            border: 1px solid var(--glass-border); 
            font-size: 0.75rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            background: var(--glass); 
            color: white; 
            text-transform: uppercase; 
            transition: 0.2s; 
        }

        .btn:hover { 
            background: var(--primary); 
            transform: translateY(-2px); 
        }

        .btn-red { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: white; }
        .btn-green { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: white; }

        #loadingOverlay { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.3s; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="rotate-hint">
    <div class="rotate-content">
        <div class="phone-icon"></div>
        <p>Landscape view recommended</p>
        <button onclick="document.getElementById('rotate-hint').style.setProperty('display', 'none', 'important')">Dismiss</button>
    </div>
</div>

<div id="loadingOverlay">
    <div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
</div>

<div class="unified-container">
    <div class="header-top-row">
        <div class="nav-side-box"><a href="index.html" class="home-link btn">HOME PAGE</a></div>
        <h1 class="page-title-main">Teams (Official)</h1>
        <div class="nav-side-box right">
            <div id="adminArea" style="display:none; gap:10px;">
                <button class="btn" style="background:#a855f7;" id="saveStatusBtn" onclick="saveToCloud()">SAVE CLOUD</button>
                <button class="btn btn-green" onclick="addNewTeam()">+ NEW TEAM</button>
                <button class="btn btn-red" onclick="logout()">LOGOUT</button>
            </div>
            <button id="loginBtn" class="btn btn-blue" onclick="toggleModal(true)">ADMIN</button>
        </div>
    </div>
</div>

<div class="unified-container">
    <div class="tools-glass-row">
        <div class="nav-side-box">
            <!-- NEW GENERATION SELECTOR -->
            <select id="genSelector" onchange="handleGenFilterChange(this.value)">
                <option value="all">All Gens</option>
                <option value="G1">G1</option>
                <option value="G2">G2</option>
                <option value="G3">G3</option>
                <option value="G4">G4</option>
            </select>
            <!-- FILE SELECTOR -->
            <select id="fileSelector" onchange="loadSelectedFile(this.value)" style="min-width: 150px;"></select>
        </div>
        <div class="search-center-box">
            <input type="text" id="teamSearch" class="search-input" placeholder="Search Team, Kingdom, or Alliance..." oninput="renderAll()">
        </div>
        <div class="nav-side-box right"></div>
    </div>
</div>

<div class="sticky-wrapper">
    <div class="metrics-island">
        <div class="metric-row">
            <button class="metric-btn active" id="btn-teamName" onclick="setSort('teamName', this)">Team Name</button>
            <button class="metric-btn" id="btn-power" onclick="setSort('power', this)">Power</button>
            <button class="metric-btn" id="btn-merits" onclick="setSort('merits', this)">Merits</button>
            <button class="metric-btn" id="btn-mp" onclick="setSort('mp', this)">M/P %</button>
            <button class="metric-btn" id="btn-mpRank" onclick="setSort('mpRank', this)">M/P R</button>
            <button class="metric-btn" id="btn-kills" onclick="setSort('kills', this)">Kills</button>
            <button class="metric-btn" id="btn-deads" onclick="setSort('deads', this)">Deads</button>
            <button class="metric-btn" id="btn-totalCh25" onclick="setSort('totalCh25', this)">CH25</button>
            <button class="metric-btn" id="btn-avgAp" onclick="setSort('avgAp', this)">CH25 AVG</button>
        </div>
        <div id="troopRow" class="expand-rows">
            <div class="metric-row"></div>
        </div>
        <div class="toggle-trigger" onclick="toggleTroops()">
            <svg id="arrowIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="transition:0.3s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>
</div>

<div id="teamsContainer"></div>

<!-- Supabase Auth Modal -->
<div id="authModal">
    <div class="modal-content">
        <h2 style="margin-top:0; font-weight:900;">ADMIN ACCESS</h2>
        <input type="email" id="email" class="modal-input" placeholder="Admin Email">
        <input type="password" id="pass" class="modal-input" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
        <div id="loginError" style="color: #ef4444; font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; display: none;"></div>
        <button id="loginActionBtn" class="btn btn-blue" style="width: 100%; padding: 15px;" onclick="login()">AUTHORIZE</button>
        <button onclick="toggleModal(false)" class="btn" style="width:100%; margin-top:10px; background:transparent;">Cancel</button>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPABASE_URL = "https://rdymqphlkjzvkmtrizqc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeW1xcGhsa2p6dmttdHJpenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTk2MTIsImV4cCI6MjA4OTg3NTYxMn0.RG7KkgDihX9nFQ9IR8YEIQ9r8ghTYv4Zf0IyjZ6kOXU";
    const BUCKET_DATA = "kvk-data";
    const BUCKET_CONFIGS = "configs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- STATE ---
    let isAdmin = false;
    let masterData = new Map();
    let allTeamsData = {};
    let currentTeams = [];
    let selectedFileName = "";
    let currentSort = { field: 'teamName', direction: 'desc' };
    let currentRegistrations = {};
    let activeTroopKeys = [];
    let sosMap = {};
    let gPoolMap = {}; 
    let fullFileList = []; 

    const sortLabels = { teamName: 'Team Name', power: 'Power', merits: 'Merits', mp: 'M/P %', mpRank: 'M/P R', kills: 'Kills', deads: 'Deads', totalCh25: 'CH25', avgAp: 'CH25 AVG' };
    
    const possibleTroopHeaders = [
        "10M","20M","30M","40M","50M","60M+","80M+","100M+","125M+","150M+","200M+","250M+","300M+",
        "10-20M","20-40M","40-60M","60-80M","80-100M","100-125M","125-150M","150-200M","200-250M","250-300M"
    ];

    function kdClean(val) {
        if (!val) return "";
        return String(parseInt(parseFloat(String(val).trim())));
    }

    function updateProgress(pct, text) {
        const bar = document.getElementById('progressBar');
        const container = document.getElementById('progressContainer');
        const status = document.getElementById('status-msg');
        if (container) container.style.display = 'block';
        if (bar) bar.style.width = pct + '%';
        if (status && text) status.innerText = text;
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => { 
                overlay.style.display = 'none'; 
            }, 300);
        }
    }

    function enableAdminMode() {
        isAdmin = true;
        document.body.classList.add('admin-active');
        document.getElementById('adminArea').style.display = 'flex';
        document.getElementById('loginBtn').style.display = 'none';
        renderAll();
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const errorDiv = document.getElementById('loginError');
        const btn = document.getElementById('loginActionBtn');
        
        errorDiv.style.display = 'none';
        btn.textContent = "AUTHORIZING...";
        btn.disabled = true;
        
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) { 
            errorDiv.textContent = error.message; 
            errorDiv.style.display = 'block'; 
            btn.disabled = false;
            btn.textContent = "AUTHORIZE";
        } else { 
            enableAdminMode(); 
            toggleModal(false); 
        }
    }

    async function logout() { 
        await supabaseClient.auth.signOut(); 
        location.reload(); 
    }

    window.onload = async () => {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) enableAdminMode();

            // 1. FETCH REMOTE VERSION FIRST (Always fresh)
            let v = "1.0";
            try {
                const { data: vBlob } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('version.json?t=' + Date.now());
                const vData = JSON.parse(await vBlob.text());
                v = vData.v;
                window.DATA_VERSION = v;
            } catch(e) { window.DATA_VERSION = "1.0"; }

            const timestamp = `?v=${v}`;

            const [sRes, fRes, gRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/SosNames.json' + timestamp),
                supabaseClient.storage.from(BUCKET_DATA).download('Pull/files.json' + timestamp),
                supabaseClient.storage.from(BUCKET_CONFIGS).download('GPool.json' + timestamp)
            ]);
            
            if (sRes.error) throw sRes.error;
            if (fRes.error) throw fRes.error;
            
            sosMap = JSON.parse(await sRes.data.text());
            fullFileList = JSON.parse(await fRes.data.text());
            gPoolMap = gRes.data ? JSON.parse(await gRes.data.text()) : {};
            
            await fetchTeamsFromCloud(); 
            populateFileSelector('all');

        } catch (e) { 
            console.error(e); 
        } finally { 
            hideLoading();
        }
    };

    function handleGenFilterChange(selectedGen) {
        populateFileSelector(selectedGen);
    }

    function populateFileSelector(filterGen) {
        const selector = document.getElementById('fileSelector'); 
        selector.innerHTML = '';
        
        const filteredFiles = fullFileList.filter(file => {
            if (filterGen === 'all') return true;
            const dateKey = file.replace('.csv', '');
            const fileGen = gPoolMap[dateKey] || "G2";
            return fileGen === filterGen;
        });

        filteredFiles.reverse().forEach(file => {
            const opt = document.createElement('option'); 
            opt.value = file;
            const dateKey = file.replace('.csv', '').replace('.CSV', '');
            opt.textContent = sosMap[dateKey] || dateKey.toUpperCase();
            selector.appendChild(opt);
        });
        
        if (filteredFiles.length > 0) {
            selector.value = filteredFiles[0];
            loadSelectedFile(selector.value);
        } else {
            masterData.clear();
            currentTeams = [];
            document.getElementById('teamsContainer').innerHTML = `
                <div style="text-align:center; padding:50px; color:var(--muted); font-weight:800; text-transform:uppercase;">
                    No snapshots found for ${filterGen}
                </div>`;
        }
    }

    async function loadSelectedFile(fileName) {
        selectedFileName = fileName; 
        const jsonName = fileName.replace(/\.csv/i, '.json');
        const v = window.DATA_VERSION || "1.0";
        const timestamp = `?v=${v}`;
        
        try {
            const [regRes, csvRes] = await Promise.all([
                supabaseClient.storage.from(BUCKET_CONFIGS).download(`SavedRegistrations/${jsonName}${timestamp}`),
                supabaseClient.storage.from(BUCKET_DATA).download(`Pull/${fileName}${timestamp}`)
            ]);
            
            let registeredKDs = new Set();
            if (regRes.data) {
                const regWrapper = JSON.parse(await regRes.data.text());
                currentRegistrations = regWrapper.data || {};
                if (regWrapper.kingdoms) {
                    regWrapper.kingdoms.forEach(k => registeredKDs.add(kdClean(k)));
                }
            } else {
                currentRegistrations = {};
            }
            
            if (csvRes.error) throw csvRes.error;
            const result = Papa.parse(await csvRes.data.text(), { header: true, skipEmptyLines: 'greedy' });
            
            const headers = result.meta.fields; 
            activeTroopKeys = headers.filter(h => possibleTroopHeaders.includes(h));
            updateSortBar(); 
            masterData.clear(); 
            let rankedPool = [];

            result.data.forEach(row => {
                const cleanId = kdClean(row.KD || row['KD#']);
                const p = cleanNum(row['Top 300 Power'] || row.Power);
                if (cleanId && p > 0) {
                    const regInfo = currentRegistrations[cleanId];
                    const obj = { 
                        kd: cleanId, 
                        power: p, 
                        merits: cleanNum(row['Top 300 Merits'] || row.Merits), 
                        kills: cleanNum(row['Top 300 Kills'] || row.Kills), 
                        deads: cleanNum(row['Top 300 Deads'] || row.Deads), 
                        heals: cleanNum(row['Top 300 Heals'] || row.Heals), 
                        ch25: cleanNum(row['CH25']), 
                        ap: cleanNum(row['CH25 AP']), 
                        mp: p > 0 ? (cleanNum(row['Top 300 Merits'] || row.Merits)/p) : 0, 
                        class: regInfo ? (regInfo.class || "TBD") : "-", 
                        isParagon: regInfo?.isParagon === true, 
                        alliance: (row['#1 Ally'] || row.Alliance || "").trim() || "-", 
                        raw: row 
                    };
                    masterData.set(cleanId, obj); 
                    if (registeredKDs.has(cleanId)) rankedPool.push(obj);
                }
            });
            
            rankedPool.sort((a,b) => b.power - a.power).forEach((d, i) => d.powerRank = i + 1);
            rankedPool.sort((a,b) => b.mp - a.mp).forEach((d, i) => d.mpRank = i + 1);
            
            currentTeams = allTeamsData[fileName] || []; 
            renderAll();
            
        } catch (e) { 
            console.error(e); 
        }
    }

    async function fetchTeamsFromCloud() {
        const v = window.DATA_VERSION || "1.0";
        const timestamp = `?v=${v}`;
        try {
            const { data, error } = await supabaseClient.storage.from(BUCKET_CONFIGS).download('TeamsConfig.json' + timestamp);
            if (error) { 
                allTeamsData = {}; 
                return; 
            }
            allTeamsData = JSON.parse(await data.text());
        } catch (e) { 
            allTeamsData = {}; 
        }
    }

    async function saveToCloud() {
        if (!isAdmin) return;
        const btn = document.getElementById('saveStatusBtn');
        btn.textContent = "SAVING..."; 
        btn.disabled = true;
        allTeamsData[selectedFileName] = currentTeams;
        try {
            const { error } = await supabaseClient.storage.from(BUCKET_CONFIGS)
                .upload('TeamsConfig.json', JSON.stringify(allTeamsData, null, 2), { upsert: true, contentType: 'application/json' });
            if (error) throw error;
            btn.textContent = "SAVED!"; 
            setTimeout(() => btn.textContent="SAVE CLOUD", 2000);
        } catch (e) { 
            btn.textContent="RETRY"; 
        } finally { 
            btn.disabled = false; 
        }
    }

    function renderAll() {
        const container = document.getElementById('teamsContainer');
        const sT = document.getElementById('teamSearch').value.toLowerCase().trim(); 
        container.innerHTML = '';
        
        let displayTeams = currentTeams.map((t, idx) => ({ 
            ...t, 
            originalIdx: idx, 
            stats: calculateTeamTotals(t) 
        }));
        
        displayTeams.sort((a, b) => { 
            if (currentSort.field === 'teamName') {
                const cmp = a.name.localeCompare(b.name, undefined, { numeric: true });
                return currentSort.direction === 'asc' ? cmp : -cmp;
            }
            if (currentSort.field === 'mpRank') {
                return currentSort.direction === 'asc' ? 
                       (a.stats.totalMpRank || 0) - (b.stats.totalMpRank || 0) : 
                       (b.stats.totalMpRank || 0) - (a.stats.totalMpRank || 0);
            }
            let valA = a.stats[currentSort.field] || (a.stats.b && a.stats.b[currentSort.field]) || 0;
            let valB = b.stats[currentSort.field] || (b.stats.b && b.stats.b[currentSort.field]) || 0; 
            return currentSort.direction === 'desc' ? valB - valA : valA - valB; 
        }); 
        
        if (sT) { 
            displayTeams = displayTeams.filter(t => 
                t.name.toLowerCase().includes(sT) || 
                t.ids.some(id => {
                    const d = masterData.get(kdClean(id));
                    return (d && d.alliance.toLowerCase().includes(sT)) || kdClean(id).includes(sT);
                })
            ); 
        }
        
        displayTeams.forEach(team => {
            const tIdx = team.originalIdx;
            const sums = team.stats;
            const card = document.createElement('div'); 
            card.className = 'team-card';
            
            const showRankCols = team.ids.some(id => {
                const d = masterData.get(kdClean(id));
                return d && d.powerRank !== undefined;
            });

            const allTbd = team.ids.every(id => { 
                const d = masterData.get(kdClean(id)); 
                return !d || d.class === "TBD" || d.class === "-"; 
            });
            
            let rowsHtml = team.ids.map((id, rowIdx) => {
                const cleanId = kdClean(id);
                const d = masterData.get(cleanId);
                
                if (!d) {
                    return `
                        <tr>
                            ${isAdmin ? `<td class="col-del" onclick="removeRow(${tIdx}, ${rowIdx})">×</td><td class="drag-handle">≡</td>` : ''}
                            <td class="sticky-col-ally" style="color:#ef4444;">ID [${id}] NOT FOUND</td>
                            <td class="sticky-col-kd">
                                ${isAdmin ? `<input value="${id}" onchange="updateId(${tIdx}, ${rowIdx}, this.value)" class="id-input">` : id}
                            </td>
                            ${!allTbd ? `<td>-</td>` : ''}
                            ${showRankCols ? '<td>-</td>' : ''}
                            <td colspan="${activeTroopKeys.length + 8}" style="opacity:0.5;">---</td>
                        </tr>
                    `;
                }
                
                return `
                    <tr>
                        ${isAdmin ? `<td class="col-del" onclick="removeRow(${tIdx}, ${rowIdx})">×</td><td class="drag-handle">≡</td>` : ''}
                        <td class="sticky-col-ally ${d.isParagon ? 'paragon-text' : ''}" style="font-weight:700;">${d.alliance}</td>
                        <td class="sticky-col-kd" style="color:var(--primary); font-weight:800;">
                            ${isAdmin ? `<input value="${id}" onchange="updateId(${tIdx}, ${rowIdx}, this.value)" class="id-input">` : id}
                        </td>
                        ${!allTbd ? `<td>${d.class}</td>` : ''}
                        ${showRankCols ? `<td>${d.powerRank || '-'}</td>` : ''}
                        <td class="${currentSort.field === 'power' ? 'highlight-sort' : ''}">${formatVal(d.power)}</td>
                        <td class="${currentSort.field === 'merits' ? 'highlight-sort' : ''}">${formatVal(d.merits)}</td>
                        <td class="${currentSort.field === 'mp' ? 'highlight-sort' : ''}">${(d.mp * 100).toFixed(2)}%</td>
                        ${showRankCols ? `<td class="${currentSort.field === 'mpRank' ? 'highlight-sort' : ''}">${d.mpRank || '-'}</td>` : ''}
                        <td class="${currentSort.field === 'kills' ? 'highlight-sort' : ''}">${formatVal(d.kills)}</td>
                        <td class="${currentSort.field === 'deads' ? 'highlight-sort' : ''}">${formatVal(d.deads)}</td>
                        <td class="${currentSort.field === 'totalCh25' ? 'highlight-sort' : ''}">${formatValNoDec(d.ch25)}</td>
                        <td class="${currentSort.field === 'avgAp' ? 'highlight-sort' : ''}">${formatVal(d.ap)}</td>
                        ${activeTroopKeys.map(k => `
                            <td class="${currentSort.field === k ? 'highlight-sort' : ''}">${formatValNoDec(cleanNum(d.raw[k]))}</td>
                        `).join('')}
                    </tr>
                `;
            }).join('');

            card.innerHTML = `
                <div class="team-header" style="align-items: flex-start; gap: 20px;">
                    <div style="flex: 1; min-width: 0;">
                        ${isAdmin ? 
                            `<input class="name-input" value="${team.name}" onchange="updateName(${tIdx}, this.value)">` : 
                            `<div class="name-input" style="word-wrap: break-word;">${team.name}</div>`
                        }
                        ${!isAdmin && team.note ? 
                            `<div class="note-display" style="margin-top: 8px;">${team.note}</div>` : 
                            ''
                        }
                        ${isAdmin ? 
                            `<input class="note-input" style="margin-top: 8px;" placeholder="Add note..." value="${team.note || ''}" onchange="updateNote(${tIdx}, this.value)">` : 
                            ''
                        }
                    </div>
                    <div style="display:flex; gap:10px; flex-shrink: 0; margin-top: 4px;">
                        ${isAdmin ? `
                            <button class="btn btn-green" onclick="addRow(${tIdx})">+ ROW</button>
                            <button class="btn btn-red" onclick="deleteTeam(${tIdx})">DEL TEAM</button>
                        ` : ''}
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                ${isAdmin ? '<th></th><th></th>' : ''}
                                <th class="sticky-col-ally">ALLIANCE</th>
                                <th class="sticky-col-kd">KD#</th>
                                ${!allTbd ? '<th>CLASS</th>' : ''}
                                ${showRankCols ? '<th>RANK</th>' : ''}
                                <th>POWER</th>
                                <th>MERITS</th>
                                <th>M/P</th>
                                ${showRankCols ? '<th>M/P R</th>' : ''}
                                <th>KILLS</th>
                                <th>DEADS</th>
                                <th>CH25</th>
                                <th>CH25 AVG</th>
                                ${activeTroopKeys.map(k => `<th>${k.replace('+', '')}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody id="tbody-${tIdx}">
                            ${rowsHtml}
                        </tbody>
                        <tr class="summary-row">
                            ${isAdmin ? '<td></td><td></td>' : ''}
                            <td class="sticky-col-ally" style="font-weight:950;">TEAM TOTALS</td>
                            <td class="sticky-col-kd"></td>
                            ${!allTbd ? `<td></td>` : ''}
                            ${showRankCols ? `<td></td>` : ''}
                            <td class="${currentSort.field === 'power' ? 'highlight-sort' : ''}">${formatVal(sums.power)}</td>
                            <td class="${currentSort.field === 'merits' ? 'highlight-sort' : ''}">${formatVal(sums.merits)}</td>
                            <td class="${currentSort.field === 'mp' ? 'highlight-sort' : ''}">${(sums.mp*100).toFixed(2)}%</td>
                            ${showRankCols ? `<td class="${currentSort.field === 'mpRank' ? 'highlight-sort' : ''}">${sums.totalMpRank || 0}</td>` : ''}
                            <td class="${currentSort.field === 'kills' ? 'highlight-sort' : ''}">${formatVal(sums.kills)}</td>
                            <td class="${currentSort.field === 'deads' ? 'highlight-sort' : ''}">${formatVal(sums.deads)}</td>
                            <td class="${currentSort.field === 'totalCh25' ? 'highlight-sort' : ''}">${formatValNoDec(sums.totalCh25)}</td>
                            <td class="${currentSort.field === 'avgAp' ? 'highlight-sort' : ''}">${formatVal(sums.avgAp)}</td>
                            ${activeTroopKeys.map(k => `
                                <td class="${currentSort.field === k ? 'highlight-sort' : ''}">${formatValNoDec(sums.b[k])}</td>
                            `).join('')}
                        </tr>
                    </table>
                </div>
            `;
            container.appendChild(card); 
            if(isAdmin) setupSortable(tIdx);
        });
    }

    function calculateTeamTotals(team) {
        let s = { power:0, merits:0, kills:0, deads:0, totalCh25:0, ap:0, count:0, totalMpRank: 0, b: {} }; 
        activeTroopKeys.forEach(k => s.b[k] = 0);
        team.ids.forEach(id => { 
            const cleanId = kdClean(id);
            const d = masterData.get(cleanId); 
            if (d) { 
                s.power += d.power; 
                s.merits += d.merits; 
                s.kills += d.kills; 
                s.deads += d.deads; 
                s.totalCh25 += d.ch25; 
                s.ap += d.ap; 
                s.count++; 
                if (typeof d.mpRank === 'number') s.totalMpRank += d.mpRank; 
                activeTroopKeys.forEach(k => s.b[k] += cleanNum(d.raw[k])); 
            } 
        });
        return { 
            ...s, 
            mp: s.power > 0 ? (s.merits / s.power) : 0, 
            avgAp: s.count > 0 ? (s.ap / s.count) : 0 
        };
    }

    function toggleTroops() { 
        const row = document.getElementById('troopRow'); 
        const arrow = document.getElementById('arrowIcon'); 
        row.classList.toggle('open'); 
        arrow.style.transform = row.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; 
    }

    function updateSortBar() { 
        const container = document.querySelector('#troopRow .metric-row'); 
        if (!container) return; 
        container.innerHTML = activeTroopKeys.map(k => `
            <button class="metric-btn ${currentSort.field === k ? 'active' : ''}" onclick="setSort('${k}', this)">${k.replace('+', '')}</button>
        `).join(''); 
    }

    function cleanNum(v) { 
        if (!v) return 0; 
        return parseFloat(String(v).replace(/,/g, '').replace('%', '')) || 0; 
    }

    function formatVal(n) { 
        if (!n) return "0"; 
        if (n >= 1e9) return (n/1e9).toFixed(2) + 'B'; 
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'; 
        return n.toLocaleString(); 
    }

    function formatValNoDec(n) { 
        return n ? Math.floor(n).toLocaleString() : "0"; 
    }

    function setSort(key, btn) { 
        if (currentSort.field === key) {
            currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc';
        } else {
            currentSort.field = key;
            currentSort.direction = 'desc';
        }

        document.querySelectorAll('.metrics-island .metric-btn').forEach(b => {
            b.classList.remove('active');
            const fieldKey = b.id.replace('btn-', '');
            if (sortLabels[fieldKey]) b.textContent = sortLabels[fieldKey];
        });

        if (btn) {
            btn.classList.add('active');
            btn.textContent += (currentSort.direction === 'desc' ? ' ▼' : ' ▲');
        } else if (key === 'teamName') {
            document.getElementById('btn-teamName').classList.add('active');
        }
        
        renderAll(); 
    }

    function updateId(tIdx, rIdx, val) { 
        currentTeams[tIdx].ids[rIdx] = val; 
        renderAll(); 
    }

    function updateName(tIdx, val) { currentTeams[tIdx].name = val; }
    function updateNote(tIdx, val) { currentTeams[tIdx].note = val; }
    function addRow(tIdx) { currentTeams[tIdx].ids.push("000"); renderAll(); }
    function removeRow(tIdx, rIdx) { currentTeams[tIdx].ids.splice(rIdx, 1); renderAll(); }
    function deleteTeam(tIdx) { if(confirm("Delete Team?")) { currentTeams.splice(tIdx, 1); renderAll(); } }
    function addNewTeam() { currentTeams.unshift({ name: "A New Group", ids: ["000"], note: "" }); renderAll(); }

    function setupSortable(tIdx) { 
        const el = document.getElementById(`tbody-${tIdx}`);
        if(el) {
            new Sortable(el, { 
                handle: '.drag-handle', 
                animation: 150, 
                onEnd: (evt) => { 
                    const team = currentTeams[tIdx]; 
                    const moved = team.ids.splice(evt.oldIndex, 1)[0]; 
                    team.ids.splice(evt.newIndex, 0, moved); 
                    renderAll(); 
                } 
            }); 
        }
    }

    function toggleModal(v) { document.getElementById('authModal').style.display = v ? 'flex' : 'none'; }
</script>
</body>
</html>
