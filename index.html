<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-portal {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 50px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        /* Subtle outer glow for the card */
        .main-portal::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, var(--primary), transparent);
            border-radius: 40px;
            z-index: -1;
            opacity: 0.2;
        }

        .hub-logo {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        p { 
            color: var(--muted); 
            margin-bottom: 45px; 
            font-weight: 600; 
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .button-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
        }

        .btn-module {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 800;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Hover Effect: Glow and Slide */
        .btn-module:hover {
            background: var(--primary);
            border-color: #60a5fa;
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 15px 30px -5px var(--primary-glow);
            letter-spacing: 3px;
        }

        /* Module Icon Decoration */
        .btn-module::after {
            content: '→';
            position: absolute;
            right: 20px;
            opacity: 0;
            transition: 0.3s;
            transform: translateX(-10px);
        }

        .btn-module:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        .btn-placeholder { 
            opacity: 0.25; 
            cursor: not-allowed; 
            border-style: dashed;
        }
    </style>
</head>
<body>
    <div class="main-portal">
        <span class="hub-logo">YOYOYOYOYO ITS YA BOY BN!!</span>
        <h1 class="page-title-main">Kingdom Hub</h1>
        <p> </p>
        
        <div class="button-grid">
            <a href="HistoricalPercents.html" class="btn-module">Kingdom Histories</a>
            <a href="CompareKingdoms.html" class="btn-module">Kingdom comparisons</a>
            <a href="KDPVP.html" class="btn-module">KD | PVP</a>
            <a href="Teams.html" class="btn-module">Official Teams</a>
            <a href="Matchups.html" class="btn-module">Official Matchups</a>
            
            <div class="btn-module btn-placeholder">Future Protocol</div>
        </div>
    </div>
</body>
</html>
