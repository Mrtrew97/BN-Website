<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Hub</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --bg-main: radial-gradient(circle at top right, #1e293b, #0f172a, #000000);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to bottom right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p { color: #94a3b8; margin-bottom: 40px; font-weight: 500; }

        .button-grid { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--primary);
            border-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>KINGDOM HUB</h1>
        <p></p>
        <div class="button-grid">
            <a href="HistoricalPercents.html" class="btn">Kingdom History</a>
            <a href="CompareKingdoms.html" class="btn">Kingdom Comparisons</a>
            <a href="KDPVP.html" class="btn">KD | PVP Analytics</a>
            <a href="Teams.html" class="btn">Official Teams</a>
            <a href="Matchups.html" class="btn">Official Matchups</a>
        </div>
    </div>
</body>
</html>
